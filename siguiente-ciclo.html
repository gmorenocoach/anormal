<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∀normal — Mi Siguiente Ciclo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060A14; --bg2:#0A0F1E; --bg3:#0E1525;
  --gold:#C9A84C; --gold2:#E8C96A; --gold3:#F5E0A0;
  --gd:rgba(201,168,76,.13); --gb:rgba(201,168,76,.28);
  --text:#EAE6DC; --dim:#9AA5B8; --faint:#3A4558; --ffaint:#1E2A3A;
  --grn:#4ABF7A; --rose:#D4537E; --azul:#5A8CC0;
  --rm:12px; --rl:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-weight:300;font-size:17.5px;line-height:1.7;-webkit-font-smoothing:antialiased}
.wrap{max-width:720px;margin:0 auto;padding:32px 22px 80px}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding-bottom:16px;border-bottom:1px solid var(--ffaint)}
.hdr-logo{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--gold);letter-spacing:.02em}
.hdr-info{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim)}
.label{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.titulo{font-family:'Cormorant Garamond',serif;font-size:33px;font-weight:400;line-height:1.25;color:var(--gold3);margin-bottom:14px;letter-spacing:.01em}
.subtitulo{font-size:15px;color:var(--dim);line-height:1.8;margin-bottom:24px}
.card{background:var(--bg2);border:1px solid var(--ffaint);border-radius:var(--rl);padding:22px 24px;margin-bottom:18px}
.card.gold{background:var(--gd);border-color:var(--gb)}
.ct{font-size:15px;color:var(--text);line-height:1.75}
.ct.dim{color:var(--dim)}
.quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px;color:var(--gold2);text-align:center;line-height:1.5;margin:24px 0;padding:0 20px}
.quote-autor{display:block;font-family:'Barlow Condensed',sans-serif;font-style:normal;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-top:8px}
.video-box{background:var(--bg3);border:1px dashed var(--faint);border-radius:var(--rl);padding:30px 24px;text-align:center;margin-bottom:18px}
.video-play{width:52px;height:52px;border-radius:50%;background:var(--gd);border:1px solid var(--gb);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:18px;color:var(--gold2)}
.video-txt{font-size:14px;color:var(--dim)}
.video-soon{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-top:4px}
.nav{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap}
.bp{flex:1;min-width:180px;background:var(--gold);color:#0A0A0A;border:none;border-radius:var(--rm);padding:15px 20px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;text-align:center}
.bp:hover{background:var(--gold2)}
.bs{background:transparent;color:var(--dim);border:1px solid var(--faint);border-radius:var(--rm);padding:15px 20px;font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;text-align:center}
.bs:hover{border-color:var(--gold);color:var(--gold2)}
.prog{display:flex;align-items:center;gap:6px;margin-bottom:24px}
.prog-seg{flex:1;height:3px;border-radius:2px;background:var(--ffaint);transition:background .4s}
.prog-seg.done{background:var(--gold)}
.prog-seg.now{background:var(--gold2)}
.textarea-ref{width:100%;background:var(--bg3);border:1px solid var(--faint);border-radius:var(--rm);color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;line-height:1.7;padding:13px 15px;resize:vertical;min-height:90px;outline:none;margin-top:6px}
.textarea-ref:focus{border-color:var(--gold)}
.hint{font-size:13px;color:var(--dim);line-height:1.6;margin-top:8px}
b,strong{font-weight:500;color:var(--gold2)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-logo">∀normal</div>
    <div class="hdr-info">Sesión 5 · Siguiente ciclo</div>
  </div>
  <div class="prog" id="prog"></div>
  <div id="contenido"></div>
</div>
<script>
function leer(c,d){ try{ var v=localStorage.getItem(c); return v===null?d:v; }catch(e){ return d; } }
function leerJSON(c,d){ try{ var v=localStorage.getItem(c); return v?JSON.parse(v):d; }catch(e){ return d; } }
function mk(tag,cls,txt){ var e=document.createElement(tag); if(cls)e.className=cls; if(txt!==undefined)e.textContent=txt; return e; }

var SC = leerJSON('anormal_siguiente_ciclo', {vision:'', queDejar:'', queLlevar:'', metaCiclo:''});
function guardarSC(){ localStorage.setItem('anormal_siguiente_ciclo', JSON.stringify(SC)); }

var CICLOS = [
  {n:1, ini:0,  fin:7,  nombre:"La base de todo",            emo:"Nostalgia"},
  {n:2, ini:7,  fin:14, nombre:"El despertar del cuerpo",    emo:"Miedo"},
  {n:3, ini:14, fin:21, nombre:"El despertar de la identidad", emo:"Enojo"},
  {n:4, ini:21, fin:28, nombre:"La salida al mundo",         emo:"Sorpresa"},
  {n:5, ini:28, fin:35, nombre:"La evaluación",              emo:"Alegría / Duda"},
  {n:6, ini:35, fin:42, nombre:"La búsqueda de sentido",     emo:"Tristeza"},
  {n:7, ini:42, fin:49, nombre:"Recoger lo sembrado",        emo:"Equilibrio"},
  {n:8, ini:49, fin:56, nombre:"Desapego y sabiduría",       emo:"Nostalgia integrada"},
  {n:9, ini:56, fin:200,nombre:"Legado y plenitud",          emo:"Amor"}
];
function edadActual(){
  var f=leer('anormal_fecha_nac',''); if(!f) return null;
  var d=new Date(f); if(isNaN(d.getTime())) return null;
  var hoy=new Date(); var e=hoy.getFullYear()-d.getFullYear();
  var m=hoy.getMonth()-d.getMonth(); if(m<0||(m===0&&hoy.getDate()<d.getDate())) e--;
  return e;
}
function cicloDeEdad(e){ for(var i=0;i<CICLOS.length;i++){ if(e>=CICLOS[i].ini && e<CICLOS[i].fin) return CICLOS[i]; } return CICLOS[0]; }

var PASOS=['intro','ciclos','vision','soltar','cierre'];
var pasoActual=0;
function renderProg(){ var p=document.getElementById('prog'); p.innerHTML=''; for(var i=0;i<PASOS.length;i++){ p.appendChild(mk('div','prog-seg'+(i<pasoActual?' done':i===pasoActual?' now':''))); } }
function irPaso(n){ if(n<0||n>=PASOS.length)return; pasoActual=n; renderProg();
  ({intro:renderIntro,ciclos:renderCiclos,vision:renderVision,soltar:renderSoltar,cierre:renderCierre})[PASOS[n]](); window.scrollTo(0,0); }
function siguiente(){ guardarSC(); irPaso(pasoActual+1); }
function anterior(){ guardarSC(); irPaso(pasoActual-1); }
function navBotones(c,txt,fn){ var nav=mk('div','nav'); var bs=mk('button','bs','← Anterior'); bs.onclick=anterior; var bp=mk('button','bp',txt||'Continuar →'); bp.onclick=fn||siguiente; if(pasoActual>0)nav.appendChild(bs); nav.appendChild(bp); c.appendChild(nav); }
function ta(refKey, ph, minH){ var t=mk('textarea','textarea-ref'); if(minH)t.style.minHeight=minH; t.value=SC[refKey]||''; t.placeholder=ph; t.oninput=function(){ SC[refKey]=this.value; guardarSC(); }; return t; }
function propositoHTML(){
  var ik=leerJSON('anormal_ikigai',{}); var prop=(ik.proposito||'').trim();
  if(!prop) return '';
  return '<div class="card gold"><div class="label">Tu razón de ser (de la sesión anterior)</div><p class="ct" style="font-style:italic;color:var(--gold3)">"'+prop.replace(/</g,'&lt;')+'"</p><p class="ct dim" style="margin-top:8px;font-size:13px">Todo lo que proyectes ahora debe servir a este propósito.</p></div>';
}

function renderIntro(){
  var c=document.getElementById('contenido'); c.innerHTML='';
  c.insertAdjacentHTML('beforeend','<div class="label">Sesión 5 · Primer trabajo</div>');
  c.insertAdjacentHTML('beforeend','<h1 class="titulo">Tu siguiente ciclo de vida.</h1>');
  c.insertAdjacentHTML('beforeend','<p class="subtitulo">Cada final es un nuevo comienzo. Con lo que descubriste sobre tu propósito, vas a mirar el ciclo de vida en el que estás y el que viene, para proyectar hacia dónde quieres llegar.</p>');
  c.insertAdjacentHTML('beforeend','<div class="video-box"><div class="video-play">▶</div><div class="video-txt">Video — Mi siguiente ciclo</div><div class="video-soon">Próximamente disponible</div></div>');
  c.insertAdjacentHTML('beforeend', propositoHTML());
  c.insertAdjacentHTML('beforeend','<p class="quote">El futuro pertenece a quienes creen en la belleza de sus sueños.<span class="quote-autor">Eleanor Roosevelt</span></p>');
  navBotones(c,'Ver mi ciclo actual →');
}

function renderCiclos(){
  var c=document.getElementById('contenido'); c.innerHTML='';
  c.insertAdjacentHTML('beforeend','<div class="label">Dónde estás y hacia dónde vas</div>');
  c.insertAdjacentHTML('beforeend','<h1 class="titulo">Tu ciclo actual y el próximo.</h1>');
  var e=edadActual();
  if(e===null){
    c.insertAdjacentHTML('beforeend','<div class="card"><p class="ct dim">No encontramos tu fecha de nacimiento para calcular tu ciclo. Puedes continuar igual — lo importante es proyectar hacia dónde vas.</p></div>');
  } else {
    var actual=cicloDeEdad(e);
    var prox=CICLOS[Math.min(actual.n, CICLOS.length-1)]; // el siguiente en el array
    if(prox.n===actual.n && actual.n<9) prox=CICLOS[actual.n];
    c.insertAdjacentHTML('beforeend','<p class="subtitulo">Tienes <b>'+e+' años</b>. Según los ciclos de vida de siete años (septenios) que trabajaste en la Sesión 2, esto es lo que estás viviendo y lo que se aproxima.</p>');
    // ciclo actual
    c.insertAdjacentHTML('beforeend','<div class="card gold"><div class="label">Tu ciclo actual · Ciclo '+actual.n+'</div><div style="font-family:Cormorant Garamond,serif;font-size:24px;color:var(--gold3);margin-bottom:4px">'+actual.nombre+'</div><div style="font-size:13px;color:var(--dim)">De los '+actual.ini+' a los '+actual.fin+' años · emoción: '+actual.emo+'</div></div>');
    // próximo ciclo
    if(prox.n!==actual.n){
      c.insertAdjacentHTML('beforeend','<div class="card"><div class="label" style="color:var(--azul)">Tu próximo ciclo · Ciclo '+prox.n+'</div><div style="font-family:Cormorant Garamond,serif;font-size:22px;color:var(--text);margin-bottom:4px">'+prox.nombre+'</div><div style="font-size:13px;color:var(--dim)">De los '+prox.ini+' a los '+prox.fin+' años · emoción: '+prox.emo+'</div></div>');
    }
  }
  // meta del ciclo, alimentada por el propósito
  var box=mk('div','card');
  box.appendChild(mk('div','label','¿A dónde quieres llegar?'));
  box.insertAdjacentHTML('beforeend','<p class="ct dim">Con tu propósito como brújula, ¿qué quieres lograr, sanar o construir en este ciclo y el que viene? ¿A dónde quieres llegar?</p>');
  box.appendChild(ta('metaCiclo','En este ciclo quiero llegar a...', '100px'));
  c.appendChild(box);
  navBotones(c,'Escribir mi visión →');
}

function renderVision(){
  var c=document.getElementById('contenido'); c.innerHTML='';
  c.insertAdjacentHTML('beforeend','<div class="label">Tu visión</div>');
  c.insertAdjacentHTML('beforeend','<h1 class="titulo">¿Quién estás construyendo?</h1>');
  c.insertAdjacentHTML('beforeend','<p class="subtitulo">Escribe en presente, como si ya estuvieras viviendo esta visión. No como un deseo — como una certeza de lo que estás construyendo.</p>');
  var box=mk('div','card'); box.appendChild(mk('div','label','Mi visión para el siguiente ciclo'));
  box.appendChild(ta('vision','Soy una persona que... Vivo... Me dedico a...', '120px'));
  c.appendChild(box);
  c.insertAdjacentHTML('beforeend','<p class="hint">Escríbela con detalle: cómo vives, qué haces, cómo te sientes, con quién estás. Mientras más vívida, más poder tiene.</p>');
  navBotones(c,'Qué dejo y qué llevo →');
}
function renderSoltar(){
  var c=document.getElementById('contenido'); c.innerHTML='';
  c.insertAdjacentHTML('beforeend','<div class="label">El umbral</div>');
  c.insertAdjacentHTML('beforeend','<h1 class="titulo">Qué dejas atrás, qué llevas contigo.</h1>');
  c.insertAdjacentHTML('beforeend','<p class="subtitulo">Un nuevo ciclo pide soltar lo que ya no sirve y honrar lo que sí. Nombra ambas cosas.</p>');
  var b1=mk('div','card'); b1.appendChild(mk('div','label','Lo que dejo atrás'));
  b1.insertAdjacentHTML('beforeend','<p class="ct dim">Hábitos, creencias, relaciones o miedos que ya no llevas al siguiente ciclo.</p>');
  b1.appendChild(ta('queDejar','Suelto...'));
  c.appendChild(b1);
  var b2=mk('div','card'); b2.appendChild(mk('div','label','Lo que llevo conmigo'));
  b2.insertAdjacentHTML('beforeend','<p class="ct dim">Aprendizajes, fortalezas y personas que sí vienen contigo.</p>');
  b2.appendChild(ta('queLlevar','Llevo conmigo...'));
  c.appendChild(b2);
  navBotones(c,'Continuar al plan de vida →');
}
function renderCierre(){
  var c=document.getElementById('contenido'); c.innerHTML='';
  c.insertAdjacentHTML('beforeend','<div class="label">Primer trabajo completo</div>');
  c.insertAdjacentHTML('beforeend','<h1 class="titulo">Tu siguiente ciclo está trazado.</h1>');
  if(SC.vision){ var box=mk('div','card gold'); box.appendChild(mk('div','label','Tu visión')); box.appendChild(mk('div','ct','"'+SC.vision+'"')); c.appendChild(box); }
  c.insertAdjacentHTML('beforeend','<p class="ct dim" style="margin-bottom:8px">Ahora vamos a convertir esta visión en un plan concreto para una vida plena: cuerpo, mente y espíritu.</p>');
  var nav=mk('div','nav'); var bs=mk('button','bs','← Anterior'); bs.onclick=anterior;
  var bp=mk('button','bp','Ir a mi Plan de Vida →'); bp.onclick=irPlan; nav.appendChild(bs); nav.appendChild(bp); c.appendChild(nav);
}
function irPlan(){ guardarSC();
  try{ var d=JSON.parse(sessionStorage.getItem('anormal_proceso')||'{}'); if(!d.progreso)d.progreso={}; d.progreso.sesion5_ciclo=true; sessionStorage.setItem('anormal_proceso',JSON.stringify(d)); }catch(e){}
  window.location.href='plan-vida.html';
}
irPaso(0);
</script>
</body>
</html>
