<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∀normal — Mi Plan de Vida Plena</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060A14; --bg2:#0A0F1E; --bg3:#0E1525;
  --gold:#C9A84C; --gold2:#E8C96A; --gold3:#F5E0A0;
  --gd:rgba(201,168,76,.13); --gb:rgba(201,168,76,.28);
  --text:#EAE6DC; --dim:#9AA5B8; --faint:#3A4558; --ffaint:#1E2A3A;
  --grn:#4ABF7A; --rose:#D4537E; --azul:#5A8CC0;
  --rm:12px; --rl:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-weight:300;font-size:17.5px;line-height:1.7;-webkit-font-smoothing:antialiased}
.wrap{max-width:720px;margin:0 auto;padding:32px 22px 80px}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding-bottom:16px;border-bottom:1px solid var(--ffaint)}
.hdr-logo{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--gold);letter-spacing:.02em}
.hdr-info{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim)}
.label{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.titulo{font-family:'Cormorant Garamond',serif;font-size:33px;font-weight:400;line-height:1.25;color:var(--gold3);margin-bottom:14px;letter-spacing:.01em}
.subtitulo{font-size:15px;color:var(--dim);line-height:1.8;margin-bottom:24px}
.card{background:var(--bg2);border:1px solid var(--ffaint);border-radius:var(--rl);padding:22px 24px;margin-bottom:18px}
.card.gold{background:var(--gd);border-color:var(--gb)}
.ct{font-size:15px;color:var(--text);line-height:1.75}
.ct.dim{color:var(--dim)}
.quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px;color:var(--gold2);text-align:center;line-height:1.5;margin:24px 0;padding:0 20px}
.quote-autor{display:block;font-family:'Barlow Condensed',sans-serif;font-style:normal;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-top:8px}
.video-box{background:var(--bg3);border:1px dashed var(--faint);border-radius:var(--rl);padding:30px 24px;text-align:center;margin-bottom:18px}
.video-play{width:52px;height:52px;border-radius:50%;background:var(--gd);border:1px solid var(--gb);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:18px;color:var(--gold2)}
.video-txt{font-size:14px;color:var(--dim)}
.video-soon{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-top:4px}
.nav{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap}
.bp{flex:1;min-width:180px;background:var(--gold);color:#0A0A0A;border:none;border-radius:var(--rm);padding:15px 20px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;text-align:center}
.bp:hover{background:var(--gold2)}
.bs{background:transparent;color:var(--dim);border:1px solid var(--faint);border-radius:var(--rm);padding:15px 20px;font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;text-align:center}
.bs:hover{border-color:var(--gold);color:var(--gold2)}
.prog{display:flex;align-items:center;gap:6px;margin-bottom:24px}
.prog-seg{flex:1;height:3px;border-radius:2px;background:var(--ffaint);transition:background .4s}
.prog-seg.done{background:var(--gold)}
.prog-seg.now{background:var(--gold2)}
.textarea-ref{width:100%;background:var(--bg3);border:1px solid var(--faint);border-radius:var(--rm);color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;line-height:1.7;padding:13px 15px;resize:vertical;min-height:80px;outline:none;margin-top:6px}
.textarea-ref:focus{border-color:var(--gold)}
.hint{font-size:13px;color:var(--dim);line-height:1.6;margin-top:8px}
.dim-tag{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:3px 12px;border-radius:20px;margin-bottom:10px}
.tag-ser{background:rgba(90,140,192,.15);color:var(--azul)}
.tag-hacer{background:var(--gd);color:var(--gold2)}
.tag-tener{background:rgba(74,191,122,.15);color:var(--grn)}
.declaracion{background:var(--gd);border:1px solid var(--gb);border-radius:var(--rl);padding:24px;margin:18px 0;text-align:center}
.declaracion-txt{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold3);line-height:1.5;font-style:italic}
b,strong{font-weight:500;color:var(--gold2)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-logo">∀normal</div>
    <div class="hdr-info">Sesión 5 · Plan de vida</div>
  </div>
  <div class="prog" id="prog"></div>
  <div id="contenido"></div>
</div>
<script>
function leer(c,d){ try{ var v=localStorage.getItem(c); return v===null?d:v; }catch(e){ return d; } }
function leerJSON(c,d){ try{ var v=localStorage.getItem(c); return v?JSON.parse(v):d; }catch(e){ return d; } }
function mk(tag,cls,txt){ var e=document.createElement(tag); if(cls)e.className=cls; if(txt!==undefined)e.textContent=txt; return e; }

function hiloLineaHTML(momento){
  var linea = leer('anormal_linea','');
  if(!linea) return '';
  var reflexion = (leer('anormal_linea_reflexion','')||'').trim();
  var cfg = {salud:{lbl:'la salud',color:'#4ABF7A'},dinero:{lbl:'el dinero',color:'#C9A84C'},amor:{lbl:'el amor',color:'#D4537E'}}[linea]||{lbl:'tu área elegida',color:'#C9A84C'};
  var intro = 'Cierras tu proceso donde lo empezaste: tu relación con <b style="color:'+cfg.color+'">'+cfg.lbl+'</b>. Todo este plan debe servir a esa transformación que elegiste al inicio.';
  var html='<div style="background:rgba(255,255,255,.02);border-left:3px solid '+cfg.color+';border-radius:0 10px 10px 0;padding:16px 18px;margin-bottom:18px">';
  html+='<div style="font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:'+cfg.color+';margin-bottom:8px">✦ Tu hilo conductor</div>';
  html+='<p style="font-size:14.5px;line-height:1.7;color:#EAE6DC;margin:0">'+intro+'</p>';
  if(reflexion){ html+='<div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06)"><div style="font-size:11px;color:#9AA5B8;margin-bottom:5px;font-style:italic">Donde empezó todo:</div><p style="font-size:14px;line-height:1.65;color:#C9A84C;margin:0;font-style:italic">"'+reflexion.replace(/</g,'&lt;')+'"</p></div>'; }
  html+='</div>';
  return html;
}

var PV = leerJSON('anormal_plan_vida', {ser:'', hacer:'', tener:'', declaracion:'', compromiso:'', ruedaFinal:{}, habitos:{cuerpo:[],mente:[],espiritu:[]}});
function guardarPV(){ localStorage.setItem('anormal_plan_vida', JSON.stringify(PV)); }
if(!PV.ruedaFinal) PV.ruedaFinal={};
if(!PV.habitos) PV.habitos={cuerpo:[],mente:[],espiritu:[]};

var PASOS=['intro','ser','hacer','tener','crecimiento','declaracion','cierre'];
var pasoActual=0;
function renderProg(){ var p=document.getElementById('prog'); p.innerHTML=''; for(var i=0;i<PASOS.length;i++){ p.appendChild(mk('div','prog-seg'+(i<pasoActual?' done':i===pasoActual?' now':''))); } }
function irPaso(n){ if(n<0||n>=PASOS.length)return; pasoActual=n; renderProg();
  ({intro:renderIntro,ser:renderSer,hacer:renderHacer,tener:renderTener,crecimiento:renderCrecimiento,declaracion:renderDeclaracion,cierre:renderCierre})[PASOS[n]](); window.scrollTo(0,0); }
function siguiente(){ guardarPV(); irPaso(pasoActual+1); }
function anterior(){ guardarPV(); irPaso(pasoActual-1); }
function navBotones(c,txt,fn){ var nav=mk('div','nav'); var bs=mk('button','bs','← Anterior'); bs.onclick=anterior; var bp=mk('button','bp',txt||'Continuar →'); bp.onclick=fn||siguiente; if(pasoActual>0)nav.appendChild(bs); nav.appendChild(bp); c.appendChild(nav); }
function ta(refKey, ph, minH){ var t=mk('textarea','textarea-ref'); if(minH)t.style.minHeight=minH; t.value=PV[refKey]||''; t.placeholder=ph; t.oninput=function(){ PV[refKey]=this.value; guardarPV(); }; return t; }

function renderIntro(){
  var c=document.getElementById('contenido'); c.innerHTML='';
  c.insertAdjacentHTML('beforeend','<div class="label">Sesión 5 · Segundo trabajo</div>');
  c.insertAdjacentHTML('beforeend','<h1 class="titulo">Tu Plan de Vida Plena.</h1>');
  c.insertAdjacentHTML('beforeend','<p class="subtitulo">Una vida plena no es una vida sin problemas — es una vida donde te disfrutas el camino y estás bien en las tres dimensiones del ser. Vas a construir tu plan en el <b>poder del tres</b>: <b>cuerpo</b>, <b>mente</b> y <b>espíritu</b>.</p>');
  c.insertAdjacentHTML('beforeend','<div class="video-box"><div class="video-play">▶</div><div class="video-txt">Video — Mi plan de vida plena</div><div class="video-soon">Próximamente disponible</div></div>');
  c.insertAdjacentHTML('beforeend','<div class="card gold"><p class="ct">El ser humano es uno solo, pero se expresa en tres: el <b>cuerpo</b> que habitas, la <b>mente</b> que piensa, y el <b>espíritu</b> que da sentido. Una vida plena cuida las tres — cuando una se descuida, las otras lo resienten.</p></div>');
  navBotones(c,'Empezar por el cuerpo →');
}
/* ═══════ CONSTRUCTOR DE CHECKLIST DE HÁBITOS ═══════ */
function construirChecklist(cont, dimKey, sugeridos, colorTag){
  // sugeridos: marcables. La persona también agrega los suyos. Todo se guarda en PV.habitos[dimKey]
  var box=mk('div','card');
  box.appendChild(mk('div','label','Marca los que te comprometes a hacer'));
  var lista=mk('div');
  function pintar(){
    lista.innerHTML='';
    // unir sugeridos + propios (propios = los que están en PV.habitos y no en sugeridos)
    var marcados=PV.habitos[dimKey]||[];
    var propios=marcados.filter(function(h){ return sugeridos.indexOf(h)<0; });
    var todos=sugeridos.concat(propios);
    todos.forEach(function(h){
      var on=marcados.indexOf(h)>=0;
      var row=mk('div'); row.style.cssText='display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg3);border-radius:8px;margin-bottom:7px;cursor:pointer;border:1px solid '+(on?colorTag:'transparent');
      var chk=mk('div'); chk.style.cssText='width:20px;height:20px;border-radius:5px;border:1px solid '+(on?colorTag:'var(--faint)')+';display:flex;align-items:center;justify-content:center;font-size:13px;color:'+colorTag+';flex-shrink:0'; chk.textContent=on?'✓':'';
      row.appendChild(chk);
      var txt=mk('span',null,h); txt.style.cssText='font-size:14.5px;color:'+(on?'var(--text)':'var(--dim)'); row.appendChild(txt);
      row.onclick=function(){ var i=PV.habitos[dimKey].indexOf(h); if(i>=0)PV.habitos[dimKey].splice(i,1); else PV.habitos[dimKey].push(h); guardarPV(); pintar(); };
      lista.appendChild(row);
    });
  }
  box.appendChild(lista);
  // agregar propio
  var row=mk('div'); row.style.cssText='display:flex;gap:8px;margin-top:10px';
  var inp=mk('input'); inp.type='text'; inp.placeholder='Agregar el mío...'; inp.style.cssText='flex:1;background:var(--bg3);border:1px solid var(--faint);border-radius:8px;color:var(--text);font-family:Barlow,sans-serif;font-size:14px;padding:10px 12px;outline:none';
  var btn=mk('button',null,'+'); btn.style.cssText='background:var(--gd);border:1px solid var(--gb);border-radius:8px;color:var(--gold2);font-size:20px;width:44px;cursor:pointer';
  function agregar(v){ v=(v||'').trim(); if(v && (PV.habitos[dimKey].indexOf(v)<0)){ PV.habitos[dimKey].push(v); guardarPV(); pintar(); } }
  btn.onclick=function(){ agregar(inp.value); inp.value=''; inp.focus(); };
  inp.onkeydown=function(e){ if(e.key==='Enter'){ e.preventDefault(); agregar(inp.value); inp.value=''; } };
  row.appendChild(inp); row.appendChild(btn); box.appendChild(row);
  pintar();
  cont.appendChild(box);
}

function renderSer(){
  var c=document.getElementById('contenido'); c.innerHTML='';
  c.insertAdjacentHTML('beforeend','<span class="dim-tag tag-ser">Dimensión 1 · Cuerpo</span>');
  c.insertAdjacentHTML('beforeend','<h1 class="titulo">Tu cuerpo: el templo.</h1>');
  c.insertAdjacentHTML('beforeend','<p class="subtitulo">Una vida plena empieza por el cuerpo: tu salud, tu energía, tu vitalidad. Es la casa donde vives. Elige los hábitos concretos con los que vas a cuidarlo — y agrega los tuyos.</p>');
  construirChecklist(c,'cuerpo',['Caminar cada día','Tomar suficiente agua','Establecer horarios de comida','Dieta baja en carbohidratos','Dormir bien','Hacer ejercicio','Reducir el azúcar','Estirar o moverme'],'var(--azul)');
  navBotones(c,'Continuar a la Mente →');
}
function renderHacer(){
  var c=document.getElementById('contenido'); c.innerHTML='';
  c.insertAdjacentHTML('beforeend','<span class="dim-tag tag-hacer">Dimensión 2 · Mente</span>');
  c.insertAdjacentHTML('beforeend','<h1 class="titulo">Tu mente: la claridad.</h1>');
  c.insertAdjacentHTML('beforeend','<p class="subtitulo">La mente es donde vive tu propósito, tus pensamientos, tu aprendizaje. Elige los hábitos con los que vas a nutrirla — y agrega los tuyos.</p>');
  construirChecklist(c,'mente',['Meditar','Leer cada día','Agradecer','Escribir un diario','Aprender algo nuevo','Cuidar mi diálogo interno','Reducir pantallas','Practicar el silencio'],'var(--gold2)');
  navBotones(c,'Continuar al Espíritu →');
}
function renderTener(){
  var c=document.getElementById('contenido'); c.innerHTML='';
  c.insertAdjacentHTML('beforeend','<span class="dim-tag tag-tener">Dimensión 3 · Espíritu</span>');
  c.insertAdjacentHTML('beforeend','<h1 class="titulo">Tu espíritu: el sentido.</h1>');
  c.insertAdjacentHTML('beforeend','<p class="subtitulo">El espíritu es tu conexión con algo más grande: tu sentido, tu paz, tus vínculos profundos. Elige los hábitos con los que vas a alimentarlo — y agrega los tuyos.</p>');
  construirChecklist(c,'espiritu',['Orar o conectar en silencio','Estar en la naturaleza','Servir a otros','Perdonar y soltar','Cultivar vínculos profundos','Practicar la gratitud','Contemplar','Vivir con propósito'],'var(--rose)');
  navBotones(c,'Ver mi crecimiento →');
}

/* ═══════ CRECIMIENTO VISIBLE ═══════ */
var AREAS_RUEDA=[
  {id:"salud_fisica",nombre:"Salud física",linea:"salud"},
  {id:"salud_emocional",nombre:"Salud emocional",linea:"salud"},
  {id:"habitos",nombre:"Hábitos",linea:"salud"},
  {id:"espiritualidad",nombre:"Espiritualidad y paz",linea:"salud"},
  {id:"finanzas",nombre:"Finanzas",linea:"dinero"},
  {id:"trabajo",nombre:"Trabajo y vocación",linea:"dinero"},
  {id:"emprendimiento",nombre:"Emprendimiento",linea:"dinero"},
  {id:"educacion",nombre:"Educación",linea:"dinero"},
  {id:"pareja",nombre:"Pareja y amor",linea:"amor"},
  {id:"familia",nombre:"Familia",linea:"amor"},
  {id:"relaciones",nombre:"Relaciones",linea:"amor"},
  {id:"autoamor",nombre:"Relación contigo mismo",linea:"amor"}
];
function colorLinea(l){ return {salud:'#4ABF7A',dinero:'#C9A84C',amor:'#D4537E'}[l]||'#C9A84C'; }
function renderCrecimiento(){
  var c=document.getElementById('contenido'); c.innerHTML='';
  c.insertAdjacentHTML('beforeend','<div class="label">Tu crecimiento</div>');
  c.insertAdjacentHTML('beforeend','<h1 class="titulo">Mira lo que lograste.</h1>');
  c.insertAdjacentHTML('beforeend','<p class="subtitulo">Empezaste este proceso calificando tu rueda de la vida. Ahora, con todo lo trabajado, vuelve a calificar cada área con la misma honestidad — y compara con dónde empezaste.</p>');
  var inicial=leerJSON('anormal_rueda_areas',{});
  // re-calificación
  AREAS_RUEDA.forEach(function(a){
    var ini=inicial[a.id]||null;
    var actual=PV.ruedaFinal[a.id]||ini||5;
    var col=colorLinea(a.linea);
    var box=mk('div','card'); box.style.padding='14px 18px';
    var head=mk('div'); head.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px';
    head.innerHTML='<span style="font-size:14px;color:var(--text)">'+a.nombre+'</span><span style="font-size:13px;color:var(--dim)">inicial: <b style="color:'+col+'">'+(ini!==null?ini:'—')+'</b> → ahora: <b id="val-'+a.id+'" style="color:'+col+'">'+actual+'</b></span>';
    box.appendChild(head);
    var slider=mk('input'); slider.type='range'; slider.min='1'; slider.max='10'; slider.value=actual;
    slider.style.cssText='width:100%;accent-color:'+col;
    slider.oninput=function(){ PV.ruedaFinal[a.id]=parseInt(this.value); guardarPV(); document.getElementById('val-'+a.id).textContent=this.value; };
    box.appendChild(slider);
    c.appendChild(box);
    if(!PV.ruedaFinal[a.id]) PV.ruedaFinal[a.id]=actual;
  });
  guardarPV();
  navBotones(c,'Escribir mi declaración →');
}

function promedioRueda(obj){ var t=0,n=0; AREAS_RUEDA.forEach(function(a){ if(obj[a.id]){ t+=obj[a.id]; n++; } }); return n?(t/n):0; }
function resumenCrecimientoHTML(){
  var ini=leerJSON('anormal_rueda_areas',{});
  var fin=PV.ruedaFinal||{};
  var pIni=promedioRueda(ini), pFin=promedioRueda(fin);
  if(pIni===0 && pFin===0) return '';
  var delta=pFin-pIni;
  var pts=parseInt(leer('anormal_puntos_conciencia','0'))||0;
  var s='<div class="card gold"><div class="label">Tu crecimiento en números</div>';
  s+='<div style="display:flex;justify-content:space-around;text-align:center;margin:10px 0">';
  s+='<div><div style="font-size:12px;color:var(--dim)">Rueda inicial</div><div style="font-family:Cormorant Garamond,serif;font-size:30px;color:var(--dim)">'+pIni.toFixed(1)+'</div></div>';
  s+='<div style="align-self:center;font-size:20px;color:var(--gold2)">→</div>';
  s+='<div><div style="font-size:12px;color:var(--dim)">Rueda ahora</div><div style="font-family:Cormorant Garamond,serif;font-size:30px;color:var(--gold3)">'+pFin.toFixed(1)+'</div></div>';
  if(delta>0){ s+='<div style="align-self:center"><div style="font-size:12px;color:var(--grn)">creciste</div><div style="font-family:Cormorant Garamond,serif;font-size:26px;color:var(--grn)">+'+delta.toFixed(1)+'</div></div>'; }
  s+='</div>';
  // comparación área por área
  s+='<div style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(201,168,76,.2)"><div style="font-size:12px;color:var(--dim);margin-bottom:10px">Área por área:</div>';
  AREAS_RUEDA.forEach(function(a){
    var vi=ini[a.id]||0, vf=fin[a.id]||0;
    if(!vi && !vf) return;
    var col=colorLinea(a.linea);
    var d=vf-vi;
    s+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12.5px">';
    s+='<span style="flex:1;color:var(--dim)">'+a.nombre+'</span>';
    s+='<span style="color:var(--faint)">'+vi+'</span>';
    s+='<div style="flex:1.5;height:6px;background:var(--ffaint);border-radius:3px;overflow:hidden;max-width:120px"><div style="height:100%;width:'+(vf*10)+'%;background:'+col+'"></div></div>';
    s+='<span style="color:'+col+';font-weight:500">'+vf+'</span>';
    if(d>0) s+='<span style="color:var(--grn);font-size:11px;min-width:26px">+'+d+'</span>'; else s+='<span style="min-width:26px"></span>';
    s+='</div>';
  });
  s+='</div>';
  s+='</div>';
  // NIVEL DE CONCIENCIA respecto a 200
  var meta=200;
  var pct=Math.min(100,Math.round(pts/meta*100));
  var falta=Math.max(0,meta-pts);
  s+='<div class="card"><div class="label">Tu nivel de conciencia</div>';
  s+='<p class="ct" style="margin-bottom:10px">En la escala de los niveles de conciencia, <b>200 es el umbral del Coraje</b> — el punto donde tu energía deja de restarte y empieza a impulsarte. Es la meta mínima, y se alcanza viviendo los principios día a día.</p>';
  s+='<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px"><span style="font-family:Cormorant Garamond,serif;font-size:34px;color:var(--gold3)">'+pts+'</span><span style="font-size:13px;color:var(--dim)">meta: '+meta+'</span></div>';
  s+='<div style="height:10px;background:var(--ffaint);border-radius:5px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,var(--gold),var(--gold2))"></div></div>';
  if(pts>=meta){ s+='<p class="ct" style="margin-top:10px;color:var(--grn)">✦ ¡Superaste el umbral de 200! Tu energía ya juega a tu favor. Ahora el camino es sostenerlo y seguir subiendo.</p>'; }
  else { s+='<p class="ct" style="margin-top:10px">Te faltan <b style="color:var(--gold2)">'+falta+' puntos</b> para llegar a 200. Cada acción que cumples de tus compromisos suma. El proceso no termina aquí: sigue cumpliendo lo que te propusiste, y verás cómo subes.</p>'; }
  s+='</div>';
  s+='<p class="ct dim" style="margin-top:4px;text-align:center;font-style:italic">Este número no es el final. Es la prueba de que cuando trabajas en ti, tu vida cambia. Y esto apenas comienza.</p>';
  return s;
}

function renderDeclaracion(){  var c=document.getElementById('contenido'); c.innerHTML='';
  c.insertAdjacentHTML('beforeend','<div class="label">Tu declaración de vida plena</div>');
  c.insertAdjacentHTML('beforeend','<h1 class="titulo">Integra todo en una sola visión.</h1>');
  c.insertAdjacentHTML('beforeend','<p class="subtitulo">La declaración de vida plena integra las tres dimensiones en una sola visión coherente: cómo cuidas tu <b>cuerpo</b>, cómo nutres tu <b>mente</b> y cómo alimentas tu <b>espíritu</b> — todo al servicio de disfrutar la vida.</p>');
  var box=mk('div','card'); box.appendChild(mk('div','label','Mi declaración de vida plena'));
  box.appendChild(ta('declaracion','Vivo una vida plena cuando cuido mi cuerpo..., nutro mi mente... y alimento mi espíritu...', '140px'));
  c.appendChild(box);
  c.insertAdjacentHTML('beforeend','<p class="hint">Léela en voz alta cuando termines. Lo que se declara con convicción, se vuelve realidad.</p>');
  navBotones(c,'Mi compromiso final →');
}
function renderCierre(){
  var c=document.getElementById('contenido'); c.innerHTML='';
  c.insertAdjacentHTML('beforeend','<div class="label">Cierre del proceso</div>');
  c.insertAdjacentHTML('beforeend','<h1 class="titulo">Alcanzaste tu anormalidad.</h1>');
  c.insertAdjacentHTML('beforeend', resumenCrecimientoHTML());
  if(PV.declaracion){ c.insertAdjacentHTML('beforeend','<div class="declaracion"><div class="label" style="text-align:center">Tu declaración de vida plena</div><div class="declaracion-txt">"'+PV.declaracion.replace(/</g,'&lt;')+'"</div></div>'); }
  c.insertAdjacentHTML('beforeend', hiloLineaHTML('cierre'));
  c.insertAdjacentHTML('beforeend','<div class="card"><div class="label">Los principios que activaste</div><p class="ct dim">∀15 Alcanza el resultado, luego mejora · ∀16 Acelera el proceso · ∀17 Atención y enfoque constante · ∀18 Alcanzas la anormalidad</p></div>');
  var comp=mk('div','card gold'); comp.appendChild(mk('div','label','Mi compromiso final'));
  comp.insertAdjacentHTML('beforeend','<p class="ct dim">¿Cuál es la primera acción concreta con la que empiezas a vivir tu plan, esta semana?</p>');
  comp.appendChild(ta('compromiso','Me comprometo a...'));
  c.appendChild(comp);
  c.insertAdjacentHTML('beforeend','<p class="quote">Terminaste el camino. Pero el camino apenas empieza — ahora se llama tu vida.<span class="quote-autor">∀normal</span></p>');
  var nav=mk('div','nav'); var bs=mk('button','bs','← Anterior'); bs.onclick=anterior;
  var bp=mk('button','bp','Cerrar mi proceso ∀normal →'); bp.onclick=cerrarProceso; nav.appendChild(bs); nav.appendChild(bp); c.appendChild(nav);
}
function cerrarProceso(){
  guardarPV();
  try{ if(PV.ruedaFinal && Object.keys(PV.ruedaFinal).length){ localStorage.setItem('anormal_rueda_final', JSON.stringify(PV.ruedaFinal)); } }catch(e){}
  try{
    var repo=leerJSON('anormal_compromisos_areas',{});
    if(PV.compromiso && PV.compromiso.trim()){ repo['principios_sesion5']={nombre:'Sesión 5 · Vivir mi plan (∀15-∀18)',texto:PV.compromiso.trim()}; }
    if(PV.declaracion && PV.declaracion.trim()){ repo['declaracion_vida']={nombre:'Mi declaración de vida plena',texto:PV.declaracion.trim()}; }
    // hábitos de cuerpo/mente/espíritu como compromisos
    var H=PV.habitos||{};
    if(H.cuerpo && H.cuerpo.length){ repo['habitos_cuerpo']={nombre:'Cuerpo · mis hábitos',texto:H.cuerpo.join(', ')}; }
    if(H.mente && H.mente.length){ repo['habitos_mente']={nombre:'Mente · mis hábitos',texto:H.mente.join(', ')}; }
    if(H.espiritu && H.espiritu.length){ repo['habitos_espiritu']={nombre:'Espíritu · mis hábitos',texto:H.espiritu.join(', ')}; }
    localStorage.setItem('anormal_compromisos_areas',JSON.stringify(repo));
  }catch(e){}
  try{ var d=JSON.parse(sessionStorage.getItem('anormal_proceso')||'{}'); if(!d.progreso)d.progreso={}; d.progreso.sesion5_completa=true; sessionStorage.setItem('anormal_proceso',JSON.stringify(d)); }catch(e){}
  localStorage.setItem('anormal_sesion5_completa','1');
  localStorage.setItem('anormal_proceso_completo','1');
  window.location.href='resumen-conciencia.html';
}
irPaso(0);
