<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∀normal — Mi Razón de Ser</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@300;400;500&display=swap" rel="stylesheet">
<style>

:root{--bg:#0A0F1E;--bg2:#0E1525;--bg3:#131D30;--bg4:#1A2640;
--gold:#C9A84C;--gold2:#E8C96A;--gold3:#F5E0A0;
--gd:rgba(201,168,76,.13);--gb:rgba(201,168,76,.28);
--text:#EAE6DC;--dim:#8A95A8;--faint:#3A4558;
--acc:#4A9EBF;--acd:rgba(74,158,191,.13);--acb:rgba(74,158,191,.28);
--grn:#4ABF7A;--grd:rgba(74,191,122,.12);--grb:rgba(74,191,122,.28);
--pur:#9B7FD4;--pud:rgba(155,127,212,.12);--pub:rgba(155,127,212,.28);
--azul:#4A9EBF;--azulb:rgba(74,158,191,.18);
--am:#C9A84C;--amb:rgba(201,168,76,.18);
--vd:#4ABF7A;--vdb:rgba(74,191,122,.18);
--ro:#D4537E;--rob:rgba(212,83,126,.18);
--r:4px;--rm:8px;--rl:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Barlow",sans-serif;font-weight:300;font-size:15px;line-height:1.65;min-height:100vh}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(201,168,76,.04),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(74,158,191,.04),transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:0 22px 80px}
.prog{display:flex;align-items:center;margin-bottom:28px;overflow-x:auto;padding-bottom:3px}
.ps{display:flex;align-items:center;gap:5px;white-space:nowrap;padding:3px 0;cursor:default;flex-shrink:0}
.ps.done{cursor:pointer}
.pn{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;border:1px solid var(--faint);color:var(--faint);transition:all .3s;flex-shrink:0}
.ps.done .pn{border-color:var(--gold);color:var(--gold);background:var(--gd)}
.ps.act .pn{border-color:var(--gold2);color:var(--bg);background:var(--gold2)}
.ptxt{font-size:9px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);transition:color .3s}
.ps.done .ptxt,.ps.act .ptxt{color:var(--gold)}
.pln{flex:1;min-width:6px;height:1px;background:var(--faint);margin:0 4px;opacity:.2;transition:all .3s}
.pln.done{background:var(--gold);opacity:.4}
.panel{display:none}.panel.act{display:block;animation:fu .35s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pbadge{display:inline-flex;align-items:center;gap:8px;background:var(--gd);border:1px solid var(--gb);border-radius:var(--rl);padding:6px 14px;margin-bottom:16px}
.pbadge-q{font-family:"Cormorant Garamond",serif;font-size:18px;color:var(--gold2);font-weight:300;font-style:italic}
.ph{margin-bottom:20px}
.ph-s{font-family:"Barlow Condensed",sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.ph-t{font-family:"Cormorant Garamond",serif;font-size:clamp(18px,4vw,28px);font-weight:300;color:var(--gold2);line-height:1.15;margin-bottom:4px}
.ph-d{font-size:13px;color:var(--dim);line-height:1.8;max-width:540px}
.card{background:var(--bg2);border:1px solid rgba(255,255,255,.055);border-radius:var(--rl);padding:18px 22px;margin-bottom:11px}
.card.gold{border-color:var(--gb);background:linear-gradient(135deg,var(--bg2),var(--bg3))}
.card.pur{border-color:var(--pub);background:linear-gradient(135deg,var(--bg2),var(--pud))}
.card.acc{border-color:var(--acb);background:linear-gradient(135deg,var(--bg2),var(--acd))}
.card.grn{border-color:var(--grb);background:linear-gradient(135deg,var(--bg2),var(--grd))}
.cl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:9px}
.cl.b{color:var(--acc)}.cl.p{color:var(--pur)}.cl.g{color:var(--grn)}.cl.r{color:#E09070}
.ct{font-size:13px;color:var(--dim);line-height:1.8}
.il{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:5px;display:block}
.inp{background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:"Barlow",sans-serif;font-size:14px;font-weight:300;padding:9px 13px;width:100%;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--faint)}
.irow{display:flex;gap:9px;flex-wrap:wrap}
.bp{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border:none;border-radius:var(--r);font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;padding:11px 26px;cursor:pointer;transition:opacity .2s,transform .15s}
.bp:hover{opacity:.9;transform:translateY(-1px)}
.bs{background:transparent;color:var(--gold);border:1px solid var(--gb);border-radius:var(--r);font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:7px 16px;cursor:pointer;transition:all .2s}
.bs:hover{background:var(--gd)}
.bn{background:transparent;color:var(--dim);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);font-family:"Barlow",sans-serif;font-size:13px;padding:8px 16px;cursor:pointer;transition:all .2s}
.bn:hover{border-color:var(--gold);color:var(--gold)}
/* Sublistas 3 columnas */
.sub3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.sub-col{background:var(--bg3);border-radius:var(--rm);padding:11px 12px;border:1px solid rgba(255,255,255,.06)}
.sub-col-t{font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;margin-bottom:8px;text-align:center;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.06)}
.sub-col-area{min-height:80px;display:flex;flex-wrap:wrap;gap:5px;align-content:flex-start;padding:4px 0}
.pap{display:inline-flex;align-items:center;gap:4px;padding:4px 9px 4px 10px;border-radius:var(--r);font-size:12px;border:1px solid transparent;animation:pi .2s ease}
@keyframes pi{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.pap.azul{background:var(--azulb);border-color:rgba(74,158,191,.4);color:var(--azul)}
.pap.am{background:var(--amb);border-color:rgba(201,168,76,.4);color:var(--am)}
.pap.vd{background:var(--vdb);border-color:rgba(74,191,122,.4);color:var(--vd)}
.pap.ro{background:var(--rob);border-color:rgba(212,83,126,.4);color:var(--ro)}
.pap.multi{background:var(--gd);border-color:var(--gold);color:var(--gold2)}
.pap.dup{background:linear-gradient(135deg,var(--azulb),var(--amb));border-color:var(--gold);color:var(--gold2);font-weight:500}
.pap.sim{background:var(--bg4);border-color:rgba(255,255,255,.2);color:var(--dim)}
.pap.sel{background:var(--gd);border-color:var(--gold2);color:var(--gold2);font-weight:500}
.pdel{background:transparent;border:none;color:inherit;opacity:.5;cursor:pointer;font-size:12px;padding:0;line-height:1}
.pdel:hover{opacity:1}
/* Input con selector de sublista */
.addinput-wrap{background:var(--bg3);border-radius:var(--rm);padding:12px 14px;border:1px solid rgba(255,255,255,.06)}
.sub-sel-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.sub-sel-btn{padding:5px 12px;border-radius:var(--r);font-size:11px;font-family:"Barlow Condensed",sans-serif;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--dim);transition:all .2s}
.sub-sel-btn.on{border-color:var(--gold);background:var(--gd);color:var(--gold2)}
.arow{display:flex;gap:7px;align-items:center}
.ainp{flex:1;background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:"Barlow",sans-serif;font-size:13px;padding:8px 11px;outline:none;transition:border-color .2s}
.ainp:focus{border-color:var(--gold)}
.ainp::placeholder{color:var(--faint)}
.abtn{padding:8px 13px;border-radius:var(--r);border:1px solid;font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;background:transparent;transition:all .18s}
/* Tabla cruce verde */
.cruce-tabla{width:100%;border-collapse:collapse;margin-bottom:10px}
.cruce-tabla th{font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;padding:8px 10px;text-align:left;border-bottom:1px solid rgba(255,255,255,.1)}
.cruce-tabla td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;vertical-align:middle}
.cruce-tabla tr:last-child td{border-bottom:none}
.cruce-tabla tr{cursor:pointer;transition:background .18s}
.cruce-tabla tr:hover{background:rgba(255,255,255,.03)}
.cruce-tabla tr.agregado td{opacity:.35}
.tag-dup{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--gd);border:1px solid var(--gold);color:var(--gold2);font-weight:500;white-space:nowrap}
.tag-sim{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bg4);border:1px solid rgba(255,255,255,.15);color:var(--dim);white-space:nowrap}
/* Cruce selector */
.cruce-selector{background:var(--bg3);border-radius:var(--rm);padding:14px 16px;margin-bottom:10px;border:1.5px solid rgba(255,255,255,.07)}
.cruce-s-t{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px}
.cruce-s-d{font-size:12px;color:var(--dim);margin-bottom:10px;line-height:1.55}
.cruce-chips{display:flex;flex-wrap:wrap;gap:5px;min-height:32px;padding:6px;background:var(--bg4);border-radius:var(--r);margin-bottom:6px}
.chip-sel{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--r);font-size:12px;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:var(--bg3);color:var(--dim);transition:all .18s}
.chip-sel:hover{border-color:var(--gold);color:var(--gold2)}
.chip-sel.on{background:var(--gd);border-color:var(--gold2);color:var(--gold2);font-weight:500}
.hint{font-size:12px;color:var(--faint);font-style:italic}
/* Frase */
.fdisp{background:var(--bg4);border:1px solid var(--gb);border-radius:var(--rm);padding:15px 17px;font-family:"Cormorant Garamond",serif;font-size:17px;color:var(--faint);line-height:1.9;font-style:italic;min-height:65px;margin-bottom:9px}
.fta{background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:"Barlow",sans-serif;font-size:14px;font-weight:300;padding:12px 14px;width:100%;min-height:80px;outline:none;resize:vertical;line-height:1.75;transition:border-color .2s}
.fta:focus{border-color:var(--gold)}
.cta{background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:"Barlow",sans-serif;font-size:13px;font-weight:300;padding:13px;width:100%;min-height:190px;outline:none;resize:vertical;line-height:1.85}
/* Reflexiones */
.rr{background:var(--bg4);border:1px solid var(--gb);border-radius:var(--rm);padding:13px 15px;margin:8px 0}
.rr-l{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:5px;font-weight:500}
.rr.b{border-color:var(--acb)}.rr.b .rr-l{color:var(--acc)}
.rr.p{border-color:var(--pub)}.rr.p .rr-l{color:var(--pur)}
.rrp{font-size:13px;color:var(--dim);line-height:1.75;margin-bottom:7px}
.rta{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:"Barlow",sans-serif;font-size:13px;padding:9px 11px;width:100%;min-height:60px;outline:none;resize:vertical;line-height:1.65;transition:border-color .2s}
.rta:focus{border-color:var(--gold)}
.rta::placeholder{color:var(--faint)}
.rchk{display:flex;align-items:center;gap:8px;margin-top:6px;cursor:pointer}
.rchk input{width:14px;height:14px;accent-color:var(--gold);cursor:pointer}
.rchk label{font-size:12px;color:var(--dim);cursor:pointer}
.rdone{display:inline-flex;font-size:11px;color:var(--grn);padding:3px 9px;background:var(--grd);border:1px solid var(--grb);border-radius:12px;margin-top:4px}
.dmsg{background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(74,158,191,.05));border:1px solid var(--gb);border-radius:var(--rl);padding:12px 16px;margin-bottom:11px;text-align:center}
.dm-l{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.dm-t{font-family:"Cormorant Garamond",serif;font-size:14px;font-style:italic;color:var(--gold3);line-height:1.8}
.cierre{background:linear-gradient(135deg,rgba(155,127,212,.1),rgba(201,168,76,.07));border:1px solid var(--pub);border-radius:var(--rl);padding:22px 18px;margin-top:14px;text-align:center}
.ct2{font-family:"Cormorant Garamond",serif;font-size:21px;color:var(--gold2);margin-bottom:9px;font-style:italic;line-height:1.3}
.cp{font-size:13px;color:var(--dim);line-height:1.85;max-width:480px;margin:0 auto 10px}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:12px;border-top:1px solid rgba(255,255,255,.05)}
/* Ikigai visual */
.iki-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:13px 0}
.iki-cell{border-radius:var(--rm);padding:12px 14px;border:1px solid}
.iki-cell.azul{background:var(--azulb);border-color:rgba(74,158,191,.4)}
.iki-cell.am{background:var(--amb);border-color:rgba(201,168,76,.4)}
.iki-cell.vd{background:var(--vdb);border-color:rgba(74,191,122,.4)}
.iki-cell.ro{background:var(--rob);border-color:rgba(212,83,126,.4)}
.iki-cell-t{font-size:12px;font-weight:500;margin-bottom:3px}
.iki-cell-d{font-size:11px;color:var(--dim);line-height:1.5}
/* Proposito conceptos */
.concepto-card{background:var(--bg3);border-radius:var(--rm);padding:14px 16px;margin-bottom:9px;border-left:3px solid}
.concepto-t{font-family:"Cormorant Garamond",serif;font-size:18px;font-weight:300;margin-bottom:4px}
.concepto-d{font-size:13px;color:var(--dim);line-height:1.75}
.ejemplo-card{background:var(--bg4);border-radius:var(--r);padding:10px 13px;margin-top:8px;border:1px solid rgba(255,255,255,.06)}
.ej-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;margin-bottom:4px}
.ej-txt{font-size:12px;color:var(--dim);line-height:1.6;font-style:italic}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gb);border-radius:2px}
@media(max-width:600px){.app{padding:0 14px 60px}.sub3{grid-template-columns:1fr}.iki-grid{grid-template-columns:1fr}}




/* VIDEO BANNER */
.vid-banner{background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(74,158,191,.04));border:1px solid rgba(201,168,76,.2);border-radius:14px;overflow:hidden;margin:0 22px 20px;display:none}
.vid-banner.show{display:block}
.vid-banner-hdr{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between}
.vid-banner-lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#C9A84C;font-weight:500;font-family:Barlow Condensed,sans-serif}
.vid-banner-mod{font-size:11px;color:#8A95A8}
.vid-banner-player{position:relative;width:100%;aspect-ratio:16/9;background:#060A14}
.vid-banner-player iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.vid-banner-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;padding:20px}
.vid-ph-icon{width:44px;height:44px;border-radius:50%;background:rgba(201,168,76,.13);border:1.5px solid rgba(201,168,76,.28);display:flex;align-items:center;justify-content:center;font-size:16px;color:#E8C96A}
.vid-ph-t{font-family:Cormorant Garamond,serif;font-size:15px;color:#E8C96A;font-weight:300}
.vid-ph-d{font-size:11px;color:#3A4558;line-height:1.55;max-width:240px}
@media(max-width:560px){.vid-banner{margin:0 14px 16px}}


/* BOTON BRUJULA */
.brujula-btn-fixed{position:fixed;bottom:22px;right:22px;z-index:500;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.brujula-btn{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.08));border:1px solid rgba(201,168,76,.35);border-radius:30px;padding:10px 16px;cursor:pointer;transition:all .25s;text-decoration:none;backdrop-filter:blur(8px)}
.brujula-btn:hover{background:linear-gradient(135deg,rgba(201,168,76,.25),rgba(201,168,76,.15));border-color:rgba(201,168,76,.6);transform:translateY(-2px)}
.brujula-btn-icon{font-family:"Cormorant Garamond",serif;font-size:18px;color:var(--gold2);font-weight:300;line-height:1}
.brujula-btn-txt{font-size:11px;font-family:"Barlow Condensed",sans-serif;letter-spacing:.14em;text-transform:uppercase;color:var(--gold2);font-weight:500}
.brujula-toast{background:var(--bg3);border:1px solid var(--gb);border-radius:var(--rm,10px);padding:9px 14px;font-size:12px;color:var(--gold3);font-family:"Barlow",sans-serif;max-width:220px;text-align:right;line-height:1.5;display:none;animation:btoast .3s ease}
.brujula-toast.show{display:block}
@keyframes btoast{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

</style>
</head>
<body>

<!-- VIDEO BANNER: Ikigai -->
<div class="vid-banner" id="vid-banner-ikigai">
  <div class="vid-banner-hdr">
    <div class="vid-banner-lbl">Introducción al módulo</div>
    <div class="vid-banner-mod">Ikigai</div>
  </div>
  <div class="vid-banner-player" id="vid-player-ikigai">
    <div class="vid-banner-ph">
      <div class="vid-ph-icon">&#9654;</div>
      <div class="vid-ph-t">Video de introducción</div>
      <div class="vid-ph-d">Alonso te explica lo que encontrarás en este módulo y cómo aprovecharlo al máximo.</div>
    </div>
  </div>
</div>
<div class="app" id="app"></div>
<script>
// ============================================================
// WIDGET DE PRINCIPIOS Y COMPROMISOS - ∀normal
// v2.0 - Con recordatorio no negociable y orden original de principios
// ============================================================

var MODULO_PRINCIPIOS = {"bienvenida":[1,4,14],"rueda":[11,12],"elementos":[11,12],"camino":[5,9],"subnums":[5],"mapa":[9],"flechas":[9],"nombre":[5,9],"personas":[9,13],"dolan":[12,13],"perfil":[9],"septenios":[3,16],"ecg":[2,10],"nino":[2,3,7],"ikigai":[6,8,17],"ciclo":[15,16],"plan":[13,15,16],"dashboard":[18,9]};

 es el acto de honestidad que hace que el plan de vida funcione."}, {"num": 9, "titulo": "∀sume responsabilidad total", "sesion": "sesion2", "color": "#9B7FD4", "no_negociable": "Lo que tu numerolog\u00eda y tus valores revelan no es un destino fijo. Es un mapa. T\u00fa decides c\u00f3mo usarlo. Eso es responsabilidad total."}, {"num": 10, "titulo": "∀poyo emocional como combustible", "sesion": "sesion3", "color": "#D4537E", "no_negociable": "El dolor emocional que emerge en esta sesi\u00f3n no es un obst\u00e1culo. Es combustible. La intensidad que sientes es proporcional a la transformaci\u00f3n que viene."}, {"num": 11, "titulo": "∀palancamiento: la verdad contigo mismo", "sesion": "sesion1", "color": "#C9A84C", "no_negociable": "El diagn\u00f3stico solo funciona si eres brutalmente honesto. El n\u00famero que le das a cada \u00e1rea de tu vida debe reflejar la realidad, no c\u00f3mo quisieras que fuera."}, {"num": 12, "titulo": "∀doptas lo que toleras", "sesion": "sesion1", "color": "#C9A84C", "no_negociable": "Las \u00e1reas con calificaci\u00f3n baja son exactamente lo que has estado tolerando. Verlo sin juzgarte es el primer paso. Seguir toler\u00e1ndolo despu\u00e9s de verlo es la excusa."}, {"num": 13, "titulo": "∀pr\u00f3piate la insatisfacci\u00f3n", "sesion": "sesion2", "color": "#9B7FD4", "no_negociable": "La brecha entre tus valores declarados y los que realmente vives no es una falla \u2014 es informaci\u00f3n. Usa esa insatisfacci\u00f3n como motor, no como excusa."}, {"num": 14, "titulo": "∀dopta m\u00e9todos probados", "sesion": "bienvenida", "color": "#C9A84C", "no_negociable": "Esta plataforma integra metodolog\u00edas con d\u00e9cadas de validaci\u00f3n. Tu trabajo es aplicarlas con honestidad, no cuestionarlas antes de vivirlas."}, {"num": 15, "titulo": "∀lcanza el resultado, luego mejora", "sesion": "sesion5", "color": "#4ABF7A", "no_negociable": "Tu plan de vida no necesita ser perfecto para empezar. Necesita ser tuyo y necesita empezar. La acci\u00f3n imperfecta ejecutada vale m\u00e1s que el plan perfecto que nunca sale."}, {"num": 16, "titulo": "∀celera el proceso", "sesion": "sesion5", "color": "#4ABF7A", "no_negociable": "Cada d\u00eda que pasa sin ejecutar el plan es un d\u00eda que no vuelve. La urgencia no es ansiedad \u2014 es el respeto que le tienes a tu propio tiempo."}, {"num": 17, "titulo": "∀tenci\u00f3n y enfoque constante", "sesion": "sesion4", "color": "#E8C96A", "no_negociable": "Haz este m\u00f3dulo sin interrupciones. Lo que emerja es proporcional a tu concentraci\u00f3n."}, {"num": 18, "titulo": "∀lcanzas la anormalidad", "sesion": "sesion5", "color": "#4ABF7A", "no_negociable": "Completar este proceso te convierte en alguien diferente. Esa diferencia ser\u00e1 visible \u2014 y no todos la aplaudir\u00e1n. Esa resistencia confirma que el proceso funcion\u00f3."}];

// Principios acumulados que el participante ya ha visto

      var rt=document.createElement("div");rt.style.cssText="font-family:Cormorant Garamond,serif;font-size:22px;color:#E8C96A;text-align:center;margin-bottom:8px;font-weight:300;line-height:1.3";

      anteriores.slice(-3).forEach(function(pr){
        var prow=document.createElement("div");prow.style.cssText="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)";

        prow.appendChild(pn);prow.appendChild(pt);aviso.appendChild(prow);

      if(anteriores.length>3){var mas=document.createElement("div");mas.style.cssText="font-size:11px;color:#3A4558;margin-top:6px;text-align:center";mas.textContent="+ "+(anteriores.length-3)+" principios anteriores";aviso.appendChild(mas);}
      sec.appendChild(aviso);

      var pregunta=document.createElement("div");pregunta.style.cssText="background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:12px 16px;text-align:center";
      pregunta.innerHTML="<span style='font-family:Cormorant Garamond,serif;font-size:16px;color:#E8C96A;font-style:italic'>Una excusa no te saca de la plataforma — te saca de tu máximo potencial.<br>¿Sigues dentro del camino ∀normal?</span>";

    // FASE PRINCIPIOS

      var pId=principiosIds[paso];
      var pr=PRINCIPIOS_DB.find(function(p2){return p2.num===pId;});

      sec2.appendChild(numDiv);
      var tit=document.createElement("div");tit.style.cssText="font-family:Cormorant Garamond,serif;font-size:26px;font-weight:300;color:"+pr.color+";margin-bottom:14px;line-height:1.2";tit.textContent=pr.titulo;sec2.appendChild(tit);

      if(pr.no_negociable){
        var nnBlk=document.createElement("div");nnBlk.style.cssText="background:rgba(212,83,126,.07);border:1px solid rgba(212,83,126,.2);border-radius:10px;padding:11px 14px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px";
        var nnIcon=document.createElement("div");nnIcon.style.cssText="font-size:14px;color:#D4537E;flex-shrink:0;margin-top:1px";nnIcon.textContent="!";
        var nnTxt=document.createElement("div");
        var nnLabel=document.createElement("div");nnLabel.style.cssText="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#D4537E;font-weight:500;margin-bottom:4px;font-family:Barlow Condensed,sans-serif";nnLabel.textContent="No negociable";
        var nnCont=document.createElement("div");nnCont.style.cssText="font-size:12px;color:#EAE6DC;line-height:1.65";nnCont.textContent=pr.no_negociable;
        nnTxt.appendChild(nnLabel);nnTxt.appendChild(nnCont);nnBlk.appendChild(nnIcon);nnBlk.appendChild(nnTxt);sec2.appendChild(nnBlk);
      }

      if(pr.aplicacion){
        var aplBlk=document.createElement("div");aplBlk.style.cssText="background:#1A2640;border-radius:10px;padding:12px 14px;border-left:3px solid "+pr.color+";margin-bottom:12px";
        var aplL=document.createElement("div");aplL.style.cssText="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:"+pr.color+";margin-bottom:4px;font-weight:500;font-family:Barlow Condensed,sans-serif";aplL.textContent="En este módulo";
        var aplT=document.createElement("div");aplT.style.cssText="font-size:13px;color:#EAE6DC;line-height:1.65;font-style:italic";aplT.textContent=pr.aplicacion;
        aplBlk.appendChild(aplL);aplBlk.appendChild(aplT);sec2.appendChild(aplBlk);
      }

      body.appendChild(sec2);

      var btnP=paso>0?document.createElement("button"):document.createElement("span");
      if(paso>0){btnP.style.cssText="background:transparent;color:#3A4558;border:1px solid #1E2A3A;border-radius:4px;font-family:Barlow,sans-serif;font-size:13px;padding:9px 16px;cursor:pointer";btnP.textContent="Anterior";btnP.onclick=function(){paso--;showPaso();};}
      ftr.appendChild(btnP);

      btnN2.textContent=paso<principiosIds.length-1?"Siguiente principio":"Mis compromisos";
      btnN2.onclick=function(){paso++;showPaso();};ftr.appendChild(btnN2);
      return;
    }

    // FASE COMPROMISOS
    var sec3=document.createElement("div");sec3.style.cssText="padding:20px 0";
    var ct=document.createElement("div");ct.style.cssText="font-family:Cormorant Garamond,serif;font-size:22px;color:#E8C96A;margin-bottom:6px;font-weight:300";ct.textContent="Mis compromisos para este módulo";sec3.appendChild(ct);
    var cs=document.createElement("div");cs.style.cssText="font-size:13px;color:#8A95A8;margin-bottom:18px;line-height:1.65";cs.textContent="Los principios te dieron el marco. Ahora escribe qué harás diferente a partir de hoy en este módulo.";sec3.appendChild(cs);
    principiosIds.forEach(function(pId2){
      var pr2=PRINCIPIOS_DB.find(function(p2){return p2.num===pId2;});if(!pr2)return;
      var blk=document.createElement("div");blk.style.cssText="margin-bottom:14px;background:#131D30;border-radius:10px;padding:13px 15px;border-left:3px solid "+pr2.color;
      var bt=document.createElement("div");bt.style.cssText="font-size:11px;font-weight:500;color:"+pr2.color+";margin-bottom:6px;letter-spacing:.08em;text-transform:uppercase;font-family:Barlow Condensed,sans-serif";bt.textContent="∀"+pr2.num+" · "+pr2.titulo;blk.appendChild(bt);
      var ta=document.createElement("textarea");ta.style.cssText="background:#0A0F1E;border:1px solid rgba(255,255,255,.07);border-radius:6px;color:#EAE6DC;font-family:Barlow,sans-serif;font-size:13px;padding:9px 12px;width:100%;min-height:70px;outline:none;resize:vertical;line-height:1.6;transition:border-color .2s";
      ta.placeholder="Describe qué cambiarás o harás diferente a partir de hoy...";ta.value=compromisos_mod["p"+pId2]||"";
      ta.onfocus=function(){this.style.borderColor=pr2.color;};ta.onblur=function(){this.style.borderColor="rgba(255,255,255,.07)";};
      ta.oninput=(function(pid){return function(){compromisos_mod["p"+pid]=this.value;};})(pId2);
      blk.appendChild(ta);sec3.appendChild(blk);
    });
    body.appendChild(sec3);

    var btnB2=document.createElement("button");btnB2.style.cssText="background:transparent;color:#3A4558;border:1px solid #1E2A3A;border-radius:4px;font-family:Barlow,sans-serif;font-size:13px;padding:9px 16px;cursor:pointer";btnB2.textContent="Revisar";btnB2.onclick=function(){paso--;showPaso();};ftr.appendChild(btnB2);
    var btnFin=document.createElement("button");btnFin.style.cssText="background:linear-gradient(135deg,#C9A84C,#E8C96A);color:#060A14;border:none;border-radius:4px;font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;padding:11px 26px;cursor:pointer";
    btnFin.textContent="Comenzar el módulo";
    btnFin.onclick=function(){
      if(window.guardarCompromisosModulo)window.guardarCompromisosModulo(moduloId,compromisos_mod);
      document.body.removeChild(overlay);
      if(onComplete)onComplete();

    ftr.appendChild(btnFin);

  box.appendChild(body);box.appendChild(ftr);overlay.appendChild(box);

  var style=document.createElement("style");

  // Arrancar en recordatorio si hay anteriores, si no en principios

window.guardarCompromisosModulo = function(moduloId, compromisos){
  if(!window.COMPROMISOS_PROCESO)window.COMPROMISOS_PROCESO={};
  window.COMPROMISOS_PROCESO[moduloId]=compromisos;
};

<script>
// ============================================================
// ANORMAL - Módulo de datos compartidos entre módulos
// Usa sessionStorage para pasar datos entre páginas HTML
// ============================================================

var ANORMAL = {
  
  // Leer todos los datos del proceso
  getData: function() {
    try {
      var raw = sessionStorage.getItem('anormal_proceso');
      return raw ? JSON.parse(raw) : {};
    } catch(e) { return {}; }
  },
  
  // Guardar datos del proceso
  setData: function(data) {
    try {
      sessionStorage.setItem('anormal_proceso', JSON.stringify(data));
    } catch(e) {}
  },
  
  // Actualizar una sección específica
  update: function(section, value) {
    var data = this.getData();
    data[section] = value;
    this.setData(data);
  },
  
  // Agregar un compromiso/hábito a la agenda central
  addAgenda: function(item) {
    // item = {modulo, titulo, descripcion, fecha, periodicidad, tipo}
    var data = this.getData();
    if (!data.agenda) data.agenda = [];
    item.id = 'ag_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    item.cumplido = false;
    item.fechaCreacion = new Date().toLocaleDateString('es-CO');
    data.agenda.push(item);
    this.setData(data);
    return item.id;
  },
  
  // Guardar lo marcado en septenios para que fluya al ECG y al Niño Interior
  saveSeptenios: function(checklistEstado, cicloActual, nombre, genero) {
    var doloresPorCiclo = [];
    
    Object.keys(checklistEstado).forEach(function(chkKey) {
      var est = checklistEstado[chkKey];
      if (!est || !est.dolor || !est.dolor.length) return;
      
      // Extraer número de ciclo del key ('chk-3' -> 3, 'actual-5' -> 5)
      var cicloNum = 0;
      if (chkKey.startsWith('chk-')) cicloNum = parseInt(chkKey.replace('chk-',''));
      else if (chkKey.startsWith('actual-')) cicloNum = parseInt(chkKey.replace('actual-',''));
      if (!cicloNum) return;
      
      // Obtener los ítems de dolor marcados
      var cicloDatos = window.CICLOS_DATA ? window.CICLOS_DATA[String(cicloNum)] : null;
      if (!cicloDatos) return;
      
      var itemsMarcados = est.dolor.map(function(idx) {
        return cicloDatos.dolor[idx] || '';
      }).filter(Boolean);
      
      var itemsAlegria = (est.alegria || []).map(function(idx) {
        return cicloDatos.alegria[idx] || '';
      }).filter(Boolean);
      
      if (itemsMarcados.length || itemsAlegria.length) {
        doloresPorCiclo.push({
          ciclo: cicloNum,
          tipo: cicloDatos.tipo,
          titulo: cicloDatos.titulo,
          edades: cicloDatos.titulo.match(/\d+ a \d+/)?.[0] || '',
          dolores: itemsMarcados,
          alegrias: itemsAlegria,
          // Preguntas respondidas
          respuestas: [0,1,2].map(function(pi) {
            return checklistEstado[chkKey + '-preg-' + pi] || '';
          }).filter(Boolean)
        });
      }
    });
    
    // Ordenar por ciclo
    doloresPorCiclo.sort(function(a,b){return a.ciclo - b.ciclo;});
    
    this.update('septenios', {
      cicloActual: cicloActual,
      nombre: nombre,
      genero: genero,
      doloresPorCiclo: doloresPorCiclo,
      fecha: new Date().toLocaleDateString('es-CO')
    });
  },
  
  // Obtener datos de septenios para el ECG
  getSepteniosParaECG: function() {
    var data = this.getData();
    return data.septenios || null;
  },
  
  // Obtener ciclos 1-2-3 para el Niño Interior
  getCiclosInfancia: function() {
    var sep = this.getSepteniosParaECG();
    if (!sep) return [];
    return sep.doloresPorCiclo.filter(function(c) {
      return c.ciclo <= 3;
    });
  },
  
  // Guardar compromisos de un módulo en la agenda central
  saveCompromisos: function(moduloId, compromisos) {
    if (!compromisos || !Object.keys(compromisos).length) return;
    var data = this.getData();
    if (!data.agenda) data.agenda = [];
    
    Object.keys(compromisos).forEach(function(key) {
      var texto = (compromisos[key] || '').trim();
      if (!texto) return;
      // Evitar duplicados del mismo módulo+key
      var exists = data.agenda.some(function(item) {
        return item.moduloId === moduloId && item.key === key;
      });
      if (!exists) {
        data.agenda.push({
          id: 'ag_' + moduloId + '_' + key,
          moduloId: moduloId,
          key: key,
          tipo: 'compromiso-principio',
          descripcion: texto,
          fechaCreacion: new Date().toLocaleDateString('es-CO'),
          cumplido: false,
          periodicidad: 'diario'
        });
      }
    });
    this.setData(data);
  },

  // ============================================================
  // FASE 1 — ¿Quién soy? — guardado genérico por módulo
  // ============================================================

  // Guardar el resultado de un módulo de Fase 1 (o cualquier fase)
  // moduloId: 'rueda' | 'elementos' | 'camino' | 'subnumeros' | 'mapa' |
  //           'flechas' | 'nombre' | 'personas' | 'dolan' | 'ikigai' |
  //           'siguiente_ciclo' | 'plan_vida'
  saveFaseModulo: function(moduloId, resultado) {
    var data = this.getData();
    if (!data.fase1) data.fase1 = {};
    if (!data.fase3) data.fase3 = {};
    var fase3Ids = ['ikigai', 'siguiente_ciclo', 'plan_vida'];
    var bucket = fase3Ids.indexOf(moduloId) >= 0 ? data.fase3 : data.fase1;
    bucket[moduloId] = resultado;
    bucket[moduloId + '_fecha'] = new Date().toLocaleDateString('es-CO');
    this.setData(data);
    this.marcarModuloCompletado(moduloId);
  },

  // Leer el resultado guardado de un módulo específico
  getFaseModulo: function(moduloId) {
    var data = this.getData();
    if (data.fase1 && data.fase1[moduloId] !== undefined) return data.fase1[moduloId];
    if (data.fase3 && data.fase3[moduloId] !== undefined) return data.fase3[moduloId];
    return null;
  },

  // Obtener todo lo guardado de Fase 1 de una vez (para Perfil Integrado)
  getFase1Completa: function() {
    var data = this.getData();
    return data.fase1 || {};
  },

  // Obtener todo lo guardado de Fase 3
  getFase3Completa: function() {
    var data = this.getData();
    return data.fase3 || {};
  },

  // ============================================================
  // PROGRESO — qué módulos completó la persona (para el Dashboard)
  // ============================================================

  TODOS_LOS_MODULOS: [
    {id:'rueda', fase:1, nombre:'Rueda de Vida'},
    {id:'elementos', fase:1, nombre:'Elementos'},
    {id:'camino', fase:1, nombre:'Camino de Vida'},
    {id:'subnumeros', fase:1, nombre:'Subnúmeros'},
    {id:'mapa', fase:1, nombre:'Mapa Energético'},
    {id:'flechas', fase:1, nombre:'Flechas'},
    {id:'nombre', fase:1, nombre:'Nombre'},
    {id:'personas', fase:1, nombre:'Personas'},
    {id:'dolan', fase:1, nombre:'Valores Dolan'},
    {id:'perfil', fase:1, nombre:'Perfil Integrado'},
    {id:'septenios', fase:2, nombre:'Mis Ciclos de Vida'},
    {id:'ecg', fase:2, nombre:'Mi Trabajo Emocional'},
    {id:'perdon', fase:2, nombre:'Mi Trabajo del Perdón'},
    {id:'ikigai', fase:3, nombre:'Ikigai'},
    {id:'siguiente_ciclo', fase:3, nombre:'Siguiente Ciclo'},
    {id:'plan_vida', fase:3, nombre:'Plan de Vida'}
  ],

  marcarModuloCompletado: function(moduloId) {
    var data = this.getData();
    if (!data.progreso) data.progreso = {};
    data.progreso[moduloId] = {
      completado: true,
      fecha: new Date().toLocaleDateString('es-CO')
    };
    this.setData(data);
  },

  // Devuelve la lista de módulos con su estado de completado, para pintar el Dashboard
  getProgreso: function() {
    var data = this.getData();
    var progreso = data.progreso || {};
    return this.TODOS_LOS_MODULOS.map(function(m) {
      return {
        id: m.id,
        fase: m.fase,
        nombre: m.nombre,
        completado: !!(progreso[m.id] && progreso[m.id].completado),
        fecha: progreso[m.id] ? progreso[m.id].fecha : null
      };
    });
  },

  // Porcentaje de avance total y por fase
  getPorcentajeAvance: function() {
    var prog = this.getProgreso();
    var total = prog.length;
    var hechos = prog.filter(function(m){ return m.completado; }).length;
    var porFase = {1:{total:0,hechos:0}, 2:{total:0,hechos:0}, 3:{total:0,hechos:0}};
    prog.forEach(function(m) {
      porFase[m.fase].total++;
      if (m.completado) porFase[m.fase].hechos++;
    });
    return {
      total: total, hechos: hechos,
      porcentaje: total ? Math.round((hechos/total)*100) : 0,
      porFase: porFase
    };
  }
};

};

function calcCruceAzAm(){
  var az=getAllAzul();var am=getAllAm();
  var iguales=[];var similares=[];
  az.forEach(function(w){
    var wl=w.toLowerCase();var found=false;
    am.forEach(function(a){if(a.toLowerCase()===wl){if(iguales.indexOf(w)<0)iguales.push(w);found=true;}});
    if(!found){
      am.forEach(function(a){
        var al=a.toLowerCase();
        if(!found&&(wl.indexOf(al)>=0||al.indexOf(wl)>=0||(wl.length>4&&al.length>4&&(wl.slice(0,5)===al.slice(0,5))))){
          var par=w+"|"+a;if(similares.map(function(s){return s.az+"|"+s.am;}).indexOf(par)<0)similares.push({az:w,am:a});
          found=true;
        }
      });
    }
  });
  return{iguales:iguales,similares:similares};
}

        var arr=k==="pasion"?(S.selsAzul.pasion=S.selsAzul.pasion||[]):k==="profesion"?(S.selsAm.profesion=S.selsAm.profesion||[]):k==="vocacion"?(S.selsVd.vocacion=S.selsVd.vocacion||[]):(S.selsRo.mision=S.selsRo.mision||[]);

// INIT VIDEO BANNER
(function(){
  var vdb = document.getElementById("vid-banner-ikigai");
  var vdp = document.getElementById("vid-player-ikigai");
  var url = window.VIDEOS_MODULO && window.VIDEOS_MODULO["ikigai"] || "";
  if(url && vdb && vdp){
    var m2 = url.match(/(?:v=|youtu\.be\/|embed\/)([\w-]{11})/);
    if(m2){
      var ifr = document.createElement("iframe");
      ifr.src = "https://www.youtube.com/embed/" + m2[1] + "?rel=0";
      ifr.allow = "accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture";
      ifr.allowFullscreen = true;
      vdp.innerHTML = "";
      vdp.appendChild(ifr);
    }
    vdb.classList.add("show");
  } else if(vdb){
    vdb.classList.add("show");
  }
})();

// Arrancar: si el widget ya se vio, ir directo al init
(function() {
  var _key = 'widget_visto_ikigai';
  if (localStorage.getItem(_key) === '1') {
    init();
  } else {
    buildWidgetPrincipios("ikigai", document.body, function() {
      localStorage.setItem(_key, '1');
      init();
    });
  }
})();
