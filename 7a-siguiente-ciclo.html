<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∀normal — Mi Siguiente Ciclo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@300;400;500&display=swap" rel="stylesheet">
<style>

:root{--bg:#0A0F1E;--bg2:#0E1525;--bg3:#131D30;--bg4:#1A2640;
--gold:#C9A84C;--gold2:#E8C96A;--gold3:#F5E0A0;
--gd:rgba(201,168,76,.13);--gb:rgba(201,168,76,.28);
--text:#EAE6DC;--dim:#8A95A8;--faint:#3A4558;
--acc:#4A9EBF;--acd:rgba(74,158,191,.13);--acb:rgba(74,158,191,.28);
--grn:#4ABF7A;--grd:rgba(74,191,122,.12);--grb:rgba(74,191,122,.28);
--pur:#9B7FD4;--pud:rgba(155,127,212,.12);--pub:rgba(155,127,212,.28);
--r:4px;--rm:8px;--rl:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Barlow",sans-serif;font-weight:300;font-size:15px;line-height:1.65;min-height:100vh}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(201,168,76,.04),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(74,158,191,.04),transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:740px;margin:0 auto;padding:0 22px 80px}
.prog{display:flex;align-items:center;margin-bottom:28px;overflow-x:auto;padding-bottom:3px}
.ps{display:flex;align-items:center;gap:5px;white-space:nowrap;padding:3px 0;cursor:default;flex-shrink:0}
.ps.done{cursor:pointer}
.pn{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;border:1px solid var(--faint);color:var(--faint);transition:all .3s;flex-shrink:0}
.ps.done .pn{border-color:var(--gold);color:var(--gold);background:var(--gd)}
.ps.act .pn{border-color:var(--gold2);color:var(--bg);background:var(--gold2)}
.ptxt{font-size:9px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);transition:color .3s}
.ps.done .ptxt,.ps.act .ptxt{color:var(--gold)}
.pln{flex:1;min-width:6px;height:1px;background:var(--faint);margin:0 4px;opacity:.2;transition:all .3s}
.pln.done{background:var(--gold);opacity:.4}
.panel{display:none}.panel.act{display:block;animation:fu .35s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pbadge{display:inline-flex;align-items:center;gap:8px;background:var(--gd);border:1px solid var(--gb);border-radius:var(--rl);padding:6px 14px;margin-bottom:16px}
.pbadge-q{font-family:"Cormorant Garamond",serif;font-size:18px;color:var(--gold2);font-weight:300;font-style:italic}
.ph{margin-bottom:20px}
.ph-s{font-family:"Barlow Condensed",sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.ph-t{font-family:"Cormorant Garamond",serif;font-size:clamp(18px,4vw,28px);font-weight:300;color:var(--gold2);line-height:1.15;margin-bottom:4px}
.ph-d{font-size:13px;color:var(--dim);line-height:1.8;max-width:520px}
.card{background:var(--bg2);border:1px solid rgba(255,255,255,.055);border-radius:var(--rl);padding:18px 22px;margin-bottom:11px}
.card.gold{border-color:var(--gb);background:linear-gradient(135deg,var(--bg2),var(--bg3))}
.card.pur{border-color:var(--pub);background:linear-gradient(135deg,var(--bg2),var(--pud))}
.card.acc{border-color:var(--acb);background:linear-gradient(135deg,var(--bg2),var(--acd))}
.card.grn{border-color:var(--grb);background:linear-gradient(135deg,var(--bg2),var(--grd))}
.cl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:9px}
.cl.b{color:var(--acc)}.cl.p{color:var(--pur)}.cl.g{color:var(--grn)}
.ct{font-size:13px;color:var(--dim);line-height:1.8}
.il{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:5px;display:block}
.inp{background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:"Barlow",sans-serif;font-size:14px;font-weight:300;padding:9px 13px;width:100%;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--faint)}
.irow{display:flex;gap:9px;flex-wrap:wrap}
.bp{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border:none;border-radius:var(--r);font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;padding:11px 26px;cursor:pointer;transition:opacity .2s,transform .15s}
.bp:hover{opacity:.9;transform:translateY(-1px)}
.bs{background:transparent;color:var(--gold);border:1px solid var(--gb);border-radius:var(--r);font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:7px 16px;cursor:pointer}
.bn{background:transparent;color:var(--dim);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);font-family:"Barlow",sans-serif;font-size:13px;padding:8px 16px;cursor:pointer}
.bn:hover{border-color:var(--gold);color:var(--gold)}
.rta{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:"Barlow",sans-serif;font-size:13px;padding:9px 11px;width:100%;outline:none;resize:vertical;line-height:1.65;transition:border-color .2s}
.rta:focus{border-color:var(--gold)}
.rta::placeholder{color:var(--faint)}
.ciclo-card{border-radius:var(--rl);padding:20px 22px;margin-bottom:14px;border:1.5px solid}
.ciclo-card.actual{border-color:var(--gold);background:linear-gradient(135deg,var(--bg2),rgba(201,168,76,.06))}
.ciclo-card.prox{border-color:rgba(74,191,122,.4);background:linear-gradient(135deg,var(--bg2),rgba(74,191,122,.05))}
.ciclo-card.prox2{border-color:rgba(74,158,191,.4);background:linear-gradient(135deg,var(--bg2),rgba(74,158,191,.05))}
.ciclo-badge{display:inline-flex;align-items:center;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.ciclo-num{font-family:"Cormorant Garamond",serif;font-size:42px;font-weight:300;line-height:1;flex-shrink:0}
.ciclo-info{flex:1}
.ciclo-tipo{font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;margin-bottom:2px}
.ciclo-nombre{font-family:"Cormorant Garamond",serif;font-size:18px;font-weight:300;color:var(--gold2)}
.ciclo-edades{font-size:12px;color:var(--dim)}
.prop-blk{background:var(--bg4);border-radius:var(--rm);padding:13px 15px;margin-bottom:9px;border-left:3px solid}
.prop-blk-l{font-size:10px;letter-spacing:.13em;text-transform:uppercase;font-weight:500;margin-bottom:5px}
.prop-blk-hint{font-size:12px;color:var(--dim);line-height:1.55;margin-bottom:7px;font-style:italic}
.dmsg{background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(74,158,191,.05));border:1px solid var(--gb);border-radius:var(--rl);padding:12px 16px;margin-bottom:11px;text-align:center}
.dm-l{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.dm-t{font-family:"Cormorant Garamond",serif;font-size:14px;font-style:italic;color:var(--gold3);line-height:1.8}
.cierre{background:linear-gradient(135deg,rgba(155,127,212,.1),rgba(201,168,76,.07));border:1px solid var(--pub);border-radius:var(--rl);padding:22px 18px;margin-top:14px;text-align:center}
.ct2{font-family:"Cormorant Garamond",serif;font-size:20px;color:var(--gold2);margin-bottom:9px;font-style:italic;line-height:1.3}
.cp{font-size:13px;color:var(--dim);line-height:1.85;max-width:460px;margin:0 auto 10px}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:12px;border-top:1px solid rgba(255,255,255,.05)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gb);border-radius:2px}
@media(max-width:560px){.app{padding:0 14px 60px}}




/* VIDEO BANNER */
.vid-banner{background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(74,158,191,.04));border:1px solid rgba(201,168,76,.2);border-radius:14px;overflow:hidden;margin:0 22px 20px;display:none}
.vid-banner.show{display:block}
.vid-banner-hdr{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between}
.vid-banner-lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#C9A84C;font-weight:500;font-family:Barlow Condensed,sans-serif}
.vid-banner-mod{font-size:11px;color:#8A95A8}
.vid-banner-player{position:relative;width:100%;aspect-ratio:16/9;background:#060A14}
.vid-banner-player iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.vid-banner-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;padding:20px}
.vid-ph-icon{width:44px;height:44px;border-radius:50%;background:rgba(201,168,76,.13);border:1.5px solid rgba(201,168,76,.28);display:flex;align-items:center;justify-content:center;font-size:16px;color:#E8C96A}
.vid-ph-t{font-family:Cormorant Garamond,serif;font-size:15px;color:#E8C96A;font-weight:300}
.vid-ph-d{font-size:11px;color:#3A4558;line-height:1.55;max-width:240px}
@media(max-width:560px){.vid-banner{margin:0 14px 16px}}


/* BOTON BRUJULA */
.brujula-btn-fixed{position:fixed;bottom:22px;right:22px;z-index:500;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.brujula-btn{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.08));border:1px solid rgba(201,168,76,.35);border-radius:30px;padding:10px 16px;cursor:pointer;transition:all .25s;text-decoration:none;backdrop-filter:blur(8px)}
.brujula-btn:hover{background:linear-gradient(135deg,rgba(201,168,76,.25),rgba(201,168,76,.15));border-color:rgba(201,168,76,.6);transform:translateY(-2px)}
.brujula-btn-icon{font-family:"Cormorant Garamond",serif;font-size:18px;color:var(--gold2);font-weight:300;line-height:1}
.brujula-btn-txt{font-size:11px;font-family:"Barlow Condensed",sans-serif;letter-spacing:.14em;text-transform:uppercase;color:var(--gold2);font-weight:500}
.brujula-toast{background:var(--bg3);border:1px solid var(--gb);border-radius:var(--rm,10px);padding:9px 14px;font-size:12px;color:var(--gold3);font-family:"Barlow",sans-serif;max-width:220px;text-align:right;line-height:1.5;display:none;animation:btoast .3s ease}
.brujula-toast.show{display:block}
@keyframes btoast{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

</style>
</head>
<body>

<!-- VIDEO BANNER: Mi Siguiente Ciclo -->
<div class="vid-banner" id="vid-banner-ciclo">
  <div class="vid-banner-hdr">
    <div class="vid-banner-lbl">Introducción al módulo</div>
    <div class="vid-banner-mod">Mi Siguiente Ciclo</div>
  </div>
  <div class="vid-banner-player" id="vid-player-ciclo">
    <div class="vid-banner-ph">
      <div class="vid-ph-icon">&#9654;</div>
      <div class="vid-ph-t">Video de introducción</div>
      <div class="vid-ph-d">Alonso te explica lo que encontrarás en este módulo y cómo aprovecharlo al máximo.</div>
    </div>
  </div>
</div>
<div class="app" id="app"></div>
<script>
// ============================================================
// WIDGET DE PRINCIPIOS Y COMPROMISOS - ∀normal
// v2.0 - Con recordatorio no negociable y orden original de principios
// ============================================================

var MODULO_PRINCIPIOS = {"bienvenida":[1,4,14],"rueda":[11,12],"elementos":[11,12],"camino":[5,9],"subnums":[5],"mapa":[9],"flechas":[9],"nombre":[5,9],"personas":[9,13],"dolan":[12,13],"perfil":[9],"septenios":[3,16],"ecg":[2,10],"nino":[2,3,7],"ikigai":[6,8,17],"ciclo":[15,16],"plan":[13,15,16],"dashboard":[18,9]};

var PRINCIPIOS_DB = [{"num": 1, "titulo": "∀gradecer", "sesion": "bienvenida", "color": "#C9A84C", "no_negociable": "Mientras avanzas en este proceso, la gratitud no es opcional. Es el lente desde el que lees cada resultado, cada ejercicio, cada descubrimiento sobre ti mismo."}, {"num": 2, "titulo": "∀vanza en el perd\u00f3n", "sesion": "sesion3", "color": "#D4537E", "no_negociable": "Sin perd\u00f3n no hay transformaci\u00f3n real. Puedes completar todos los ejercicios \u2014 pero si cargas resentimiento, el proceso no puede hacer su trabajo completo."}, {"num": 3, "titulo": "∀provecha el dolor", "sesion": "sesion3", "color": "#D4537E", "no_negociable": "El dolor que emerja en este proceso no es se\u00f1al de que algo sale mal. Es la se\u00f1al de que algo est\u00e1 cambiando. No te detengas."}, {"num": 4, "titulo": "∀p\u00fantale al compromiso", "sesion": "bienvenida", "color": "#C9A84C", "no_negociable": "Ya te comprometiste al entrar. Ese compromiso no vence. Cada vez que sientas que quieres pausar, recuerda: te comprometiste antes de saber el c\u00f3mo. Conf\u00eda."}, {"num": 5, "titulo": "∀prende a normalizar lo extraordinario", "sesion": "sesion2", "color": "#9B7FD4", "no_negociable": "Lo que descubras sobre ti en esta sesi\u00f3n debe convertirse en tu nueva normalidad, no en un dato interesante que olvidas en una semana."}, {"num": 6, "titulo": "∀taca el miedo", "sesion": "sesion4", "color": "#E8C96A", "no_negociable": "Declarar tu prop\u00f3sito de vida activa todos tus miedos. Eso es normal y es buena se\u00f1al. La \u00fanica respuesta ∀normal es seguir avanzando."}, {"num": 7, "titulo": "∀prende cero excusas", "sesion": "sesion3", "color": "#D4537E", "no_negociable": "Una excusa no te saca del proceso. Te saca de tu m\u00e1ximo potencial. Recuerda tu compromiso."}, {"num": 8, "titulo": "∀prende a pagar el precio", "sesion": "sesion4", "color": "#E8C96A", "no_negociable": "Vivir tu prop\u00f3sito tiene un precio real. Identificarlo aqu\u00ed y aceptarlo es el acto de honestidad que hace que el plan de vida funcione."}, {"num": 9, "titulo": "∀sume responsabilidad total", "sesion": "sesion2", "color": "#9B7FD4", "no_negociable": "Lo que tu numerolog\u00eda y tus valores revelan no es un destino fijo. Es un mapa. T\u00fa decides c\u00f3mo usarlo. Eso es responsabilidad total."}, {"num": 10, "titulo": "∀poyo emocional como combustible", "sesion": "sesion3", "color": "#D4537E", "no_negociable": "El dolor emocional que emerge en esta sesi\u00f3n no es un obst\u00e1culo. Es combustible. La intensidad que sientes es proporcional a la transformaci\u00f3n que viene."}, {"num": 11, "titulo": "∀palancamiento: la verdad contigo mismo", "sesion": "sesion1", "color": "#C9A84C", "no_negociable": "El diagn\u00f3stico solo funciona si eres brutalmente honesto. El n\u00famero que le das a cada \u00e1rea de tu vida debe reflejar la realidad, no c\u00f3mo quisieras que fuera."}, {"num": 12, "titulo": "∀doptas lo que toleras", "sesion": "sesion1", "color": "#C9A84C", "no_negociable": "Las \u00e1reas con calificaci\u00f3n baja son exactamente lo que has estado tolerando. Verlo sin juzgarte es el primer paso. Seguir toler\u00e1ndolo despu\u00e9s de verlo es la excusa."}, {"num": 13, "titulo": "∀pr\u00f3piate la insatisfacci\u00f3n", "sesion": "sesion2", "color": "#9B7FD4", "no_negociable": "La brecha entre tus valores declarados y los que realmente vives no es una falla \u2014 es informaci\u00f3n. Usa esa insatisfacci\u00f3n como motor, no como excusa."}, {"num": 14, "titulo": "∀dopta m\u00e9todos probados", "sesion": "bienvenida", "color": "#C9A84C", "no_negociable": "Esta plataforma integra metodolog\u00edas con d\u00e9cadas de validaci\u00f3n. Tu trabajo es aplicarlas con honestidad, no cuestionarlas antes de vivirlas."}, {"num": 15, "titulo": "∀lcanza el resultado, luego mejora", "sesion": "sesion5", "color": "#4ABF7A", "no_negociable": "Tu plan de vida no necesita ser perfecto para empezar. Necesita ser tuyo y necesita empezar. La acci\u00f3n imperfecta ejecutada vale m\u00e1s que el plan perfecto que nunca sale."}, {"num": 16, "titulo": "∀celera el proceso", "sesion": "sesion5", "color": "#4ABF7A", "no_negociable": "Cada d\u00eda que pasa sin ejecutar el plan es un d\u00eda que no vuelve. La urgencia no es ansiedad \u2014 es el respeto que le tienes a tu propio tiempo."}, {"num": 17, "titulo": "∀tenci\u00f3n y enfoque constante", "sesion": "sesion4", "color": "#E8C96A", "no_negociable": "Haz este m\u00f3dulo sin interrupciones. Lo que emerja es proporcional a tu concentraci\u00f3n."}, {"num": 18, "titulo": "∀lcanzas la anormalidad", "sesion": "sesion5", "color": "#4ABF7A", "no_negociable": "Completar este proceso te convierte en alguien diferente. Esa diferencia ser\u00e1 visible \u2014 y no todos la aplaudir\u00e1n. Esa resistencia confirma que el proceso funcion\u00f3."}];

// Principios acumulados que el participante ya ha visto
var PRINCIPIOS_VISTOS = (function(){
  var v = {};
  PRINCIPIOS_DB.forEach(function(pr){ v[pr.num] = false; });
  return v;
})();

function buildWidgetPrincipios(moduloId, contenedor, onComplete) {
  var principiosIds = MODULO_PRINCIPIOS[moduloId] || [];
  if (!principiosIds.length) { if (onComplete) onComplete(); return; }

  // Principios acumulados anteriores (ya vistos en modulos previos)
  var anteriores = [];
  PRINCIPIOS_DB.forEach(function(pr){
    if(PRINCIPIOS_VISTOS[pr.num] && principiosIds.indexOf(pr.num) < 0){
      anteriores.push(pr);
    }
  });

  var compromisos_mod = {};
  var paso = 0;
  // Fases: -1=recordatorio, 0..N-1=principios, N=compromisos
  var FASE_RECORD = -1;
  var totalPasos = principiosIds.length + 1;
  var hayAnteriores = anteriores.length > 0;

  // Crear overlay
  var overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(4,8,16,.97);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;animation:wfadeIn .3s ease";

  var box = document.createElement("div");
  box.style.cssText = "background:#0A0F1E;border:1px solid rgba(201,168,76,.25);border-radius:20px;width:100%;max-width:560px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.6)";

  // Header
  var hdr = document.createElement("div");
  hdr.style.cssText = "padding:18px 22px 14px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0";
  var htop = document.createElement("div");
  htop.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:10px";
  var hlogo = document.createElement("div");
  hlogo.style.cssText = "font-family:Cormorant Garamond,serif;font-size:20px;color:#E8C96A;font-weight:300;letter-spacing:.02em";
  hlogo.textContent = "∀normal";
  var hstep = document.createElement("div");
  hstep.id = "wp-step";
  hstep.style.cssText = "font-size:10px;color:#3A4558;letter-spacing:.12em;text-transform:uppercase;font-family:Barlow Condensed,sans-serif";
  htop.appendChild(hlogo); htop.appendChild(hstep);
  var hbar = document.createElement("div");
  hbar.style.cssText = "height:2px;background:#1A2640;border-radius:1px;overflow:hidden";
  var hfill = document.createElement("div");
  hfill.id = "wp-fill";
  hfill.style.cssText = "height:100%;background:linear-gradient(90deg,#C9A84C,#E8C96A);border-radius:1px;transition:width .4s ease;width:0%";
  hbar.appendChild(hfill); hdr.appendChild(htop); hdr.appendChild(hbar);
  box.appendChild(hdr);

  // Body
  var body = document.createElement("div");
  body.style.cssText = "flex:1;overflow-y:auto;padding:0 22px";

  // Footer
  var ftr = document.createElement("div");
  ftr.style.cssText = "padding:14px 22px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;display:flex;justify-content:space-between;align-items:center;gap:10px";

  function upProg(){
    var pct = paso < 0 ? 0 : Math.round(((paso+1)/totalPasos)*100);
    var f=document.getElementById("wp-fill"); if(f)f.style.width=pct+"%";
    var s=document.getElementById("wp-step");
    if(s)s.textContent = paso < 0 ? "Recordatorio" : paso < principiosIds.length ? "Principio "+(paso+1)+" de "+principiosIds.length : "Mis compromisos";
  }

  function showPaso(){
    body.innerHTML=""; ftr.innerHTML=""; upProg();

    // FASE RECORDATORIO
    if(paso===FASE_RECORD && hayAnteriores){
      var sec=document.createElement("div"); sec.style.cssText="padding:20px 0";
      var icon=document.createElement("div");icon.style.cssText="text-align:center;margin-bottom:16px";

<script>
// ============================================================
// ANORMAL - Módulo de datos compartidos entre módulos
// Usa sessionStorage para pasar datos entre páginas HTML
// ============================================================

var ANORMAL = {
  
  // Leer todos los datos del proceso
  getData: function() {
    try {
      var raw = sessionStorage.getItem('anormal_proceso');
      return raw ? JSON.parse(raw) : {};
    } catch(e) { return {}; }
  },
  
  // Guardar datos del proceso
  setData: function(data) {
    try {
      sessionStorage.setItem('anormal_proceso', JSON.stringify(data));
    } catch(e) {}
  },
  
  // Actualizar una sección específica
  update: function(section, value) {
    var data = this.getData();
    data[section] = value;
    this.setData(data);
  },
  
  // Agregar un compromiso/hábito a la agenda central
  addAgenda: function(item) {
    // item = {modulo, titulo, descripcion, fecha, periodicidad, tipo}
    var data = this.getData();
    if (!data.agenda) data.agenda = [];
    item.id = 'ag_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    item.cumplido = false;
    item.fechaCreacion = new Date().toLocaleDateString('es-CO');
    data.agenda.push(item);
    this.setData(data);
    return item.id;
  },
  
  // Guardar lo marcado en septenios para que fluya al ECG y al Niño Interior
  saveSeptenios: function(checklistEstado, cicloActual, nombre, genero) {
    var doloresPorCiclo = [];
    
    Object.keys(checklistEstado).forEach(function(chkKey) {
      var est = checklistEstado[chkKey];
      if (!est || !est.dolor || !est.dolor.length) return;
      
      // Extraer número de ciclo del key ('chk-3' -> 3, 'actual-5' -> 5)
      var cicloNum = 0;
      if (chkKey.startsWith('chk-')) cicloNum = parseInt(chkKey.replace('chk-',''));
      else if (chkKey.startsWith('actual-')) cicloNum = parseInt(chkKey.replace('actual-',''));
      if (!cicloNum) return;
      
      // Obtener los ítems de dolor marcados
      var cicloDatos = window.CICLOS_DATA ? window.CICLOS_DATA[String(cicloNum)] : null;
      if (!cicloDatos) return;
      
      var itemsMarcados = est.dolor.map(function(idx) {
        return cicloDatos.dolor[idx] || '';
      }).filter(Boolean);
      
      var itemsAlegria = (est.alegria || []).map(function(idx) {
        return cicloDatos.alegria[idx] || '';
      }).filter(Boolean);
      
      if (itemsMarcados.length || itemsAlegria.length) {
        doloresPorCiclo.push({
          ciclo: cicloNum,
          tipo: cicloDatos.tipo,
          titulo: cicloDatos.titulo,
          edades: cicloDatos.titulo.match(/\d+ a \d+/)?.[0] || '',
          dolores: itemsMarcados,
          alegrias: itemsAlegria,
          // Preguntas respondidas
          respuestas: [0,1,2].map(function(pi) {
            return checklistEstado[chkKey + '-preg-' + pi] || '';
          }).filter(Boolean)
        });
      }
    });
    
    // Ordenar por ciclo
    doloresPorCiclo.sort(function(a,b){return a.ciclo - b.ciclo;});
    
    this.update('septenios', {
      cicloActual: cicloActual,
      nombre: nombre,
      genero: genero,
      doloresPorCiclo: doloresPorCiclo,
      fecha: new Date().toLocaleDateString('es-CO')
    });
  },
  
  // Obtener datos de septenios para el ECG
  getSepteniosParaECG: function() {
    var data = this.getData();
    return data.septenios || null;
  },
  
  // Obtener ciclos 1-2-3 para el Niño Interior
  getCiclosInfancia: function() {
    var sep = this.getSepteniosParaECG();
    if (!sep) return [];
    return sep.doloresPorCiclo.filter(function(c) {
      return c.ciclo <= 3;
    });
  },
  
  // Guardar compromisos de un módulo en la agenda central
  saveCompromisos: function(moduloId, compromisos) {
    if (!compromisos || !Object.keys(compromisos).length) return;
    var data = this.getData();
    if (!data.agenda) data.agenda = [];
    
    Object.keys(compromisos).forEach(function(key) {
      var texto = (compromisos[key] || '').trim();
      if (!texto) return;
      // Evitar duplicados del mismo módulo+key
      var exists = data.agenda.some(function(item) {
        return item.moduloId === moduloId && item.key === key;
      });
      if (!exists) {
        data.agenda.push({
          id: 'ag_' + moduloId + '_' + key,
          moduloId: moduloId,
          key: key,
          tipo: 'compromiso-principio',
          descripcion: texto,
          fechaCreacion: new Date().toLocaleDateString('es-CO'),
          cumplido: false,
          periodicidad: 'diario'
        });
      }
    });
    this.setData(data);
  },

  // ============================================================
  // FASE 1 — ¿Quién soy? — guardado genérico por módulo
  // ============================================================

  // Guardar el resultado de un módulo de Fase 1 (o cualquier fase)
  // moduloId: 'rueda' | 'elementos' | 'camino' | 'subnumeros' | 'mapa' |
  //           'flechas' | 'nombre' | 'personas' | 'dolan' | 'ikigai' |
  //           'siguiente_ciclo' | 'plan_vida'
  saveFaseModulo: function(moduloId, resultado) {
    var data = this.getData();
    if (!data.fase1) data.fase1 = {};
    if (!data.fase3) data.fase3 = {};
    var fase3Ids = ['ikigai', 'siguiente_ciclo', 'plan_vida'];
    var bucket = fase3Ids.indexOf(moduloId) >= 0 ? data.fase3 : data.fase1;
    bucket[moduloId] = resultado;
    bucket[moduloId + '_fecha'] = new Date().toLocaleDateString('es-CO');
    this.setData(data);
    this.marcarModuloCompletado(moduloId);
  },

  // Leer el resultado guardado de un módulo específico
  getFaseModulo: function(moduloId) {
    var data = this.getData();
    if (data.fase1 && data.fase1[moduloId] !== undefined) return data.fase1[moduloId];
    if (data.fase3 && data.fase3[moduloId] !== undefined) return data.fase3[moduloId];
    return null;
  },

  // Obtener todo lo guardado de Fase 1 de una vez (para Perfil Integrado)
  getFase1Completa: function() {
    var data = this.getData();
    return data.fase1 || {};
  },

  // Obtener todo lo guardado de Fase 3
  getFase3Completa: function() {
    var data = this.getData();
    return data.fase3 || {};
  },

  // ============================================================
  // PROGRESO — qué módulos completó la persona (para el Dashboard)
  // ============================================================

  TODOS_LOS_MODULOS: [
    {id:'rueda', fase:1, nombre:'Rueda de Vida'},
    {id:'elementos', fase:1, nombre:'Elementos'},
    {id:'camino', fase:1, nombre:'Camino de Vida'},
    {id:'subnumeros', fase:1, nombre:'Subnúmeros'},
    {id:'mapa', fase:1, nombre:'Mapa Energético'},
    {id:'flechas', fase:1, nombre:'Flechas'},
    {id:'nombre', fase:1, nombre:'Nombre'},
    {id:'personas', fase:1, nombre:'Personas'},
    {id:'dolan', fase:1, nombre:'Valores Dolan'},
    {id:'perfil', fase:1, nombre:'Perfil Integrado'},
    {id:'septenios', fase:2, nombre:'Mis Ciclos de Vida'},
    {id:'ecg', fase:2, nombre:'Mi Trabajo Emocional'},
    {id:'perdon', fase:2, nombre:'Mi Trabajo del Perdón'},
    {id:'ikigai', fase:3, nombre:'Ikigai'},
    {id:'siguiente_ciclo', fase:3, nombre:'Siguiente Ciclo'},
    {id:'plan_vida', fase:3, nombre:'Plan de Vida'}
  ],

  marcarModuloCompletado: function(moduloId) {
    var data = this.getData();
    if (!data.progreso) data.progreso = {};
    data.progreso[moduloId] = {
      completado: true,
      fecha: new Date().toLocaleDateString('es-CO')
    };
    this.setData(data);
  },

  // Devuelve la lista de módulos con su estado de completado, para pintar el Dashboard
  getProgreso: function() {
    var data = this.getData();
    var progreso = data.progreso || {};
    return this.TODOS_LOS_MODULOS.map(function(m) {
      return {
        id: m.id,
        fase: m.fase,
        nombre: m.nombre,
        completado: !!(progreso[m.id] && progreso[m.id].completado),
        fecha: progreso[m.id] ? progreso[m.id].fecha : null
      };
    });
  },

  // Porcentaje de avance total y por fase
  getPorcentajeAvance: function() {
    var prog = this.getProgreso();
    var total = prog.length;
    var hechos = prog.filter(function(m){ return m.completado; }).length;
    var porFase = {1:{total:0,hechos:0}, 2:{total:0,hechos:0}, 3:{total:0,hechos:0}};
    prog.forEach(function(m) {
      porFase[m.fase].total++;
      if (m.completado) porFase[m.fase].hechos++;
    });
    return {
      total: total, hechos: hechos,
      porcentaje: total ? Math.round((hechos/total)*100) : 0,
      porFase: porFase
    };
  }
};

// Sobrescribir guardarCompromisosModulo para que también vaya a la agenda
window.guardarCompromisosModulo = function(moduloId, compromisos) {
  if (!window.COMPROMISOS_PROCESO) window.COMPROMISOS_PROCESO = {};
  window.COMPROMISOS_PROCESO[moduloId] = compromisos;
  ANORMAL.saveCompromisos(moduloId, compromisos);
};

</script>

function calcCiclo(dd,mm,aa){
  var hoy=new Date();var nac=new Date(aa,mm-1,dd);
  var ed=hoy.getFullYear()-nac.getFullYear();
  if(hoy.getMonth()<mm-1||(hoy.getMonth()===mm-1&&hoy.getDate()<dd))ed--;
  return{edad:ed,ciclo:Math.min(Math.floor(ed/7)+1,12)};
}
function redS(n){if(n<10)return n;var s=0;String(n).split("").forEach(function(c){s+=parseInt(c)||0;});return redS(s);}

function rProg(){
  var b=ge("pb");if(!b)return;b.innerHTML="";
  for(var i=0;i<STEPS.length;i++){
    if(i>0){var ln=mk("div","pln"+(i<=paso?" done":""));b.appendChild(ln);}
    var s=mk("div","ps"+(i===paso?" act":i<paso?" done":""));
    var pn=mk("div","pn",i<paso?"\u2713":String(i+1));
    var pt=mk("span","ptxt",STEPS[i]);
    s.appendChild(pn);s.appendChild(pt);
    if(i<paso)(function(x){s.onclick=function(){irA(x);};})(i);
    b.appendChild(s);
  }
}

function buildCicloData(){
  var c=S.cicloActual;
  S.ciclos=[];
  for(var i=0;i<3;i++){
    var num=Math.min(c+i,12);
    var tipo=TIPO_MAP[num]||"cuerpo";
    var edadInicio=(num-1)*7;var edadFin=num*7;
    S.ciclos.push({num:num,tipo:tipo,label:TIPO_LABEL[tipo],col:TIPO_COL[tipo],nombre:CICLO_NOMBRES[num]||"",edades:edadInicio+"\u2013"+edadFin+" a\u00f1os",esCurrent:i===0});
  }
}

  if(url && vdb && vdp){
    var m2 = url.match(/(?:v=|youtu\.be\/|embed\/)([\w-]{11})/);
    if(m2){
      var ifr = document.createElement("iframe");
      ifr.src = "https://www.youtube.com/embed/" + m2[1] + "?rel=0";

      ifr.allowFullscreen = true;
      vdp.innerHTML = "";
      vdp.appendChild(ifr);
    }
    vdb.classList.add("show");
  } else if(vdb){
    vdb.classList.add("show");
  }
})();
