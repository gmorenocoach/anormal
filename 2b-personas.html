<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café con Propósito — Las Personas</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0F1E;--bg2:#0E1525;--bg3:#131D30;--bg4:#1A2640;
--gold:#C9A84C;--gold2:#E8C96A;--gold3:#F5E0A0;
--gd:rgba(201,168,76,.13);--gb:rgba(201,168,76,.28);
--text:#EAE6DC;--dim:#8A95A8;--faint:#3A4558;
--acc:#4A9EBF;--acd:rgba(74,158,191,.13);--acb:rgba(74,158,191,.28);
--grn:#4ABF7A;--grd:rgba(74,191,122,.12);--grb:rgba(74,191,122,.28);
--red:#BF6A4A;--rdd:rgba(191,106,74,.12);--rdb:rgba(191,106,74,.28);
--pur:#9B7FD4;--pud:rgba(155,127,212,.12);--pub:rgba(155,127,212,.28);
--r:4px;--rm:8px;--rl:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Barlow",sans-serif;font-weight:300;font-size:15px;line-height:1.65;min-height:100vh}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(201,168,76,.04),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(74,158,191,.04),transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:740px;margin:0 auto;padding:0 22px 80px}
.prog{display:flex;align-items:center;margin-bottom:32px;overflow-x:auto;padding-bottom:3px}
.ps{display:flex;align-items:center;gap:6px;white-space:nowrap;padding:3px 0;cursor:default}
.ps.done{cursor:pointer}
.pn{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;border:1px solid var(--faint);color:var(--faint);transition:all .3s;flex-shrink:0}
.ps.done .pn{border-color:var(--gold);color:var(--gold);background:var(--gd)}
.ps.act .pn{border-color:var(--gold2);color:var(--bg);background:var(--gold2)}
.ptxt{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);transition:color .3s}
.ps.done .ptxt,.ps.act .ptxt{color:var(--gold)}
.pln{flex:1;min-width:10px;height:1px;background:var(--faint);margin:0 6px;opacity:.2;transition:all .3s}
.pln.done{background:var(--gold);opacity:.4}
.panel{display:none}.panel.act{display:block;animation:fu .4s ease}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.pbadge{display:inline-flex;align-items:center;gap:8px;background:var(--gd);border:1px solid var(--gb);border-radius:var(--rl);padding:7px 15px;margin-bottom:18px}
.pbadge-q{font-family:"Cormorant Garamond",serif;font-size:20px;color:var(--gold2);font-weight:300;font-style:italic}
.pbadge-s{font-size:11px;color:var(--dim);margin-top:1px}
.ph{margin-bottom:24px}
.ph-s{font-family:"Barlow Condensed",sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.ph-t{font-family:"Cormorant Garamond",serif;font-size:clamp(20px,4vw,30px);font-weight:300;color:var(--gold2);line-height:1.15;margin-bottom:5px}
.ph-d{font-size:13px;color:var(--dim);line-height:1.8;max-width:520px}
.card{background:var(--bg2);border:1px solid rgba(255,255,255,.055);border-radius:var(--rl);padding:20px 24px;margin-bottom:13px}
.card.gold{border-color:var(--gb);background:linear-gradient(135deg,var(--bg2),var(--bg3))}
.card.acc{border-color:var(--acb)}
.card.red{border-color:var(--rdb);background:linear-gradient(135deg,var(--bg2),rgba(191,106,74,.04))}
.card.grn{border-color:var(--grb)}
.card.pur{border-color:var(--pub);background:linear-gradient(135deg,var(--bg2),rgba(155,127,212,.04))}
.cl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:10px}
.cl.b{color:var(--acc)}.cl.r{color:#E09070}.cl.g{color:var(--grn)}.cl.p{color:var(--pur)}
.ct{font-size:13px;color:var(--dim);line-height:1.8}
.dv{height:1px;background:var(--gb);margin:16px 0;opacity:.3}
.il{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;display:block}
.inp{background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:"Barlow",sans-serif;font-size:15px;font-weight:300;padding:10px 14px;width:100%;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--faint)}
.irow{display:flex;gap:10px;flex-wrap:wrap}
.bp{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border:none;border-radius:var(--r);font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;padding:12px 28px;cursor:pointer;transition:opacity .2s,transform .15s}
.bp:hover{opacity:.9;transform:translateY(-1px)}
.bs{background:transparent;color:var(--gold);border:1px solid var(--gb);border-radius:var(--r);font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:9px 20px;cursor:pointer;transition:all .2s}
.bs:hover{background:var(--gd)}
.bn{background:transparent;color:var(--dim);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);font-family:"Barlow",sans-serif;font-size:13px;padding:9px 18px;cursor:pointer;transition:all .2s}
.bn:hover{border-color:var(--gold);color:var(--gold)}
/* Tags */
.tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;margin:2px 2px 2px 0}
.tg{background:var(--gd);color:var(--gold2);border:1px solid var(--gb)}
.tb{background:var(--acd);color:var(--acc);border:1px solid var(--acb)}
.tr{background:var(--rdd);color:#E09070;border:1px solid var(--rdb)}
.tgr{background:var(--grd);color:var(--grn);border:1px solid var(--grb)}
.tp{background:var(--pud);color:var(--pur);border:1px solid var(--pub)}
/* Persona slot */
.pslot{background:var(--bg3);border:1px solid rgba(255,255,255,.055);border-radius:var(--rm);padding:16px 18px;margin-bottom:11px;transition:border-color .2s}
.pslot.filled{border-color:var(--gb)}
.sr{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.si{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:"Barlow",sans-serif;font-size:13px;font-weight:300;padding:8px 11px;outline:none;transition:border-color .2s}
.si:focus{border-color:var(--gold)}
.si::placeholder{color:var(--faint)}
/* Relación */
.rel-card{border-radius:var(--rm);padding:14px 16px;margin:10px 0}
.rel-karma{background:rgba(191,106,74,.08);border:1px solid var(--rdb)}
.rel-espejo{background:var(--gd);border:1px solid var(--gb)}
.rel-comp{background:var(--grd);border:1px solid var(--grb)}
.rel-mutual{background:var(--acd);border:1px solid var(--acb)}
.rel-t{font-size:12px;font-weight:500;margin-bottom:6px}
.rel-d{font-size:13px;color:var(--dim);line-height:1.75}
/* Checklist */
.chk-item{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s;border-radius:var(--r)}
.chk-item:last-child{border-bottom:none}
.chk-item:hover{background:rgba(255,255,255,.02)}
.chk-box{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--faint);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.chk-item.on .chk-box{background:var(--gold);border-color:var(--gold)}
.chk-item.on .chk-box::after{content:"\2713";font-size:11px;color:var(--bg);font-weight:600}
.chk-t{font-size:13px;color:var(--text);font-weight:400;margin-bottom:1px}
.chk-d{font-size:12px;color:var(--dim);line-height:1.5}
/* Reto */
.rr{background:var(--bg4);border:1px solid var(--gb);border-radius:var(--rm);padding:14px 16px;margin:9px 0}
.rr-l{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;font-weight:500}
.rr.b{border-color:var(--acb)}.rr.b .rr-l{color:var(--acc)}
.rr.r{border-color:var(--rdb)}.rr.r .rr-l{color:#E09070}
.rr.p{border-color:var(--pub)}.rr.p .rr-l{color:var(--pur)}
.rr p{font-size:13px;color:var(--dim);line-height:1.75;margin-bottom:8px}
.rta{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:"Barlow",sans-serif;font-size:13px;font-weight:300;padding:10px 12px;width:100%;min-height:70px;outline:none;resize:vertical;line-height:1.65;transition:border-color .2s}
.rta:focus{border-color:var(--gold)}
.rta::placeholder{color:var(--faint)}
.rchk{display:flex;align-items:center;gap:8px;margin-top:7px;cursor:pointer}
.rchk input{width:15px;height:15px;accent-color:var(--gold);cursor:pointer}
.rchk label{font-size:12px;color:var(--dim);cursor:pointer}
.rdone{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--grn);padding:3px 9px;background:var(--grd);border:1px solid var(--grb);border-radius:12px;margin-top:5px}
/* Avance */
.av-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin:8px 0 4px}
.av-fill{height:100%;border-radius:2px;background:var(--grn);transition:width .4s}
/* Daily */
.dmsg{background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(74,158,191,.05));border:1px solid var(--gb);border-radius:var(--rl);padding:15px 20px;margin-bottom:14px;text-align:center}
.dm-l{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.dm-t{font-family:"Cormorant Garamond",serif;font-size:15px;font-style:italic;color:var(--gold3);line-height:1.8}
/* Cierre */
.cierre{background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--gb);border-radius:var(--rl);padding:20px 24px;margin-top:18px;text-align:center}
.cierre-t{font-family:"Cormorant Garamond",serif;font-size:18px;color:var(--gold2);margin-bottom:8px;font-style:italic}
.cierre p{font-size:13px;color:var(--dim);line-height:1.75;max-width:460px;margin:0 auto}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:15px;border-top:1px solid rgba(255,255,255,.05)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gb);border-radius:2px}
@media(max-width:560px){.app{padding:0 14px 60px}}



/* VIDEO BANNER */
.vid-banner{background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(74,158,191,.04));border:1px solid rgba(201,168,76,.2);border-radius:14px;overflow:hidden;margin:0 22px 20px;display:none}
.vid-banner.show{display:block}
.vid-banner-hdr{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between}
.vid-banner-lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#C9A84C;font-weight:500;font-family:Barlow Condensed,sans-serif}
.vid-banner-mod{font-size:11px;color:#8A95A8}
.vid-banner-player{position:relative;width:100%;aspect-ratio:16/9;background:#060A14}
.vid-banner-player iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.vid-banner-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;padding:20px}
.vid-ph-icon{width:44px;height:44px;border-radius:50%;background:rgba(201,168,76,.13);border:1.5px solid rgba(201,168,76,.28);display:flex;align-items:center;justify-content:center;font-size:16px;color:#E8C96A}
.vid-ph-t{font-family:Cormorant Garamond,serif;font-size:15px;color:#E8C96A;font-weight:300}
.vid-ph-d{font-size:11px;color:#3A4558;line-height:1.55;max-width:240px}
@media(max-width:560px){.vid-banner{margin:0 14px 16px}}


/* BOTON BRUJULA */
.brujula-btn-fixed{position:fixed;bottom:22px;right:22px;z-index:500;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.brujula-btn{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.08));border:1px solid rgba(201,168,76,.35);border-radius:30px;padding:10px 16px;cursor:pointer;transition:all .25s;text-decoration:none;backdrop-filter:blur(8px)}
.brujula-btn:hover{background:linear-gradient(135deg,rgba(201,168,76,.25),rgba(201,168,76,.15));border-color:rgba(201,168,76,.6);transform:translateY(-2px)}
.brujula-btn-icon{font-family:"Cormorant Garamond",serif;font-size:18px;color:var(--gold2);font-weight:300;line-height:1}
.brujula-btn-txt{font-size:11px;font-family:"Barlow Condensed",sans-serif;letter-spacing:.14em;text-transform:uppercase;color:var(--gold2);font-weight:500}
.brujula-toast{background:var(--bg3);border:1px solid var(--gb);border-radius:var(--rm,10px);padding:9px 14px;font-size:12px;color:var(--gold3);font-family:"Barlow",sans-serif;max-width:220px;text-align:right;line-height:1.5;display:none;animation:btoast .3s ease}
.brujula-toast.show{display:block}
@keyframes btoast{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

</style>
</head>
<body>

<!-- VIDEO BANNER: Personas y Relaciones -->
<div class="vid-banner" id="vid-banner-personas">
  <div class="vid-banner-hdr">
    <div class="vid-banner-lbl">Introducción al módulo</div>
    <div class="vid-banner-mod">Personas y Relaciones</div>
  </div>
  <div class="vid-banner-player" id="vid-player-personas">
    <div class="vid-banner-ph">
      <div class="vid-ph-icon">&#9654;</div>
      <div class="vid-ph-t">Video de introducción</div>
      <div class="vid-ph-d">Alonso te explica lo que encontrarás en este módulo y cómo aprovecharlo al máximo.</div>
    </div>
  </div>
</div>
<div class="app" id="app"></div>
<script>
// ============================================================
// ANORMAL - Módulo de datos compartidos entre módulos
// Usa sessionStorage para pasar datos entre páginas HTML
// ============================================================

var ANORMAL = {
  
  // Leer todos los datos del proceso
  getData: function() {
    try {
      var raw = sessionStorage.getItem('anormal_proceso');
      return raw ? JSON.parse(raw) : {};
    } catch(e) { return {}; }
  },
  
  // Guardar datos del proceso
  setData: function(data) {
    try {
      sessionStorage.setItem('anormal_proceso', JSON.stringify(data));
    } catch(e) {}
  },
  
  // Actualizar una sección específica
  update: function(section, value) {
    var data = this.getData();
    data[section] = value;
    this.setData(data);
  },
  
  // Agregar un compromiso/hábito a la agenda central
  addAgenda: function(item) {
    // item = {modulo, titulo, descripcion, fecha, periodicidad, tipo}
    var data = this.getData();
    if (!data.agenda) data.agenda = [];
    item.id = 'ag_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    item.cumplido = false;
    item.fechaCreacion = new Date().toLocaleDateString('es-CO');
    data.agenda.push(item);
    this.setData(data);
    return item.id;
  },
  
  // Guardar lo marcado en septenios para que fluya al ECG y al Niño Interior
  saveSeptenios: function(checklistEstado, cicloActual, nombre, genero) {
    var doloresPorCiclo = [];
    
    Object.keys(checklistEstado).forEach(function(chkKey) {
      var est = checklistEstado[chkKey];
      if (!est || !est.dolor || !est.dolor.length) return;
      
      // Extraer número de ciclo del key ('chk-3' -> 3, 'actual-5' -> 5)
      var cicloNum = 0;
      if (chkKey.startsWith('chk-')) cicloNum = parseInt(chkKey.replace('chk-',''));
      else if (chkKey.startsWith('actual-')) cicloNum = parseInt(chkKey.replace('actual-',''));
      if (!cicloNum) return;
      
      // Obtener los ítems de dolor marcados
      var cicloDatos = window.CICLOS_DATA ? window.CICLOS_DATA[String(cicloNum)] : null;
      if (!cicloDatos) return;
      
      var itemsMarcados = est.dolor.map(function(idx) {
        return cicloDatos.dolor[idx] || '';
      }).filter(Boolean);
      
      var itemsAlegria = (est.alegria || []).map(function(idx) {
        return cicloDatos.alegria[idx] || '';
      }).filter(Boolean);
      
      if (itemsMarcados.length || itemsAlegria.length) {
        doloresPorCiclo.push({
          ciclo: cicloNum,
          tipo: cicloDatos.tipo,
          titulo: cicloDatos.titulo,
          edades: cicloDatos.titulo.match(/\d+ a \d+/)?.[0] || '',
          dolores: itemsMarcados,
          alegrias: itemsAlegria,
          // Preguntas respondidas
          respuestas: [0,1,2].map(function(pi) {
            return checklistEstado[chkKey + '-preg-' + pi] || '';
          }).filter(Boolean)
        });
      }
    });
    
    // Ordenar por ciclo
    doloresPorCiclo.sort(function(a,b){return a.ciclo - b.ciclo;});
    
    this.update('septenios', {
      cicloActual: cicloActual,
      nombre: nombre,
      genero: genero,
      doloresPorCiclo: doloresPorCiclo,
      fecha: new Date().toLocaleDateString('es-CO')
    });
  },
  
  // Obtener datos de septenios para el ECG
  getSepteniosParaECG: function() {
    var data = this.getData();
    return data.septenios || null;
  },
  
  // Obtener ciclos 1-2-3 para el Niño Interior
  getCiclosInfancia: function() {
    var sep = this.getSepteniosParaECG();
    if (!sep) return [];
    return sep.doloresPorCiclo.filter(function(c) {
      return c.ciclo <= 3;
    });
  },
  
  // Guardar compromisos de un módulo en la agenda central
  saveCompromisos: function(moduloId, compromisos) {
    if (!compromisos || !Object.keys(compromisos).length) return;
    var data = this.getData();
    if (!data.agenda) data.agenda = [];
    
    Object.keys(compromisos).forEach(function(key) {
      var texto = (compromisos[key] || '').trim();
      if (!texto) return;
      // Evitar duplicados del mismo módulo+key
      var exists = data.agenda.some(function(item) {
        return item.moduloId === moduloId && item.key === key;
      });
      if (!exists) {
        data.agenda.push({
          id: 'ag_' + moduloId + '_' + key,
          moduloId: moduloId,
          key: key,
          tipo: 'compromiso-principio',
          descripcion: texto,
          fechaCreacion: new Date().toLocaleDateString('es-CO'),
          cumplido: false,
          periodicidad: 'diario'
        });
      }
    });
    this.setData(data);
  },

  // ============================================================
  // FASE 1 — ¿Quién soy? — guardado genérico por módulo
  // ============================================================

  // Guardar el resultado de un módulo de Fase 1 (o cualquier fase)
  // moduloId: 'rueda' | 'elementos' | 'camino' | 'subnumeros' | 'mapa' |
  //           'flechas' | 'nombre' | 'personas' | 'dolan' | 'ikigai' |
  //           'siguiente_ciclo' | 'plan_vida'
  saveFaseModulo: function(moduloId, resultado) {
    var data = this.getData();
    if (!data.fase1) data.fase1 = {};
    if (!data.fase3) data.fase3 = {};
    var fase3Ids = ['ikigai', 'siguiente_ciclo', 'plan_vida'];
    var bucket = fase3Ids.indexOf(moduloId) >= 0 ? data.fase3 : data.fase1;
    bucket[moduloId] = resultado;
    bucket[moduloId + '_fecha'] = new Date().toLocaleDateString('es-CO');
    this.setData(data);
    this.marcarModuloCompletado(moduloId);
  },

  // Leer el resultado guardado de un módulo específico
  getFaseModulo: function(moduloId) {
    var data = this.getData();
    if (data.fase1 && data.fase1[moduloId] !== undefined) return data.fase1[moduloId];
    if (data.fase3 && data.fase3[moduloId] !== undefined) return data.fase3[moduloId];
    return null;
  },

  // Obtener todo lo guardado de Fase 1 de una vez (para Perfil Integrado)
  getFase1Completa: function() {
    var data = this.getData();
    return data.fase1 || {};
  },

  // Obtener todo lo guardado de Fase 3
  getFase3Completa: function() {
    var data = this.getData();
    return data.fase3 || {};
  },

  // ============================================================
  // PROGRESO — qué módulos completó la persona (para el Dashboard)
  // ============================================================

  TODOS_LOS_MODULOS: [
    {id:'rueda', fase:1, nombre:'Rueda de Vida'},
    {id:'elementos', fase:1, nombre:'Elementos'},
    {id:'camino', fase:1, nombre:'Camino de Vida'},
    {id:'subnumeros', fase:1, nombre:'Subnúmeros'},

  ],

  marcarModuloCompletado: function(moduloId) {
    var data = this.getData();
    if (!data.progreso) data.progreso = {};
    data.progreso[moduloId] = {
      completado: true,
      fecha: new Date().toLocaleDateString('es-CO')
    };
    this.setData(data);
  },

  // Devuelve la lista de módulos con su estado de completado, para pintar el Dashboard
  getProgreso: function() {
    var data = this.getData();
    var progreso = data.progreso || {};
    return this.TODOS_LOS_MODULOS.map(function(m) {
      return {
        id: m.id,
        fase: m.fase,
        nombre: m.nombre,
        completado: !!(progreso[m.id] && progreso[m.id].completado),
        fecha: progreso[m.id] ? progreso[m.id].fecha : null
      };
    });
  },

  // Porcentaje de avance total y por fase
  getPorcentajeAvance: function() {
    var prog = this.getProgreso();
    var total = prog.length;
    var hechos = prog.filter(function(m){ return m.completado; }).length;
    var porFase = {1:{total:0,hechos:0}, 2:{total:0,hechos:0}, 3:{total:0,hechos:0}};
    prog.forEach(function(m) {
      porFase[m.fase].total++;
      if (m.completado) porFase[m.fase].hechos++;
    });
    return {
      total: total, hechos: hechos,
      porcentaje: total ? Math.round((hechos/total)*100) : 0,
      porFase: porFase
    };
  }
};

function red(n,m=true){if(m&&[11,22,33].includes(n))return n;if(n<10)return n;return red(String(n).split('').reduce((a,c)=>a+parseInt(c),0),m);}
function redS(n){if(n<10)return n;return redS(String(n).split('').reduce((a,c)=>a+parseInt(c),0));}
function calcNV(dd,mm,aa){const arr=[...`${dd}`,...`${mm}`.padStart(2,'0'),...`${aa}`].map(Number);const s=arr.reduce((a,c)=>a+c,0);return{nv:red(s,true)};}
function nvNom(n){return NV_N[n]||NV_N[redS(n)]||'';}
function nvMis(n){return NV_M[n]||NV_M[redS(n)]||'';}

// ── LÓGICA DE RELACIÓN — 4 ESCENARIOS ───────────────────────
function relacion(nvPropio,nvOtro,presPropio,ausPropio){
  const pS=redS(nvPropio), oS=redS(nvOtro);
  // Escenario 1: NV del otro es uno de mis ausentes → Kármica
  if(ausPropio.includes(oS)){
    const cual=NV_CUAL[oS]||[];
    return{tipo:'karma',tag:'tr',
      titulo:'Esta persona es tu Maestro Kármico',
      col:'#E09070',bgCard:'rel-karma',
      desc:`Su número de vida es el <strong style="color:var(--gold3)">${nvOtro} — ${nvNom(nvOtro)}</strong>, exactamente uno de tus números ausentes. No es casualidad: su alma y la tuya acordaron este encuentro. Lo que más te genera admiración, fricción o incomodidad en esta persona es exactamente la energía que tu alma eligió aprender en esta vida.`,
      ens:`Cada momento de tensión con esta persona es una clase. Cada momento de admiración también. La energía del ${nvOtro} que encarna te muestra el camino de tu propio desarrollo.`,
      checklist:cual,
      chkLabel:`¿Qué de esto reconoces en esta persona?`,
      chkGuia:`Marca las cualidades que ves en esta persona. Las que marques son exactamente las que tú estás aprendiendo a desarrollar. El karma no es un castigo — es un regalo disfrazado de fricción.`,
      reto:`¿Qué cualidad de esta persona te genera más admiración? ¿Qué te genera más fricción? Las dos respuestas son espejos del número ${nvOtro} que viniste a integrar. Escribe ambas.`,
      perdon:`Este es el espacio del perdón: si esta persona te ha causado dolor, ese dolor es parte de la lección. Lo que vino a enseñarte no siempre llega de forma gentil. ¿Hay algo que perdonar aquí — no para justificar lo que hizo, sino para liberarte tú?`
    };
  }
  // Escenario 2: mismo NV reducido → Espejo
  if(pS===oS){
    const cual=NV_CUAL[oS]||[];
    return{tipo:'espejo',tag:'tg',
      titulo:'Esta persona es tu espejo más directo',
      col:'var(--gold2)',bgCard:'rel-espejo',
      desc:`Ambos comparten la energía del número <strong style="color:var(--gold3)">${oS}</strong>. Esta es una de las relaciones más reveladoras. Lo que ves en ella — tanto lo que admiras como lo que te irrita — tiene que ver directamente contigo.`,
      ens:`Cuando dos personas del mismo número se encuentran, se amplifican mutuamente: los dones y las sombras. Lo que más te incomoda de esta persona probablemente es un aspecto de ti que aún no has integrado. Lo que más admiras es el potencial de tu número que aún no has desplegado.`,
      checklist:cual,
      chkLabel:`¿Qué de esto ves en esta persona?`,
      chkGuia:`Las cualidades que marques de esta persona son el espejo de lo que tú también tienes o estás desarrollando. La relación espejo no es cómoda — pero es de las más transformadoras.`,
      reto:`Escribe tres cualidades que admiras en esta persona y tres que te generan fricción. Luego pregúntate honestamente: ¿cuánto de cada una también está en ti?`,
      perdon:`A veces las personas que son nuestro espejo son también las que más nos han herido — precisamente porque nos muestran lo que no queremos ver. ¿Hay algo que necesitas perdonar o perdonarte en esta relación?`
    };
  }
  // Escenario 3: NV del otro está en mis presentes → Complemento
  if(presPropio.includes(oS)){
    const cual=NV_CUAL[oS]||[];
    return{tipo:'comp',tag:'tgr',
      titulo:'Esta persona complementa tu energía',
      col:'var(--grn)',bgCard:'rel-comp',
      desc:`Su número de vida <strong style="color:var(--gold3)">${nvOtro} — ${nvNom(nvOtro)}</strong> está presente en tu cuadro de nacimiento. Hay una resonancia natural — sus energías se nutren mutuamente sin la tensión del encuentro kármico.`,
      ens:`Esta persona no vino a enseñarte algo que no tienes — vino a reforzar y ampliar una energía que ya llevas. La relación tiene un potencial de crecimiento alto cuando ambos son conscientes de lo que cada uno aporta.`,
      checklist:cual,
      chkLabel:`¿Qué de esto te aporta esta persona?`,
      chkGuia:`Las cualidades que marques son las que esta persona activa o amplifica en ti. Una relación complementaria florece cuando ambos reconocen conscientemente lo que cada uno trae.`,
      reto:`¿En qué áreas de tu vida esta persona te ha complementado o apoyado de forma natural? Escribe cómo su energía del ${nvOtro} ha sido un recurso para ti.`,
      perdon:null
    };
  }
  // Escenario 4: Aprendizaje mutuo
  return{tipo:'mutual',tag:'tb',
    titulo:'Relación de aprendizaje mutuo',
    col:'var(--acc)',bgCard:'rel-mutual',
    desc:`Sus energías (${pS} y ${oS}) crean una relación de crecimiento en dos direcciones. Cada uno lleva algo que el otro necesita desarrollar — aunque no siempre sea evidente de inmediato.`,
    ens:`Esta relación requiere más intención consciente para ser nutritiva. Cuando ambos entienden qué han venido a enseñarse mutuamente, la dinámica cambia completamente.`,
    checklist:NV_CUAL[oS]||[],
    chkLabel:`¿Qué cualidades de esta persona reconoces?`,
    chkGuia:`Identificar qué tiene esta persona que tú necesitas desarrollar convierte una relación de fricción en una relación de aprendizaje consciente.`,
    reto:`¿Qué has aprendido de esta persona que no habrías aprendido de alguien más similar a ti? Escribe al menos una cualidad que esta relación ha desarrollado en ti.`,
    perdon:null
  };
}

function bResumen(){
  const personas=S.personas.filter(p=>p.nv&&p.rel);
  if(window.ANORMAL){
    ANORMAL.saveFaseModulo('personas', {
      personas: personas.map(p=>({nombre:p.nombre, nv:p.nv, tipoRelacion:p.rel?p.rel.tipo:null}))
    });
  }
  const porTipo={karma:[],espejo:[],comp:[],mutual:[]};
  personas.forEach(p=>{if(p.rel)porTipo[p.rel.tipo]?.push(p);});

  const grupoH=(lista,titulo,col,tag)=>{
    if(!lista.length)return'';
    return`<div style="margin-bottom:16px">
      <div style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:${col};margin-bottom:8px;font-weight:500">${titulo} (${lista.length})</div>
      ${lista.map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);flex-wrap:wrap;gap:6px">
        <div>
          <span style="font-size:13px;color:var(--text);font-weight:400">${p.nombre||'Sin nombre'}</span>
          <span style="font-size:12px;color:var(--dim);margin-left:8px">NV ${p.nv} — ${nvNom(p.nv)}</span>
        </div>
        <span class="tag ${p.rel.tag}">${p.rel.titulo.replace('Esta persona es tu ','').replace('Esta persona ','')}</span>
      </div>`).join('')}
    </div>`;
  };

  const totalRetos=Object.keys(S.comp).length;
  const compRetos=Object.values(S.comp).filter(Boolean).length;

  document.getElementById('p2').innerHTML=`
    <div class="pbadge"><div><div class="pbadge-q">¿Quién soy?</div><div class="pbadge-s">El mapa de tus relaciones</div></div></div>
    <div class="ph"><div class="ph-s">Paso 3 de 3 — Resumen</div>
    <div class="ph-t">El mapa de tus relaciones</div>
    <div class="ph-d">Aquí puedes ver, de un vistazo, el propósito numerológico de cada persona que ingresaste.</div></div>

    <div class="dmsg"><div class="dm-l">Reflexión del día</div><div class="dm-t">"${frase()}"</div></div>

    ${personas.length===0?`<div class="card"><div class="ct">Aún no ingresaste personas. Regresa al paso anterior para añadirlas.</div></div>`:`
    <div class="card gold">
      <div class="cl">Las ${personas.length} personas en tu vida</div>
      ${grupoH(porTipo.karma,'Maestros Kármicos — vinieron a enseñarte','#E09070','tr')}
      ${grupoH(porTipo.espejo,'Espejos — te reflejan','var(--gold2)','tg')}
      ${grupoH(porTipo.comp,'Complementarios — te nutren','var(--grn)','tgr')}
      ${grupoH(porTipo.mutual,'Aprendizaje mutuo','var(--acc)','tb')}
    </div>`}

    ${porTipo.karma.length>0?`<div class="card pur">
      <div class="cl p">El karma como regalo</div>
      <div class="ct">Tienes <strong style="color:var(--gold3)">${porTipo.karma.length} maestro${porTipo.karma.length>1?'s':''} kármico${porTipo.karma.length>1?'s':''}</strong> en tu vida. Cada uno representa una energía que tu alma eligió aprender. La lección no siempre llega de forma gentil — pero la conciencia de que esa persona es tu maestro transforma la fricción en crecimiento.<br><br>El perdón no es excusar lo que hicieron. Es liberarte tú de cargar con lo que ya no te pertenece. Lo que aprendiste de cada uno ya es tuyo — no tienes que seguir pagando el costo del sufrimiento para conservar la enseñanza.</div>
      ${rrH('karma-sintesis','Tu reflexión sobre tus maestros kármicos','¿Qué patrón ves en las personas kármicas de tu vida? ¿Comparten alguna cualidad? ¿Qué dice eso sobre lo que viniste a aprender?','p')}
    </div>`:''}

    ${totalRetos>0?`<div class="card acc">
      <div class="cl b">Tu avance en esta fase</div>
      <div class="av-bar"><div class="av-fill" style="width:${Math.round(compRetos/totalRetos*100)}%"></div></div>
      <div style="font-size:12px;color:var(--dim);margin-top:4px">${compRetos} de ${totalRetos} reflexiones completadas</div>
    </div>`:''}

    <div class="cierre">
      <div class="cierre-t">¿Desde qué valores estás tomando tus decisiones?</div>
      <p>Ya sabes quién eres desde tu fecha, tu nombre y tus relaciones. Ahora viene la pregunta que conecta el autoconocimiento con la acción: ¿qué valores guían realmente tu vida?</p>
      <p style="margin-top:10px">Abre el archivo <strong style="color:var(--gold3)">3a-valores-dolan-v2.html</strong> para continuar.</p>
    </div>

    <div class="nav"><button class="bn" onclick="retro()">Anterior</button>
    <button class="bs" onclick="irA(0)" style="opacity:.5">Revisar desde el inicio</button></div>`;
}
