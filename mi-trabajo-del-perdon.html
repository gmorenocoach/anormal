<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060C1A;--bg2:#0A1020;--bg3:#101828;--bg4:#131D30;

}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding:0}
.wrap{max-width:760px;margin:0 auto;padding:24px 16px 60px}
.tag{display:inline-block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;padding:3px 10px;border-radius:20px;font-family:'Barlow Condensed',sans-serif}
.card{background:var(--bg3);border-radius:var(--rl);padding:18px 20px;margin-bottom:12px;border:1px solid rgba(255,255,255,.06)}
.ph-s{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin-bottom:6px;font-family:'Barlow Condensed',sans-serif}
.ph-t{font-family:var(--serif);font-size:28px;font-weight:300;color:var(--gold2);margin-bottom:8px;line-height:1.2}
.ph-d{font-size:13px;color:var(--dim);line-height:1.75;max-width:580px}
.ct{font-size:13px;color:var(--dim);line-height:1.75}
.cl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;margin-bottom:8px;font-family:'Barlow Condensed',sans-serif}
.rta{width:100%;background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:var(--rm);color:var(--text);font-family:var(--font);font-size:13px;padding:12px 14px;outline:none;resize:vertical;min-height:100px;line-height:1.7;transition:border-color .2s}

.rta::placeholder{color:var(--faint)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 24px;border-radius:30px;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;transition:all .2s}
.bp{background:linear-gradient(135deg,var(--gold),#a07830);color:#060C1A}
.bp:hover{opacity:.88}
.bn{background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--dim)}
.bn:hover{border-color:rgba(255,255,255,.3);color:var(--text)}
.br{background:transparent;border:1px solid var(--roseb);color:var(--rose)}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,.05);gap:10px;flex-wrap:wrap}

.paso-lbl{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.paso-num{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-family:'Barlow Condensed',sans-serif}
.ritual-blk{background:linear-gradient(135deg,rgba(212,83,126,.08),rgba(155,127,212,.06));border:1px solid rgba(212,83,126,.2);border-radius:var(--rl);padding:16px 18px;margin-bottom:12px}
.ritual-lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--rose);margin-bottom:8px;font-weight:500;font-family:'Barlow Condensed',sans-serif}
.ritual-paso{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.ritual-paso:last-child{border-bottom:none}
.ritual-num{width:22px;height:22px;border-radius:50%;background:rgba(212,83,126,.15);border:1px solid var(--roseb);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--rose);font-weight:500;flex-shrink:0;margin-top:1px}
.ritual-txt{font-size:12px;color:var(--text);line-height:1.6}
.ritual-txt strong{color:var(--gold3)}
.persona-blk{background:var(--bg3);border-radius:var(--rl);padding:20px;margin-bottom:14px;border:1px solid rgba(255,255,255,.07)}
.persona-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.persona-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:20px;font-weight:300;flex-shrink:0}
.persona-titulo{font-family:var(--serif);font-size:20px;font-weight:300;color:var(--gold2)}
.persona-sub{font-size:11px;color:var(--faint);margin-top:2px}
.guia-blk{background:var(--bg4);border-radius:var(--rm);padding:12px 15px;margin-bottom:12px;border-left:3px solid var(--pur)}

.soltar-opts{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

.soltar-opt:hover{border-color:var(--roseb);color:var(--rose)}
.soltar-opt.on{border-color:var(--rose);background:rgba(212,83,126,.1);color:var(--rose)}
.done-blk{background:linear-gradient(135deg,rgba(74,191,122,.08),rgba(74,191,122,.04));border:1px solid rgba(74,191,122,.25);border-radius:var(--rl);padding:14px 16px;margin-top:10px;display:none}
.done-blk.show{display:block}
.done-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--grn);margin-bottom:5px;font-weight:500;font-family:'Barlow Condensed',sans-serif}
.done-txt{font-size:12px;color:var(--dim);line-height:1.6}
.chk-row{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer}
.chk-box{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--faint);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.chk-box.on{background:var(--grn);border-color:var(--grn)}
.chk-lbl{font-size:12px;color:var(--dim);line-height:1.5}
.frase-dia{background:var(--bg4);border-radius:var(--rm);padding:12px 16px;margin-bottom:16px;border-left:3px solid var(--gold);text-align:center}
.frase-dia-t{font-family:var(--serif);font-size:15px;font-style:italic;color:var(--gold3);line-height:1.7}
.aprendizaje-blk{background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.04));border:1px solid rgba(201,168,76,.2);border-radius:var(--rm);padding:12px 15px;margin-bottom:12px}
.resumen-carta{background:var(--bg2);border-radius:var(--rm);padding:14px 16px;margin:10px 0;border:1px solid rgba(255,255,255,.06);font-size:13px;color:var(--dim);line-height:1.75;white-space:pre-wrap;font-family:var(--serif);font-style:italic}
#app{padding:0}
</style>

<script>
// ============================================================
// ANORMAL - Módulo de datos compartidos entre módulos
// Usa sessionStorage para pasar datos entre páginas HTML
// ============================================================

var ANORMAL = {
  
  // Leer todos los datos del proceso
  getData: function() {
    try {
      var raw = sessionStorage.getItem('anormal_proceso');
      return raw ? JSON.parse(raw) : {};
    } catch(e) { return {}; }
  },
  
  // Guardar datos del proceso
  setData: function(data) {
    try {
      sessionStorage.setItem('anormal_proceso', JSON.stringify(data));
    } catch(e) {}
  },
  
  // Actualizar una sección específica
  update: function(section, value) {
    var data = this.getData();
    data[section] = value;
    this.setData(data);
  },
  
  // Agregar un compromiso/hábito a la agenda central
  addAgenda: function(item) {
    // item = {modulo, titulo, descripcion, fecha, periodicidad, tipo}
    var data = this.getData();
    if (!data.agenda) data.agenda = [];
    item.id = 'ag_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    item.cumplido = false;
    item.fechaCreacion = new Date().toLocaleDateString('es-CO');
    data.agenda.push(item);
    this.setData(data);
    return item.id;
  },
  
  // Guardar lo marcado en septenios para que fluya al ECG y al Niño Interior
  saveSeptenios: function(checklistEstado, cicloActual, nombre, genero) {
    var doloresPorCiclo = [];
    
    Object.keys(checklistEstado).forEach(function(chkKey) {
      var est = checklistEstado[chkKey];
      if (!est || !est.dolor || !est.dolor.length) return;
      
      // Extraer número de ciclo del key ('chk-3' -> 3, 'actual-5' -> 5)
      var cicloNum = 0;
      if (chkKey.startsWith('chk-')) cicloNum = parseInt(chkKey.replace('chk-',''));
      else if (chkKey.startsWith('actual-')) cicloNum = parseInt(chkKey.replace('actual-',''));
      if (!cicloNum) return;
      
      // Obtener los ítems de dolor marcados
      var cicloDatos = window.CICLOS_DATA ? window.CICLOS_DATA[String(cicloNum)] : null;
      if (!cicloDatos) return;
      
      var itemsMarcados = est.dolor.map(function(idx) {
        return cicloDatos.dolor[idx] || '';
      }).filter(Boolean);
      
      var itemsAlegria = (est.alegria || []).map(function(idx) {
        return cicloDatos.alegria[idx] || '';
      }).filter(Boolean);
      
      if (itemsMarcados.length || itemsAlegria.length) {
        doloresPorCiclo.push({
          ciclo: cicloNum,
          tipo: cicloDatos.tipo,
          titulo: cicloDatos.titulo,
          edades: cicloDatos.titulo.match(/\d+ a \d+/)?.[0] || '',
          dolores: itemsMarcados,
          alegrias: itemsAlegria,
          // Preguntas respondidas
          respuestas: [0,1,2].map(function(pi) {
            return checklistEstado[chkKey + '-preg-' + pi] || '';
          }).filter(Boolean)
        });
      }
    });
    
    // Ordenar por ciclo
    doloresPorCiclo.sort(function(a,b){return a.ciclo - b.ciclo;});
    
    this.update('septenios', {
      cicloActual: cicloActual,
      nombre: nombre,
      genero: genero,
      doloresPorCiclo: doloresPorCiclo,
      fecha: new Date().toLocaleDateString('es-CO')
    });
  },
  
  // Obtener datos de septenios para el ECG
  getSepteniosParaECG: function() {
    var data = this.getData();
    return data.septenios || null;
  },
  
  // Obtener ciclos 1-2-3 para el Niño Interior
  getCiclosInfancia: function() {
    var sep = this.getSepteniosParaECG();
    if (!sep) return [];
    return sep.doloresPorCiclo.filter(function(c) {
      return c.ciclo <= 3;
    });
  },
  
  // Guardar compromisos de un módulo en la agenda central
  saveCompromisos: function(moduloId, compromisos) {
    if (!compromisos || !Object.keys(compromisos).length) return;
    var data = this.getData();
    if (!data.agenda) data.agenda = [];
    
    Object.keys(compromisos).forEach(function(key) {
      var texto = (compromisos[key] || '').trim();
      if (!texto) return;
      // Evitar duplicados del mismo módulo+key
      var exists = data.agenda.some(function(item) {
        return item.moduloId === moduloId && item.key === key;
      });
      if (!exists) {
        data.agenda.push({
          id: 'ag_' + moduloId + '_' + key,
          moduloId: moduloId,
          key: key,
          tipo: 'compromiso-principio',
          descripcion: texto,
          fechaCreacion: new Date().toLocaleDateString('es-CO'),
          cumplido: false,
          periodicidad: 'diario'
        });
      }
    });
    this.setData(data);
  }
};

// Sobrescribir guardarCompromisosModulo para que también vaya a la agenda
window.guardarCompromisosModulo = function(moduloId, compromisos) {
  if (!window.COMPROMISOS_PROCESO) window.COMPROMISOS_PROCESO = {};
  window.COMPROMISOS_PROCESO[moduloId] = compromisos;
  ANORMAL.saveCompromisos(moduloId, compromisos);
};

</script>
<script>
// ============================================================
// WIDGET DE PRINCIPIOS Y COMPROMISOS - Anormal / Cafe con Proposito
// v2.0 - Con recordatorio no negociable y orden original de principios
// ============================================================

var MODULO_PRINCIPIOS = {"bienvenida":[1,4,14],"rueda":[11,12],"elementos":[11,12],"camino":[5,9],"subnums":[5],"mapa":[9],"flechas":[9],"nombre":[5,9],"personas":[9,13],"dolan":[12,13],"perfil":[9],"septenios":[3,16],"ecg":[2,10],"nino":[2,3,7],"ikigai":[6,8,17],"ciclo":[15,16],"plan":[13,15,16],"dashboard":[18,9]};

var PRINCIPIOS_DB = [{"num": 1, "titulo": "\u2200gradecer", "sesion": "bienvenida", "color": "#C9A84C", "no_negociable": "Mientras avanzas en este proceso, la gratitud no es opcional. Es el lente desde el que lees cada resultado, cada ejercicio, cada descubrimiento sobre ti mismo."}, {"num": 2, "titulo": "\u2200vanza en el perd\u00f3n", "sesion": "sesion3", "color": "#D4537E", "no_negociable": "Sin perd\u00f3n no hay transformaci\u00f3n real. Puedes completar todos los ejercicios \u2014 pero si cargas resentimiento, el proceso no puede hacer su trabajo completo."}, {"num": 3, "titulo": "\u2200provecha el dolor", "sesion": "sesion3", "color": "#D4537E", "no_negociable": "El dolor que emerja en este proceso no es se\u00f1al de que algo sale mal. Es la se\u00f1al de que algo est\u00e1 cambiando. No te detengas."}, {"num": 4, "titulo": "\u2200p\u00fantale al compromiso", "sesion": "bienvenida", "color": "#C9A84C", "no_negociable": "Ya te comprometiste al entrar. Ese compromiso no vence. Cada vez que sientas que quieres pausar, recuerda: te comprometiste antes de saber el c\u00f3mo. Conf\u00eda."}, {"num": 5, "titulo": "\u2200prende a normalizar lo extraordinario", "sesion": "sesion2", "color": "#9B7FD4", "no_negociable": "Lo que descubras sobre ti en esta sesi\u00f3n debe convertirse en tu nueva normalidad, no en un dato interesante que olvidas en una semana."}, {"num": 6, "titulo": "\u2200taca el miedo", "sesion": "sesion4", "color": "#E8C96A", "no_negociable": "Declarar tu prop\u00f3sito de vida activa todos tus miedos. Eso es normal y es buena se\u00f1al. La \u00fanica respuesta \u2200normal es seguir avanzando."}, {"num": 7, "titulo": "\u2200prende cero excusas", "sesion": "sesion3", "color": "#D4537E", "no_negociable": "Una excusa no te saca del proceso. Te saca de tu m\u00e1ximo potencial. Recuerda tu compromiso."}, {"num": 8, "titulo": "\u2200prende a pagar el precio", "sesion": "sesion4", "color": "#E8C96A", "no_negociable": "Vivir tu prop\u00f3sito tiene un precio real. Identificarlo aqu\u00ed y aceptarlo es el acto de honestidad que hace que el plan de vida funcione."}, {"num": 9, "titulo": "\u2200sume responsabilidad total", "sesion": "sesion2", "color": "#9B7FD4", "no_negociable": "Lo que tu numerolog\u00eda y tus valores revelan no es un destino fijo. Es un mapa. T\u00fa decides c\u00f3mo usarlo. Eso es responsabilidad total."}, {"num": 10, "titulo": "\u2200poyo emocional como combustible", "sesion": "sesion3", "color": "#D4537E", "no_negociable": "El dolor emocional que emerge en esta sesi\u00f3n no es un obst\u00e1culo. Es combustible. La intensidad que sientes es proporcional a la transformaci\u00f3n que viene."}, {"num": 11, "titulo": "\u2200palancamiento: la verdad contigo mismo", "sesion": "sesion1", "color": "#C9A84C", "no_negociable": "El diagn\u00f3stico solo funciona si eres brutalmente honesto. El n\u00famero que le das a cada \u00e1rea de tu vida debe reflejar la realidad, no c\u00f3mo quisieras que fuera."}, {"num": 12, "titulo": "\u2200doptas lo que toleras", "sesion": "sesion1", "color": "#C9A84C", "no_negociable": "Las \u00e1reas con calificaci\u00f3n baja son exactamente lo que has estado tolerando. Verlo sin juzgarte es el primer paso. Seguir toler\u00e1ndolo despu\u00e9s de verlo es la excusa."}, {"num": 13, "titulo": "\u2200pr\u00f3piate la insatisfacci\u00f3n", "sesion": "sesion2", "color": "#9B7FD4", "no_negociable": "La brecha entre tus valores declarados y los que realmente vives no es una falla \u2014 es informaci\u00f3n. Usa esa insatisfacci\u00f3n como motor, no como excusa."}, {"num": 14, "titulo": "\u2200dopta m\u00e9todos probados", "sesion": "bienvenida", "color": "#C9A84C", "no_negociable": "Esta plataforma integra metodolog\u00edas con d\u00e9cadas de validaci\u00f3n. Tu trabajo es aplicarlas con honestidad, no cuestionarlas antes de vivirlas."}, {"num": 15, "titulo": "\u2200lcanza el resultado, luego mejora", "sesion": "sesion5", "color": "#4ABF7A", "no_negociable": "Tu plan de vida no necesita ser perfecto para empezar. Necesita ser tuyo y necesita empezar. La acci\u00f3n imperfecta ejecutada vale m\u00e1s que el plan perfecto que nunca sale."}, {"num": 16, "titulo": "\u2200celera el proceso", "sesion": "sesion5", "color": "#4ABF7A", "no_negociable": "Cada d\u00eda que pasa sin ejecutar el plan es un d\u00eda que no vuelve. La urgencia no es ansiedad \u2014 es el respeto que le tienes a tu propio tiempo."}, {"num": 17, "titulo": "\u2200tenci\u00f3n y enfoque constante", "sesion": "sesion4", "color": "#E8C96A", "no_negociable": "Haz este m\u00f3dulo sin interrupciones. Lo que emerja es proporcional a tu concentraci\u00f3n."}, {"num": 18, "titulo": "\u2200lcanzas la anormalidad", "sesion": "sesion5", "color": "#4ABF7A", "no_negociable": "Completar este proceso te convierte en alguien diferente. Esa diferencia ser\u00e1 visible \u2014 y no todos la aplaudir\u00e1n. Esa resistencia confirma que el proceso funcion\u00f3."}];

// Principios acumulados que el participante ya ha visto
var PRINCIPIOS_VISTOS = (function(){
  var v = {};
  PRINCIPIOS_DB.forEach(function(pr){ v[pr.num] = false; });
  return v;
})();

function buildWidgetPrincipios(moduloId, contenedor, onComplete) {
  var principiosIds = MODULO_PRINCIPIOS[moduloId] || [];
  if (!principiosIds.length) { if (onComplete) onComplete(); return; }

  // Principios acumulados anteriores (ya vistos en modulos previos)
  var anteriores = [];
  PRINCIPIOS_DB.forEach(function(pr){
    if(PRINCIPIOS_VISTOS[pr.num] && principiosIds.indexOf(pr.num) < 0){
      anteriores.push(pr);
    }
  });

  var compromisos_mod = {};
  var paso = 0;
  // Fases: -1=recordatorio, 0..N-1=principios, N=compromisos
  var FASE_RECORD = -1;
  var totalPasos = principiosIds.length + 1;
  var hayAnteriores = anteriores.length > 0;

  // Crear overlay
  var overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(4,8,16,.97);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;animation:wfadeIn .3s ease";

  var box = document.createElement("div");
  box.style.cssText = "background:#0A0F1E;border:1px solid rgba(201,168,76,.25);border-radius:20px;width:100%;max-width:560px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.6)";

  // Header
  var hdr = document.createElement("div");
  hdr.style.cssText = "padding:18px 22px 14px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0";
  var htop = document.createElement("div");
  htop.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:10px";
  var hlogo = document.createElement("div");
  hlogo.style.cssText = "font-family:Cormorant Garamond,serif;font-size:20px;color:#E8C96A;font-weight:300;letter-spacing:.02em";
  hlogo.textContent = "\u2200normal";
  var hstep = document.createElement("div");
  hstep.id = "wp-step";
  hstep.style.cssText = "font-size:10px;color:#3A4558;letter-spacing:.12em;text-transform:uppercase;font-family:Barlow Condensed,sans-serif";
  htop.appendChild(hlogo); htop.appendChild(hstep);
  var hbar = document.createElement("div");
  hbar.style.cssText = "height:2px;background:#1A2640;border-radius:1px;overflow:hidden";
  var hfill = document.createElement("div");
  hfill.id = "wp-fill";
  hfill.style.cssText = "height:100%;background:linear-gradient(90deg,#C9A84C,#E8C96A);border-radius:1px;transition:width .4s ease;width:0%";
  hbar.appendChild(hfill); hdr.appendChild(htop); hdr.appendChild(hbar);
  box.appendChild(hdr);

  // Body
  var body = document.createElement("div");
  body.style.cssText = "flex:1;overflow-y:auto;padding:0 22px";

  nomRow.appendChild(nomInp); nomRow.appendChild(nomBtn);
  nomBlk.appendChild(nomRow);
  p.appendChild(nomBlk);
}

// ── FUNCIÓN COMÚN: Bloque de carta ──────────────────────────
function buildCartaBlk(container, personaKey, titulo, guiaTexto, preguntasGuia, cicloPadres, datosDirectos) {
  var datos = datosDirectos || S.datos[personaKey];

    var ctxLbl = mk('div','cl'); ctxLbl.style.color='var(--gold)'; ctxLbl.textContent='Antes de escribir \u2014 M\u00edralo(a) como ni\u00f1o(a)';
    ctxBlk.appendChild(ctxLbl);
    var ctxTxt = mk('div','ct'); ctxTxt.style.fontSize='12px';
    ctxTxt.textContent = cicloPadres;
    ctxBlk.appendChild(ctxTxt);

  }

  // Guía de la carta
  var guia = mk('div','guia-blk');
  var gLbl = mk('div','guia-lbl'); gLbl.textContent = 'Gu\u00eda para tu carta';
  guia.appendChild(gLbl);
  preguntasGuia.forEach(function(preg, i) {

    pBlk.style.cssText = 'padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)';
    var pNum = mk('div');
    pNum.style.cssText = 'font-size:10px;color:var(--pur);font-weight:500;margin-bottom:3px';
    pNum.textContent = String(i+1) + '.';

    pBlk.appendChild(pNum); pBlk.appendChild(pTxt);
    guia.appendChild(pBlk);
  });
  container.appendChild(guia);

  // El aprendizaje primero
  var aprBlk = mk('div','aprendizaje-blk');
  var aprLbl = mk('div','cl'); aprLbl.style.color='var(--gold)'; aprLbl.textContent='Perder para ganar \u2014 \u00bfQu\u00e9 aprendes de este dolor?';
  aprBlk.appendChild(aprLbl);
  var aprDesc = mk('div','ct'); aprDesc.style.cssText='margin-bottom:8px;font-size:12px';
  aprDesc.textContent = 'Antes de escribir la carta, identifica el aprendizaje que este dolor te dej\u00f3. Cuando lo ves como un maestro, es m\u00e1s f\u00e1cil soltar al autor del dolor.';
  aprBlk.appendChild(aprDesc);
  var aprRta = document.createElement('textarea'); aprRta.className='rta'; aprRta.style.minHeight='70px';
  aprRta.placeholder = '\u00bfQu\u00e9 me ense\u00f1\u00f3 este dolor? \u00bfEn qu\u00e9 me hizo m\u00e1s fuerte? \u00bfQu\u00e9 no hubiera aprendido sin haberlo vivido?';
  aprRta.value = datos.aprendizaje || '';
  aprRta.oninput = function(){datos.aprendizaje = this.value;};
  aprBlk.appendChild(aprRta);
  container.appendChild(aprBlk);

  // Textarea de la carta
  var cartaLbl = mk('div','cl'); cartaLbl.style.cssText='color:var(--rose);margin-bottom:6px'; cartaLbl.textContent='Escribe tu carta \u2014 en papel, a mano';
  container.appendChild(cartaLbl);
  var cartaDesc = mk('div','ct'); cartaDesc.style.cssText='font-size:12px;margin-bottom:8px';
  cartaDesc.textContent = 'Usa las preguntas de arriba como gu\u00eda. No hay forma incorrecta de hacerlo. Escr\u00edbela en papel \u2014 usa este espacio para tu borrador o para registrar lo m\u00e1s importante.';
  container.appendChild(cartaDesc);
  var cartaRta = document.createElement('textarea'); cartaRta.className='rta'; cartaRta.style.minHeight='160px';
  cartaRta.placeholder = titulo + ', quiero decirte que...';
  cartaRta.value = datos.carta || '';
  cartaRta.oninput = function(){datos.carta = this.value;};
  container.appendChild(cartaRta);

  // Ritual de soltar
  var soltarBlk = mk('div','card');
  soltarBlk.style.cssText = 'margin-top:12px;border-color:rgba(212,83,126,.15)';
  var sLbl = mk('div','cl'); sLbl.style.color='var(--rose)'; sLbl.textContent='El ritual de soltar \u2014 \u00bfC\u00f3mo liberar\u00e1s esta carta?';
  soltarBlk.appendChild(sLbl);
  var sDesc = mk('div','ct'); sDesc.style.cssText='font-size:12px;margin-bottom:10px';
  sDesc.textContent = 'Una vez que hayas escrito la carta en papel, elige c\u00f3mo soltarla. El acto f\u00edsico completa el proceso emocional.';
  soltarBlk.appendChild(sDesc);
  var opts = mk('div','soltar-opts');
  var soltar_ops = [
    {id:'romper', lbl:'\u270f Romperla'},
    {id:'quemar', lbl:'\ud83d\udd25 Quemarla'},
    {id:'inodoro', lbl:'\ud83d\udca7 Inodoro'}
  ];
  soltar_ops.forEach(function(op) {
    var btn = mk('button','soltar-opt');
    btn.textContent = op.lbl;
    if (datos.soltar === op.id) btn.classList.add('on');
    btn.onclick = function() {
      datos.soltar = op.id;
      opts.querySelectorAll('.soltar-opt').forEach(function(b){b.classList.remove('on');});
      btn.classList.add('on');
      doneBlk.classList.add('show');
    };
    opts.appendChild(btn);
  });
  soltarBlk.appendChild(opts);

  var doneBlk = mk('div','done-blk');
  if (datos.soltar) doneBlk.classList.add('show');
  var doneLbl = mk('div','done-lbl'); doneLbl.textContent = 'Soltar registrado';
  var doneTxt = mk('div','done-txt');
  doneTxt.textContent = 'Recuerda: no tienes que hacerlo perfectamente. Solo hacerlo con intenci\u00f3n. Cuando est\u00e9s listo, marca que completaste este perd\u00f3n.';
  doneBlk.appendChild(doneLbl); doneBlk.appendChild(doneTxt);
  soltarBlk.appendChild(doneBlk);

  // Checkbox de completado
  var chkRow = mk('div','chk-row');
  chkRow.style.marginTop = '12px';
  var chkBox = mk('div','chk-box' + (datos.comp ? ' on' : ''));
  var chkLbl = mk('label','chk-lbl');
  chkLbl.textContent = 'He completado este perd\u00f3n \u2014 escribi la carta y realic\u00e9 el ritual de soltar';
  chkRow.onclick = function() {
    datos.comp = !datos.comp;
    chkBox.className = 'chk-box' + (datos.comp ? ' on' : '');
  };
  chkRow.appendChild(chkBox); chkRow.appendChild(chkLbl);
  soltarBlk.appendChild(chkRow);
  container.appendChild(soltarBlk);
}

  // Resumen
  var completados = 0;
  if (S.datos.nino.comp) completados++;
  if (S.datos.madre.comp) completados++;
  if (S.datos.padre.comp) completados++;
  S.datos.otros.forEach(function(o){if(o.comp)completados++;});
  var total = 3 + S.datos.otros.length;

  var ph = mk('div','card');
  ph.style.background = 'linear-gradient(135deg,rgba(74,191,122,.06),rgba(201,168,76,.04))';
  ph.style.borderColor = 'rgba(74,191,122,.2)';
  ph.innerHTML = '<div class="ph-s">El camino del perd\u00f3n</div><div class="ph-t">Mi compromiso</div>' +
    '<div class="ph-d">Perdonar es un proceso, no un momento. Lo que hiciste hoy es el inicio \u2014 o la continuaci\u00f3n \u2014 de uno de los trabajos m\u00e1s valientes que existe.</div>';
  p.appendChild(ph);

  // Stats
  var stats = mk('div');
  stats.style.cssText='display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap';
  [{n:String(total),l:'Perdones iniciados',c:'var(--gold2)'},{n:String(completados),l:'Completados',c:'var(--grn)'},{n:String(total-completados),l:'En proceso',c:'var(--rose)'}].forEach(function(s){
    var blk=mk('div','card');blk.style.cssText='flex:1;min-width:80px;text-align:center;padding:12px';
    var sn=mk('div');sn.style.cssText='font-family:var(--serif);font-size:28px;font-weight:300;color:'+s.c;sn.textContent=s.n;
    var sl=mk('div');sl.style.cssText='font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-top:3px';sl.textContent=s.l;
    blk.appendChild(sn);blk.appendChild(sl);stats.appendChild(blk);
  });
  p.appendChild(stats);

  // Compromiso personal
  var compBlk = mk('div','card');
  var cLbl = mk('div','cl'); cLbl.style.color='var(--gold)'; cLbl.textContent='Mi declaraci\u00f3n de perd\u00f3n';
  compBlk.appendChild(cLbl);
  var cDesc = mk('div','ct'); cDesc.style.cssText='font-size:12px;margin-bottom:10px';
  cDesc.textContent = 'El perd\u00f3n es un acto de voluntad. Escribe tu declaraci\u00f3n personal \u2014 no para el otro, sino para ti.';
  compBlk.appendChild(cDesc);
  var cRta = document.createElement('textarea'); cRta.className='rta';
  cRta.placeholder = 'Hoy decido soltar... Hoy elijo perdonar porque... A partir de hoy...';
  cRta.value = S.datos.declaracion || '';
  cRta.oninput = function(){S.datos.declaracion=this.value;};
  compBlk.appendChild(cRta);
  p.appendChild(compBlk);

  // Hábitos del perdón
  var habBlk = mk('div','card');
  var hLbl = mk('div','cl'); hLbl.style.color='var(--pur)'; hLbl.textContent='H\u00e1bitos para sostener el perd\u00f3n';
  habBlk.appendChild(hLbl);
  var habDesc = mk('div','ct'); habDesc.style.cssText='font-size:12px;margin-bottom:10px';
  habDesc.textContent = 'El perd\u00f3n no es un evento \u2014 es una pr\u00e1ctica. Estos h\u00e1bitos te ayudan a sostenerlo:';
  habBlk.appendChild(habDesc);
  var habitos = [
    'Gratitud diaria \u2014 el ABC de las gracias',
    'Contacto con la naturaleza',
    'Movimiento corporal consciente',
    'Meditaci\u00f3n o silencio de 5 minutos al d\u00eda',
    'Escritura terap\u00e9utica continua',
    'Contacto social genuino',
    'Actividades en familia',
    'Servicio a otros'
  ];
  habitos.forEach(function(h) {
    var row = mk('div','chk-row');
    var cb = mk('div','chk-box'+(S.comp['hab-'+h]?' on':''));
    var lbl = mk('label','chk-lbl'); lbl.textContent=h;
    row.onclick=function(){S.comp['hab-'+h]=!S.comp['hab-'+h];cb.className='chk-box'+(S.comp['hab-'+h]?' on':'');
      // Guardar en agenda compartida
      if(S.comp['hab-'+h] && window.ANORMAL){
        ANORMAL.addAgenda({moduloId:'perdon',tipo:'habito',descripcion:h,periodicidad:'diario'});
      }
    };
    row.appendChild(cb); row.appendChild(lbl); habBlk.appendChild(row);
  });
  p.appendChild(habBlk);

  // Guardar en agenda compartida
  if (window.ANORMAL && S.datos.declaracion) {
    ANORMAL.update('perdon', {
      declaracion: S.datos.declaracion,
      fecha: new Date().toLocaleDateString('es-CO'),
      completados: completados,
      total: total
    });
  }

  var nav = mk('div','nav');
  var pb = mk('button','btn bn'); pb.textContent = '\u2190 Otros perdones'; pb.onclick=function(){irA(4);};
  var pn = mk('button','btn bp'); pn.textContent = 'Ir a mi Br\u00fajula \u2192'; pn.onclick=function(){window.location.href='brujula-proposito.html';};
  nav.appendChild(pb); nav.appendChild(pn); p.appendChild(nav);
}

// ── HELPER: Barra de progreso ─────────────────────────────────
function addProgBlk(container) {
  var pw = mk('div','prog-wrap');
  var pb2 = mk('div','prog-bar'); pb2.id='prog-bar';
  var pct = Math.round((S.paso / (S.totalPasos - 1)) * 100);
  pb2.style.width = pct + '%';
  pw.appendChild(pb2);
  var pl = mk('div','paso-lbl');
  var pls = mk('div','paso-num'); pls.id='paso-lbl-txt';
  pls.textContent = PASOS[S.paso] + ' \u2014 Paso ' + (S.paso+1) + ' de ' + S.totalPasos;
  var plp = mk('div','paso-num'); plp.textContent = pct + '%';
  pl.appendChild(pls); pl.appendChild(plp);
  container.appendChild(pl);
  container.appendChild(pw);
}

// ── INIT ──────────────────────────────────────────────────────
window.onload = function() {
  buildWidgetPrincipios("nino", document.body, function(){

  if (window.ANORMAL) {
    var d = ANORMAL.getData();
    if (d.septenios && d.septenios.nombre) S.nombre = d.septenios.nombre;
  }
  irA(0);
  });
};
</script>
</body>
