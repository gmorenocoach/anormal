<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Libro — ∀normal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060A14; --bg2:#0A0F1E; --bg3:#0E1525;
  --gold:#C9A84C; --gold2:#E8C96A; --gold3:#F5E0A0;
  --gd:rgba(201,168,76,.13); --gb:rgba(201,168,76,.28);
  --text:#EAE6DC; --dim:#9AA5B8; --faint:#3A4558; --ffaint:#1E2A3A;
  --grn:#4ABF7A; --rose:#D4537E; --azul:#5A8CC0;
  --rm:10px; --rl:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:17.5px;line-height:1.7;padding:0 0 60px}
.wrap{max-width:760px;margin:0 auto;padding:28px 22px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}
.volver{font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);text-decoration:none;border:1px solid var(--faint);border-radius:20px;padding:6px 16px;transition:all .2s}
.volver:hover{border-color:var(--gb);color:var(--gold2)}
.label{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold2);margin-bottom:8px}

/* PORTADA */
.portada{text-align:center;padding:40px 20px 50px;border-bottom:1px solid var(--gb);margin-bottom:40px}
.portada-simbolo{font-family:'Cormorant Garamond',serif;font-size:52px;color:var(--gold);margin-bottom:10px;line-height:1}
.portada-tit{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;line-height:1.2;margin-bottom:8px}
.portada-sub{font-size:15px;color:var(--dim);font-style:italic;margin-bottom:22px}
.portada-datos{display:flex;justify-content:center;gap:26px;flex-wrap:wrap;margin-top:20px}
.pd{text-align:center}
.pd-v{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold3)}
.pd-l{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-top:2px}
.proposito-portada{margin-top:26px;padding:18px 22px;background:var(--bg2);border:1px solid var(--gb);border-radius:var(--rl)}
.proposito-portada .t{font-family:'Cormorant Garamond',serif;font-size:21px;font-style:italic;color:var(--gold3);line-height:1.5}

/* CAPÍTULOS */
.cap{margin-bottom:44px}
.cap-num{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.cap-tit{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;color:var(--text);margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--ffaint)}
.cap-intro{font-size:15px;color:var(--dim);font-style:italic;line-height:1.75;margin-bottom:22px}
.pieza{margin-bottom:20px}
.pieza-lbl{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold2);margin-bottom:6px}
.pieza-txt{background:var(--bg2);border-left:2px solid var(--gb);border-radius:0 var(--rm) var(--rm) 0;padding:14px 18px;font-size:15.5px;line-height:1.75;color:var(--text);white-space:pre-wrap}
.pieza-txt.italic{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--gold3)}
.lista-items{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.item-chip{background:var(--bg3);border:1px solid var(--faint);border-radius:14px;padding:5px 12px;font-size:13.5px;color:var(--text)}
.vacio{font-size:14px;color:var(--faint);font-style:italic;padding:10px 0}
.nota{font-size:13px;color:var(--dim);font-style:italic;margin-top:8px}

/* EPÍLOGO */
.epilogo{background:var(--bg2);border:1px solid var(--gb);border-radius:var(--rl);padding:26px 24px;text-align:center;margin-top:10px}
.epi-crecimiento{display:flex;justify-content:center;align-items:center;gap:20px;margin:16px 0}
.epi-n{font-family:'Cormorant Garamond',serif;font-size:32px}
.epi-l{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}

.cierre-libro{text-align:center;padding:34px 20px;margin-top:36px;border-top:1px solid var(--gb)}
.cierre-libro .f{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--gold3);line-height:1.5;margin-bottom:8px}
.cierre-libro .a{font-size:13px;color:var(--dim)}
.btn-imprimir{margin-top:20px;background:var(--gd);border:1px solid var(--gb);border-radius:22px;color:var(--gold2);font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:.1em;text-transform:uppercase;padding:10px 26px;cursor:pointer;transition:all .2s}
.btn-imprimir:hover{background:rgba(201,168,76,.2)}

@media print{
  body{background:#fff;color:#111}
  .top,.btn-imprimir{display:none}
  .pieza-txt{background:#f7f7f7;color:#111}
  .cap-tit,.portada-tit{color:#111}
}
@media(max-width:600px){
  .portada-tit{font-size:30px}
  .cap-tit{font-size:25px}
  body{font-size:16.5px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a href="resumen-conciencia.html" class="volver">← Volver al resumen</a>
    <button class="btn-imprimir" onclick="window.print()">Imprimir / PDF</button>
  </div>
  <div id="libro"></div>
</div>

<script>
function leer(k,def){ try{ var v=localStorage.getItem(k); return (v===null||v===undefined)?def:v; }catch(e){ return def; } }
function leerJSON(k,def){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):def; }catch(e){ return def; } }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function tieneTexto(s){ return s && String(s).trim().length>0; }

var NIVELES=[{n:20,t:'Vergüenza'},{n:30,t:'Culpa'},{n:50,t:'Apatía'},{n:75,t:'Tristeza'},{n:100,t:'Miedo'},{n:125,t:'Deseo'},{n:150,t:'Ira'},{n:175,t:'Orgullo'},{n:200,t:'Coraje'},{n:250,t:'Neutralidad'},{n:310,t:'Voluntad'},{n:350,t:'Aceptación'},{n:400,t:'Razón'},{n:500,t:'Amor'},{n:540,t:'Alegría'},{n:600,t:'Paz'},{n:700,t:'Iluminación'}];
function nombreNivel(v){ if(!v) return '—'; var r=NIVELES[0]; for(var i=0;i<NIVELES.length;i++){ if(Math.abs(NIVELES[i].n-v)<Math.abs(r.n-v)) r=NIVELES[i]; } return r.t; }

// ── Datos ────────────────────────────────────────────────
var nombre = leer('anormal_nombre','');
var linea = leer('anormal_linea','');
var lineaTxt = {salud:'Salud', dinero:'Dinero', amor:'Amor'}[linea] || '';
var reflexionOrigen = leer('anormal_linea_reflexion','');
var nivelConsciente = parseInt(leer('anormal_nivel_consciente','0'))||0;
var nivelReal = parseInt(leer('anormal_nivel_real','0'))||0;
var nivelMeta = parseInt(leer('anormal_nivel_meta','0'))||0;
var puntos = parseInt(leer('anormal_puntos_conciencia','0'))||0;
var acciones = leerJSON('anormal_acciones',[]);
var prioridades = leerJSON('anormal_prioridades',[]);
var resig = leerJSON('anormal_resignificacion',{});
var perdon = leerJSON('anormal_perdon',{});
var caminoVida = leer('anormal_camino_vida','');
var autoc = leerJSON('anormal_autoconocimiento',{});
var ikigai = leerJSON('anormal_ikigai',{});
var sigCiclo = leerJSON('anormal_siguiente_ciclo',{});
var planVida = leerJSON('anormal_plan_vida',{});
var ruedaIni = leerJSON('anormal_rueda_areas',{});
var ruedaFin = leerJSON('anormal_rueda_final',{});

var MISIONES={'1':'El Pionero','2':'El Mediador','3':'El Creador','4':'El Constructor','5':'El Explorador','6':'El Sanador','7':'El Sabio','8':'El Ejecutivo','9':'El Humanista','11':'El Iluminado','22':'El Maestro Constructor','33':'El Maestro Sanador'};

function piezaTexto(lbl, txt, italic){
  if(!tieneTexto(txt)) return '';
  return '<div class="pieza"><div class="pieza-lbl">'+lbl+'</div><div class="pieza-txt'+(italic?' italic':'')+'">'+esc(String(txt).trim())+'</div></div>';
}
function piezaLista(lbl, arr){
  if(!arr || !arr.length) return '';
  var chips = arr.map(function(x){
    var t = (typeof x==='object') ? (x.texto||x.n||x.nombre||'') : x;
    return tieneTexto(t) ? '<span class="item-chip">'+esc(t)+'</span>' : '';
  }).filter(Boolean).join('');
  if(!chips) return '';
  return '<div class="pieza"><div class="pieza-lbl">'+lbl+'</div><div class="lista-items">'+chips+'</div></div>';
}
function promedio(obj){ var t=0,n=0; for(var k in obj){ if(typeof obj[k]==='number'){ t+=obj[k]; n++; } } return n?(t/n):0; }

function render(){
  var h='';
  var hayAlgo=false;

  // ── PORTADA ──
  h+='<div class="portada">';
  h+='<div class="portada-simbolo">∀</div>';
  h+='<div class="portada-tit">El libro de '+(tieneTexto(nombre)?esc(nombre):'tu vida')+'</div>';
  h+='<div class="portada-sub">Escrito por ti, durante tu proceso ∀normal</div>';
  h+='<div class="portada-datos">';
  if(lineaTxt) h+='<div class="pd"><div class="pd-v">'+lineaTxt+'</div><div class="pd-l">Mi línea</div></div>';
  if(nivelReal||nivelConsciente) h+='<div class="pd"><div class="pd-v">'+nombreNivel(nivelReal||nivelConsciente)+'</div><div class="pd-l">Donde empecé</div></div>';
  if(nivelMeta) h+='<div class="pd"><div class="pd-v">'+nombreNivel(nivelMeta)+'</div><div class="pd-l">Mi meta</div></div>';
  if(caminoVida) h+='<div class="pd"><div class="pd-v">'+esc(caminoVida)+'</div><div class="pd-l">'+(MISIONES[String(caminoVida)]||'Mi número')+'</div></div>';
  h+='</div>';
  if(tieneTexto(ikigai.proposito)){
    h+='<div class="proposito-portada"><div class="label">Mi razón de ser</div><div class="t">"'+esc(ikigai.proposito.trim())+'"</div></div>';
    hayAlgo=true;
  }
  h+='</div>';

  // ── CAPÍTULO I ──
  var c1='';
  c1+=piezaTexto('De dónde creo que viene mi dolor', reflexionOrigen);
  if(nivelConsciente && nivelReal && nivelConsciente!==nivelReal){
    c1+='<div class="pieza"><div class="pieza-lbl">Mi punto de partida honesto</div><div class="pieza-txt">Me reconocía en <b>'+nombreNivel(nivelConsciente)+'</b>, pero mi vida reflejaba <b>'+nombreNivel(nivelReal)+'</b>. Esa distancia fue mi verdadero punto de partida.</div></div>';
  }
  var accTxt = (prioridades&&prioridades.length) ? prioridades : acciones;
  c1+=piezaLista('Las acciones que me propuse', accTxt);
  if(c1){
    hayAlgo=true;
    h+='<div class="cap"><div class="cap-num">Capítulo I</div><div class="cap-tit">De dónde vengo</div>';
    h+='<div class="cap-intro">Todo empieza con una verdad incómoda: el origen de lo que hoy te duele casi nunca está donde crees. Esto es lo que reconociste cuando te miraste sin anestesia.</div>';
    h+=c1+'</div>';
  }

  // ── CAPÍTULO II ──
  var c2='';
  c2+=piezaTexto('Cuando imaginé a mi padre como el niño que fue', resig.padre);
  c2+=piezaTexto('Cuando imaginé a mi madre como la niña que fue', resig.madre);
  if(perdon.cartas){
    var ca=perdon.cartas;
    if(ca.nino && typeof ca.nino==='object'){
      for(var k in ca.nino){ c2+=piezaTexto('Carta a mi niño interior', ca.nino[k]); break; }
    }
    c2+=piezaTexto('Carta a mi madre', typeof ca.madre==='string'?ca.madre:(ca.madre&&ca.madre.texto));
    c2+=piezaTexto('Carta a mi padre', typeof ca.padre==='string'?ca.padre:(ca.padre&&ca.padre.texto));
  }
  c2+=piezaTexto('La palabra con la que cerré mi perdón', perdon.palabra_final, true);
  if(c2){
    hayAlgo=true;
    h+='<div class="cap"><div class="cap-num">Capítulo II</div><div class="cap-tit">Lo que me pesaba</div>';
    h+='<div class="cap-intro">El resentimiento es un veneno que tomas tú esperando que le duela al otro. Aquí soltaste la piedra — no para justificar a nadie, sino para liberarte tú.</div>';
    h+=c2+'</div>';
  }

  // ── CAPÍTULO III ──
  var c3='';
  if(caminoVida){
    c3+='<div class="pieza"><div class="pieza-lbl">Mi camino de vida</div><div class="pieza-txt">Soy un <b>'+esc(caminoVida)+' · '+(MISIONES[String(caminoVida)]||'')+'</b>.</div></div>';
  }
  c3+=piezaLista('En lo que soy bueno', autoc.soy_bueno);
  c3+=piezaLista('Lo que tengo por desarrollar', autoc.por_desarrollar);
  c3+=piezaLista('Lo que vine a activar', autoc.activar);
  if(c3){
    hayAlgo=true;
    h+='<div class="cap"><div class="cap-num">Capítulo III</div><div class="cap-tit">Quién soy</div>';
    h+='<div class="cap-intro">Tus números no son tu sentencia: son tu lista de tareas. Esto es lo que descubriste sobre tus dones y sobre lo que viniste a desarrollar.</div>';
    h+=c3+'</div>';
  }

  // ── CAPÍTULO IV ──
  var c4='';
  if(ikigai.amas){
    var amas=[].concat(ikigai.amas.personal||[], ikigai.amas.familiar||[], ikigai.amas.profesional||[]);
    c4+=piezaLista('Lo que amo', amas);
  }
  if(ikigai.bueno){
    var bueno=[].concat(ikigai.bueno.personal||[], ikigai.bueno.familiar||[], ikigai.bueno.profesional||[]);
    c4+=piezaLista('En lo que soy bueno', bueno);
  }
  c4+=piezaLista('Por lo que me pagan', ikigai.pagan);
  c4+=piezaLista('Lo que el mundo necesita de mí', ikigai.necesita);
  c4+=piezaTexto('Mi pasión', ikigai.pasion);
  c4+=piezaTexto('Mi profesión', ikigai.profesion);
  c4+=piezaTexto('Mi vocación', ikigai.vocacion);
  c4+=piezaTexto('Mi misión', ikigai.mision);
  c4+=piezaTexto('Mi propósito', ikigai.proposito, true);
  if(c4){
    hayAlgo=true;
    h+='<div class="cap"><div class="cap-num">Capítulo IV</div><div class="cap-tit">Mi razón de ser</div>';
    h+='<div class="cap-intro">El Ikigai es la razón por la que te levantas cada mañana. No se inventa: se descubre en el cruce honesto de cuatro verdades sobre ti.</div>';
    h+=c4+'</div>';
  }

  // ── CAPÍTULO V ──
  var c5='';
  c5+=piezaTexto('A dónde quiero llegar en este ciclo', sigCiclo.metaCiclo);
  c5+=piezaTexto('Mi visión', sigCiclo.vision, true);
  c5+=piezaTexto('Lo que dejo atrás', sigCiclo.queDejar);
  c5+=piezaTexto('Lo que llevo conmigo', sigCiclo.queLlevar);
  if(planVida.habitos){
    c5+=piezaLista('Mi cuerpo — mis hábitos', planVida.habitos.cuerpo);
    c5+=piezaLista('Mi mente — mis hábitos', planVida.habitos.mente);
    c5+=piezaLista('Mi espíritu — mis hábitos', planVida.habitos.espiritu);
  }
  c5+=piezaTexto('Mi declaración de vida plena', planVida.declaracion, true);
  if(c5){
    hayAlgo=true;
    h+='<div class="cap"><div class="cap-num">Capítulo V</div><div class="cap-tit">Hacia dónde voy</div>';
    h+='<div class="cap-intro">Lo que no sanas en un ciclo, regresa en el siguiente. Aquí cerraste bien, para entrar liviano a lo que viene — con tu cuerpo, tu mente y tu espíritu alineados.</div>';
    h+=c5+'</div>';
  }

  // ── EPÍLOGO ──
  var pIni=promedio(ruedaIni), pFin=promedio(ruedaFin);
  if(pIni>0 || puntos>0){
    hayAlgo=true;
    h+='<div class="cap"><div class="cap-num">Epílogo</div><div class="cap-tit">Mi crecimiento</div>';
    h+='<div class="cap-intro">Esto no fue magia. Fuiste tú, cumpliendo lo que te comprometiste.</div>';
    h+='<div class="epilogo">';
    if(pIni>0 && pFin>0){
      h+='<div class="epi-crecimiento">';
      h+='<div><div class="epi-n" style="color:var(--dim)">'+pIni.toFixed(1)+'</div><div class="epi-l">Rueda inicial</div></div>';
      h+='<div style="color:var(--gold2);font-size:20px">→</div>';
      h+='<div><div class="epi-n" style="color:var(--gold3)">'+pFin.toFixed(1)+'</div><div class="epi-l">Rueda final</div></div>';
      if(pFin>pIni) h+='<div><div class="epi-n" style="color:var(--grn)">+'+(pFin-pIni).toFixed(1)+'</div><div class="epi-l">Crecí</div></div>';
      h+='</div>';
    }
    if(puntos>0) h+='<p style="font-size:15px;color:var(--text)">Mi nivel de conciencia subió <b style="color:var(--gold2)">'+puntos+' puntos</b> — cada uno ganado con acciones cumplidas, no con intenciones.</p>';
    h+='</div></div>';
  }

  // ── CIERRE ──
  if(!hayAlgo){
    h+='<div class="cap"><div class="cap-tit">Tu libro está en blanco... por ahora</div>';
    h+='<div class="cap-intro">Cada palabra que escribas en tu proceso ∀normal se va a guardar aquí. Este es el lugar donde tu historia toma forma — escrita por ti, con tu puño y tu verdad.</div>';
    h+='<p style="text-align:center;margin-top:20px"><a href="resumen-conciencia.html" class="volver">Volver y empezar a escribirlo</a></p></div>';
  } else {
    h+='<div class="cierre-libro">';
    h+='<div class="f">"Ser ∀normal no es un certificado.<br>Es una forma de vivir."</div>';
    h+='<div class="a">— El Barista del Ser</div>';
    h+='</div>';
  }

  document.getElementById('libro').innerHTML=h;
}
render();
</script>
</body>
</html>
