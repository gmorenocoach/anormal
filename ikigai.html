<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∀normal — Mi Razón de Ser</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --serif:'Fraunces',serif;--lienzo:#F4EFE3;--sans:'Inter',sans-serif;
  --sesion:#E0A54A;
  --t-display:44px;--t-h1:28px;--t-h2:20px;--t-h3:20px;--t-body:17px;--t-small:17px;--t-micro:20px;
  --bg:#14100A; --bg2:#1E1810; --bg3:#282016;
  --gold:#C9A84C; --gold2:#E4C878; --gold3:#F5E0A0;
  --gd:rgba(201,168,76,.13); --gb:rgba(201,168,76,.28);
  --text:#EDE7D9; --dim:#A9B0C0; --faint:#3A4558; --ffaint:#3F3115;
  --grn:#6FA382; --rose:#C77A8E; --azul:#5A8CC0;
  --c-azul:#5A8CC0; --c-oro:#C9A84C; --c-verde:#4ABF7A; --c-rosa:#D4537E;
  --rm:12px; --rl:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--serif);font-weight:300;font-size:var(--t-body);line-height:1.7;-webkit-font-smoothing:antialiased;background-image:radial-gradient(ellipse 70% 45% at 50% -5%, rgba(224,165,74,.07), transparent)}
.wrap{max-width:760px;margin:0 auto;padding:32px 22px 80px}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px;padding-bottom:16px;border-bottom:1px solid var(--ffaint)}
.hdr-logo{font-family:var(--serif);font-size:var(--t-h2);color:var(--gold);letter-spacing:.02em}
.hdr-info{font-family:var(--sans);font-size:var(--t-body);letter-spacing:.06em;text-transform:uppercase;color:var(--dim)}
.label{font-family:var(--sans);font-size:var(--t-body);letter-spacing:.07em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.titulo{font-family:var(--serif);font-size:var(--t-h1);font-weight:400;line-height:1.25;color:var(--gold3);margin-bottom:14px;letter-spacing:.01em}
.subtitulo{font-size:var(--t-body);color:var(--dim);line-height:1.8;margin-bottom:22px}
.card{background:var(--bg2);border:1px solid var(--ffaint);border-radius:var(--rl);padding:20px 22px;margin-bottom:16px}
.card.gold{background:var(--gd);border-color:var(--gb)}
.ct{font-size:var(--t-body);color:var(--text);line-height:1.75}
.ct.dim{color:var(--dim)}
.quote{font-family:var(--serif);font-style:italic;font-size:var(--t-h2);color:var(--gold2);text-align:center;line-height:1.5;margin:22px 0;padding:0 20px}
.quote-autor{display:block;font-family:var(--sans);font-style:normal;font-size:var(--t-h2);letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-top:8px}
.video-box{background:var(--bg3);border:1px dashed var(--faint);border-radius:var(--rl);padding:28px 24px;text-align:center;margin-bottom:16px}
.video-play{width:52px;height:52px;border-radius:50%;background:var(--gd);border:1px solid var(--gb);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:var(--t-h2);color:var(--gold2)}
.video-txt{font-size:var(--t-body);color:var(--dim)}
.video-soon{font-family:var(--sans);font-size:var(--t-h2);letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-top:4px}
.nav{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap}
.bp{flex:1;min-width:180px;background:var(--gold);color:#0A0A0A;border:none;border-radius:var(--rm);padding:15px 20px;font-family:var(--sans);font-size:var(--t-body);font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;text-align:center}
.bp:hover{background:var(--gold2)}
.bs{background:transparent;color:var(--dim);border:1px solid var(--faint);border-radius:var(--rm);padding:15px 20px;font-family:var(--sans);font-size:var(--t-body);letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;text-align:center}
.bs:hover{border-color:var(--gold);color:var(--gold2)}
.prog{display:flex;align-items:center;gap:5px;margin-bottom:22px}
.prog-seg{flex:1;height:3px;border-radius:2px;background:var(--ffaint);transition:background .4s}
.prog-seg.done{background:var(--gold)}
.prog-seg.now{background:var(--gold2)}

/* Columnas personal/familiar/profesional */
.cols3{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px}
@media(min-width:640px){.cols3{grid-template-columns:1fr 1fr 1fr}}
.col-est{background:var(--bg3);border:1px solid var(--faint);border-radius:var(--rm);padding:14px}
.col-est-lbl{font-family:var(--sans);font-size:var(--t-h2);letter-spacing:.1em;text-transform:uppercase;color:var(--gold2);margin-bottom:10px;text-align:center;padding-bottom:8px;border-bottom:1px solid var(--ffaint)}
.col-input-row{display:flex;gap:6px;margin-bottom:10px}
.col-input{flex:1;background:var(--bg2);border:1px solid var(--faint);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:var(--t-body);padding:9px 10px;outline:none;min-width:0}
.col-input:focus{border-color:var(--gold)}
.col-add{background:var(--gd);border:1px solid var(--gb);border-radius:8px;color:var(--gold2);font-size:var(--t-h2);width:38px;cursor:pointer;flex-shrink:0}
.col-add:hover{background:var(--gb)}
.papelitos{display:flex;flex-wrap:wrap;gap:6px}
.papel{border-radius:16px;padding:6px 11px;font-size:var(--t-body);display:flex;align-items:center;gap:6px;line-height:1.3}
.papel .x{cursor:pointer;opacity:.6;font-size:var(--t-body);line-height:1}
.papel .x:hover{opacity:1;color:#fff}
.papel.azul{background:rgba(90,140,192,.18);border:1px solid rgba(90,140,192,.4);color:#B8D0EA}
.papel.oro{background:rgba(201,168,76,.15);border:1px solid var(--gb);color:var(--gold3)}
.papel.verde{background:rgba(74,191,122,.15);border:1px solid rgba(74,191,122,.4);color:#A8E5C2}
.papel.rosa{background:rgba(212,83,126,.15);border:1px solid rgba(212,83,126,.4);color:#F0B8CE}

.contador-lista{font-size:var(--t-h2);color:var(--dim);margin-top:12px;text-align:center;padding:8px;background:var(--bg3);border-radius:8px}
.contador-num{color:var(--gold2);font-weight:500}
.barra-prog{height:5px;background:var(--ffaint);border-radius:3px;margin-top:6px;overflow:hidden}
.barra-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .4s;width:0%}

.sug-box{background:rgba(90,140,192,.06);border:1px solid rgba(90,140,192,.2);border-radius:var(--rm);padding:14px 16px;margin:14px 0}
.sug-box.oro{background:var(--gd);border-color:var(--gb)}
.sug-box.verde{background:rgba(74,191,122,.06);border-color:rgba(74,191,122,.2)}
.sug-lbl{font-size:var(--t-h2);color:var(--dim);margin-bottom:10px;font-style:italic}
.chip-sug{display:inline-flex;align-items:center;background:transparent;border:1px dashed var(--faint);border-radius:16px;padding:6px 12px;font-size:var(--t-body);color:var(--dim);cursor:pointer;margin:0 6px 6px 0;transition:all .2s}
.chip-sug:hover{border-color:var(--gold);color:var(--gold2)}

/* Cruce lista verde (repetidas + similares) */
.cruce-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg3);border-radius:8px;margin-bottom:7px;cursor:pointer;border:1px solid transparent;transition:all .2s}
.cruce-item:hover{border-color:var(--gb)}
.cruce-item.on{border-color:var(--grn);background:rgba(74,191,122,.08)}
.cruce-check{width:20px;height:20px;border-radius:5px;border:1px solid var(--faint);display:flex;align-items:center;justify-content:center;font-size:var(--t-body);color:var(--grn);flex-shrink:0}
.cruce-item.on .cruce-check{border-color:var(--grn)}
.cruce-tag{font-size:var(--t-h2);padding:2px 7px;border-radius:10px;margin-left:auto;flex-shrink:0}
.tag-igual{background:rgba(74,191,122,.2);color:var(--grn)}
.tag-similar{background:rgba(201,168,76,.15);color:var(--gold2)}

/* Definiciones pasión/profesión/vocación/misión */
.def-card{border-left:3px solid;border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:12px;background:rgba(255,255,255,.02)}
.def-titulo{font-family:var(--serif);font-size:var(--t-h2);margin-bottom:4px}
.def-cruce{font-size:var(--t-h2);letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.def-txt{font-size:var(--t-body);color:var(--text);line-height:1.7}

.textarea-ref{width:100%;background:var(--bg3);border:1px solid var(--faint);border-radius:var(--rm);color:var(--text);font-family:var(--sans);font-size:var(--t-body);line-height:1.7;padding:13px 15px;resize:vertical;min-height:80px;outline:none;margin-top:8px}
.textarea-ref:focus{border-color:var(--gold)}
.ikigai-center{text-align:center;padding:22px;background:var(--gd);border:1px solid var(--gb);border-radius:var(--rl);margin:16px 0}
.ikigai-center-lbl{font-family:var(--sans);font-size:var(--t-h2);letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.ikigai-center-txt{font-family:var(--serif);font-size:var(--t-h2);color:var(--gold3);line-height:1.4}
.hint{font-size:var(--t-body);color:var(--dim);line-height:1.6;margin-top:8px}
b,strong{font-weight:500;color:var(--gold2)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-logo">∀normal</div>
    <div class="hdr-info">Sesión 4 · Ikigai</div>
  </div>
  <div class="prog" id="prog"></div>
  <div id="contenido"></div>
</div>
<script>
function leer(c,d){ try{ var v=localStorage.getItem(c); return v===null?d:v; }catch(e){ return d; } }
function leerJSON(c,d){ try{ var v=localStorage.getItem(c); return v?JSON.parse(v):d; }catch(e){ return d; } }
function mk(tag,cls,txt){ var e=document.createElement(tag); if(cls)e.className=cls; if(txt!==undefined)e.textContent=txt; return e; }
function esc(s){ return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ═══════ FIGURA VISUAL DEL IKIGAI (4 círculos) ═══════ */
function figuraIkigaiSVG(){
  var s='<div style="max-width:360px;margin:6px auto 0;background:var(--lienzo);border-radius:18px;padding:14px">';
  s+='<svg viewBox="0 0 360 360" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">';
  s+='<circle cx="180" cy="120" r="95" fill="rgba(58,110,165,.28)" stroke="#3A6EA5" stroke-width="1.2"/>';
  s+='<circle cx="240" cy="180" r="95" fill="rgba(176,140,50,.30)" stroke="#A88A2E" stroke-width="1.2"/>';
  s+='<circle cx="180" cy="240" r="95" fill="rgba(58,140,90,.26)" stroke="#3A8C5A" stroke-width="1.2"/>';
  s+='<circle cx="120" cy="180" r="95" fill="rgba(180,70,110,.24)" stroke="#B4466E" stroke-width="1.2"/>';
  s+='<text x="180" y="42" fill="#2A5178" font-size="13" text-anchor="middle" font-weight="600">Lo que AMAS</text>';
  s+='<text x="316" y="184" fill="#7A5F1E" font-size="13" text-anchor="middle" font-weight="600">Eres BUENO</text>';
  s+='<text x="180" y="336" fill="#256545" font-size="13" text-anchor="middle" font-weight="600">Te PAGAN</text>';
  s+='<text x="44" y="184" fill="#8A3358" font-size="12" text-anchor="middle" font-weight="600">Mundo NECESITA</text>';
  s+='<text x="240" y="130" fill="#3A4A5A" font-size="10" text-anchor="middle" font-style="italic">Pasión</text>';
  s+='<text x="240" y="238" fill="#5A4A2A" font-size="10" text-anchor="middle" font-style="italic">Profesión</text>';
  s+='<text x="120" y="238" fill="#2A4A38" font-size="10" text-anchor="middle" font-style="italic">Vocación</text>';
  s+='<text x="120" y="130" fill="#5A3A48" font-size="10" text-anchor="middle" font-style="italic">Misión</text>';
  s+='<circle cx="180" cy="180" r="36" fill="rgba(201,168,76,.42)" stroke="#A88A2E" stroke-width="1.5"/>';
  s+='<text x="180" y="177" fill="#6E5518" font-size="15" text-anchor="middle" font-weight="700" font-family="Fraunces, serif">IKIGAI</text>';
  s+='<text x="180" y="191" fill="#6E5518" font-size="8.5" text-anchor="middle">razón de ser</text>';
  s+='</svg></div>';
  return s;
}

/* ═══════ AUTOCONOCIMIENTO E HILO ═══════ */
function acLeer(){ return leerJSON('anormal_autoconocimiento',{}); }
function sugerenciasBueno(){ var ac=acLeer(); var out=[]; (ac.soy_bueno||[]).forEach(function(it){ if(it.texto) out.push(it.texto); }); return out; }
function hiloLineaHTML(momento){
  var linea=leer('anormal_linea',''); if(!linea) return '';
  var reflexion=(leer('anormal_linea_reflexion','')||'').trim();
  var cfg={salud:{lbl:'la salud',color:'#4ABF7A'},dinero:{lbl:'el dinero',color:'#C9A84C'},amor:{lbl:'el amor',color:'#D4537E'}}[linea]||{lbl:'tu área elegida',color:'#C9A84C'};
  var intro=momento==='cierre'?'Antes de cerrar: ¿cómo tu propósito se conecta con transformar <b style="color:'+cfg.color+'">'+cfg.lbl+'</b>? Ese es el hilo que sostiene todo tu proceso.':'Recuerda por qué estás aquí. Elegiste transformar tu relación con <b style="color:'+cfg.color+'">'+cfg.lbl+'</b>. Tu Ikigai debe iluminar también ese camino.';
  var html='<div style="background:rgba(255,255,255,.02);border-left:3px solid '+cfg.color+';border-radius:0 10px 10px 0;padding:16px 18px;margin-bottom:18px">';
  html+='<div style="font-size:var(--t-h2);letter-spacing:.08em;text-transform:uppercase;color:'+cfg.color+';margin-bottom:8px">✦ Tu hilo conductor</div>';
  html+='<p style="font-size:var(--t-body);line-height:1.7;color:#EAE6DC;margin:0">'+intro+'</p>';
  if(reflexion){ html+='<div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06)"><div style="font-size:var(--t-h2);color:#9AA5B8;margin-bottom:5px;font-style:italic">Tus propias palabras:</div><p style="font-size:var(--t-body);line-height:1.65;color:#C9A84C;margin:0;font-style:italic">"'+esc(reflexion)+'"</p></div>'; }
  html+='</div>'; return html;
}

/* ═══════ ESTADO ═══════ */
// Cada lista amas/bueno tiene 3 sub-columnas. pagan/necesita son listas simples.
var IK = leerJSON('anormal_ikigai', {
  amas:{personal:[],familiar:[],profesional:[]},
  bueno:{personal:[],familiar:[],profesional:[]},
  pagan:[], necesita:[],
  pasion:'', profesion:'', vocacion:'', mision:'',
  proposito:'', compromiso:''
});
// migración si viene de versión vieja (arrays planos)
if(Array.isArray(IK.amas)){ IK.amas={personal:IK.amas,familiar:[],profesional:[]}; }
if(Array.isArray(IK.bueno)){ IK.bueno={personal:IK.bueno,familiar:[],profesional:[]}; }
if(!IK.pagan) IK.pagan=[]; if(!IK.necesita) IK.necesita=[];
function guardarIK(){ localStorage.setItem('anormal_ikigai', JSON.stringify(IK)); }
function todas(listaObj){ return [].concat(listaObj.personal||[],listaObj.familiar||[],listaObj.profesional||[]); }

var PASOS=['intro','amas','bueno','pagan','necesita','cruces','proposito','cierre'];
var pasoActual=0;
function renderProg(){ var p=document.getElementById('prog'); p.innerHTML=''; for(var i=0;i<PASOS.length;i++){ p.appendChild(mk('div','prog-seg'+(i<pasoActual?' done':i===pasoActual?' now':''))); } }
function irPaso(n){ if(n<0||n>=PASOS.length)return; pasoActual=n; renderProg();
  ({intro:renderIntro,amas:renderAmas,bueno:renderBueno,pagan:renderPagan,necesita:renderNecesita,cruces:renderCruces,proposito:renderProposito,cierre:renderCierre})[PASOS[n]](); window.scrollTo(0,0); }
function siguiente(){ guardarIK(); irPaso(pasoActual+1); }
function anterior(){ guardarIK(); irPaso(pasoActual-1); }
function navBotones(c,txt,fn){ var nav=mk('div','nav'); var bs=mk('button','bs','← Anterior'); bs.onclick=anterior; var bp=mk('button','bp',txt||'Continuar →'); bp.onclick=fn||siguiente; if(pasoActual>0)nav.appendChild(bs); nav.appendChild(bp); c.appendChild(nav); }

/* ═══════ CONSTRUCTOR DE 3 COLUMNAS ═══════ */
var ESTADIOS=[{k:'personal',lbl:'Personal'},{k:'familiar',lbl:'Familiar / Social'},{k:'profesional',lbl:'Profesional'}];
function construir3Columnas(cont, listaKey, claseChip, sugerencias){
  var grid=mk('div','cols3');
  function pintarCol(colDiv, estadio){
    var chips=colDiv.querySelector('.papelitos'); chips.innerHTML='';
    IK[listaKey][estadio].forEach(function(item,idx){
      var p=mk('div','papel '+claseChip); p.appendChild(mk('span',null,item));
      var x=mk('span','x','×'); x.onclick=function(){ IK[listaKey][estadio].splice(idx,1); guardarIK(); pintarCol(colDiv,estadio); actualizarContador(); };
      p.appendChild(x); chips.appendChild(p);
    });
  }
  ESTADIOS.forEach(function(est){
    var col=mk('div','col-est');
    col.appendChild(mk('div','col-est-lbl',est.lbl));
    var row=mk('div','col-input-row');
    var inp=mk('input','col-input'); inp.type='text'; inp.placeholder='Una palabra...';
    var btn=mk('button','col-add','+');
    row.appendChild(inp); row.appendChild(btn); col.appendChild(row);
    col.appendChild(mk('div','papelitos'));
    function agregar(v){ v=(v||'').trim(); if(v && IK[listaKey][est.k].indexOf(v)<0){ IK[listaKey][est.k].push(v); guardarIK(); pintarCol(col,est.k); actualizarContador(); } }
    btn.onclick=function(){ agregar(inp.value); inp.value=''; inp.focus(); };
    inp.onkeydown=function(e){ if(e.key==='Enter'){ e.preventDefault(); agregar(inp.value); inp.value=''; } };
    grid.appendChild(col);
    pintarCol(col,est.k);
  });
  cont.appendChild(grid);
  // sugerencias del autoconocimiento (van a profesional por defecto)
  if(sugerencias && sugerencias.length){
    var sb=mk('div','sug-box'+(claseChip==='oro'?' oro':''));
    var msgSug = claseChip==='azul'
      ? '✦ Tu numerología reveló estos dones. ¿Amas ejercerlos? Toca los que sí (irán a Profesional, muévelos si quieres):'
      : '✦ Esto reconociste sobre ti en tu numerología y talentos. Ratifica los que resuenen (irán a Profesional, muévelos si quieres):';
    sb.appendChild(mk('div','sug-lbl',msgSug));
    var yaTodas=todas(IK[listaKey]);
    sugerencias.forEach(function(s){
      if(yaTodas.indexOf(s)>=0) return;
      var chip=mk('span','chip-sug','+ '+s);
      chip.onclick=function(){ if(IK[listaKey].profesional.indexOf(s)<0){ IK[listaKey].profesional.push(s); guardarIK(); irPaso(pasoActual); } };
      sb.appendChild(chip);
    });
    if(sb.querySelector('.chip-sug')) cont.appendChild(sb);
  }
  // contador con meta ~40
  var cont40=mk('div','contador-lista'); cont40.id='contador-'+listaKey;
  cont.appendChild(cont40);
  function actualizarContador(){
    var n=todas(IK[listaKey]).length;
    var pct=Math.min(100,Math.round(n/40*100));
    cont40.innerHTML='<span class="contador-num">'+n+'</span> palabras · meta sugerida: ~40 para llegar a lo profundo'+
      '<div class="barra-prog"><div class="barra-fill" style="width:'+pct+'%"></div></div>';
  }
  actualizarContador();
}

/* ═══════ MISIÓN NUMEROLÓGICA ═══════ */
function misionNumerologicaHTML(){
  var nv=leer('anormal_camino_vida','');
  if(!nv) return '';
  var MISIONES={
    '1':{n:'El Pionero',m:'Liderar, crear e iniciar con autenticidad y coraje.'},
    '2':{n:'El Mediador',m:'Crear armonía, cooperar y conectar con sensibilidad.'},
    '3':{n:'El Creador',m:'Comunicar, crear e inspirar a través de la alegría y el arte.'},
    '4':{n:'El Constructor',m:'Construir fundamentos duraderos a través del orden y la perseverancia.'},
    '5':{n:'El Explorador',m:'Vivir el cambio con sabiduría y ser puente de transformación.'},
    '6':{n:'El Sanador',m:'Sanar, cuidar y crear belleza y armonía en el mundo.'},
    '7':{n:'El Sabio',m:'Buscar la verdad, conectar con lo espiritual y compartir sabiduría.'},
    '8':{n:'El Ejecutivo',m:'Crear abundancia, ejercer el poder con responsabilidad y dejar legado.'},
    '9':{n:'El Humanista',m:'Servir, transformar y elevar la conciencia colectiva desde el amor universal.'},
    '11':{n:'El Iluminado',m:'Inspirar, iluminar y elevar la conciencia con sensibilidad espiritual extraordinaria.'},

/* ═══════ LISTA 3: PAGAN (se arma sola del cruce azul+amarillo) ═══════ */
function calcularCruceAzulOro(){
  var amas=todas(IK.amas).map(function(s){return s.toLowerCase();});
  var bueno=todas(IK.bueno);
  var iguales=[], similares=[];
  bueno.forEach(function(b){
    var bl=b.toLowerCase();
    if(amas.indexOf(bl)>=0){ iguales.push(b); }
    else if(amas.some(function(a){ return a.length>3 && bl.length>3 && (a.indexOf(bl)>=0||bl.indexOf(a)>=0); })){ similares.push(b); }
  });
  return {iguales:iguales, similares:similares};
}
function renderPagan(){
  var c=document.getElementById('contenido'); c.innerHTML='';
  c.insertAdjacentHTML('beforeend','<div class="label" style="color:var(--c-verde)">Dimensión 3 de 4 · Verde</div>');
  c.insertAdjacentHTML('beforeend','<h1 class="titulo">Por lo que te pueden pagar.</h1>');
  c.insertAdjacentHTML('beforeend','<p class="subtitulo">Esta lista <b>se arma sola</b>: nace del cruce entre lo que amas y en lo que eres bueno. La honestidad aquí es crítica — no es lo mismo que te paguen un par de pesos, a que te paguen <b>muy bien</b>. Busca actividades donde tu talento y tu pasión creen valor económico real y significativo.</p>');
  var cruce=calcularCruceAzulOro();
  var box=mk('div','card');
  if(cruce.iguales.length || cruce.similares.length){
    box.appendChild(mk('div','label','Coincidencias entre "amo" y "soy bueno" — toca las que podrían pagarte bien'));
    var lista=mk('div');
    function pintarCruce(){
      lista.innerHTML='';
      cruce.iguales.forEach(function(item){ lista.appendChild(itemCruce(item,'igual')); });
      cruce.similares.forEach(function(item){ lista.appendChild(itemCruce(item,'similar')); });
    }
    function itemCruce(item,tipo){
      var sel=IK.pagan.indexOf(item)>=0;
      var row=mk('div','cruce-item'+(sel?' on':''));
      var chk=mk('div','cruce-check',sel?'✓':''); row.appendChild(chk);
      row.appendChild(mk('span',null,item));
      var tag=mk('span','cruce-tag '+(tipo==='igual'?'tag-igual':'tag-similar'),tipo==='igual'?'coincide':'similar');
      row.appendChild(tag);
      row.onclick=function(){ var i=IK.pagan.indexOf(item); if(i>=0)IK.pagan.splice(i,1); else IK.pagan.push(item); guardarIK(); pintarCruce(); };
      return row;
    }
    pintarCruce();
    box.appendChild(lista);
  } else {
    box.insertAdjacentHTML('beforeend','<p class="ct dim">Aún no hay coincidencias claras entre tus listas de "amo" y "soy bueno". Puedes volver atrás y enriquecerlas, o escribir directamente abajo por lo que crees que te pueden pagar bien.</p>');
  }
  c.appendChild(box);
  // añadir manual
  var manual=mk('div','card');
  manual.appendChild(mk('div','label','¿Algo más por lo que te pagarían muy bien? Agrégalo'));
  var row=mk('div','col-input-row');
  var inp=mk('input','col-input'); inp.type='text'; inp.placeholder='Ej: consultoría, formación, diseño...';
  var btn=mk('button','col-add','+'); row.appendChild(inp); row.appendChild(btn);
  manual.appendChild(row);
  var chips=mk('div','papelitos');
  function pintarManual(){ chips.innerHTML=''; IK.pagan.forEach(function(item,idx){ var p=mk('div','papel verde'); p.appendChild(mk('span',null,item)); var x=mk('span','x','×'); x.onclick=function(){ IK.pagan.splice(idx,1); guardarIK(); pintarManual(); }; p.appendChild(x); chips.appendChild(p); }); }
  function agregar(v){ v=(v||'').trim(); if(v&&IK.pagan.indexOf(v)<0){ IK.pagan.push(v); guardarIK(); pintarManual(); } }
  btn.onclick=function(){ agregar(inp.value); inp.value=''; };
  inp.onkeydown=function(e){ if(e.key==='Enter'){e.preventDefault();agregar(inp.value);inp.value='';} };
  manual.appendChild(chips); pintarManual();
  c.appendChild(manual);
  navBotones(c,'Ahora, lo que el mundo necesita →');
}

function palabrasComunes(a,b){

}
