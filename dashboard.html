<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caf\u00e9 con Prop\u00f3sito \u2014 Mi Perfil Consolidado</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0F1E;--bg2:#0E1525;--bg3:#131D30;--bg4:#1A2640;
--gold:#C9A84C;--gold2:#E8C96A;--gold3:#F5E0A0;
--gd:rgba(201,168,76,.13);--gb:rgba(201,168,76,.28);
--text:#EAE6DC;--dim:#8A95A8;--faint:#3A4558;
--acc:#4A9EBF;--acb:rgba(74,158,191,.28);--acd:rgba(74,158,191,.13);
--grn:#4ABF7A;--grb:rgba(74,191,122,.28);--grd:rgba(74,191,122,.12);
--pur:#9B7FD4;--pub:rgba(155,127,212,.28);--pud:rgba(155,127,212,.12);
--r:4px;--rm:8px;--rl:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Barlow",sans-serif;font-weight:300;font-size:15px;line-height:1.65;min-height:100vh}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(201,168,76,.04),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(74,158,191,.04),transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:0 22px 80px}
.panel{display:none}.panel.act{display:block;animation:fu .35s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.prog{display:flex;align-items:center;margin-bottom:28px;overflow-x:auto;padding-bottom:3px}
.ps{display:flex;align-items:center;gap:5px;white-space:nowrap;padding:3px 0;cursor:default;flex-shrink:0}
.ps.done{cursor:pointer}
.pn{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;border:1px solid var(--faint);color:var(--faint);transition:all .3s;flex-shrink:0}
.ps.done .pn{border-color:var(--gold);color:var(--gold);background:var(--gd)}
.ps.act .pn{border-color:var(--gold2);color:var(--bg);background:var(--gold2)}
.ptxt{font-size:9px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint)}
.ps.done .ptxt,.ps.act .ptxt{color:var(--gold)}
.pln{flex:1;min-width:6px;height:1px;background:var(--faint);margin:0 4px;opacity:.2}
.pln.done{background:var(--gold);opacity:.4}
.pbadge{display:inline-flex;align-items:center;gap:8px;background:var(--gd);border:1px solid var(--gb);border-radius:var(--rl);padding:6px 14px;margin-bottom:16px}
.pbadge-q{font-family:"Cormorant Garamond",serif;font-size:18px;color:var(--gold2);font-weight:300;font-style:italic}
.ph{margin-bottom:20px}
.ph-s{font-family:"Barlow Condensed",sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.ph-t{font-family:"Cormorant Garamond",serif;font-size:clamp(18px,4vw,30px);font-weight:300;color:var(--gold2);line-height:1.15;margin-bottom:4px}
.ph-d{font-size:13px;color:var(--dim);line-height:1.8;max-width:540px}
.card{background:var(--bg2);border:1px solid rgba(255,255,255,.055);border-radius:var(--rl);padding:18px 22px;margin-bottom:11px}
.card.gold{border-color:var(--gb);background:linear-gradient(135deg,var(--bg2),var(--bg3))}
.card.pur{border-color:var(--pub);background:linear-gradient(135deg,var(--bg2),var(--pud))}
.card.acc{border-color:var(--acb);background:linear-gradient(135deg,var(--bg2),var(--acd))}
.card.grn{border-color:var(--grb);background:linear-gradient(135deg,var(--bg2),var(--grd))}
.cl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:9px}
.cl.b{color:var(--acc)}.cl.p{color:var(--pur)}.cl.g{color:var(--grn)}
.ct{font-size:13px;color:var(--dim);line-height:1.8}
.il{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:5px;display:block}
.inp{background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:"Barlow",sans-serif;font-size:14px;font-weight:300;padding:9px 13px;width:100%;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--faint)}
.irow{display:flex;gap:9px;flex-wrap:wrap}
.bp{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border:none;border-radius:var(--r);font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;padding:11px 26px;cursor:pointer;transition:opacity .2s,transform .15s}
.bp:hover{opacity:.9;transform:translateY(-1px)}
.bs{background:transparent;color:var(--gold);border:1px solid var(--gb);border-radius:var(--r);font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:7px 16px;cursor:pointer}
.bn{background:transparent;color:var(--dim);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);font-family:"Barlow",sans-serif;font-size:13px;padding:8px 16px;cursor:pointer}
.bn:hover{border-color:var(--gold);color:var(--gold)}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:12px;border-top:1px solid rgba(255,255,255,.05)}
/* PERFIL HERO */
.perfil-hero{background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(155,127,212,.07));border:1px solid var(--gb);border-radius:var(--rl);padding:28px 26px;margin-bottom:14px;text-align:center}
.perfil-nombre{font-family:"Cormorant Garamond",serif;font-size:34px;font-weight:300;color:var(--gold2);margin-bottom:6px}
.perfil-proposito{font-family:"Cormorant Garamond",serif;font-size:17px;font-style:italic;color:var(--gold3);line-height:1.75;max-width:540px;margin:0 auto 14px}
.perfil-tags{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-bottom:14px}
.tag{font-size:11px;padding:3px 11px;border-radius:20px;border:1px solid;font-weight:400}
.perfil-fecha{font-size:11px;color:var(--faint);letter-spacing:.08em}
/* SECCION BLOQUES */
.seccion-titulo{font-family:"Barlow Condensed",sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:500;margin:20px 0 8px;display:flex;align-items:center;gap:8px}
.seccion-titulo::after{content:"";flex:1;height:1px;background:var(--gb);opacity:.4}
.bloque-num{background:var(--bg3);border-radius:var(--rm);padding:12px 15px;margin-bottom:8px;border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:12px}
.bloque-num-val{font-family:"Cormorant Garamond",serif;font-size:36px;font-weight:300;line-height:1;flex-shrink:0;min-width:40px;text-align:center}
.bloque-num-info{flex:1}
.bloque-num-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;margin-bottom:3px}
.bloque-num-desc{font-size:12px;color:var(--dim);line-height:1.55}
/* RUEDA MINI */
.rueda-wrap{text-align:center;margin:10px 0}
.comp-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.comp-row:last-child{border-bottom:none}
.comp-bar-bg{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.comp-bar-fill{height:100%;border-radius:3px}
.comp-val{font-size:11px;min-width:28px;text-align:right;color:var(--dim)}
/* VALORES GRID */
.valores-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.valor-chip{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.12);color:var(--dim)}
/* FRASE GRANDE */
.frase-grande{font-family:"Cormorant Garamond",serif;font-size:clamp(16px,3vw,22px);font-style:italic;color:var(--gold3);line-height:1.75;text-align:center;padding:20px;border-top:1px solid var(--gb);border-bottom:1px solid var(--gb);margin:14px 0}
/* CICLO VISUAL */
.ciclo-blk{background:var(--bg3);border-radius:var(--rm);padding:12px 14px;margin-bottom:8px;border-left:3px solid}
/* METAS */
.meta-blk{background:var(--bg4);border-radius:var(--rm);padding:12px 14px;margin-bottom:7px;border:1px solid rgba(255,255,255,.06)}
.meta-area{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.meta-txt{font-size:13px;color:var(--text);margin-bottom:3px}
.meta-ind{font-size:11px;color:var(--dim);font-style:italic}
/* PRINT */
@media print{
  body{background:#fff;color:#111}
  body::before{display:none}
  .no-print{display:none}
  .card,.perfil-hero,.ciclo-blk,.meta-blk,.bloque-num{background:#f8f8f8;border-color:#ddd}
  .ph-t,.perfil-nombre,.perfil-proposito,.frase-grande{color:#1a1a2e}
  .ct,.comp-val,.bloque-num-desc,.meta-ind{color:#555}
  .cl,.perfil-fecha,.meta-area,.bloque-num-label{color:#888}
  .panel{display:block!important}
  .prog,.nav{display:none}
}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gb);border-radius:2px}
@media(max-width:560px){.app{padding:0 14px 60px}}



/* VIDEO BANNER */
.vid-banner{background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(74,158,191,.04));border:1px solid rgba(201,168,76,.2);border-radius:14px;overflow:hidden;margin:0 22px 20px;display:none}
.vid-banner.show{display:block}
.vid-banner-hdr{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between}
.vid-banner-lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#C9A84C;font-weight:500;font-family:Barlow Condensed,sans-serif}
.vid-banner-mod{font-size:11px;color:#8A95A8}
.vid-banner-player{position:relative;width:100%;aspect-ratio:16/9;background:#060A14}
.vid-banner-player iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.vid-banner-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;padding:20px}
.vid-ph-icon{width:44px;height:44px;border-radius:50%;background:rgba(201,168,76,.13);border:1.5px solid rgba(201,168,76,.28);display:flex;align-items:center;justify-content:center;font-size:16px;color:#E8C96A}
.vid-ph-t{font-family:Cormorant Garamond,serif;font-size:15px;color:#E8C96A;font-weight:300}
.vid-ph-d{font-size:11px;color:#3A4558;line-height:1.55;max-width:240px}
@media(max-width:560px){.vid-banner{margin:0 14px 16px}}

</style>
</head>
<body>

<!-- VIDEO BANNER: Mi Perfil Consolidado -->
<div class="vid-banner" id="vid-banner-dashboard">
  <div class="vid-banner-hdr">
    <div class="vid-banner-lbl">Introducción al módulo</div>
    <div class="vid-banner-mod">Mi Perfil Consolidado</div>
  </div>
  <div class="vid-banner-player" id="vid-player-dashboard">
    <div class="vid-banner-ph">
      <div class="vid-ph-icon">&#9654;</div>
      <div class="vid-ph-t">Video de introducción</div>
      <div class="vid-ph-d">Alonso te explica lo que encontrarás en este módulo y cómo aprovecharlo al máximo.</div>
    </div>
  </div>
</div>
<div class="app" id="app"></div>
<script>
// ============================================================
// ANORMAL - Módulo de datos compartidos entre módulos
// Usa sessionStorage para pasar datos entre páginas HTML
// ============================================================

var ANORMAL = {
  
  // Leer todos los datos del proceso
  getData: function() {
    try {
      var raw = sessionStorage.getItem('anormal_proceso');
      return raw ? JSON.parse(raw) : {};
    } catch(e) { return {}; }
  },
  
  // Guardar datos del proceso
  setData: function(data) {
    try {
      sessionStorage.setItem('anormal_proceso', JSON.stringify(data));
    } catch(e) {}
  },
  
  // Actualizar una sección específica
  update: function(section, value) {
    var data = this.getData();
    data[section] = value;
    this.setData(data);
  },
  
  // Agregar un compromiso/hábito a la agenda central
  addAgenda: function(item) {
    // item = {modulo, titulo, descripcion, fecha, periodicidad, tipo}
    var data = this.getData();
    if (!data.agenda) data.agenda = [];
    item.id = 'ag_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    item.cumplido = false;
    item.fechaCreacion = new Date().toLocaleDateString('es-CO');
    data.agenda.push(item);
    this.setData(data);
    return item.id;
  },
  
  // Guardar lo marcado en septenios para que fluya al ECG y al Niño Interior
  saveSeptenios: function(checklistEstado, cicloActual, nombre, genero) {
    var doloresPorCiclo = [];
    
    Object.keys(checklistEstado).forEach(function(chkKey) {
      var est = checklistEstado[chkKey];
      if (!est || !est.dolor || !est.dolor.length) return;
      
      // Extraer número de ciclo del key ('chk-3' -> 3, 'actual-5' -> 5)
      var cicloNum = 0;
      if (chkKey.startsWith('chk-')) cicloNum = parseInt(chkKey.replace('chk-',''));
      else if (chkKey.startsWith('actual-')) cicloNum = parseInt(chkKey.replace('actual-',''));
      if (!cicloNum) return;
      
      // Obtener los ítems de dolor marcados
      var cicloDatos = window.CICLOS_DATA ? window.CICLOS_DATA[String(cicloNum)] : null;
      if (!cicloDatos) return;
      
      var itemsMarcados = est.dolor.map(function(idx) {
        return cicloDatos.dolor[idx] || '';
      }).filter(Boolean);
      
      var itemsAlegria = (est.alegria || []).map(function(idx) {
        return cicloDatos.alegria[idx] || '';
      }).filter(Boolean);
      
      if (itemsMarcados.length || itemsAlegria.length) {
        doloresPorCiclo.push({
          ciclo: cicloNum,
          tipo: cicloDatos.tipo,
          titulo: cicloDatos.titulo,
          edades: cicloDatos.titulo.match(/\d+ a \d+/)?.[0] || '',
          dolores: itemsMarcados,
          alegrias: itemsAlegria,
          // Preguntas respondidas
          respuestas: [0,1,2].map(function(pi) {
            return checklistEstado[chkKey + '-preg-' + pi] || '';
          }).filter(Boolean)
        });
      }
    });
    
    // Ordenar por ciclo
    doloresPorCiclo.sort(function(a,b){return a.ciclo - b.ciclo;});
    
    this.update('septenios', {
      cicloActual: cicloActual,
      nombre: nombre,
      genero: genero,
      doloresPorCiclo: doloresPorCiclo,
      fecha: new Date().toLocaleDateString('es-CO')
    });
  },
  
  // Obtener datos de septenios para el ECG
  getSepteniosParaECG: function() {
    var data = this.getData();
    return data.septenios || null;
  },
  
  // Obtener ciclos 1-2-3 para el Niño Interior
  getCiclosInfancia: function() {
    var sep = this.getSepteniosParaECG();
    if (!sep) return [];
    return sep.doloresPorCiclo.filter(function(c) {
      return c.ciclo <= 3;
    });
  },
  
  // Guardar compromisos de un módulo en la agenda central
  saveCompromisos: function(moduloId, compromisos) {
    if (!compromisos || !Object.keys(compromisos).length) return;
    var data = this.getData();
    if (!data.agenda) data.agenda = [];
    
    Object.keys(compromisos).forEach(function(key) {
      var texto = (compromisos[key] || '').trim();
      if (!texto) return;
      // Evitar duplicados del mismo módulo+key
      var exists = data.agenda.some(function(item) {
        return item.moduloId === moduloId && item.key === key;
      });
      if (!exists) {
        data.agenda.push({
          id: 'ag_' + moduloId + '_' + key,
          moduloId: moduloId,
          key: key,
          tipo: 'compromiso-principio',
          descripcion: texto,
          fechaCreacion: new Date().toLocaleDateString('es-CO'),
          cumplido: false,
          periodicidad: 'diario'
        });
      }
    });
    this.setData(data);
  },

  // ============================================================
  // FASE 1 — ¿Quién soy? — guardado genérico por módulo
  // ============================================================

  // Guardar el resultado de un módulo de Fase 1 (o cualquier fase)
  // moduloId: 'rueda' | 'elementos' | 'camino' | 'subnumeros' | 'mapa' |
  //           'flechas' | 'nombre' | 'personas' | 'dolan' | 'ikigai' |
  //           'siguiente_ciclo' | 'plan_vida'
  saveFaseModulo: function(moduloId, resultado) {
    var data = this.getData();
    if (!data.fase1) data.fase1 = {};
    if (!data.fase3) data.fase3 = {};
    var fase3Ids = ['ikigai', 'siguiente_ciclo', 'plan_vida'];
    var bucket = fase3Ids.indexOf(moduloId) >= 0 ? data.fase3 : data.fase1;
    bucket[moduloId] = resultado;
    bucket[moduloId + '_fecha'] = new Date().toLocaleDateString('es-CO');
    this.setData(data);
    this.marcarModuloCompletado(moduloId);
  },

  // Leer el resultado guardado de un módulo específico
  getFaseModulo: function(moduloId) {
    var data = this.getData();
    if (data.fase1 && data.fase1[moduloId] !== undefined) return data.fase1[moduloId];
    if (data.fase3 && data.fase3[moduloId] !== undefined) return data.fase3[moduloId];
    return null;
  },

  // Obtener todo lo guardado de Fase 1 de una vez (para Perfil Integrado)
  getFase1Completa: function() {
    var data = this.getData();
    return data.fase1 || {};
  },

  // Obtener todo lo guardado de Fase 3
  getFase3Completa: function() {
    var data = this.getData();
    return data.fase3 || {};
  },

  // ============================================================
  // PROGRESO — qué módulos completó la persona (para el Dashboard)
  // ============================================================

  TODOS_LOS_MODULOS: [
    {id:'rueda', fase:1, nombre:'Rueda de Vida'},
    {id:'elementos', fase:1, nombre:'Elementos'},
    {id:'camino', fase:1, nombre:'Camino de Vida'},
    {id:'subnumeros', fase:1, nombre:'Subnúmeros'},
    {id:'mapa', fase:1, nombre:'Mapa Energético'},
    {id:'flechas', fase:1, nombre:'Flechas'},
    {id:'nombre', fase:1, nombre:'Nombre'},
    {id:'personas', fase:1, nombre:'Personas'},
    {id:'dolan', fase:1, nombre:'Valores Dolan'},
    {id:'perfil', fase:1, nombre:'Perfil Integrado'},
    {id:'septenios', fase:2, nombre:'Mis Ciclos de Vida'},
    {id:'ecg', fase:2, nombre:'Mi Trabajo Emocional'},
    {id:'perdon', fase:2, nombre:'Mi Trabajo del Perdón'},
    {id:'ikigai', fase:3, nombre:'Ikigai'},
    {id:'siguiente_ciclo', fase:3, nombre:'Siguiente Ciclo'},
    {id:'plan_vida', fase:3, nombre:'Plan de Vida'}
  ],

  marcarModuloCompletado: function(moduloId) {
    var data = this.getData();
    if (!data.progreso) data.progreso = {};
    data.progreso[moduloId] = {
      completado: true,
      fecha: new Date().toLocaleDateString('es-CO')
    };
    this.setData(data);
  },

  // Devuelve la lista de módulos con su estado de completado, para pintar el Dashboard
  getProgreso: function() {
    var data = this.getData();
    var progreso = data.progreso || {};
    return this.TODOS_LOS_MODULOS.map(function(m) {
      return {
        id: m.id,
        fase: m.fase,
        nombre: m.nombre,
        completado: !!(progreso[m.id] && progreso[m.id].completado),
        fecha: progreso[m.id] ? progreso[m.id].fecha : null
      };
    });
  },

  // Porcentaje de avance total y por fase
  getPorcentajeAvance: function() {
    var prog = this.getProgreso();
    var total = prog.length;
    var hechos = prog.filter(function(m){ return m.completado; }).length;
    var porFase = {1:{total:0,hechos:0}, 2:{total:0,hechos:0}, 3:{total:0,hechos:0}};
    prog.forEach(function(m) {
      porFase[m.fase].total++;
      if (m.completado) porFase[m.fase].hechos++;
    });
    return {
      total: total, hechos: hechos,
      porcentaje: total ? Math.round((hechos/total)*100) : 0,
      porFase: porFase
    };
  }
};

// Sobrescribir guardarCompromisosModulo para que también vaya a la agenda
window.guardarCompromisosModulo = function(moduloId, compromisos) {
  if (!window.COMPROMISOS_PROCESO) window.COMPROMISOS_PROCESO = {};
  window.COMPROMISOS_PROCESO[moduloId] = compromisos;
  ANORMAL.saveCompromisos(moduloId, compromisos);
};

</script>
<script>
// ============================================================
// WIDGET DE PRINCIPIOS Y COMPROMISOS - Anormal / Cafe con Proposito

function rProg(){

  for(var i=0;i<STEPS.length;i++){
    if(i>0){var ln=mk("div","pln"+(i<=paso?" done":""));b.appendChild(ln);}

function buildRuedaSVG(scores,size){
  size=size||280;var cx=size/2,cy=size/2,r=size*0.37,n=12;
  var svg='<svg viewBox="0 0 '+size+' '+size+'" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto">';
  for(var ring=1;ring<=10;ring++)svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(r*ring/10)+'" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>';
  for(var i=0;i<n;i++){var a=(i/n)*Math.PI*2-Math.PI/2;svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+Math.cos(a)*r)+'" y2="'+(cy+Math.sin(a)*r)+'" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';}
  var pts=[];
  for(var j=0;j<n;j++){var a2=(j/n)*Math.PI*2-Math.PI/2;var val=scores[AREAS_R[j].id]||1;var rad=r*val/10;pts.push((cx+Math.cos(a2)*rad)+","+(cy+Math.sin(a2)*rad));}
  svg+='<polygon points="'+pts.join(" ")+'" fill="rgba(201,168,76,0.15)" stroke="rgba(201,168,76,0.7)" stroke-width="1.5"/>';
  for(var k=0;k<n;k++){
    var a3=(k/n)*Math.PI*2-Math.PI/2;var val2=scores[AREAS_R[k].id]||1;var rad2=r*val2/10;
    var px=cx+Math.cos(a3)*rad2;var py=cy+Math.sin(a3)*rad2;
    svg+='<circle cx="'+px+'" cy="'+py+'" r="3.5" fill="'+AREAS_R[k].color+'"/>';
    var lx=cx+Math.cos(a3)*(r+20);var ly=cy+Math.sin(a3)*(r+20);
    var anch=(lx<cx-10)?"end":(lx>cx+10)?"start":"middle";
    svg+='<text x="'+lx+'" y="'+(ly+3)+'" text-anchor="'+anch+'" font-size="8" fill="'+AREAS_R[k].color+'" font-family="Barlow,sans-serif">'+AREAS_R[k].nombre+'</text>';
    svg+='<text x="'+lx+'" y="'+(ly+13)+'" text-anchor="'+anch+'" font-size="8" fill="rgba(255,255,255,0.4)" font-family="Barlow,sans-serif">'+val2+'</text>';
  }
  svg+='</svg>';return svg;
}

  hero.appendChild(mk("div","perfil-fecha","Proceso completado: "+S.fecha));
  p.appendChild(hero);

  // SECCIÓN 1 - NUMEROLOGÍA
  var s1=mk("div","seccion-titulo","1 \u00b7 Qui\u00e9n soy \u2014 Numerolog\u00eda");p.appendChild(s1);
  var cnum=mk("div","card");
  var nums=[{n:S.nv,lbl:"N\u00famero de vida",col:"var(--gold2)"},{n:S.alma,lbl:"N\u00famero del alma",col:"var(--pur)"},{n:S.actitud,lbl:"N\u00famero de actitud",col:"var(--acc)"},{n:S.expresion,lbl:"N\u00famero de expresi\u00f3n",col:"var(--grn)"}];
  var numGrid=mk("div");numGrid.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:8px";
  nums.forEach(function(num){
    if(!num.n)return;
    var blk=mk("div","bloque-num");
    var val=mk("div","bloque-num-val",String(num.n));val.style.color=num.col;
    var info=mk("div","bloque-num-info");
    var lbl=mk("div","bloque-num-label",num.lbl);lbl.style.color=num.col;info.appendChild(lbl);
    if(num.lbl==="N\u00famero de vida"&&nvMis(num.n)){info.appendChild(mk("div","bloque-num-desc",nvMis(num.n)));}
    blk.appendChild(val);blk.appendChild(info);numGrid.appendChild(blk);
  });
  cnum.appendChild(numGrid);p.appendChild(cnum);

  // SECCIÓN 2 - ELEMENTO
  if(S.elemento){
    var s2=mk("div","seccion-titulo","2 \u00b7 Mi elemento");p.appendChild(s2);
    var eCol2=ELEM_COL[S.elemento]||"#888";
    var celem=mk("div","card");celem.style.borderLeft="3px solid "+eCol2;
    var eblk=mk("div","bloque-num");
    var eval2=mk("div","bloque-num-val",ELEM_NOM[S.elemento]);eval2.style.cssText="font-size:22px;font-weight:400;color:"+eCol2;
    var einfo=mk("div","bloque-num-info");einfo.appendChild(mk("div","bloque-num-desc",ELEM_DESC[S.elemento]||""));
    eblk.appendChild(eval2);eblk.appendChild(einfo);celem.appendChild(eblk);p.appendChild(celem);
  }

  // SECCIÓN 3 - VALORES
  if(S.dolanValores.length){
    var s3=mk("div","seccion-titulo","3 \u00b7 Mis valores Dolan");p.appendChild(s3);
    var cvals=mk("div","card");
    var vGrid=mk("div","valores-grid");
    S.dolanValores.forEach(function(v){
      var chip=mk("div","valor-chip",v);chip.style.borderColor="var(--gb)";chip.style.color="var(--gold3)";vGrid.appendChild(chip);
    });
    cvals.appendChild(vGrid);p.appendChild(cvals);
  }

  // SECCIÓN 4 - PROPÓSITO
  if(S.proposito||S.declaracion){
    var s4=mk("div","seccion-titulo","4 \u00b7 Mi prop\u00f3sito de vida");p.appendChild(s4);
    if(S.proposito){
      var fp=mk("div","frase-grande","\u201c"+S.proposito+"\u201d");p.appendChild(fp);
    }
    if(S.declaracion){
      var cdecl=mk("div","card pur");cdecl.appendChild(mk("div","cl p","Mi declaraci\u00f3n de vida plena"));cdecl.appendChild(mk("div","ct",S.declaracion));p.appendChild(cdecl);
    }
  }

  // SECCIÓN 5 - CICLO
  if(S.cicloActual){
    var s5=mk("div","seccion-titulo","5 \u00b7 Mi momento de vida \u2014 Ciclos");p.appendChild(s5);
    var cTipo2=TIPO_MAP[String(S.cicloActual)]||"cuerpo";var cCol2=TIPO_COL[cTipo2]||"#888";
    var cciclo=mk("div","ciclo-blk");cciclo.style.borderLeftColor=cCol2;
    var ct=mk("div");ct.style.cssText="font-family:Cormorant Garamond,serif;font-size:20px;font-weight:300;color:"+cCol2+";margin-bottom:4px";
    ct.textContent="Ciclo "+S.cicloActual+" \u00b7 "+(CICLO_NOMBRES[String(S.cicloActual)]||"")+" \u00b7 "+(TIPO_LABEL[cTipo2]||S.tiposCiclo);
    cciclo.appendChild(ct);
    if(S.planSer){var rSer=mk("div");rSer.style.cssText="margin-bottom:5px";rSer.innerHTML="<strong style='color:var(--pur)'>Ser:</strong> <span style='color:var(--dim)'>"+S.planSer+"</span>";cciclo.appendChild(rSer);}
    if(S.planHacer){var rH=mk("div");rH.style.cssText="margin-bottom:5px";rH.innerHTML="<strong style='color:var(--acc)'>Hacer:</strong> <span style='color:var(--dim)'>"+S.planHacer+"</span>";cciclo.appendChild(rH);}
    if(S.planTener){var rT=mk("div");rT.innerHTML="<strong style='color:var(--grn)'>Vivir:</strong> <span style='color:var(--dim)'>"+S.planTener+"</span>";cciclo.appendChild(rT);}
    p.appendChild(cciclo);
  }

  // SECCIÓN 6 - RUEDA
  var totalR=0;AREAS_R.forEach(function(a){totalR+=S.ruedaDiag[a.id]||1;});
  if(totalR>12){
    var s6=mk("div","seccion-titulo","6 \u00b7 Mi rueda de vida");p.appendChild(s6);
    var crueda=mk("div","card");crueda.style.padding="14px 16px";
    var rw=mk("div","rueda-wrap");rw.innerHTML=buildRuedaSVG(S.ruedaDiag,300);crueda.appendChild(rw);
    var prom=Math.round(totalR/12*10)/10;
    var promDiv=mk("div");promDiv.style.cssText="text-align:center;margin-bottom:10px";
    var promVal=mk("span");promVal.style.cssText="font-family:Cormorant Garamond,serif;font-size:22px;color:var(--gold2);font-weight:300";promVal.textContent=prom+"/10";
    var promLbl=mk("span");promLbl.style.cssText="font-size:12px;color:var(--dim);margin-left:6px";promLbl.textContent="promedio general";
    promDiv.appendChild(promVal);promDiv.appendChild(promLbl);crueda.appendChild(promDiv);
    var sorted=[].concat(AREAS_R).sort(function(a,b){return (S.ruedaDiag[b.id]||1)-(S.ruedaDiag[a.id]||1);});
    sorted.forEach(function(a){
      var val=S.ruedaDiag[a.id]||1;
      var row=mk("div","comp-row");
      var dot=mk("div");dot.style.cssText="width:7px;height:7px;border-radius:50%;background:"+a.color+";flex-shrink:0";
      var nom=mk("div");nom.style.cssText="font-size:11px;flex:1;min-width:0;color:var(--text)";nom.textContent=a.nombre;
      var barBg=mk("div","comp-bar-bg");var barFill=mk("div","comp-bar-fill");barFill.style.cssText="width:"+Math.round(val/10*100)+"%;background:"+a.color;
      barBg.appendChild(barFill);
      var valEl=mk("div","comp-val",val+"/10");
      row.appendChild(dot);row.appendChild(nom);row.appendChild(barBg);row.appendChild(valEl);crueda.appendChild(row);
    });
    p.appendChild(crueda);
  }

  // SECCIÓN 7 - METAS
  if(S.metasObj.proposito90){
    var s7=mk("div","seccion-titulo","7 \u00b7 Mi meta de 90 d\u00edas");p.appendChild(s7);
    var cmeta=mk("div","meta-blk");
    var mt=mk("div","meta-area","Meta principal");mt.style.color="var(--grn)";cmeta.appendChild(mt);
    cmeta.appendChild(mk("div","meta-txt",S.metasObj.proposito90));
    if(S.metasObj.accion90){var ma=mk("div","meta-ind","Acci\u00f3n semanal: "+S.metasObj.accion90);cmeta.appendChild(ma);}
    if(S.metasObj.fecha90){var mf=mk("div","meta-ind","Fecha l\u00edmite: "+S.metasObj.fecha90);cmeta.appendChild(mf);}
    p.appendChild(cmeta);
  }

  // CIERRE
  var cierre=mk("div");cierre.style.cssText="background:linear-gradient(135deg,rgba(155,127,212,.1),rgba(201,168,76,.07));border:1px solid var(--pub);border-radius:var(--rl);padding:22px 20px;margin-top:16px;text-align:center";
  var ctC=mk("div");ctC.style.cssText="font-family:Cormorant Garamond,serif;font-size:20px;color:var(--gold2);margin-bottom:9px;font-style:italic;line-height:1.4";
  ctC.textContent="Del grano a la taza \u2014 de ti mismo a tu raz\u00f3n de ser.";
  var ctC2=mk("div","ct","Este perfil es el mapa de qui\u00e9n eres, d\u00f3nde est\u00e1s y para qu\u00e9 est\u00e1s aqu\u00ed. Lo que sigue es vivirlo con consciencia y decisi\u00f3n.");
  cierre.appendChild(ctC);cierre.appendChild(ctC2);p.appendChild(cierre);

  var nav=mk("div","nav no-print");var pb=mk("button","bn","Editar");pb.onclick=function(){irA(0);};var ps=mk("button","bp","Imprimir / PDF");ps.onclick=function(){window.print();};nav.appendChild(pb);nav.appendChild(ps);p.appendChild(nav);
}

// ============================================================
// MÓDULO: MI PERFIL CONSOLIDADO — Dashboard
// ============================================================

function ge(id){return document.getElementById(id);}
function mk(tag,cls,txt){var d=document.createElement(tag);if(cls)d.className=cls;if(txt!==undefined)d.textContent=txt;return d;}

var FASE_NOMBRES = {1:"¿Quién soy?", 2:"¿Dónde estoy?", 3:"¿Para qué estoy aquí?"};
var FASE_COLORES = {1:"var(--gold2)", 2:"var(--pur)", 3:"var(--acc)"};

function initDashboard(){
  var app = ge("app");
  app.innerHTML = "";
  if (!window.ANORMAL) {
    app.appendChild(mk("div","ct","No se pudo cargar el sistema de datos."));
    return;
  }

  var avance = ANORMAL.getPorcentajeAvance();
  var progreso = ANORMAL.getProgreso();
  var datos = ANORMAL.getData();

  // ── HEADER ──────────────────────────────────────────────
  var ph = mk("div");
  ph.style.cssText = "padding:28px 0 0";
  var s = mk("div"); s.style.cssText = "font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:4px";
  s.textContent = "Café con Propósito · Mi recorrido completo";
  var t = mk("div"); t.style.cssText = "font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--gold2);margin-bottom:8px;font-style:italic";
  t.textContent = "Mi perfil consolidado";
  var d = mk("div"); d.style.cssText = "font-size:13px;color:var(--dim);line-height:1.7;max-width:560px;margin-bottom:22px";
  d.textContent = "Todo lo que has trabajado, en un solo lugar.";
  ph.appendChild(s); ph.appendChild(t); ph.appendChild(d);
  app.appendChild(ph);

  // ── PROGRESO GENERAL ────────────────────────────────────
  var cProg = mk("div"); cProg.style.cssText = "background:var(--bg3);border-radius:var(--rl);padding:20px;margin-bottom:14px;border:1px solid rgba(255,255,255,.06)";
  var cpHead = mk("div"); cpHead.style.cssText = "display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px";
  var cpLbl = mk("div"); cpLbl.style.cssText = "font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:500;font-family:'Barlow Condensed',sans-serif";
  cpLbl.textContent = "Progreso general";
  var cpPct = mk("div"); cpPct.style.cssText = "font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;color:var(--gold2)";
  cpPct.textContent = avance.porcentaje + "%";
  cpHead.appendChild(cpLbl); cpHead.appendChild(cpPct);
  cProg.appendChild(cpHead);

  var barWrap = mk("div"); barWrap.style.cssText = "background:var(--bg4);border-radius:20px;height:8px;overflow:hidden;margin-bottom:6px";
  var bar = mk("div"); bar.style.cssText = "height:100%;border-radius:20px;background:linear-gradient(90deg,var(--gold),var(--gold2));width:"+avance.porcentaje+"%;transition:width .6s ease";
  barWrap.appendChild(bar); cProg.appendChild(barWrap);

  var cpSub = mk("div"); cpSub.style.cssText = "font-size:11px;color:var(--faint);text-align:right";
  cpSub.textContent = avance.hechos + " de " + avance.total + " módulos completados";
  cProg.appendChild(cpSub);
  app.appendChild(cProg);

  // ── PROGRESO POR FASE ───────────────────────────────────
  var cFases = mk("div"); cFases.style.cssText = "display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap";
  [1,2,3].forEach(function(faseNum){
    var fd = avance.porFase[faseNum];
    var pct = fd.total ? Math.round((fd.hechos/fd.total)*100) : 0;
    var blk = mk("div"); blk.style.cssText = "flex:1;min-width:140px;background:var(--bg3);border-radius:var(--rm);padding:14px;border:1px solid rgba(255,255,255,.05)";
    var fLbl = mk("div"); fLbl.style.cssText = "font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:"+FASE_COLORES[faseNum]+";margin-bottom:6px;font-weight:500;font-family:'Barlow Condensed',sans-serif";
    fLbl.textContent = "Fase " + faseNum;
    var fNom = mk("div"); fNom.style.cssText = "font-size:13px;color:var(--text);margin-bottom:8px";
    fNom.textContent = FASE_NOMBRES[faseNum];
    var fBarWrap = mk("div"); fBarWrap.style.cssText = "background:var(--bg4);border-radius:20px;height:5px;overflow:hidden;margin-bottom:5px";
    var fBar = mk("div"); fBar.style.cssText = "height:100%;border-radius:20px;background:"+FASE_COLORES[faseNum]+";width:"+pct+"%";
    fBarWrap.appendChild(fBar);
    var fSub = mk("div"); fSub.style.cssText = "font-size:10px;color:var(--faint)";
    fSub.textContent = fd.hechos + "/" + fd.total;
    blk.appendChild(fLbl); blk.appendChild(fNom); blk.appendChild(fBarWrap); blk.appendChild(fSub);
    cFases.appendChild(blk);
  });
  app.appendChild(cFases);

  // ── LISTADO DE MÓDULOS ──────────────────────────────────
  var cList = mk("div"); cList.style.cssText = "background:var(--bg3);border-radius:var(--rl);padding:18px 20px;margin-bottom:18px;border:1px solid rgba(255,255,255,.06)";
  var clLbl = mk("div"); clLbl.style.cssText = "font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:12px;font-family:'Barlow Condensed',sans-serif";
  clLbl.textContent = "Mis módulos";
  cList.appendChild(clLbl);
  var faseActual = 0;
  progreso.forEach(function(m){
    if (m.fase !== faseActual) {
      faseActual = m.fase;
      var fHdr = mk("div"); fHdr.style.cssText = "font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:"+FASE_COLORES[faseActual]+";margin:"+(faseActual>1?"14px":"0")+" 0 6px;font-weight:500;font-family:'Barlow Condensed',sans-serif";
      fHdr.textContent = "Fase " + faseActual + " — " + FASE_NOMBRES[faseActual];
      cList.appendChild(fHdr);
    }
    var row = mk("div"); row.style.cssText = "display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.03)";
    var dot = mk("div"); dot.style.cssText = "width:8px;height:8px;border-radius:50%;flex-shrink:0;background:"+(m.completado?"var(--grn)":"var(--faint)");
    var nom = mk("div"); nom.style.cssText = "flex:1;font-size:13px;color:"+(m.completado?"var(--text)":"var(--dim)");
    nom.textContent = m.nombre;
    var est = mk("div"); est.style.cssText = "font-size:11px;color:"+(m.completado?"var(--grn)":"var(--faint)");
    est.textContent = m.completado ? "Completado" : "Pendiente";
    row.appendChild(dot); row.appendChild(nom); row.appendChild(est);
    cList.appendChild(row);
  });
  app.appendChild(cList);

  // ── RESUMEN DE RESULTADOS ───────────────────────────────
  var fase1 = datos.fase1 || {};
  var fase3 = datos.fase3 || {};
  var sep = datos.septenios || null;

  var hayResultados = (fase1.camino || fase1.dolan || fase1.nombre || sep || fase3.ikigai);

  if (hayResultados) {
    var cRes = mk("div"); cRes.style.cssText = "background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.03));border-radius:var(--rl);padding:18px 20px;margin-bottom:18px;border:1px solid rgba(201,168,76,.2)";
    var crLbl = mk("div"); crLbl.style.cssText = "font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:14px;font-family:'Barlow Condensed',sans-serif";
    crLbl.textContent = "Mi resumen — quién soy, dónde estoy, para qué estoy aquí";
    cRes.appendChild(crLbl);

    var items = [];
    if (fase1.camino && fase1.camino.numeroCamino != null) items.push(["Número de camino de vida", String(fase1.camino.numeroCamino)]);
    if (fase1.nombre && fase1.nombre.resultado) {
      var nr = fase1.nombre.resultado;
      if (nr.alma != null) items.push(["Número del alma", String(nr.alma)]);
    }
    if (fase1.dolan && fase1.dolan.dom) {
      var domLbl = {eco:"Económico", eti:"Ético-social", emo:"Emocional"}[fase1.dolan.dom] || fase1.dolan.dom;
      items.push(["Eje de valores dominante", domLbl]);
    }
    if (sep && sep.cicloActual) items.push(["Ciclo de vida actual", "Ciclo " + sep.cicloActual]);
    if (fase3.ikigai && fase3.ikigai.frase) items.push(["Mi propósito (Ikigai)", fase3.ikigai.frase]);
    if (fase3.plan_vida && fase3.plan_vida.declaracion) items.push(["Mi declaración de vida", fase3.plan_vida.declaracion]);

    items.forEach(function(item){
      var row = mk("div"); row.style.cssText = "padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)";
      var iLbl = mk("div"); iLbl.style.cssText = "font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:3px";
      iLbl.textContent = item[0];
      var iVal = mk("div"); iVal.style.cssText = "font-size:13px;color:var(--text);line-height:1.6";
      iVal.textContent = item[1];
      row.appendChild(iLbl); row.appendChild(iVal);
      cRes.appendChild(row);
    });
    app.appendChild(cRes);
  } else {
    var cVacio = mk("div"); cVacio.style.cssText = "background:var(--bg3);border-radius:var(--rl);padding:20px;text-align:center;border:1px solid rgba(255,255,255,.05)";
    var vTxt = mk("div"); vTxt.style.cssText = "font-size:13px;color:var(--dim);font-style:italic";
    vTxt.textContent = "Aún no hay resultados guardados. Completa tus primeros módulos para ver tu perfil aquí.";
    cVacio.appendChild(vTxt);
    app.appendChild(cVacio);
  }

  // Link a la Brújula
  var cBruj = mk("div"); cBruj.style.cssText = "text-align:center;padding:10px 0 30px";
  var aBruj = document.createElement("a");
  aBruj.href = "brujula-proposito.html";
  aBruj.style.cssText = "display:inline-block;padding:11px 26px;border-radius:30px;background:linear-gradient(135deg,var(--gold),#a07830);color:#0A0F1E;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;text-decoration:none";
  aBruj.textContent = "Ir a mi Brújula de Propósito →";
  cBruj.appendChild(aBruj);
  app.appendChild(cBruj);
}
</script>
