<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∀normal \u2014 Bienvenida y Registro</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#060A14;--bg2:#0A0F1E;--bg3:#0E1525;--bg4:#131D30;--bg5:#1A2640;
--gold:#C9A84C;--gold2:#E8C96A;--gold3:#F5E0A0;
--gd:rgba(201,168,76,.13);--gb:rgba(201,168,76,.28);--gs:rgba(201,168,76,.06);
--text:#EAE6DC;--dim:#8A95A8;--faint:#3A4558;--ffaint:#1E2A3A;
--acc:#4A9EBF;--grn:#4ABF7A;--pur:#9B7FD4;--rose:#D4537E;
--r:4px;--rm:8px;--rl:14px;--rxl:20px}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:"Barlow",sans-serif;font-weight:300;font-size:15px;line-height:1.65;min-height:100vh;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 15% 40%,rgba(201,168,76,.05),transparent 55%),radial-gradient(ellipse at 85% 15%,rgba(155,127,212,.04),transparent 50%),radial-gradient(ellipse at 50% 90%,rgba(74,158,191,.03),transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 24px 80px}

/* PROGRESS */
.prog-bar{position:fixed;top:0;left:0;right:0;height:2px;background:var(--ffaint);z-index:100}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .4s ease}

/* PANELS */
.panel{display:none;animation:fu .4s ease}
.panel.act{display:block}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* HERO */
.hero{padding:50px 0 30px;text-align:center}
.hero-logo{font-family:"Cormorant Garamond",serif;font-size:clamp(52px,12vw,88px);font-weight:300;color:var(--gold2);line-height:1;margin-bottom:6px;letter-spacing:-.02em}
.hero-logo span{color:var(--gold3)}
.hero-tagline{font-family:"Barlow Condensed",sans-serif;font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:var(--faint);margin-bottom:28px}
.hero-desc{font-family:"Cormorant Garamond",serif;font-size:clamp(17px,3.5vw,22px);font-weight:300;color:var(--dim);line-height:1.75;max-width:480px;margin:0 auto 32px;font-style:italic}

/* VIDEO PLACEHOLDER */
.video-wrap{background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:var(--rxl);overflow:hidden;margin-bottom:14px;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;transition:border-color .2s}
.video-wrap:hover{border-color:var(--gold)}
.video-wrap.has-video{padding:0}
.video-wrap.has-video iframe{width:100%;height:100%;border:none}
.video-placeholder{text-align:center;padding:20px}
.vp-icon{width:56px;height:56px;border-radius:50%;background:var(--gd);border:1.5px solid var(--gb);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:22px}
.vp-t{font-family:"Cormorant Garamond",serif;font-size:17px;color:var(--gold2);margin-bottom:5px;font-weight:300}
.vp-d{font-size:12px;color:var(--faint)}

/* CARDS */
.card{background:var(--bg2);border:1px solid rgba(255,255,255,.055);border-radius:var(--rl);padding:20px 24px;margin-bottom:12px}
.card.gold{border-color:var(--gb);background:linear-gradient(135deg,var(--bg2),var(--bg3))}
.card.dark{background:var(--bg3);border-color:rgba(255,255,255,.04)}
.cl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:10px}
.cl.p{color:var(--pur)}.cl.g{color:var(--grn)}.cl.r{color:var(--rose)}
.ct{font-size:13px;color:var(--dim);line-height:1.8}
.ph-t{font-family:"Cormorant Garamond",serif;font-size:clamp(20px,4vw,28px);font-weight:300;color:var(--gold2);line-height:1.2;margin-bottom:8px}
.ph-d{font-size:13px;color:var(--dim);line-height:1.8;margin-bottom:20px}

/* PRINCIPIOS */
.principio-item{border-radius:var(--rm);border:1px solid rgba(255,255,255,.05);margin-bottom:7px;overflow:hidden;transition:border-color .2s}
.principio-item.aceptado{border-color:var(--gb)}
.principio-header{display:flex;align-items:center;gap:12px;padding:12px 15px;cursor:pointer;background:var(--bg3);transition:background .2s}
.principio-header:hover{background:var(--bg4)}
.principio-num{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:300;color:var(--faint);min-width:28px;text-align:center;transition:color .3s}
.principio-item.aceptado .principio-num{color:var(--gold2)}
.principio-titulo{font-size:13px;font-weight:400;flex:1;color:var(--dim);transition:color .3s;line-height:1.3}
.principio-item.aceptado .principio-titulo{color:var(--text)}
.principio-chk{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--faint);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .3s}
.principio-item.aceptado .principio-chk{background:var(--gold);border-color:var(--gold)}
.principio-body{padding:12px 15px 14px;background:var(--bg4);display:none;border-top:1px solid rgba(255,255,255,.04)}
.principio-item.open .principio-body{display:block}
.principio-resumen{font-size:13px;color:var(--dim);line-height:1.75;margin-bottom:10px}
.principio-comp{background:var(--bg5);border-radius:var(--r);padding:10px 13px;border-left:2px solid var(--gold);font-size:12px;color:var(--gold3);font-style:italic;line-height:1.65;margin-bottom:10px}
.sesion-badge{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:500}

/* REGISTRO */
.form-group{margin-bottom:14px}
.form-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;display:block;font-weight:500}
.form-inp{background:var(--bg3);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);color:var(--text);font-family:"Barlow",sans-serif;font-size:14px;font-weight:300;padding:11px 14px;width:100%;outline:none;transition:border-color .25s}
.form-inp:focus{border-color:var(--gold)}
.form-inp::placeholder{color:var(--faint)}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.form-note{font-size:11px;color:var(--faint);margin-top:5px;line-height:1.5}

/* SESIONES */
.sesion-card{background:var(--bg3);border-radius:var(--rl);padding:16px 18px;margin-bottom:10px;border:1px solid rgba(255,255,255,.05);border-left:3px solid;position:relative;overflow:hidden}
.sesion-num{font-family:"Cormorant Garamond",serif;font-size:42px;font-weight:300;line-height:1;opacity:.15;position:absolute;right:16px;top:10px}
.sesion-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:500;margin-bottom:4px}
.sesion-titulo{font-family:"Cormorant Garamond",serif;font-size:18px;font-weight:300;color:var(--gold2);margin-bottom:3px}
.sesion-sub{font-size:12px;color:var(--dim);margin-bottom:10px}
.sesion-modulos{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.sesion-mod-chip{font-size:10px;padding:2px 9px;border-radius:20px;background:rgba(255,255,255,.05);color:var(--faint);border:1px solid rgba(255,255,255,.07)}
.sesion-principios{font-size:11px;color:var(--faint);margin-bottom:9px}
.sesion-fecha-row{display:flex;gap:8px}
.sesion-fecha-inp{flex:1;background:var(--bg4);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:"Barlow",sans-serif;font-size:12px;padding:7px 10px;outline:none;transition:border-color .2s}
.sesion-fecha-inp:focus{border-color:var(--gold)}
.sesion-estado{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.sesion-estado.pen{background:rgba(255,255,255,.06);color:var(--faint)}
.sesion-estado.prog{background:var(--gd);color:var(--gold2)}
.sesion-estado.ok{background:rgba(74,191,122,.12);color:var(--grn)}

/* COMPROMISO FINAL */
.compromiso-blk{background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(155,127,212,.06));border:1.5px solid var(--gb);border-radius:var(--rxl);padding:28px 24px;text-align:center;margin-bottom:12px}
.comp-firma{font-family:"Cormorant Garamond",serif;font-size:clamp(16px,3.5vw,21px);color:var(--gold3);line-height:1.8;font-style:italic;margin:14px 0}
.firma-nombre{display:inline-block;border-bottom:1px solid var(--gold);padding:0 20px 4px;font-family:"Cormorant Garamond",serif;font-size:22px;color:var(--gold2);font-style:normal;margin-top:10px}

/* BOTONES */
.bp{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border:none;border-radius:var(--r);font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;padding:13px 30px;cursor:pointer;transition:opacity .2s,transform .15s;display:inline-block}
.bp:hover{opacity:.9;transform:translateY(-1px)}
.bp:disabled{opacity:.4;cursor:not-allowed;transform:none}
.bs{background:transparent;color:var(--gold);border:1px solid var(--gb);border-radius:var(--r);font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;padding:9px 20px;cursor:pointer;transition:all .2s}
.bs:hover{background:var(--gd)}
.bn{background:transparent;color:var(--dim);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);font-family:"Barlow",sans-serif;font-size:13px;padding:9px 18px;cursor:pointer}
.bn:hover{border-color:var(--gold);color:var(--gold)}
.btn-row{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,.05)}
.btn-center{text-align:center;margin-top:20px}
.progreso-txt{font-size:11px;color:var(--faint);letter-spacing:.08em}

/* DASHBOARD ACTIVADO */
.dash-header{background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(74,191,122,.06));border:1px solid var(--gb);border-radius:var(--rxl);padding:26px 24px;margin-bottom:14px;text-align:center}
.dash-nombre{font-family:"Cormorant Garamond",serif;font-size:30px;color:var(--gold2);margin-bottom:4px;font-weight:300}
.dash-sub{font-size:12px;color:var(--dim);margin-bottom:14px}
.dash-tags{display:flex;flex-wrap:wrap;justify-content:center;gap:6px}
.dash-tag{font-size:11px;padding:3px 12px;border-radius:20px;border:1px solid;font-weight:400}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gb);border-radius:2px}
@media(max-width:560px){.app{padding:0 16px 60px}.form-row{grid-template-columns:1fr}}
</style>
</head>

var PRINCIPIOS = [{"num": 1, "letra": "A", "nombre": "GRADECER", "titulo": "\∀gradecer", "resumen": "La gratitud es el punto de partida para una vida extraordinaria. No como emoci\u00f3n pasajera \u2014 como decisi\u00f3n consciente de interpretar cada experiencia como un regalo.", "compromiso": "Me comprometo a iniciar cada d\u00eda con gratitud consciente, a buscar activamente motivos de agradecimiento incluso en circunstancias desafiantes, y a cultivar un estado mental de abundancia.", "sesion": 1}, {"num": 2, "letra": "A", "nombre": "VANZA EN EL CAMINO DEL PERD\u00d3N", "titulo": "\∀vanza en el perd\u00f3n", "resumen": "El perd\u00f3n no es un regalo para el otro \u2014 es una liberaci\u00f3n para ti. El resentimiento es un veneno autoadministrado.", "compromiso": "Me comprometo a identificar y liberar resentimientos pasados, a perdonarme por mis propios errores y a practicar el perd\u00f3n como disciplina diaria.", "sesion": 1}, {"num": 3, "letra": "A", "nombre": "PROVECHA EL DOLOR Y USA EL EGO A TU FAVOR", "titulo": "\∀provecha el dolor", "resumen": "La transformaci\u00f3n real ocurre cuando conviertes tus mayores obst\u00e1culos en tus m\u00e1s poderosas ventajas. El dolor contiene mensajes cruciales.", "compromiso": "Me comprometo a recibir el dolor como informaci\u00f3n valiosa y a canalizar mi ego hacia objetivos trascendentes.", "sesion": 1}, {"num": 4, "letra": "A", "nombre": "P\u00daENTALE AL COMPROMISO, LUEGO AL M\u00c9TODO", "titulo": "\∀p\u00fantale al compromiso", "resumen": "El compromiso inquebrantable con un resultado precede a la identificaci\u00f3n del m\u00e9todo. Primero el qu\u00e9, luego el c\u00f3mo.", "compromiso": "Me comprometo a definir con claridad los resultados que deseo y a comprometerme completamente con ellos antes de tener todos los detalles del proceso.", "sesion": 2}, {"num": 5, "letra": "A", "nombre": "PRENDE A NORMALIZAR LO EXTRAORDINARIO", "titulo": "\∀prende a normalizar lo extraordinario", "resumen": "La disciplina, el esfuerzo constante, la lectura diaria y el movimiento regular no deben ser excepcionales \u2014 deben ser tu nueva normalidad.", "compromiso": "Me comprometo a adoptar pr\u00e1cticas de excelencia como mi nuevo est\u00e1ndar m\u00ednimo y a rechazar los est\u00e1ndares mediocres.", "sesion": 2}, {"num": 6, "letra": "A", "nombre": "TACA EL MIEDO DIRECTAMENTE", "titulo": "\∀taca el miedo", "resumen": "El miedo no confrontado se convierte en una prisi\u00f3n invisible. No buscas estar libre de miedo \u2014 buscas actuar con valor a pesar del miedo.", "compromiso": "Me comprometo a identificar mis miedos fundamentales y a avanzar conscientemente hacia ellos en lugar de evitarlos.", "sesion": 2}, {"num": 7, "letra": "A", "nombre": "PRENDE A ENTENDER EL PODER DE CERO EXCUSAS", "titulo": "\∀prende cero excusas", "resumen": "El camino \∀normal no permite zonas grises: una sola excusa te excluye de este camino. Asumes total responsabilidad sin condiciones.", "compromiso": "Me comprometo a eliminar completamente las excusas de mi vida y a asumir 100% de responsabilidad por mis resultados.", "sesion": 3}, {"num": 8, "letra": "A", "nombre": "PRENDE A PAGAR EL PRECIO ANTICIPADAMENTE", "titulo": "\∀prende a pagar el precio", "resumen": "Todo logro significativo requiere inversi\u00f3n de tiempo, energ\u00eda o recursos. La persona \∀normal paga ese precio voluntariamente, por adelantado.", "compromiso": "Me comprometo a identificar y pagar conscientemente el precio requerido para mis metas m\u00e1s importantes.", "sesion": 3}, {"num": 9, "letra": "A", "nombre": "SUME RESPONSABILIDAD TOTAL POR TUS RESULTADOS", "titulo": "\∀sume responsabilidad total", "resumen": "El \u00e9xito nunca es accidental. A trav\u00e9s de ti pasa tu destino. La responsabilidad total no es una carga \u2014 es la fuente de tu verdadero poder.", "compromiso": "Me comprometo a asumir 100% de responsabilidad por cada aspecto de mi vida y a rechazar la mentalidad de v\u00edctima en todas sus formas.", "sesion": 3}, {"num": 10, "letra": "A", "nombre": "POYO EMOCIONAL COMO COMBUSTIBLE", "titulo": "\∀poyo emocional como combustible", "resumen": "Las emociones son recursos poderosos cuando sabemos canalizarlas. No las reprimes ni te dejas arrastrar \u2014 las usas como informaci\u00f3n y combustible.", "compromiso": "Me comprometo a desarrollar inteligencia emocional avanzada y a utilizar tanto emociones positivas como negativas como combustible para mi crecimiento.", "sesion": 4}, {"num": 11, "letra": "A", "nombre": "PALANCAMIENTO FUERTE, LA VERDAD CONTIGO MISMO", "titulo": "\∀palancamiento: la verdad contigo mismo", "resumen": "El autoenga\u00f1o es el mayor obst\u00e1culo para la grandeza. Cultivas una honestidad brutal contigo mismo, confrontando constantemente tus propias mentiras internas.", "compromiso": "Me comprometo a practicar honestidad radical conmigo mismo y a confrontar verdades inc\u00f3modas como el camino m\u00e1s r\u00e1pido hacia mi evoluci\u00f3n.", "sesion": 4}, {"num": 12, "letra": "A", "nombre": "DOPTAS LO QUE TOLERAS", "titulo": "\∀doptas lo que toleras", "resumen": "Tus est\u00e1ndares no son lo que dices valorar \u2014 son lo que efectivamente permites en tu vida. Lo que permites es lo que promueves.", "compromiso": "Me comprometo a identificar y eliminar todo lo que estoy tolerando por debajo de mis est\u00e1ndares declarados.", "sesion": 4}, {"num": 13, "letra": "A", "nombre": "PR\u00d3PIATE DE LA INSATISFACCI\u00d3N", "titulo": "\∀pr\u00f3piate la insatisfacci\u00f3n", "resumen": "La insatisfacci\u00f3n constructiva es un motor de crecimiento. No te conformas con suficientemente bueno \u2014 usas la insatisfacci\u00f3n como br\u00fajula hacia niveles superiores.", "compromiso": "Me comprometo a transformar la insatisfacci\u00f3n en motivaci\u00f3n constructiva y a utilizar mi deseo natural de progreso como impulso hacia la excelencia.", "sesion": 5}, {"num": 14, "letra": "A", "nombre": "DOPTA M\u00c9TODOS PROBADOS", "titulo": "\∀dopta m\u00e9todos probados", "resumen": "La innovaci\u00f3n verdadera se construye sobre fundamentos s\u00f3lidos. La humildad para aprender de quienes ya recorrieron el camino acelera exponencialmente tus resultados.", "compromiso": "Me comprometo a estudiar maestros y metodolog\u00edas que han demostrado eficacia y a mantener la humildad necesaria para aprender continuamente.", "sesion": 5}, {"num": 15, "letra": "A", "nombre": "LCANZA EL RESULTADO, LUEGO LO MEJORAS", "titulo": "\∀lcanza el resultado, luego mejora", "resumen": "La perfecci\u00f3n es enemiga de la acci\u00f3n. La excelencia es un proceso iterativo. Primero el resultado tangible, luego la mejora continua.", "compromiso": "Me comprometo a valorar la acci\u00f3n imperfecta por encima de la planeaci\u00f3n perfecta e implementar r\u00e1pidamente y refinar constantemente.", "sesion": 5}, {"num": 16, "letra": "A", "nombre": "CELERA EL PROCESO, DALE SENTIDO DE URGENCIA", "titulo": "\∀celera el proceso", "resumen": "La urgencia consciente es un catalizador para la acci\u00f3n decidida. El tiempo es el recurso m\u00e1s valioso e irrecuperable. Act\u00faa con esa consciencia.", "compromiso": "Me comprometo a vivir con un agudo sentido de urgencia constructiva y a eliminar la procrastinaci\u00f3n en todas sus formas.", "sesion": 5}, {"num": 17, "letra": "A", "nombre": "TENCI\u00d3N Y ENFOQUE CONSTANTE", "titulo": "\∀tenci\u00f3n y enfoque constante", "resumen": "En un mundo dise\u00f1ado para fragmentar tu atenci\u00f3n, la capacidad de mantener enfoque sostenido se ha vuelto un superpoder. Tu enfoque determina tu realidad.", "compromiso": "Me comprometo a desarrollar atenci\u00f3n concentrada como habilidad fundamental y a proteger ferozmente mis recursos atencionales.", "sesion": 5}, {"num": 18, "letra": "A", "nombre": "LCANZAS LA ANORMALIDAD CUANDO TIENES NUEVOS CR\u00cdTICOS", "titulo": "\∀lcanzas la anormalidad", "resumen": "Las cr\u00edticas son la validaci\u00f3n de tu transformaci\u00f3n. Cuando emergen nuevos cr\u00edticos es se\u00f1al inequ\u00edvoca de que est\u00e1s trascendiendo tus l\u00edmites anteriores.", "compromiso": "Me comprometo a valorar las cr\u00edticas como se\u00f1al de progreso y a buscar crecimiento en lugar de aprobaci\u00f3n.", "sesion": 5}];

    var fechaInfo=mk("div");fechaInfo.style.cssText="display:flex;gap:14px;font-size:11px;color:var(--faint);margin-top:6px;flex-wrap:wrap";
    if(fi){var f1=mk("span");f1.innerHTML="Encuentro: <strong style='color:var(--gold2)'>"+fi+"</strong>";fechaInfo.appendChild(f1);}
    if(fl){var f2=mk("span");f2.innerHTML="L\u00edmite m\u00f3dulos: <strong style='color:var(--gold2)'>"+fl+"</strong>";fechaInfo.appendChild(f2);}
    sc.appendChild(fechaInfo);
    var estado=mk("div","sesion-estado pen","Pr\u00f3ximamente");
    if(ses.num===1)estado=mk("div","sesion-estado prog","Activa \u2014 Comienza aqu\u00ed");
    sc.style.marginBottom="8px";sc.appendChild(estado);
    cses.appendChild(sc);
  });
  p.appendChild(cses);

  // Acceso a primer modulo
  var cmod=mk("div","card gold");cmod.appendChild(mk("div","cl","Sesi\u00f3n 1 \u00b7 Activa ahora"));
  var ctMod=mk("div","ct");ctMod.style.marginBottom="13px";ctMod.textContent="Tu primera sesi\u00f3n ya est\u00e1 activa. Comienza con el diagn\u00f3stico honesto: la Rueda de la Vida y el Test de los Elementos.";
  cmod.appendChild(ctMod);
  var modBtns=mk("div");modBtns.style.cssText="display:flex;gap:8px;flex-wrap:wrap";
  [{n:"Rueda de la Vida",f:"0a-rueda-vida.html"},{n:"Test de los Elementos",f:"0b-elementos.html"}].forEach(function(item){
    var btn=mk("button","bs",item.n+" \u2192");
    btn.onclick=function(){window.location.href=item.f;};
    modBtns.appendChild(btn);
  });
  cmod.appendChild(modBtns);p.appendChild(cmod);

  // Principios de la sesion 1
  var cpr=mk("div","card dark");cpr.appendChild(mk("div","cl","Los principios de la sesi\u00f3n 1"));
  PRINCIPIOS.filter(function(pr){return pr.sesion===1;}).forEach(function(pr){
    var row=mk("div");row.style.cssText="padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)";
    var t=mk("div");t.style.cssText="font-size:13px;color:var(--gold2);margin-bottom:3px;font-family:Cormorant Garamond,serif;font-weight:300;font-size:15px";t.textContent=pr.titulo;row.appendChild(t);
    row.appendChild(mk("div","ct",pr.resumen));cpr.appendChild(row);
  });
  p.appendChild(cpr);
}

init();
</script>
</body>
</html>
