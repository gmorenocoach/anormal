<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>\u2200normal \u2014 Panel de Administraci\u00f3n</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#060A14;--bg2:#0A0F1E;--bg3:#0E1525;--bg4:#131D30;--bg5:#1A2640;
--gold:#C9A84C;--gold2:#E8C96A;--gold3:#F5E0A0;
--gd:rgba(201,168,76,.13);--gb:rgba(201,168,76,.28);
--text:#EAE6DC;--dim:#8A95A8;--faint:#3A4558;--ffaint:#1E2A3A;
--acc:#4A9EBF;--grn:#4ABF7A;--pur:#9B7FD4;--rose:#D4537E;
--r:4px;--rm:8px;--rl:14px;--rxl:18px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Barlow",sans-serif;font-weight:300;font-size:14px;line-height:1.65;min-height:100vh}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 20% 30%,rgba(201,168,76,.04),transparent 55%);pointer-events:none;z-index:0}
.layout{position:relative;z-index:1;display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--bg2);border-right:1px solid rgba(255,255,255,.05);padding:24px 0;position:fixed;top:0;left:0;width:220px;height:100vh;overflow-y:auto;z-index:10}
.sb-logo{padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:16px}
.sb-logo-t{font-family:"Cormorant Garamond",serif;font-size:26px;color:var(--gold2);font-weight:300;line-height:1}
.sb-logo-s{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin-top:3px}
.sb-section{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);padding:0 20px;margin:14px 0 6px;font-weight:500}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 20px;cursor:pointer;transition:all .15s;font-size:13px;color:var(--dim);border-left:2px solid transparent}
.sb-item:hover{background:rgba(255,255,255,.03);color:var(--text)}
.sb-item.act{background:var(--gd);color:var(--gold2);border-left-color:var(--gold)}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.main{margin-left:220px;padding:28px 32px;max-width:900px}
.page{display:none}.page.act{display:block;animation:fu .3s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.page-title{font-family:"Cormorant Garamond",serif;font-size:26px;font-weight:300;color:var(--gold2);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--dim);margin-bottom:24px;line-height:1.6}
.card{background:var(--bg2);border:1px solid rgba(255,255,255,.055);border-radius:var(--rl);padding:18px 22px;margin-bottom:12px}
.card.gold{border-color:var(--gb);background:linear-gradient(135deg,var(--bg2),var(--bg3))}
.card.dark{background:var(--bg3);border-color:rgba(255,255,255,.04)}
.cl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:10px}
.cl.g{color:var(--grn)}.cl.b{color:var(--acc)}.cl.r{color:var(--rose)}.cl.p{color:var(--pur)}
.ct{font-size:13px;color:var(--dim);line-height:1.75}
.il{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:5px;display:block;font-weight:500}
.inp{background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:"Barlow",sans-serif;font-size:13px;font-weight:300;padding:9px 13px;width:100%;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--faint)}
.inp.yt{padding-left:36px}
.inp-wrap{position:relative}
.inp-prefix{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--faint);pointer-events:none}
.frow{display:grid;gap:10px}
.frow.col2{grid-template-columns:1fr 1fr}
.frow.col3{grid-template-columns:1fr 1fr 1fr}
.bp{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border:none;border-radius:var(--r);font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;padding:9px 22px;cursor:pointer;transition:opacity .2s,transform .15s}
.bp:hover{opacity:.9;transform:translateY(-1px)}
.bs{background:transparent;color:var(--gold);border:1px solid var(--gb);border-radius:var(--r);font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;padding:7px 16px;cursor:pointer;transition:all .2s}
.bs:hover{background:var(--gd)}
.btn-row{display:flex;gap:8px;align-items:center;margin-top:14px;flex-wrap:wrap}
.toast{position:fixed;bottom:24px;right:24px;background:var(--grn);color:var(--bg);border-radius:var(--rm);padding:11px 18px;font-size:13px;font-weight:500;font-family:"Barlow Condensed",sans-serif;letter-spacing:.1em;text-transform:uppercase;transform:translateY(80px);opacity:0;transition:all .3s;z-index:200}
.toast.show{transform:translateY(0);opacity:1}
/* SESIONES */
.ses-blk{border-radius:var(--rxl);padding:18px 20px;margin-bottom:12px;border:1px solid rgba(255,255,255,.07);border-left:3px solid;background:var(--bg2)}
.ses-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.ses-num{font-family:"Cormorant Garamond",serif;font-size:36px;font-weight:300;line-height:1;opacity:.5;flex-shrink:0}
.ses-info{flex:1}
.ses-titulo{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px}
.ses-principios{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.ses-princ-chip{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--dim);border:1px solid rgba(255,255,255,.08)}
.video-inp-row{display:flex;gap:8px;align-items:center}
.video-preview{background:var(--bg4);border-radius:var(--rm);padding:8px 11px;margin-top:7px;font-size:12px;color:var(--acc);border:1px solid var(--acb);display:none}
.video-preview.show{display:block}
/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid rgba(255,255,255,.055);border-radius:var(--rl);padding:14px 16px;text-align:center}
.stat-n{font-family:"Cormorant Garamond",serif;font-size:32px;font-weight:300;line-height:1;margin-bottom:4px}
.stat-l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
/* PROMOS */
.promo-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.promo-item:last-child{border-bottom:none}
.promo-name{font-size:13px;font-weight:500;flex:1}
.promo-fechas{font-size:11px;color:var(--dim)}
.promo-estado{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500;flex-shrink:0}
.est-activa{background:rgba(74,191,122,.12);color:var(--grn)}
.est-prox{background:var(--gd);color:var(--gold2)}
.est-cerrada{background:rgba(255,255,255,.06);color:var(--faint)}
/* MODULOS VIDEO */
.mod-video-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.mod-video-row:last-child{border-bottom:none}
.mod-video-name{font-size:12px;font-weight:500;min-width:160px;flex-shrink:0;color:var(--text)}
.mod-video-inp{flex:1}
.mod-video-status{font-size:11px;padding:1px 8px;border-radius:20px;flex-shrink:0;margin-top:2px}
.mvs-ok{background:rgba(74,191,122,.1);color:var(--grn);border:1px solid rgba(74,191,122,.25)}
.mvs-pen{background:rgba(255,255,255,.05);color:var(--faint);border:1px solid rgba(255,255,255,.08)}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-box{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:var(--rxl);padding:36px 32px;width:100%;max-width:360px;text-align:center}
.login-logo{font-family:"Cormorant Garamond",serif;font-size:48px;color:var(--gold2);font-weight:300;margin-bottom:4px}
.login-sub{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin-bottom:28px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gb);border-radius:2px}
@media(max-width:700px){.layout{grid-template-columns:1fr}.sidebar{display:none}.main{margin-left:0;padding:16px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">\u2200</div>
    <div class="login-sub">Panel de administraci\u00f3n \u2200normal</div>
    <div style="margin-bottom:14px">
      <label class="il" style="text-align:left;display:block">Contrase\u00f1a de acceso</label>
      <input class="inp" id="pwdInp" type="password" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022">
    </div>
    <button class="bp" style="width:100%" onclick="doLogin()">Acceder al panel</button>
    <div id="loginErr" style="font-size:12px;color:#BF4A4A;margin-top:10px;display:none">Contrase\u00f1a incorrecta</div>
  </div>
</div>

<!-- PANEL PRINCIPAL -->
<div id="adminPanel" style="display:none">
<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-t">\u2200normal</div>
    <div class="sb-logo-s">Panel de administraci\u00f3n</div>
  </div>
  <div class="sb-section">General</div>
  <div class="sb-item act" onclick="goPage(0,this)"><div class="sb-dot" style="background:var(--gold)"></div>Resumen</div>
  <div class="sb-item" onclick="goPage(1,this)"><div class="sb-dot" style="background:var(--acc)"></div>Promociones</div>
  <div class="sb-section">Contenido</div>
  <div class="sb-item" onclick="goPage(2,this)"><div class="sb-dot" style="background:var(--pur)"></div>Videos por sesi\u00f3n</div>
  <div class="sb-item" onclick="goPage(3,this)"><div class="sb-dot" style="background:var(--rose)"></div>Videos por m\u00f3dulo</div>
  <div class="sb-section">Configuraci\u00f3n</div>
  <div class="sb-item" onclick="goPage(4,this)"><div class="sb-dot" style="background:var(--grn)"></div>Principios por sesi\u00f3n</div>
  <div class="sb-item" onclick="goPage(5,this)"><div class="sb-dot" style="background:var(--faint)"></div>Acceso y seguridad</div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="page act" id="pg0"></div>
  <div class="page" id="pg1"></div>
  <div class="page" id="pg2"></div>
  <div class="page" id="pg3"></div>
  <div class="page" id="pg4"></div>
  <div class="page" id="pg5"></div>
</div>
</div>
</div>

<div class="toast" id="toast">Guardado correctamente</div>

<script>
var SESIONES = [{"num": 0, "titulo": "Bienvenida y registro", "color": "#C9A84C", "principios": [4, 14], "modulos": []}, {"num": 1, "titulo": "Sesi\u00f3n 1 \u00b7 Diagn\u00f3stico honesto", "color": "#C9A84C", "principios": [1, 11, 12], "modulos": ["0a-rueda-vida.html", "0b-elementos.html"]}, {"num": 2, "titulo": "Sesi\u00f3n 2 \u00b7 Mi identidad profunda", "color": "#9B7FD4", "principios": [5, 9, 13], "modulos": ["1a-camino-de-vida.html", "1b-sub-numeros.html", "1c-mapa-energetico.html", "1d-flechas.html", "2a-nombre.html", "2b-personas.html", "3a-valores-dolan-v2.html", "4-perfil.html"]}, {"num": 3, "titulo": "Sesi\u00f3n 3 \u00b7 Mi mapa emocional", "color": "#D4537E", "principios": [2, 3, 10], "modulos": ["5a-septenios-v3.html", "5bc-electro-perdon-v3.html", "5bd-nino-interior.html"]}, {"num": 4, "titulo": "Sesi\u00f3n 4 \u00b7 Mi raz\u00f3n de ser", "color": "#E8C96A", "principios": [6, 8, 17], "modulos": ["6a-ikigai.html"]}, {"num": 5, "titulo": "Sesi\u00f3n 5 \u00b7 Mi plan de vida", "color": "#4ABF7A", "principios": [7, 15, 16, 18], "modulos": ["7a-siguiente-ciclo.html", "7b-plan-vida.html", "dashboard.html"]}];
var PRINCIPIOS_MINI = {"1": "\\u2200gradecer", "2": "\\u2200vanza en el perd\\u00f3n", "3": "\\u2200provecha el dolor", "4": "\\u2200p\\u00fantale al compromiso", "5": "\\u2200prende lo extraordinario", "6": "\\u2200taca el miedo", "7": "\\u2200prende cero excusas", "8": "\\u2200prende a pagar el precio", "9": "\\u2200sume responsabilidad", "10": "\\u2200poyo emocional", "11": "\\u2200palancamiento: la verdad", "12": "\\u2200doptas lo que toleras", "13": "\\u2200pr\\u00f3piate la insatisfacci\\u00f3n", "14": "\\u2200dopta m\\u00e9todos probados", "15": "\\u2200lcanza y mejora", "16": "\\u2200celera el proceso", "17": "\\u2200tenci\\u00f3n y enfoque", "18": "\\u2200lcanzas la anormalidad"};

var CFG = {
  pwd:"anormal2024",
  promos:[
    {id:"p1",nombre:"Promoci\u00f3n 1",inicio:"01/03/2025",fin:"30/05/2025",estado:"cerrada"},
    {id:"p2",nombre:"Promoci\u00f3n 2",inicio:"15/06/2025",fin:"15/09/2025",estado:"activa"},
    {id:"p3",nombre:"Promoci\u00f3n 3",inicio:"01/10/2025",fin:"31/12/2025",estado:"proxima"}
  ],
  videosBienvenida:"",
  videosSesion:{},
  videosModulo:{},
  sesionFechas:{}
};

var MODULOS_ALL = [
  {id:"bienvenida",nombre:"Bienvenida y registro",sesion:0,archivo:"00-bienvenida.html"},
  {id:"rueda",nombre:"Rueda de la Vida",sesion:1,archivo:"0a-rueda-vida.html"},
  {id:"elementos",nombre:"Test de los Elementos",sesion:1,archivo:"0b-elementos.html"},
  {id:"camino",nombre:"N\u00famero de vida",sesion:2,archivo:"1a-camino-de-vida.html"},
  {id:"subnums",nombre:"Sub-n\u00fameros",sesion:2,archivo:"1b-sub-numeros.html"},
  {id:"mapa",nombre:"Mapa energ\u00e9tico",sesion:2,archivo:"1c-mapa-energetico.html"},
  {id:"flechas",nombre:"Flechas",sesion:2,archivo:"1d-flechas.html"},
  {id:"nombre",nombre:"N\u00fameros del nombre",sesion:2,archivo:"2a-nombre.html"},
  {id:"personas",nombre:"Personas y relaciones",sesion:2,archivo:"2b-personas.html"},
  {id:"dolan",nombre:"Valores Dolan",sesion:2,archivo:"3a-valores-dolan-v2.html"},
  {id:"perfil",nombre:"Perfil integrado",sesion:2,archivo:"4-perfil.html"},
  {id:"septenios",nombre:"Ciclos de vida (Septenios)",sesion:3,archivo:"5a-septenios-v3.html"},
  {id:"ecg",nombre:"ECG emocional y Perd\u00f3n",sesion:3,archivo:"5bc-electro-perdon-v3.html"},
  {id:"nino",nombre:"El Ni\u00f1o Interior",sesion:3,archivo:"5bd-nino-interior.html"},
  {id:"ikigai",nombre:"Ikigai",sesion:4,archivo:"6a-ikigai.html"},
  {id:"ciclo",nombre:"Siguiente ciclo",sesion:5,archivo:"7a-siguiente-ciclo.html"},
  {id:"plan",nombre:"Plan de vida plena",sesion:5,archivo:"7b-plan-vida.html"},
  {id:"dashboard",nombre:"Dashboard consolidado",sesion:5,archivo:"dashboard.html"}
];

function ge(id){return document.getElementById(id);}
function mk(tag,cls,txt){var d=document.createElement(tag);if(cls)d.className=cls;if(txt!==undefined)d.textContent=txt;return d;}

function doLogin(){
  var pwd=ge("pwdInp").value;
  if(pwd===CFG.pwd){
    ge("loginWrap").style.display="none";ge("adminPanel").style.display="block";
    buildAll();
  } else {
    ge("loginErr").style.display="block";
    ge("pwdInp").value="";
  }
}
ge("pwdInp").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});

function goPage(i,el){
  document.querySelectorAll(".sb-item").forEach(function(s){s.classList.remove("act");});
  if(el)el.classList.add("act");
  document.querySelectorAll(".page").forEach(function(p,j){p.classList.toggle("act",j===i);});
}

function showToast(msg){
  var t=ge("toast");t.textContent=msg||"Guardado correctamente";
  t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);
}

function ytEmbed(url){
  if(!url)return "";
  var m=url.match(/(?:v=|youtu\.be\/)([\w-]{11})/);
  return m?"https://www.youtube.com/embed/"+m[1]:"";
}

function buildAll(){build0();build1();build2();build3();build4();build5();}

// ── PG0: RESUMEN ─────────────────────────────────────────────
function build0(){
  var p=ge("pg0");p.innerHTML="";
  p.appendChild(mk("div","page-title","Resumen del proceso \u2200normal"));
  p.appendChild(mk("div","page-sub","Vista general de la plataforma, promociones activas y estado de contenidos."));

  var sg=mk("div","stat-grid");
  var promoActiva=CFG.promos.find(function(pr){return pr.estado==="activa";});
  var modConVideo=MODULOS_ALL.filter(function(m){return CFG.videosModulo[m.id];}).length;
  [{n:String(CFG.promos.length),l:"Promociones",c:"var(--gold2)"},{n:promoActiva?promoActiva.nombre:"Ninguna",l:"Activa ahora",c:"var(--grn)"},{n:String(modConVideo)+"/"+MODULOS_ALL.length,l:"M\u00f3dulos con video",c:"var(--acc)"},{n:"5",l:"Sesiones del proceso",c:"var(--pur)"}].forEach(function(item){
    var sc=mk("div","stat-card");
    var sn=mk("div","stat-n",item.n);sn.style.color=item.c;sc.appendChild(sn);sc.appendChild(mk("div","stat-l",item.l));sg.appendChild(sc);
  });
  p.appendChild(sg);

  var cmap=mk("div","card");cmap.appendChild(mk("div","cl","Mapa de principios por sesi\u00f3n"));
  SESIONES.forEach(function(ses){
    var row=mk("div");row.style.cssText="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)";
    var dot=mk("div");dot.style.cssText="width:8px;height:8px;border-radius:50%;background:"+ses.color+";flex-shrink:0;margin-top:5px";
    var info=mk("div");info.style.flex="1";
    var t=mk("div");t.style.cssText="font-size:12px;font-weight:500;color:"+ses.color+";margin-bottom:4px";t.textContent=ses.titulo;
    var chips=mk("div");chips.style.cssText="display:flex;flex-wrap:wrap;gap:4px";
    ses.principios.forEach(function(n){var c=mk("div","ses-princ-chip","\u2200"+n+" "+PRINCIPIOS_MINI[n]);chips.appendChild(c);});
    info.appendChild(t);info.appendChild(chips);row.appendChild(dot);row.appendChild(info);cmap.appendChild(row);
  });
  p.appendChild(cmap);

  var cvid=mk("div","card");cvid.appendChild(mk("div","cl","Estado de videos por m\u00f3dulo"));
  var sesColores=["","#C9A84C","#9B7FD4","#D4537E","#E8C96A","#4ABF7A"];
  var curSes=-1;
  MODULOS_ALL.forEach(function(mod){
    if(mod.sesion!==curSes){
      curSes=mod.sesion;
      var sh=mk("div");sh.style.cssText="font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:"+(sesColores[curSes]||"var(--faint)")+";margin:10px 0 5px;font-weight:500";
      sh.textContent=curSes===0?"Bienvenida":"Sesi\u00f3n "+curSes;cvid.appendChild(sh);
    }
    var row=mk("div");row.style.cssText="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03)";
    var dot2=mk("div");dot2.style.cssText="width:6px;height:6px;border-radius:50%;flex-shrink:0;background:"+(CFG.videosModulo[mod.id]?"var(--grn)":"var(--faint)");
    var n=mk("div");n.style.cssText="font-size:12px;flex:1;color:var(--dim)";n.textContent=mod.nombre;
    var st=mk("div","mod-video-status "+(CFG.videosModulo[mod.id]?"mvs-ok":"mvs-pen"),CFG.videosModulo[mod.id]?"Con video":"Pendiente");
    row.appendChild(dot2);row.appendChild(n);row.appendChild(st);cvid.appendChild(row);
  });
  p.appendChild(cvid);
}

// ── PG1: PROMOCIONES ─────────────────────────────────────────
function build1(){
  var p=ge("pg1");p.innerHTML="";
  p.appendChild(mk("div","page-title","Gestionar promociones"));
  p.appendChild(mk("div","page-sub","Cada promoci\u00f3n es una cohorte de participantes con fechas propias. El acceso a los m\u00f3dulos se habilita seg\u00fan las fechas programadas aqu\u00ed."));

  var clista=mk("div","card");clista.appendChild(mk("div","cl","Promociones actuales"));
  var lista=mk("div");lista.id="promoLista";renderPromos(lista);clista.appendChild(lista);p.appendChild(clista);

  var cnueva=mk("div","card gold");cnueva.appendChild(mk("div","cl","Crear nueva promoci\u00f3n"));
  var frow=mk("div","frow col3");frow.style.marginBottom="12px";
  function mkF(id,lbl,ph){var wr=mk("div");wr.appendChild(mk("label","il",lbl));var inp=document.createElement("input");inp.className="inp";inp.id=id;inp.placeholder=ph;wr.appendChild(inp);return wr;}
  frow.appendChild(mkF("npNom","Nombre / C\u00f3digo","Promoci\u00f3n 4"));
  frow.appendChild(mkF("npInicio","Fecha de inicio","DD/MM/AAAA"));
  frow.appendChild(mkF("npFin","Fecha de cierre","DD/MM/AAAA"));
  cnueva.appendChild(frow);

  var sesGrid=mk("div");sesGrid.style.marginBottom="12px";
  sesGrid.appendChild(mk("div","il","Fechas por sesi\u00f3n (encuentro en vivo)"));
  SESIONES.filter(function(s){return s.num>0;}).forEach(function(ses){
    var row=mk("div");row.style.cssText="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)";
    var dot=mk("div");dot.style.cssText="width:7px;height:7px;border-radius:50%;background:"+ses.color+";flex-shrink:0";
    var lbl=mk("div");lbl.style.cssText="font-size:12px;color:var(--dim);flex:1";lbl.textContent=ses.titulo;
    var inp1=document.createElement("input");inp1.className="inp";inp1.id="nps"+ses.num+"enc";inp1.style.cssText="width:120px;font-size:12px;padding:6px 10px";inp1.placeholder="Encuentro";
    var inp2=document.createElement("input");inp2.className="inp";inp2.id="nps"+ses.num+"lim";inp2.style.cssText="width:120px;font-size:12px;padding:6px 10px";inp2.placeholder="L\u00edmite m\u00f3dulos";
    row.appendChild(dot);row.appendChild(lbl);row.appendChild(inp1);row.appendChild(inp2);sesGrid.appendChild(row);
  });
  cnueva.appendChild(sesGrid);

  var btnNueva=mk("button","bp","Crear promoci\u00f3n");
  btnNueva.onclick=function(){
    var nom=(ge("npNom").value||"").trim();var ini=(ge("npInicio").value||"").trim();var fin=(ge("npFin").value||"").trim();
    if(!nom||!ini||!fin){alert("Completa los datos b\u00e1sicos de la promoci\u00f3n.");return;}
    var ses={};SESIONES.filter(function(s){return s.num>0;}).forEach(function(s){ses["ses"+s.num]={enc:ge("nps"+s.num+"enc").value||"",lim:ge("nps"+s.num+"lim").value||""};});
    CFG.promos.push({id:"p"+Date.now(),nombre:nom,inicio:ini,fin:fin,estado:"proxima",sesiones:ses});
    renderPromos(ge("promoLista"));showToast("Promoci\u00f3n creada");
    ["npNom","npInicio","npFin"].forEach(function(id){ge(id).value="";});
    SESIONES.filter(function(s){return s.num>0;}).forEach(function(s){ge("nps"+s.num+"enc").value="";ge("nps"+s.num+"lim").value="";});
  };
  cnueva.appendChild(btnNueva);p.appendChild(cnueva);
}

function renderPromos(cont){
  cont.innerHTML="";
  CFG.promos.forEach(function(pr){
    var row=mk("div","promo-item");
    var nm=mk("div","promo-name",pr.nombre);
    var fc=mk("div","promo-fechas",pr.inicio+" \u2014 "+pr.fin);
    nm.appendChild(mk("div",null," "));nm.firstChild.textContent=pr.nombre;
    var est=mk("div","promo-estado est-"+( pr.estado==="activa"?"activa":pr.estado==="proxima"?"prox":"cerrada"),pr.estado==="activa"?"Activa":pr.estado==="proxima"?"Pr\u00f3xima":"Cerrada");
    var info=mk("div");info.style.flex="1";info.appendChild(mk("div",null,pr.nombre));info.style.cssText="flex:1;font-size:13px;font-weight:500;color:var(--text)";
    info.appendChild(mk("div","promo-fechas",pr.inicio+" \u2014 "+pr.fin));
    row.appendChild(info);row.appendChild(est);
    var btnAct=mk("button","bs",pr.estado==="activa"?"Cerrar":"Activar");btnAct.style.padding="4px 12px";btnAct.style.fontSize="11px";
    btnAct.onclick=function(){pr.estado=pr.estado==="activa"?"cerrada":"activa";renderPromos(cont);showToast("Estado actualizado");};
    row.appendChild(btnAct);cont.appendChild(row);
  });
  if(!CFG.promos.length)cont.appendChild(mk("div","ct","No hay promociones creadas a\u00fan."));
}

// ── PG2: VIDEOS POR SESION ───────────────────────────────────
function build2(){
  var p=ge("pg2");p.innerHTML="";
  p.appendChild(mk("div","page-title","Videos por sesi\u00f3n"));
  p.appendChild(mk("div","page-sub","Un video introductorio para cada sesi\u00f3n que el participante ve al inicio del encuentro. Pega el enlace de YouTube y el sistema lo incrusta autom\u00e1ticamente."));

  var cbien=mk("div","card gold");cbien.appendChild(mk("div","cl","Video de bienvenida general (\u2200normal)"));
  buildVideoInp(cbien,"videosBienvenida","Video de presentaci\u00f3n del proceso \u2200normal");p.appendChild(cbien);

  SESIONES.filter(function(s){return s.num>0;}).forEach(function(ses){
    var card=mk("div","card ses-blk");card.style.borderLeftColor=ses.color;
    var hdr=mk("div","ses-header");
    var num=mk("div","ses-num",String(ses.num));num.style.color=ses.color;hdr.appendChild(num);
    var info=mk("div","ses-info");info.appendChild(mk("div","ses-titulo",ses.titulo));
    var chips=mk("div","ses-principios");
    ses.principios.forEach(function(n){chips.appendChild(mk("div","ses-princ-chip","\u2200"+n+" \u00b7 "+PRINCIPIOS_MINI[n]));});
    info.appendChild(chips);hdr.appendChild(info);card.appendChild(hdr);
    buildVideoInp(card,"ses"+ses.num,"Introduce el video de la sesi\u00f3n "+ses.num);
    p.appendChild(card);
  });
}

function buildVideoInp(cont,key,ph){
  var wr=mk("div");wr.style.marginTop="8px";
  var row=mk("div","video-inp-row");
  var wrap=mk("div","inp-wrap");wrap.style.flex="1";
  var prefix=mk("div","inp-prefix","YT");
  var inp=document.createElement("input");inp.className="inp yt";inp.id="vid-"+key;
  inp.placeholder=ph||"https://youtube.com/watch?v=...";
  inp.value=CFG.videosSesion[key]||CFG.videosBienvenida&&key==="videosBienvenida"?CFG.videosBienvenida:"";
  wrap.appendChild(prefix);wrap.appendChild(inp);
  var btnG=mk("button","bs","Guardar");btnG.style.padding="8px 16px";
  btnG.onclick=function(){
    var url=(ge("vid-"+key).value||"").trim();
    if(key==="videosBienvenida")CFG.videosBienvenida=url;
    else CFG.videosSesion[key]=url;
    var prev=ge("prev-"+key);
    if(prev){var embed=ytEmbed(url);if(embed){prev.innerHTML='<iframe src="'+embed+'" style="width:100%;height:160px;border:none;border-radius:var(--rm)" allowfullscreen></iframe>';prev.classList.add("show");}else{prev.classList.remove("show");}}
    showToast("Video guardado");
  };
  row.appendChild(wrap);row.appendChild(btnG);wr.appendChild(row);
  var prev=mk("div","video-preview");prev.id="prev-"+key;
  var url=key==="videosBienvenida"?CFG.videosBienvenida:(CFG.videosSesion[key]||"");
  if(url){var embed=ytEmbed(url);if(embed){prev.innerHTML='<iframe src="'+embed+'" style="width:100%;height:160px;border:none;border-radius:var(--rm)" allowfullscreen></iframe>';prev.classList.add("show");}}
  wr.appendChild(prev);cont.appendChild(wr);
}

// ── PG3: VIDEOS POR MODULO ───────────────────────────────────
function build3(){
  var p=ge("pg3");p.innerHTML="";
  p.appendChild(mk("div","page-title","Videos de introducci\u00f3n por m\u00f3dulo"));
  p.appendChild(mk("div","page-sub","Cada m\u00f3dulo puede tener un video tuyo de introducci\u00f3n que aparece antes de que el participante comience. Cuando no hay video, se muestra el placeholder."));
  var sesColores=["#C9A84C","#C9A84C","#9B7FD4","#D4537E","#E8C96A","#4ABF7A"];
  var sesTitulos=["Bienvenida","Sesi\u00f3n 1","Sesi\u00f3n 2","Sesi\u00f3n 3","Sesi\u00f3n 4","Sesi\u00f3n 5"];
  var curSes=-1;
  MODULOS_ALL.forEach(function(mod){
    if(mod.sesion!==curSes){
      curSes=mod.sesion;
      var card=mk("div","card");card.style.borderLeft="3px solid "+(sesColores[curSes]||"var(--faint)");card.style.marginBottom="12px";
      var clabel=mk("div","cl",sesTitulos[curSes]);clabel.style.color=sesColores[curSes];card.appendChild(clabel);
      p.appendChild(card);
      var curCard=card;
      var modsSes=MODULOS_ALL.filter(function(m){return m.sesion===curSes;});
      modsSes.forEach(function(m){
        var row=mk("div","mod-video-row");
        var nm=mk("div","mod-video-name",m.nombre);
        var inpWr=mk("div","mod-video-inp");
        var inp2=document.createElement("input");inp2.className="inp";inp2.style.cssText="font-size:12px;padding:7px 11px";
        inp2.id="mv-"+m.id;inp2.placeholder="URL de YouTube...";inp2.value=CFG.videosModulo[m.id]||"";
        var btnG2=mk("button","bs","OK");btnG2.style.cssText="padding:5px 12px;font-size:10px;margin-left:6px";
        btnG2.onclick=(function(mid,inp3){return function(){
          CFG.videosModulo[mid]=(inp3.value||"").trim();showToast("Video guardado para "+mid);build0();
        };})(m.id,inp2);
        inpWr.style.cssText="display:flex;align-items:center;flex:1";inpWr.appendChild(inp2);inpWr.appendChild(btnG2);
        var status=mk("div","mod-video-status "+(CFG.videosModulo[m.id]?"mvs-ok":"mvs-pen"),CFG.videosModulo[m.id]?"\u2713":"Pendiente");status.id="mvst-"+m.id;
        row.appendChild(nm);row.appendChild(inpWr);row.appendChild(status);curCard.appendChild(row);
      });
    }
  });
}

// ── PG4: PRINCIPIOS ──────────────────────────────────────────
function build4(){
  var p=ge("pg4");p.innerHTML="";
  p.appendChild(mk("div","page-title","Principios por sesi\u00f3n"));
  p.appendChild(mk("div","page-sub","El mapa de c\u00f3mo est\u00e1n distribuidos los 18 principios \u2200normal a lo largo de las 5 sesiones del proceso."));
  SESIONES.forEach(function(ses){
    var card=mk("div","card ses-blk");card.style.borderLeftColor=ses.color;
    var hdr=mk("div","ses-header");
    var num=mk("div","ses-num",ses.num===0?"\u2200":String(ses.num));num.style.color=ses.color;hdr.appendChild(num);
    var info=mk("div","ses-info");
    var t=mk("div","ses-titulo",ses.titulo);info.appendChild(t);
    hdr.appendChild(info);card.appendChild(hdr);
    ses.principios.forEach(function(n){
      var row=mk("div");row.style.cssText="display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)";
      var num2=mk("div");num2.style.cssText="font-family:Cormorant Garamond,serif;font-size:22px;font-weight:300;color:"+ses.color+";min-width:32px;line-height:1";num2.textContent="\u2200"+n;
      var txt=mk("div");txt.style.cssText="font-size:13px;color:var(--text);margin-top:2px;line-height:1.4";txt.textContent=PRINCIPIOS_MINI[n];
      row.appendChild(num2);row.appendChild(txt);card.appendChild(row);
    });
    p.appendChild(card);
  });
}

// ── PG5: SEGURIDAD ───────────────────────────────────────────
function build5(){
  var p=ge("pg5");p.innerHTML="";
  p.appendChild(mk("div","page-title","Acceso y seguridad"));
  p.appendChild(mk("div","page-sub","Cambia la contrase\u00f1a de acceso al panel de administraci\u00f3n."));
  var card=mk("div","card");card.appendChild(mk("div","cl","Cambiar contrase\u00f1a"));
  var g=mk("div","frow col2");g.style.marginBottom="12px";
  function mkF2(id,lbl){var wr=mk("div");wr.appendChild(mk("label","il",lbl));var inp=document.createElement("input");inp.className="inp";inp.id=id;inp.type="password";inp.placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022";wr.appendChild(inp);return wr;}
  g.appendChild(mkF2("pwdNew","Nueva contrase\u00f1a"));g.appendChild(mkF2("pwdConf","Confirmar contrase\u00f1a"));
  card.appendChild(g);
  var btn=mk("button","bp","Cambiar contrase\u00f1a");
  btn.onclick=function(){
    var n=(ge("pwdNew").value||"").trim();var c=(ge("pwdConf").value||"").trim();
    if(!n){alert("Ingresa la nueva contrase\u00f1a.");return;}
    if(n!==c){alert("Las contrase\u00f1as no coinciden.");return;}
    CFG.pwd=n;showToast("Contrase\u00f1a actualizada");ge("pwdNew").value="";ge("pwdConf").value="";
  };
  card.appendChild(btn);p.appendChild(card);

  var cinfo=mk("div","card dark");cinfo.appendChild(mk("div","cl","Informaci\u00f3n del sistema"));
  [{l:"Versi\u00f3n",v:"\u2200normal v1.0"},{l:"M\u00f3dulos totales",v:String(MODULOS_ALL.length)},{l:"Sesiones",v:"5"},{l:"Principios",v:"18"}].forEach(function(item){
    var row=mk("div");row.style.cssText="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px";
    var l=mk("span");l.style.color="var(--faint)";l.textContent=item.l;
    var v=mk("span");v.style.color="var(--text)";v.textContent=item.v;
    row.appendChild(l);row.appendChild(v);cinfo.appendChild(row);
  });
  p.appendChild(cinfo);
}
</script>
