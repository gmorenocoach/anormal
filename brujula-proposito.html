<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∀normal — Mi Brújula de Propósito</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#060A14;--bg2:#0A0F1E;--bg3:#0E1525;--bg4:#131D30;--bg5:#1A2640;
--gold:#C9A84C;--gold2:#E8C96A;--gold3:#F5E0A0;
--gd:rgba(201,168,76,.13);--gb:rgba(201,168,76,.28);
--text:#EAE6DC;--dim:#8A95A8;--faint:#3A4558;--ffaint:#1E2A3A;
--acc:#4A9EBF;--grn:#4ABF7A;--pur:#9B7FD4;--rose:#D4537E;
--r:4px;--rm:8px;--rl:14px;--rxl:20px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Barlow",sans-serif;font-weight:300;font-size:15px;line-height:1.65;min-height:100vh}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(201,168,76,.04),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(155,127,212,.04),transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:0 22px 80px}
/* HEADER */
.header{padding:30px 0 20px;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:24px}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-logo{font-family:"Cormorant Garamond",serif;font-size:14px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
.header-titulo{font-family:"Cormorant Garamond",serif;font-size:clamp(24px,5vw,36px);font-weight:300;color:var(--gold2);line-height:1.1;margin-bottom:6px}
.header-sub{font-size:13px;color:var(--dim);max-width:480px;line-height:1.75}
.progress-circle-wrap{text-align:center;flex-shrink:0}
.progress-circle{position:relative;width:80px;height:80px}
.progress-circle svg{transform:rotate(-90deg)}
.progress-circle-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pc-num{font-family:"Cormorant Garamond",serif;font-size:22px;color:var(--gold2);font-weight:300;line-height:1}
.pc-lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-top:2px}
/* PROPOSITO BOX */
.proposito-box{background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(155,127,212,.06));border:1px solid var(--gb);border-radius:var(--rxl);padding:20px 22px;margin-bottom:20px}
.pb-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:8px;font-family:"Barlow Condensed",sans-serif}
.pb-texto{font-family:"Cormorant Garamond",serif;font-size:clamp(16px,3vw,21px);font-style:italic;color:var(--gold3);line-height:1.75;min-height:52px}
.pb-placeholder{color:var(--faint);font-style:italic}
.pb-edit{margin-top:10px;display:none}
.pb-edit.show{display:block}
.pb-ta{background:rgba(0,0,0,.3);border:1px solid var(--gb);border-radius:var(--rm);color:var(--gold3);font-family:"Cormorant Garamond",serif;font-size:17px;font-style:italic;padding:11px 14px;width:100%;min-height:70px;outline:none;resize:vertical;line-height:1.75}
.pb-ta::placeholder{color:var(--faint)}
.pb-btn-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
/* SESION TABS */
.tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;margin-bottom:18px}
.tab{padding:6px 14px;border-radius:var(--r);font-size:11px;font-family:"Barlow Condensed",sans-serif;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:1px solid rgba(255,255,255,.08);background:var(--bg2);color:var(--faint);white-space:nowrap;transition:all .2s;flex-shrink:0}
.tab:hover{border-color:rgba(255,255,255,.2);color:var(--dim)}
.tab.on{border-color:var(--gold);background:var(--gd);color:var(--gold2)}
.tab.completada{border-color:rgba(74,191,122,.4);background:rgba(74,191,122,.08);color:var(--grn)}
/* ENTRADAS */
.entrada-card{background:var(--bg2);border:1px solid rgba(255,255,255,.055);border-radius:var(--rl);padding:18px 20px;margin-bottom:10px;transition:border-color .2s;position:relative;overflow:hidden}
.entrada-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--color-entrada,var(--faint))}
.entrada-card.completa::before{opacity:1}
.entrada-card:not(.completa)::before{opacity:.3}
.entrada-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;cursor:pointer}
.entrada-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.entrada-nombre{font-size:13px;font-weight:500;flex:1}
.entrada-estado{font-size:11px;padding:2px 9px;border-radius:20px;flex-shrink:0;font-family:"Barlow Condensed",sans-serif;letter-spacing:.06em}
.est-completa{background:rgba(74,191,122,.1);color:var(--grn);border:1px solid rgba(74,191,122,.25)}
.est-pendiente{background:rgba(255,255,255,.04);color:var(--faint);border:1px solid rgba(255,255,255,.08)}
.entrada-body{display:none}
.entrada-card.abierta .entrada-body{display:block}
.pregunta-blk{margin-bottom:12px}
.pregunta-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;margin-bottom:5px;display:flex;align-items:center;gap:6px;font-family:"Barlow Condensed",sans-serif}
.pregunta-ta{background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:"Barlow",sans-serif;font-size:13px;padding:9px 12px;width:100%;min-height:65px;outline:none;resize:vertical;line-height:1.65;transition:border-color .2s}
.pregunta-ta::placeholder{color:var(--faint)}
.pregunta-ta:focus{border-color:var(--color-entrada,var(--gold))}
/* PRINCIPIO BADGE */
.principio-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:20px;padding:3px 10px;margin-bottom:10px}
.pb-princ-num{font-family:"Cormorant Garamond",serif;font-size:16px;color:var(--gold2);font-weight:300}
.pb-princ-txt{font-size:11px;color:var(--dim)}
/* TENSION ZEIGARNIK */
.tension-blk{background:rgba(155,127,212,.07);border:1px solid rgba(155,127,212,.2);border-radius:var(--rm);padding:10px 13px;margin-top:10px;display:flex;align-items:flex-start;gap:8px}
.tension-icon{font-size:14px;color:var(--pur);flex-shrink:0;margin-top:1px}
.tension-txt{font-size:12px;color:var(--pur);line-height:1.6;font-style:italic}
/* ACCION URGENTE */
.accion-urgente{background:rgba(74,191,122,.07);border:1px solid rgba(74,191,122,.25);border-radius:var(--rm);padding:10px 13px;margin-top:6px}
.au-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--grn);font-weight:500;margin-bottom:4px;font-family:"Barlow Condensed",sans-serif}
/* BOTONES */
.bp{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border:none;border-radius:var(--r);font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;padding:9px 20px;cursor:pointer;transition:all .2s}
.bp:hover{opacity:.9;transform:translateY(-1px)}
.bs{background:transparent;color:var(--gold);border:1px solid var(--gb);border-radius:var(--r);font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;padding:7px 14px;cursor:pointer}
.bn{background:transparent;color:var(--dim);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);font-family:"Barlow",sans-serif;font-size:13px;padding:8px 14px;cursor:pointer}
/* FORTALEZAS ACUMULADAS */
.fortalezas-wrap{background:var(--bg2);border:1px solid rgba(255,255,255,.055);border-radius:var(--rl);padding:18px 20px;margin-bottom:20px}
.fortaleza-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;margin:3px;border:1px solid;cursor:default;transition:all .2s}
/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid rgba(255,255,255,.055);border-radius:var(--rl);padding:14px 16px;text-align:center}
.stat-n{font-family:"Cormorant Garamond",serif;font-size:28px;font-weight:300;line-height:1;margin-bottom:3px}
.stat-l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gb);border-radius:2px}
@media(max-width:560px){.app{padding:0 14px 60px}.stats-row{grid-template-columns:1fr 1fr}}

/* CALENDARIO DE COMPROMISOS */
.cal-wrap{margin-top:24px}
.cal-entrada{background:var(--bg3);border-radius:var(--rm);padding:11px 14px;margin-bottom:7px;border:1px solid rgba(255,255,255,.06);display:flex;align-items:flex-start;gap:10px;transition:border-color .2s}
.cal-entrada:hover{border-color:rgba(255,255,255,.15)}
.cal-entrada.cumplida{opacity:.6}
.cal-chk{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--faint);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;margin-top:2px}
.cal-chk.on{background:var(--grn);border-color:var(--grn)}
.cal-info{flex:1;min-width:0}
.cal-modulo{font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;margin-bottom:2px;font-family:"Barlow Condensed",sans-serif}
.cal-accion{font-size:13px;color:var(--text);line-height:1.5;margin-bottom:4px}
.cal-accion.cumplida{text-decoration:line-through;color:var(--faint)}
.cal-fecha{font-size:11px;color:var(--faint)}
.cal-fecha input{background:var(--bg4);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--dim);font-family:"Barlow",sans-serif;font-size:11px;padding:3px 8px;outline:none;width:130px;transition:border-color .2s}
.cal-fecha input:focus{border-color:var(--gold)}
.cal-empty{text-align:center;padding:30px 20px;color:var(--faint);font-size:13px;font-style:italic}
.cal-stats{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.cal-stat{background:var(--bg3);border-radius:var(--rm);padding:9px 14px;text-align:center;flex:1;min-width:80px;border:1px solid rgba(255,255,255,.05)}
.cal-stat-n{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:300;line-height:1;margin-bottom:2px}
.cal-stat-l{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
.add-compromiso{background:var(--bg3);border-radius:var(--rl);padding:14px 16px;margin-top:12px;border:1px solid rgba(255,255,255,.06)}
.add-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.add-inp{flex:1;min-width:200px;background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:"Barlow",sans-serif;font-size:13px;padding:8px 12px;outline:none;transition:border-color .2s}
.add-inp:focus{border-color:var(--gold)}
.add-inp::placeholder{color:var(--faint)}
.add-sel{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--dim);font-family:"Barlow",sans-serif;font-size:12px;padding:8px 10px;outline:none;cursor:pointer}

</style>

<body>
<div class="app" id="app"></div>
<script>
// ============================================================
// ANORMAL - Módulo de datos compartidos entre módulos
// Usa sessionStorage para pasar datos entre páginas HTML
// ============================================================

var ANORMAL = {
  
  // Leer todos los datos del proceso
  getData: function() {
    try {
      var raw = sessionStorage.getItem('anormal_proceso');
      return raw ? JSON.parse(raw) : {};
    } catch(e) { return {}; }
  },
  
  // Guardar datos del proceso
  setData: function(data) {
    try {
      sessionStorage.setItem('anormal_proceso', JSON.stringify(data));
    } catch(e) {}
  },
  
  // Actualizar una sección específica
  update: function(section, value) {
    var data = this.getData();
    data[section] = value;
    this.setData(data);
  },
  
  // Agregar un compromiso/hábito a la agenda central
  addAgenda: function(item) {
    // item = {modulo, titulo, descripcion, fecha, periodicidad, tipo}
    var data = this.getData();
    if (!data.agenda) data.agenda = [];
    item.id = 'ag_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    item.cumplido = false;
    item.fechaCreacion = new Date().toLocaleDateString('es-CO');
    data.agenda.push(item);
    this.setData(data);
    return item.id;
  },
  
  // Guardar lo marcado en septenios para que fluya al ECG y al Niño Interior
  saveSeptenios: function(checklistEstado, cicloActual, nombre, genero) {
    var doloresPorCiclo = [];
    
    Object.keys(checklistEstado).forEach(function(chkKey) {
      var est = checklistEstado[chkKey];
      if (!est || !est.dolor || !est.dolor.length) return;
      
      // Extraer número de ciclo del key ('chk-3' -> 3, 'actual-5' -> 5)
      var cicloNum = 0;
      if (chkKey.startsWith('chk-')) cicloNum = parseInt(chkKey.replace('chk-',''));
      else if (chkKey.startsWith('actual-')) cicloNum = parseInt(chkKey.replace('actual-',''));
      if (!cicloNum) return;
      
      // Obtener los ítems de dolor marcados
      var cicloDatos = window.CICLOS_DATA ? window.CICLOS_DATA[String(cicloNum)] : null;
      if (!cicloDatos) return;
      
      var itemsMarcados = est.dolor.map(function(idx) {
        return cicloDatos.dolor[idx] || '';
      }).filter(Boolean);
      
      var itemsAlegria = (est.alegria || []).map(function(idx) {
        return cicloDatos.alegria[idx] || '';
      }).filter(Boolean);
      
      if (itemsMarcados.length || itemsAlegria.length) {
        doloresPorCiclo.push({
          ciclo: cicloNum,
          tipo: cicloDatos.tipo,
          titulo: cicloDatos.titulo,
          edades: cicloDatos.titulo.match(/\d+ a \d+/)?.[0] || '',
          dolores: itemsMarcados,
          alegrias: itemsAlegria,
          // Preguntas respondidas
          respuestas: [0,1,2].map(function(pi) {
            return checklistEstado[chkKey + '-preg-' + pi] || '';
          }).filter(Boolean)
        });
      }
    });
    
    // Ordenar por ciclo
    doloresPorCiclo.sort(function(a,b){return a.ciclo - b.ciclo;});
    
    this.update('septenios', {
      cicloActual: cicloActual,
      nombre: nombre,
      genero: genero,
      doloresPorCiclo: doloresPorCiclo,
      fecha: new Date().toLocaleDateString('es-CO')
    });
  },
  
  // Obtener datos de septenios para el ECG
  getSepteniosParaECG: function() {
    var data = this.getData();
    return data.septenios || null;
  },
  
  // Obtener ciclos 1-2-3 para el Niño Interior
  getCiclosInfancia: function() {
    var sep = this.getSepteniosParaECG();
    if (!sep) return [];
    return sep.doloresPorCiclo.filter(function(c) {
      return c.ciclo <= 3;
    });
  },
  
  // Guardar compromisos de un módulo en la agenda central
  saveCompromisos: function(moduloId, compromisos) {
    if (!compromisos || !Object.keys(compromisos).length) return;
    var data = this.getData();
    if (!data.agenda) data.agenda = [];
    
    Object.keys(compromisos).forEach(function(key) {
      var texto = (compromisos[key] || '').trim();
      if (!texto) return;
      // Evitar duplicados del mismo módulo+key
      var exists = data.agenda.some(function(item) {
        return item.moduloId === moduloId && item.key === key;
      });
      if (!exists) {
        data.agenda.push({
          id: 'ag_' + moduloId + '_' + key,
          moduloId: moduloId,
          key: key,
          tipo: 'compromiso-principio',
          descripcion: texto,
          fechaCreacion: new Date().toLocaleDateString('es-CO'),
          cumplido: false,
          periodicidad: 'diario'
        });
      }
    });
    this.setData(data);
  }
};

// Sobrescribir guardarCompromisosModulo para que también vaya a la agenda
window.guardarCompromisosModulo = function(moduloId, compromisos) {
  if (!window.COMPROMISOS_PROCESO) window.COMPROMISOS_PROCESO = {};
  window.COMPROMISOS_PROCESO[moduloId] = compromisos;
  ANORMAL.saveCompromisos(moduloId, compromisos);
};

</script>

var SES_COLORES = {1:"#C9A84C",2:"#9B7FD4",3:"#D4537E",4:"#E8C96A",5:"#4ABF7A"};

var BRUJULA = {
  nombre: "",
  proposito: "",
  entradas: {},
  tabActivo: 1

// Inicializar entradas
MODULOS.forEach(function(m){
  BRUJULA.entradas[m.id] = {
    fortaleza: "",
    proposito_conexion: "",
    accion: "",
    completa: false,
    fecha: ""
  };
});

function ge(id){return document.getElementById(id);}
function mk(tag,cls,txt){var d=document.createElement(tag);if(cls)d.className=cls;if(txt!==undefined)d.textContent=txt;return d;}

function calcStats(){
  var total=MODULOS.length;
  var completas=MODULOS.filter(function(m){return BRUJULA.entradas[m.id].completa;}).length;
  var acciones=MODULOS.filter(function(m){return BRUJULA.entradas[m.id].accion&&BRUJULA.entradas[m.id].accion.trim();}).length;
  return {total:total,completas:completas,acciones:acciones,pct:Math.round(completas/total*100)};
}

function init(){
  var app=ge("app");app.innerHTML="";
  renderHeader(app);
  renderProposito(app);
  renderStats(app);
  renderFortalezas(app);
  renderTabs(app);
  renderTabContent();
}

function renderHeader(cont){
  var hdr=mk("div","header");
  var htop=mk("div","header-top");
  var hinfo=mk("div");
  hinfo.appendChild(mk("div","header-logo","∀normal \u00b7 Proceso de transformaci\u00f3n"));
  hinfo.appendChild(mk("div","header-titulo","Mi Br\u00fajula de Prop\u00f3sito"));
  var sub=mk("div","header-sub","El repositorio que crece contigo. Cada m\u00f3dulo que completas agrega una pieza a la imagen completa de qui\u00e9n eres y para qu\u00e9 est\u00e1s aqu\u00ed.");
  hinfo.appendChild(sub);
  var stats=calcStats();
  var pcWrap=mk("div","progress-circle-wrap");
  var pct=stats.pct;
  var r=34;var circ=2*Math.PI*r;var dash=circ*(pct/100);
  var svgNS="http://www.w3.org/2000/svg";
  var svg=document.createElementNS(svgNS,"svg");svg.setAttribute("viewBox","0 0 80 80");svg.setAttribute("width","80");svg.setAttribute("height","80");
  var bg=document.createElementNS(svgNS,"circle");bg.setAttribute("cx","40");bg.setAttribute("cy","40");bg.setAttribute("r",String(r));bg.setAttribute("fill","none");bg.setAttribute("stroke","#1A2640");bg.setAttribute("stroke-width","5");
  var fg=document.createElementNS(svgNS,"circle");fg.setAttribute("cx","40");fg.setAttribute("cy","40");fg.setAttribute("r",String(r));fg.setAttribute("fill","none");fg.setAttribute("stroke","#C9A84C");fg.setAttribute("stroke-width","5");fg.setAttribute("stroke-dasharray",dash+" "+(circ-dash));fg.setAttribute("stroke-linecap","round");
  svg.appendChild(bg);svg.appendChild(fg);
  var pcTxt=mk("div","progress-circle-txt");
  var pcNum=mk("div","pc-num",pct+"%");
  var pcLbl=mk("div","pc-lbl","avance");
  pcTxt.appendChild(pcNum);pcTxt.appendChild(pcLbl);
  var pcWrapInner=mk("div","progress-circle");pcWrapInner.appendChild(svg);pcWrapInner.appendChild(pcTxt);
  pcWrap.appendChild(pcWrapInner);
  htop.appendChild(hinfo);htop.appendChild(pcWrap);
  hdr.appendChild(htop);cont.appendChild(hdr);
}

function renderProposito(cont){
  var pb=mk("div","proposito-box");
  pb.appendChild(mk("div","pb-label","Mi prop\u00f3sito de vida \u2014 se construye m\u00f3dulo a m\u00f3dulo"));
  var texto=mk("div","pb-texto");
  if(BRUJULA.proposito){texto.textContent="\u201c"+BRUJULA.proposito+"\u201d";}
  else{var ph=mk("span","pb-placeholder","Tu prop\u00f3sito ir\u00e1 emergiendo a medida que avanzas en los m\u00f3dulos. Al llegar al Ikigai, estar\u00e1 listo para ser declarado.");texto.appendChild(ph);}
  pb.appendChild(texto);
  var editDiv=mk("div","pb-edit"+(BRUJULA.proposito?" show":""));
  var ta=document.createElement("textarea");ta.className="pb-ta";ta.placeholder="Escribe aqu\u00ed la frase de prop\u00f3sito que va emergiendo...";ta.value=BRUJULA.proposito||"";
  ta.oninput=function(){BRUJULA.proposito=this.value;};editDiv.appendChild(ta);
  var btnRow=mk("div","pb-btn-row");
  var btnG=mk("button","bp","Guardar prop\u00f3sito");btnG.onclick=function(){BRUJULA.proposito=(ta.value||"").trim();init();};
  var btnC=mk("button","bn","Cancelar");btnC.onclick=function(){editDiv.classList.remove("show");};
  btnRow.appendChild(btnG);btnRow.appendChild(btnC);editDiv.appendChild(btnRow);pb.appendChild(editDiv);

function renderStats(cont){
  var stats=calcStats();
  var sg=mk("div","stats-row");
  [{n:stats.completas+"/"+stats.total,l:"M\u00f3dulos completados",c:"var(--gold2)"},{n:stats.acciones,l:"Acciones registradas",c:"var(--grn)"},{n:BRUJULA.proposito?"\u2713":"Pendiente",l:"Prop\u00f3sito declarado",c:BRUJULA.proposito?"var(--grn)":"var(--faint)"}].forEach(function(item){
    var sc=mk("div","stat-card");
    var sn=mk("div","stat-n",String(item.n));sn.style.color=item.c;sc.appendChild(sn);sc.appendChild(mk("div","stat-l",item.l));sg.appendChild(sc);
  });

function renderFortalezas(cont){
  var fortalezas=MODULOS.filter(function(m){return BRUJULA.entradas[m.id].fortaleza&&BRUJULA.entradas[m.id].fortaleza.trim();});
  if(!fortalezas.length)return;
  var wrap=mk("div","fortalezas-wrap");
  wrap.appendChild(mk("div","cl","Mis fortalezas acumuladas"));
  var sub=mk("div","ct");sub.style.marginBottom="12px";sub.textContent="Estas son las fortalezas que has ido reconociendo a lo largo del proceso. Este es quien eres.";wrap.appendChild(sub);
  var chips=mk("div");
  fortalezas.forEach(function(m){
    var e=BRUJULA.entradas[m.id];
    var chip=mk("div","fortaleza-chip");
    chip.style.cssText+="border-color:"+m.color+";color:"+m.color+";background:rgba(0,0,0,.3)";
    var dot=mk("span");dot.style.cssText="width:6px;height:6px;border-radius:50%;background:"+m.color+";flex-shrink:0";
    var txt=mk("span");txt.style.cssText="font-size:11px;color:var(--text)";
    txt.textContent=e.fortaleza.length>60?e.fortaleza.substring(0,57)+"...":e.fortaleza;
    chip.appendChild(dot);chip.appendChild(txt);chips.appendChild(chip);
  });
  wrap.appendChild(chips);cont.appendChild(wrap);
}

function renderTabs(cont){
  var tabs=mk("div","tabs");
  [1,2,3,4,5].forEach(function(ses){
    var modsSes=MODULOS.filter(function(m){return m.sesion===ses;});
    var completasSes=modsSes.filter(function(m){return BRUJULA.entradas[m.id].completa;}).length;
    var tab=mk("div","tab"+(ses===BRUJULA.tabActivo?" on":completasSes===modsSes.length?" completada":""),SES_LABELS[ses]);
    tab.onclick=function(){BRUJULA.tabActivo=ses;renderTabContent();};
    tabs.appendChild(tab);
  });
  var tabCal=mk("div","tab"+(BRUJULA.tabActivo==="cal"?" on":""),"Mi Calendario \u2713");
  tabCal.onclick=function(){BRUJULA.tabActivo="cal";renderTabContent();};
  tabs.appendChild(tabCal);
  cont.appendChild(tabs);
  var tabContent=mk("div");tabContent.id="tab-content";cont.appendChild(tabContent);
}

function renderTabContent(){
  var tc=ge("tab-content");if(!tc)return;tc.innerHTML="";
  var tabs=document.querySelectorAll(".tab");
  tabs.forEach(function(t,i){
    var esCal=(i===tabs.length-1);
    var activo=esCal?(BRUJULA.tabActivo==="cal"):(i+1===BRUJULA.tabActivo);
    t.className="tab"+(activo?" on":"");
  });
  if (BRUJULA.tabActivo==="cal") {
    var calSection=mk("div");calSection.id="cal-section";tc.appendChild(calSection);
    renderCalendario(calSection);
  } else {
    renderEntradas(tc,BRUJULA.tabActivo);
  }
}

function renderEntradas(cont,sesion){
  var modsSes=MODULOS.filter(function(m){return m.sesion===sesion;});
  if(!modsSes.length){cont.appendChild(mk("div","ct","No hay m\u00f3dulos en esta sesi\u00f3n."));return;}
  modsSes.forEach(function(mod){
    var entrada=BRUJULA.entradas[mod.id];
    var card=mk("div","entrada-card"+(entrada.completa?" completa":""));
    card.style.setProperty("--color-entrada",mod.color);

    // Header
    var hdr=mk("div","entrada-header");
    var dot=mk("div","entrada-dot");dot.style.background=mod.color;
    var nom=mk("div","entrada-nombre",mod.nombre);nom.style.color=mod.color;
    var est=mk("div","entrada-estado "+(entrada.completa?"est-completa":"est-pendiente"),entrada.completa?"\u2713 Completa":"Pendiente");
    hdr.appendChild(dot);hdr.appendChild(nom);hdr.appendChild(est);card.appendChild(hdr);

    // Body
    var body=mk("div","entrada-body");

    // Principio activado
    if(mod.principio_activado){
      var pbadge=mk("div","principio-badge");
      var pnum=mk("div","pb-princ-num","∀"+mod.principio_activado);
      var ptxt=mk("div","pb-princ-txt",PRINCIPIOS_MINI[mod.principio_activado]||"");
      pbadge.appendChild(pnum);pbadge.appendChild(ptxt);body.appendChild(pbadge);
    }

    // Tres preguntas
    var preguntas=[
      {key:"fortaleza",lbl:"\u2740 Mi fortaleza descubierta",ph:mod.pregunta_fortaleza,color:mod.color},
      {key:"proposito_conexion",lbl:"\u2738 Conexi\u00f3n con mi prop\u00f3sito",ph:mod.pregunta_proposito,color:"var(--gold)"},
      {key:"accion",lbl:"\u26a1 Mi acci\u00f3n concreta esta semana",ph:mod.pregunta_accion,color:"var(--grn)"}
    ];

    preguntas.forEach(function(preg){
      var blk=mk("div","pregunta-blk");
      var lbl=mk("div","pregunta-lbl");lbl.style.color=preg.color;
      lbl.textContent=preg.lbl;
      var ta=document.createElement("textarea");ta.className="pregunta-ta";
      ta.placeholder=preg.ph;ta.value=entrada[preg.key]||"";
      ta.oninput=(function(k,e){return function(){e[k]=this.value;};})(preg.key,entrada);
      blk.appendChild(lbl);blk.appendChild(ta);

      // Indicador especial para accion
      if(preg.key==="accion"&&(entrada[preg.key]||"").trim()){
        var auDiv=mk("div","accion-urgente");
        auDiv.appendChild(mk("div","au-lbl","\u2713 Acci\u00f3n registrada"));
        auDiv.appendChild(mk("div","ct",entrada[preg.key]));
        blk.appendChild(auDiv);
      }
      body.appendChild(blk);
    });

    // Tension Zeigarnik
    if(mod.tension_zeigarnik){
      var tz=mk("div","tension-blk");
      var tzIcon=mk("div","tension-icon","\u2192");
      var tzTxt=mk("div","tension-txt",mod.tension_zeigarnik);
      tz.appendChild(tzIcon);tz.appendChild(tzTxt);body.appendChild(tz);
    }

    // Boton ir al modulo
    if(mod.archivo && !entrada.completa){
      var btnIr=mk("button","bp");
      btnIr.textContent="Abrir módulo →";
      btnIr.style.cssText="width:100%;margin-bottom:8px;font-size:13px;padding:10px 0";
      (function(url){ btnIr.onclick=function(){ window.location.href=url; }; })(mod.archivo);
      body.appendChild(btnIr);
    }
    // Botones
    var btnRow=mk("div");btnRow.style.cssText="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap";
    var btnG=mk("button","bp",entrada.completa?"Actualizar entrada":"Marcar como completa");
    btnG.onclick=function(){
      entrada.completa=true;
      if(!entrada.fecha)entrada.fecha=new Date().toLocaleDateString("es-CO");
      card.classList.add("completa");
      var est2=card.querySelector(".entrada-estado");
      if(est2){est2.className="entrada-estado est-completa";est2.textContent="\u2713 Completa";}
      init();
    };
    var btnC=mk("button","bn","Cerrar");btnC.onclick=function(){card.classList.remove("abierta");};
    btnRow.appendChild(btnG);btnRow.appendChild(btnC);body.appendChild(btnRow);

    card.appendChild(body);

    // Toggle
    hdr.onclick=function(){card.classList.toggle("abierta");};
    if(card.classList.contains("abierta")||!entrada.completa&&modsSes.indexOf(mod)===0){card.classList.add("abierta");}

    cont.appendChild(card);
  });
}

// Inicializar
(function(){
  var style=document.createElement("style");
  style.textContent=".cl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:10px}.ct{font-size:13px;color:var(--dim);line-height:1.8}";
  document.head.appendChild(style);
  init();
})();

// ── CALENDARIO DE COMPROMISOS ─────────────────────────────────
if (!BRUJULA.calendario) BRUJULA.calendario = [];

function renderCalendario(cont) {
  var section = document.createElement('div');
  section.className = 'cal-wrap';

  // Titulo
  var tit = document.createElement('div');
  tit.style.cssText = 'font-family:Cormorant Garamond,serif;font-size:26px;font-weight:300;color:var(--gold2);margin-bottom:6px';
  tit.textContent = 'Mi Calendario de Compromisos';
  var sub = document.createElement('div');
  sub.style.cssText = 'font-size:13px;color:var(--dim);margin-bottom:18px;line-height:1.75;max-width:520px';
  sub.textContent = 'Todos los compromisos que has asumido a lo largo del proceso — con su módulo de origen y fecha de ejecución. Marca cada uno cuando lo cumplas.';
  section.appendChild(tit); section.appendChild(sub);

  // Recoger compromisos de todos los módulos
  var allCompromisos = [];
  
  // Cargar compromisos de la agenda compartida (sessionStorage)
  if (window.ANORMAL) {
    var agendaData = ANORMAL.getData();
    if (agendaData && agendaData.agenda && agendaData.agenda.length) {
      agendaData.agenda.forEach(function(item) {
        // Evitar duplicados con los que ya están en BRUJULA.entradas
        var yaEsta = allCompromisos.some(function(c2) {
          return c2.id === item.id;
        });
        if (!yaEsta) {
          allCompromisos.push({
            id: item.id,
            modulo: item.moduloId || 'General',
            color: 'var(--gold)',
            accion: item.descripcion || '',
            fecha: item.fechaCreacion || '',
            cumplido: item.cumplido || false,
            origen: item.tipo || 'agenda'
          });
        }
      });
    }
  }
  MODULOS.forEach(function(mod) {
    var e = BRUJULA.entradas[mod.id];
    if (e && e.accion && e.accion.trim()) {
      allCompromisos.push({
        id: mod.id + '_accion',
        modulo: mod.nombre,
        color: mod.color,
        accion: e.accion,
        fecha: e.fecha_compromiso || '',
        cumplido: e.accion_cumplida || false,
        origen: 'modulo'
      });
    }
  });
  // Compromisos manuales
  (BRUJULA.calendario || []).forEach(function(comp) {
    allCompromisos.push(comp);
  });

  // Stats
  var total = allCompromisos.length;
  var cumplidos = allCompromisos.filter(function(c2) { return c2.cumplido; }).length;
  var pendientes = total - cumplidos;
  var calStats = document.createElement('div');
  calStats.className = 'cal-stats';
  [{n:String(total),l:'Total',c:'var(--gold2)'},{n:String(cumplidos),l:'Cumplidos',c:'var(--grn)'},{n:String(pendientes),l:'Pendientes',c:pendientes>0?'#BF4A4A':'var(--faint)'}].forEach(function(item) {
    var s = document.createElement('div'); s.className = 'cal-stat';
    var sn = document.createElement('div'); sn.className = 'cal-stat-n'; sn.textContent = item.n; sn.style.color = item.c;
    var sl = document.createElement('div'); sl.className = 'cal-stat-l'; sl.textContent = item.l;
    s.appendChild(sn); s.appendChild(sl); calStats.appendChild(s);
  });
  section.appendChild(calStats);

  // Lista
  if (!allCompromisos.length) {
    var emp = document.createElement('div'); emp.className = 'cal-empty';
    emp.textContent = 'Tus compromisos de los módulos aparecerán aquí a medida que avanzas.';
    section.appendChild(emp);
  } else {
    allCompromisos.forEach(function(comp, idx) {
      var row = document.createElement('div');
      row.className = 'cal-entrada' + (comp.cumplido ? ' cumplida' : '');
      var chk = document.createElement('div');
      chk.className = 'cal-chk' + (comp.cumplido ? ' on' : '');
      if (comp.cumplido) { var tick = document.createElement('div'); tick.style.cssText = 'width:8px;height:8px;border-radius:50%;background:var(--bg)'; chk.appendChild(tick); }
      var info = document.createElement('div'); info.className = 'cal-info';
      var modLbl = document.createElement('div'); modLbl.className = 'cal-modulo'; modLbl.style.color = comp.color; modLbl.textContent = comp.modulo;
      var accLbl = document.createElement('div'); accLbl.className = 'cal-accion' + (comp.cumplido ? ' cumplida' : ''); accLbl.textContent = comp.accion;
      var fechaRow = document.createElement('div'); fechaRow.className = 'cal-fecha';
      var fechaInp = document.createElement('input'); fechaInp.placeholder = 'Fecha compromiso DD/MM/AAAA'; fechaInp.value = comp.fecha || '';
      fechaInp.oninput = (function(c3) { return function() { c3.fecha = this.value; }; })(comp);
      fechaRow.appendChild(fechaInp);
      info.appendChild(modLbl); info.appendChild(accLbl); info.appendChild(fechaRow);
      chk.onclick = row.onclick = (function(c4, rowEl, chkEl, accEl) { return function(e2) {
        if (e2.target.tagName === 'INPUT') return;
        c4.cumplido = !c4.cumplido;
        if (c4.origen === 'modulo') {
          var e3 = BRUJULA.entradas[c4.id.replace('_accion','')];
          if (e3) e3.accion_cumplida = c4.cumplido;
        }
        rowEl.classList.toggle('cumplida', c4.cumplido);
        chkEl.classList.toggle('on', c4.cumplido); chkEl.innerHTML = '';
        if (c4.cumplido) { var t3 = document.createElement('div'); t3.style.cssText = 'width:8px;height:8px;border-radius:50%;background:var(--bg)'; chkEl.appendChild(t3); }
        accEl.classList.toggle('cumplida', c4.cumplido);
        renderCalendario(document.getElementById('cal-section'));
      }; })(comp, row, chk, accLbl);
      row.appendChild(chk); row.appendChild(info); section.appendChild(row);
    });
  }

  // Agregar compromiso manual
  var addBlk = document.createElement('div'); addBlk.className = 'add-compromiso';
  var addLbl = document.createElement('div');
  addLbl.style.cssText = 'font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:6px;font-family:Barlow Condensed,sans-serif';
  addLbl.textContent = 'Agregar compromiso adicional';
  addBlk.appendChild(addLbl);
  var addRow2 = document.createElement('div'); addRow2.className = 'add-row';
  var addInp = document.createElement('input'); addInp.className = 'add-inp'; addInp.placeholder = 'Describe el compromiso que asumes...';
  var addSel = document.createElement('select'); addSel.className = 'add-sel';
  MODULOS.forEach(function(m) { var opt = document.createElement('option'); opt.value = m.id; opt.textContent = m.nombre; addSel.appendChild(opt); });
  var addBtn = document.createElement('button');
  addBtn.style.cssText = 'padding:8px 16px;border-radius:var(--r);border:1px solid var(--gb);background:transparent;color:var(--gold);font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;white-space:nowrap';
  addBtn.textContent = '+ Agregar';
  addBtn.onclick = function() {
    var txt = (addInp.value || '').trim(); if (!txt) return;
    var mod = MODULOS.find(function(m) { return m.id === addSel.value; });
    BRUJULA.calendario.push({ id: 'cal_' + Date.now(), modulo: mod ? mod.nombre : 'General', color: mod ? mod.color : 'var(--gold)', accion: txt, fecha: '', cumplido: false, origen: 'manual' });
    addInp.value = '';
    renderCalendario(document.getElementById('cal-section'));
  };
  addInp.onkeydown = function(e2) { if (e2.key === 'Enter') addBtn.click(); };
  addRow2.appendChild(addInp); addRow2.appendChild(addSel); addRow2.appendChild(addBtn);
  addBlk.appendChild(addRow2); section.appendChild(addBlk);

  cont.innerHTML = ''; cont.appendChild(section);
}
// ── FIN CALENDARIO ────────────────────────────────────────────

</script>
</body>
</html>
