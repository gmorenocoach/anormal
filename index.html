<script>
// Redirigir según estado del participante
(function(){
  var contrato = localStorage.getItem('anormal_contrato_firmado');
  var entrada = localStorage.getItem('anormal_entrada_completa');
  if (!contrato) {
    window.location.replace('contrato-transformacion.html');
  } else if (!entrada) {
    window.location.replace('entrada-anormal.html');
  } else {
    window.location.replace('resumen-conciencia.html');
  }
})();
</script>
