<style>
:root{
  --serif:'Fraunces',serif;--lienzo:#F4EFE3;--sans:'Inter',sans-serif;
  --t-display:44px;--t-h1:28px;--t-h2:20px;--t-h3:20px;--t-body:17px;--t-small:17px;--t-micro:20px;--bg:#0A101E;--bg2:#111A2C;--bg3:#16223A;--bg4:#1C2942;

--gd:rgba(201,168,76,.13);--gb:rgba(201,168,76,.28);
--text:#EDE7D9;--dim:#A9B0C0;--faint:#3A4558;
--acc:#4A9EBF;--acd:rgba(74,158,191,.13);--acb:rgba(74,158,191,.28);
--grn:#6FA382;--grd:rgba(74,191,122,.12);--grb:rgba(74,191,122,.28);
--pur:#9B7FD4;--pud:rgba(155,127,212,.12);--pub:rgba(155,127,212,.28);
--r:4px;--rm:8px;--rl:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--serif);font-weight:300;font-size:var(--t-body);line-height:1.7;min-height:100vh}

.app{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:0 22px 80px}
.prog{display:flex;align-items:center;margin-bottom:28px;overflow-x:auto;padding-bottom:3px}
.ps{display:flex;align-items:center;gap:5px;white-space:nowrap;padding:3px 0;cursor:default;flex-shrink:0}
.ps.done{cursor:pointer}
.pn{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:var(--t-h2);font-weight:500;border:1px solid var(--faint);color:var(--faint);transition:all .3s;flex-shrink:0}
.ps.done .pn{border-color:var(--gold);color:var(--gold);background:var(--gd)}
.ps.act .pn{border-color:var(--gold2);color:var(--bg);background:var(--gold2)}
.ptxt{font-size:var(--t-h2);letter-spacing:.07em;text-transform:uppercase;color:var(--faint)}

.pln{flex:1;min-width:6px;height:1px;background:var(--faint);margin:0 4px;opacity:.2}
.pln.done{background:var(--gold);opacity:.4}
.panel{display:none}.panel.act{display:block;animation:fu .35s ease}

.pbadge{display:inline-flex;align-items:center;gap:8px;background:var(--gd);border:1px solid var(--gb);border-radius:var(--rl);padding:6px 14px;margin-bottom:16px}

.card{background:var(--bg2);border:1px solid rgba(255,255,255,.055);border-radius:var(--rl);padding:18px 22px;margin-bottom:11px}
.card.gold{border-color:var(--gb);background:linear-gradient(135deg,var(--bg2),var(--bg3))}
.card.pur{border-color:var(--pub);background:linear-gradient(135deg,var(--bg2),var(--pud))}

.cl{font-size:var(--t-h2);letter-spacing:.06em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:9px}
.cl.b{color:var(--acc)}.cl.p{color:var(--pur)}.cl.g{color:var(--grn)}

.inp{background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:var(--t-body);font-weight:300;padding:9px 13px;width:100%;outline:none;transition:border-color .2s}

.bp{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border:none;border-radius:var(--r);font-family:var(--sans);font-size:var(--t-h2);font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:11px 26px;cursor:pointer;transition:opacity .2s,transform .15s}

.meta-card{background:var(--bg3);border-radius:var(--rm);padding:14px 16px;margin-bottom:9px;border:1px solid rgba(255,255,255,.06)}

.tab-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:6px 14px;border-radius:var(--r);font-size:var(--t-h2);font-family:var(--sans);letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--dim);transition:all .2s}

.dmsg{background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(74,158,191,.05));border:1px solid var(--gb);border-radius:var(--rl);padding:12px 16px;margin-bottom:11px;text-align:center}
.dm-l{font-size:var(--t-h2);letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.dm-t{font-family:var(--serif);font-size:var(--t-body);font-style:italic;color:var(--gold3);line-height:1.8}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:12px;border-top:1px solid rgba(255,255,255,.05)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gb);border-radius:2px}

<!-- VIDEO BANNER: Rueda de la Vida -->
<div class="vid-banner" id="vid-banner-rueda">
  <div class="vid-banner-hdr">
    <div class="vid-banner-lbl">Introducción al módulo</div>

  </div>

      <div class="vid-ph-icon">&#9654;</div>

    </div>
  </div>

<div class="app" id="app"></div>
<script>
/* ── Asociación principio ↔ acción (mapa rico por tipo) ── */
var PRINCIPIO_INFO={
  1:{n:'Agradecer',c:'#C9A84C'},
  2:{n:'Apúntale al compromiso',c:'#C9A84C'},
  3:{n:'Normaliza lo extraordinario',c:'#C9A84C'},
  4:{n:'Avanza en el perdón',c:'#D4537E'},
  5:{n:'Aprovecha el dolor',c:'#D4537E'},
  6:{n:'Ataca el miedo',c:'#D4537E'},
  8:{n:'Asume responsabilidad total',c:'#5A8CC0'}
};
function principioParaAccion(texto){
  var t=(texto||'').toLowerCase();
  var reglas=[
    {kw:['perdon','perdón','soltar','dejar ir','reconcili','cerrar ciclo','rencor'], p:4, como:'Soltar es liberarte. No cargues lo que ya no te sirve — el perdón es para ti, no para el otro.'},
    {kw:['miedo','enfrentar','atrever','confront','exponer','pedir ayuda','hablar con','decir lo que','arriesg'], p:6, como:'Lo que te da miedo es justo donde está tu crecimiento. Da el paso pequeño, a pesar del miedo.'},
    {kw:['emoci','sentir','dolor','sanar','terapia','nombrar','duelo','herida'], p:5, como:'El dolor es maestro cuando lo escuchas. Pregúntate qué te enseña, en vez de evitarlo.'},
    {kw:['agradec','valorar','reconoc','celebrar','apreciar','gratitud'], p:1, como:'Agradecer cambia tu enfoque: de lo que falta a lo que ya tienes. Empieza por ahí.'},
    {kw:['rutina','hábito','habito','diario','21 día','7 día','21 dias','7 dias','registrar','cada día','cada dia','practicar','constan','todos los días','todos los dias'], p:3, como:'La constancia vuelve extraordinario lo cotidiano. Repítelo hasta que sea parte de ti, no un esfuerzo.'},
    {kw:['decidir','asumir','hacerme cargo','responsab','dejar de excus','depende de mí','depende de mi','tomar control'], p:8, como:'Nada cambia hasta que asumes que depende de ti. Deja las excusas y toma el control.'},
    {kw:['iniciar','empezar','crear','comenzar','pedir cita','buscar','definir','establecer','primer paso'], p:2, como:'Empezar es el acto de compromiso. Ponle fecha y da el primer paso — sin fecha, es solo un deseo.'}
  ];
  for(var i=0;i<reglas.length;i++){
    for(var j=0;j<reglas[i].kw.length;j++){
      if(t.indexOf(reglas[i].kw[j])>=0) return {p:reglas[i].p, como:reglas[i].como};
    }
  }
  return {p:2, como:'Todo compromiso se sostiene en ∀2: ponle fecha y cúmplelo. Sin compromiso, la intención se diluye.'};
}
function principioAccionHTML(texto){
  var r=principioParaAccion(texto);
  var info=PRINCIPIO_INFO[r.p]||{n:'',c:'#C9A84C'};
  var html='<div style="margin-top:8px;padding:9px 12px;background:rgba(201,168,76,.07);border-left:2px solid '+info.c+';border-radius:0 6px 6px 0">';
  html+='<div style="font-size:var(--t-h2);letter-spacing:.1em;text-transform:uppercase;color:'+info.c+';margin-bottom:3px">✦ El principio que refuerza esta acción</div>';
  html+='<div style="font-size:var(--t-body);color:#EAE6DC"><b style="color:'+info.c+'">∀'+r.p+' · '+info.n+'</b> — '+r.como+'</div>';
  html+='</div>';
  return html;
}


// ============================================================
// ANORMAL - Módulo de datos compartidos entre módulos
// Usa sessionStorage para pasar datos entre páginas HTML
// ============================================================

var ANORMAL = {
  
  // Leer todos los datos del proceso
  getData: function() {
    try {
      var raw = sessionStorage.getItem('anormal_proceso');
      return raw ? JSON.parse(raw) : {};
    } catch(e) { return {}; }
  },
  
  // Guardar datos del proceso
  setData: function(data) {
    try {
      sessionStorage.setItem('anormal_proceso', JSON.stringify(data));
    } catch(e) {}
  },
  
  // Actualizar una sección específica
  update: function(section, value) {
    var data = this.getData();
    data[section] = value;
    this.setData(data);
  },
  
  // Agregar un compromiso/hábito a la agenda central
  addAgenda: function(item) {
    // item = {modulo, titulo, descripcion, fecha, periodicidad, tipo}
    var data = this.getData();
    if (!data.agenda) data.agenda = [];
    item.id = 'ag_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    item.cumplido = false;
    item.fechaCreacion = new Date().toLocaleDateString('es-CO');
    data.agenda.push(item);
    this.setData(data);
    return item.id;
  },
  
  // Guardar lo marcado en septenios para que fluya al ECG y al Niño Interior
  saveSeptenios: function(checklistEstado, cicloActual, nombre, genero) {
    var doloresPorCiclo = [];
    
    Object.keys(checklistEstado).forEach(function(chkKey) {
      var est = checklistEstado[chkKey];
      if (!est || !est.dolor || !est.dolor.length) return;
      
      // Extraer número de ciclo del key ('chk-3' -> 3, 'actual-5' -> 5)
      var cicloNum = 0;
      if (chkKey.startsWith('chk-')) cicloNum = parseInt(chkKey.replace('chk-',''));
      else if (chkKey.startsWith('actual-')) cicloNum = parseInt(chkKey.replace('actual-',''));
      if (!cicloNum) return;
      
      // Obtener los ítems de dolor marcados
      var cicloDatos = window.CICLOS_DATA ? window.CICLOS_DATA[String(cicloNum)] : null;
      if (!cicloDatos) return;
      
      var itemsMarcados = est.dolor.map(function(idx) {
        return cicloDatos.dolor[idx] || '';
      }).filter(Boolean);
      
      var itemsAlegria = (est.alegria || []).map(function(idx) {
        return cicloDatos.alegria[idx] || '';
      }).filter(Boolean);
      
      if (itemsMarcados.length || itemsAlegria.length) {
        doloresPorCiclo.push({
          ciclo: cicloNum,
          tipo: cicloDatos.tipo,
          titulo: cicloDatos.titulo,
          edades: cicloDatos.titulo.match(/\d+ a \d+/)?.[0] || '',
          dolores: itemsMarcados,
          alegrias: itemsAlegria,
          // Preguntas respondidas
          respuestas: [0,1,2].map(function(pi) {
            return checklistEstado[chkKey + '-preg-' + pi] || '';
          }).filter(Boolean)
        });
      }
    });
    
    // Ordenar por ciclo
    doloresPorCiclo.sort(function(a,b){return a.ciclo - b.ciclo;});
    
    this.update('septenios', {
      cicloActual: cicloActual,
      nombre: nombre,
      genero: genero,
      doloresPorCiclo: doloresPorCiclo,
      fecha: new Date().toLocaleDateString('es-CO')
    });
  },
  
  // Obtener datos de septenios para el ECG
  getSepteniosParaECG: function() {
    var data = this.getData();
    return data.septenios || null;
  },
  
  // Obtener ciclos 1-2-3 para el Niño Interior
  getCiclosInfancia: function() {
    var sep = this.getSepteniosParaECG();
    if (!sep) return [];
    return sep.doloresPorCiclo.filter(function(c) {
      return c.ciclo <= 3;
    });
  },
  
  // Guardar compromisos de un módulo en la agenda central
  saveCompromisos: function(moduloId, compromisos) {
    if (!compromisos || !Object.keys(compromisos).length) return;
    var data = this.getData();
    if (!data.agenda) data.agenda = [];
    
    Object.keys(compromisos).forEach(function(key) {
      var texto = (compromisos[key] || '').trim();
      if (!texto) return;
      // Evitar duplicados del mismo módulo+key
      var exists = data.agenda.some(function(item) {
        return item.moduloId === moduloId && item.key === key;
      });
      if (!exists) {
        data.agenda.push({
          id: 'ag_' + moduloId + '_' + key,
          moduloId: moduloId,
          key: key,
          tipo: 'compromiso-principio',
          descripcion: texto,
          fechaCreacion: new Date().toLocaleDateString('es-CO'),
          cumplido: false,
          periodicidad: 'diario'
        });
      }
    });
    this.setData(data);
  },

  // ============================================================
  // FASE 1 — ¿Quién soy? — guardado genérico por módulo
  // ============================================================

  // Guardar el resultado de un módulo de Fase 1 (o cualquier fase)
  // moduloId: 'rueda' | 'elementos' | 'camino' | 'subnumeros' | 'mapa' |
  //           'flechas' | 'nombre' | 'personas' | 'dolan' | 'ikigai' |
  //           'siguiente_ciclo' | 'plan_vida'
  saveFaseModulo: function(moduloId, resultado) {
    var data = this.getData();
    if (!data.fase1) data.fase1 = {};
    if (!data.fase3) data.fase3 = {};
    var fase3Ids = ['ikigai', 'siguiente_ciclo', 'plan_vida'];
    var bucket = fase3Ids.indexOf(moduloId) >= 0 ? data.fase3 : data.fase1;
    bucket[moduloId] = resultado;
    bucket[moduloId + '_fecha'] = new Date().toLocaleDateString('es-CO');
    this.setData(data);
    this.marcarModuloCompletado(moduloId);

  // Leer el resultado guardado de un módulo específico
  getFaseModulo: function(moduloId) {
    var data = this.getData();
    if (data.fase1 && data.fase1[moduloId] !== undefined) return data.fase1[moduloId];
    if (data.fase3 && data.fase3[moduloId] !== undefined) return data.fase3[moduloId];
    return null;
  },

  // Obtener todo lo guardado de Fase 1 de una vez (para Perfil Integrado)
  getFase1Completa: function() {
    var data = this.getData();
    return data.fase1 || {};
  },

  // Obtener todo lo guardado de Fase 3
  getFase3Completa: function() {
    var data = this.getData();
    return data.fase3 || {};
  },

  // ============================================================
  // PROGRESO — qué módulos completó la persona (para el Dashboard)
  // ============================================================

  TODOS_LOS_MODULOS: [
    {id:'rueda', fase:1, nombre:'Rueda de Vida'},

    {id:'camino', fase:1, nombre:'Camino de Vida'},
    {id:'subnumeros', fase:1, nombre:'Subnúmeros'},
    {id:'mapa', fase:1, nombre:'Mapa Energético'},
    {id:'flechas', fase:1, nombre:'Flechas'},
    {id:'nombre', fase:1, nombre:'Nombre'},
    {id:'personas', fase:1, nombre:'Personas'},
    {id:'dolan', fase:1, nombre:'Valores Dolan'},
    {id:'perfil', fase:1, nombre:'Perfil Integrado'},
    {id:'septenios', fase:2, nombre:'Mis Ciclos de Vida'},
    {id:'ecg', fase:2, nombre:'Mi Trabajo Emocional'},
    {id:'perdon', fase:2, nombre:'Mi Trabajo del Perdón'},
    {id:'ikigai', fase:3, nombre:'Ikigai'},
    {id:'siguiente_ciclo', fase:3, nombre:'Siguiente Ciclo'},
    {id:'plan_vida', fase:3, nombre:'Plan de Vida'}
  ],

  marcarModuloCompletado: function(moduloId) {
    var data = this.getData();
    if (!data.progreso) data.progreso = {};
    data.progreso[moduloId] = {
      completado: true,
      fecha: new Date().toLocaleDateString('es-CO')
    };
    this.setData(data);
  },

  // Devuelve la lista de módulos con su estado de completado, para pintar el Dashboard
  getProgreso: function() {
    var data = this.getData();
    var progreso = data.progreso || {};
    return this.TODOS_LOS_MODULOS.map(function(m) {
      return {
        id: m.id,
        fase: m.fase,
        nombre: m.nombre,
        completado: !!(progreso[m.id] && progreso[m.id].completado),
        fecha: progreso[m.id] ? progreso[m.id].fecha : null
      };
    });
  },

  // Porcentaje de avance total y por fase
  getPorcentajeAvance: function() {
    var prog = this.getProgreso();
    var total = prog.length;
    var hechos = prog.filter(function(m){ return m.completado; }).length;
    var porFase = {1:{total:0,hechos:0}, 2:{total:0,hechos:0}, 3:{total:0,hechos:0}};
    prog.forEach(function(m) {
      porFase[m.fase].total++;
      if (m.completado) porFase[m.fase].hechos++;
    });
    return {
      total: total, hechos: hechos,
      porcentaje: total ? Math.round((hechos/total)*100) : 0,
      porFase: porFase
    };
  }
};

function buildRuedaSVG(scores,size){
  size=size||320;
  var cx=size/2,cy=size/2,r=size*0.38,n=12;
  var svg='<div style="background:var(--lienzo,#F4EFE3);border-radius:16px;padding:18px 12px"><div style="max-width:340px;margin:0 auto">';
  svg+='<svg viewBox="0 0 '+size+' '+size+'" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto">';
  for(var ring=1;ring<=10;ring++){svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(r*ring/10)+'" fill="none" stroke="rgba(60,40,20,0.10)" stroke-width="1"/>';}
  for(var i=0;i<n;i++){var a=(i/n)*Math.PI*2-Math.PI/2;svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+Math.cos(a)*r)+'" y2="'+(cy+Math.sin(a)*r)+'" stroke="rgba(60,40,20,0.12)" stroke-width="1"/>';}
  var pts=[];
  for(var j=0;j<n;j++){var a2=(j/n)*Math.PI*2-Math.PI/2;var val=scores[AREAS[j].id]||1;var rad=r*val/10;pts.push((cx+Math.cos(a2)*rad)+","+(cy+Math.sin(a2)*rad));}
  svg+='<polygon points="'+pts.join(" ")+'" fill="rgba(176,140,50,0.22)" stroke="rgba(160,120,40,0.85)" stroke-width="1.5"/>';
  for(var k=0;k<n;k++){
    var a3=(k/n)*Math.PI*2-Math.PI/2;var val2=scores[AREAS[k].id]||1;var rad2=r*val2/10;
    var px=cx+Math.cos(a3)*rad2;var py=cy+Math.sin(a3)*rad2;
    svg+='<circle cx="'+px+'" cy="'+py+'" r="4" fill="'+AREAS[k].color+'"/>';
    var lx=cx+Math.cos(a3)*(r+22);var ly=cy+Math.sin(a3)*(r+22);
    var anch=(lx<cx-15)?"end":(lx>cx+15)?"start":"middle";
    var nom=AREAS[k].nombre.split(" ")[0];
    svg+='<text x="'+lx+'" y="'+(ly+3)+'" text-anchor="'+anch+'" font-size="9" fill="#3A2A1A" font-weight="600" font-family="Inter,sans-serif">'+nom+'</text>';
    svg+='<text x="'+lx+'" y="'+(ly+14)+'" text-anchor="'+anch+'" font-size="9" fill="rgba(60,40,20,0.55)" font-family="Inter,sans-serif">'+val2+'</text>';
  }
  svg+='</svg></div></div>';return svg;
}

function buildSlider(area, storeObj, containerId){
  var val=storeObj[area.id]||5;
  var swrap=mk("div","slider-wrap");
  var sfill=mk("div","slider-fill");sfill.style.background=area.color;sfill.style.width=((val-1)/9*100)+"%";
  var sthumb=mk("div","slider-thumb");sthumb.style.left=((val-1)/9*100)+"%";sthumb.style.borderColor=area.color;sthumb.style.background=area.color;
  swrap.appendChild(sfill);swrap.appendChild(sthumb);
  var valEl=mk("div","area-val",String(val));valEl.style.color=area.color;

  (function(a,sw,sf,st,ve,store){
    function setVal(v){
      v=Math.max(1,Math.min(10,Math.round(v)));
      store[a.id]=v;
      try{ if(store===S.diagnostico){ localStorage.setItem('anormal_rueda_areas', JSON.stringify(S.diagnostico)); } }catch(e){}
      var pct=(v-1)/9*100;
      sf.style.width=pct+"%";st.style.left=pct+"%";
      ve.textContent=String(v);
    }
    function fromEvent(e){
      var rect=sw.getBoundingClientRect();
      var cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
      setVal(1+Math.round(Math.max(0,Math.min(1,cx/rect.width))*9));
    }
    sw.addEventListener("mousedown",function(e){
      fromEvent(e);
      var mm=function(ev){fromEvent(ev);};
      var mu=function(){document.removeEventListener("mousemove",mm);document.removeEventListener("mouseup",mu);};
      document.addEventListener("mousemove",mm);document.addEventListener("mouseup",mu);
    });
    sw.addEventListener("touchstart",function(e){fromEvent(e);},{passive:true});
    sw.addEventListener("touchmove",function(e){fromEvent(e);},{passive:true});
    setVal(store[a.id]||5);
  })(area,swrap,sfill,sthumb,valEl,storeObj);

  return {wrap:swrap,valEl:valEl};
}

function renderAcciones(areaId,container){

    var del=mk("div");del.style.cssText="cursor:pointer;color:var(--faint);font-size:var(--t-body);padding:0 4px;flex-shrink:0";del.textContent="\u00d7";

    [{k:"meta",l:"\u00bfQu\u00e9 quieres lograr en esta \u00e1rea en 90 d\u00edas?",ph:"Describe el resultado concreto que quieres ver. Espec\u00edfico y medible.",rows:3},
     {k:"indicador",l:"\u00bfC\u00f3mo sabrás que lo lograste? \u2014 Indicador de \u00e9xito",ph:"Ej: Correr 5km sin parar. Ahorrar $X al mes. Tener una conversaci\u00f3n con mi padre.",rows:2},
     {k:"accion",l:"\u00bfQu\u00e9 har\u00e1s CADA SEMANA para lograrlo?",ph:"La acci\u00f3n semanal que sostiene la meta. Concreta y repetible.",rows:2},
     {k:"fecha",l:"Fecha l\u00edmite de revisi\u00f3n (90 d\u00edas desde hoy)",ph:"Escribe la fecha exacta de revisi\u00f3n...",rows:1}
    ].forEach(function(item){
      var wr=mk("div");wr.style.marginBottom="9px";
      var lb=mk("label");lb.style.cssText="font-size:var(--t-h2);letter-spacing:.12em;text-transform:uppercase;display:block;font-weight:500;margin-bottom:5px";lb.style.color=a.color;lb.textContent=item.l;wr.appendChild(lb);
      var ta=document.createElement("textarea");ta.className="rta";ta.style.minHeight=(item.rows*24+20)+"px";ta.placeholder=item.ph;ta.value=m[item.k]||"";
      ta.oninput=(function(aId,k){return function(){if(!S.metas[aId])S.metas[aId]={};S.metas[aId][k]=this.value;};})(a.id,item.k);
      wr.appendChild(ta);mc.appendChild(wr);
    });
    ctabs.appendChild(mc);
  });

  // Agregar mas areas
  var cmas=mk("div");cmas.style.cssText="margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)";
  cmas.appendChild(mk("div","cl","Agregar meta en otra \u00e1rea"));
  var selArea=document.createElement("select");selArea.style.cssText="background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:var(--t-body);padding:8px 12px;width:100%;outline:none;margin-bottom:8px";
  AREAS.forEach(function(a){
    var already=top3.some(function(t){return t.id===a.id;});
    if(!already){var opt=document.createElement("option");opt.value=a.id;opt.textContent=a.nombre+" ("+String(S.checkin30[a.id]||S.diagnostico[a.id]||1)+"/10)";selArea.appendChild(opt);}
  });
  cmas.appendChild(selArea);
  var btnMas=mk("button","bs","Agregar esta \u00e1rea");
  btnMas.onclick=function(){
    var aId=selArea.value;
    var found=AREAS.find(function(a){return a.id===aId;});
    if(!found||top3.some(function(t){return t.id===aId;}))return;
    top3.push(found);
    var tab2=mk("button","tab",found.nombre.split(" ")[0]+" \u2014 "+String(S.diagnostico[found.id]||1)+"/10");
    tab2.onclick=function(){
      activeArea=found.id;tabsDiv.querySelectorAll(".tab").forEach(function(t){t.className="tab";});
      tab2.className="tab on";document.querySelectorAll(".meta-content").forEach(function(mc){mc.style.display="none";});
      var mc2=ge("meta-"+found.id);if(mc2)mc2.style.display="block";
    };
    tabsDiv.appendChild(tab2);
    // Crear el meta-content para esta area
    if(!ge("meta-"+found.id)){
      var mc3=mk("div","meta-content");mc3.id="meta-"+found.id;mc3.style.display="none";
      if(!S.metas[found.id])S.metas[found.id]={meta:"",accion:"",fecha:"",indicador:""};
      var m2=S.metas[found.id];
      var dot3=mk("div");dot3.style.cssText="width:8px;height:8px;border-radius:50%;background:"+found.color+";display:inline-block;margin-right:7px";mc3.appendChild(dot3);
      var nomL=mk("span");nomL.style.cssText="font-size:var(--t-body);font-weight:500;color:"+found.color;nomL.textContent=found.nombre;mc3.appendChild(nomL);mc3.appendChild(mk("div",null,"\u00a0"));
      [{k:"meta",l:"\u00bfQu\u00e9 quieres lograr en 90 d\u00edas?",ph:"Resultado concreto y medible.",rows:3},{k:"indicador",l:"Indicador de \u00e9xito",ph:"\u00bfC\u00f3mo sabr\u00e1s que lo lograste?",rows:2},{k:"accion",l:"Acci\u00f3n semanal",ph:"La acci\u00f3n que sostiene la meta cada semana.",rows:2},{k:"fecha",l:"Fecha l\u00edmite",ph:"Fecha exacta de revisi\u00f3n...",rows:1}].forEach(function(item){
        var wr2=mk("div");wr2.style.marginBottom="9px";
        var lb2=mk("label");lb2.style.cssText="font-size:var(--t-h2);letter-spacing:.12em;text-transform:uppercase;display:block;font-weight:500;margin-bottom:5px";lb2.style.color=found.color;lb2.textContent=item.l;wr2.appendChild(lb2);
        var ta2=document.createElement("textarea");ta2.className="rta";ta2.style.minHeight=(item.rows*24+20)+"px";ta2.placeholder=item.ph;ta2.value=m2[item.k]||"";
        ta2.oninput=(function(aId2,k2){return function(){if(!S.metas[aId2])S.metas[aId2]={};S.metas[aId2][k2]=this.value;};})(found.id,item.k);
        wr2.appendChild(ta2);mc3.appendChild(wr2);

  p.appendChild(ctabs);

  var nav=mk("div","nav");
  var pb2=mk("button","bn","Anterior");pb2.onclick=function(){irA(4);};
  var pn=mk("button","bp","Ver mi crecimiento");pn.onclick=function(){bCrecimiento();irA(6);};
  nav.appendChild(pb2);nav.appendChild(pn);p.appendChild(nav);
}

// ── P6: CRECIMIENTO ──────────────────────────────────────────
function bCrecimiento(){
  var p=ge("p6");p.innerHTML="";
  var badge=mk("div","pbadge");badge.appendChild(mk("div","pbadge-q","Mi crecimiento"));p.appendChild(badge);
  var ph=mk("div","ph");
  ph.appendChild(mk("div","ph-t","Tu evoluci\u00f3n en el tiempo, "+S.nombre));
  ph.appendChild(mk("div","ph-d","La comparaci\u00f3n honesta entre d\u00f3nde empezaste y d\u00f3nde est\u00e1s."));
  p.appendChild(ph);dmsg(p);

  var hasCheckin=Object.keys(S.checkin30).length>0;
  var scores2=hasCheckin?S.checkin30:S.diagnostico;
  var total1=0,total2=0;
  AREAS.forEach(function(a){total1+=S.diagnostico[a.id]||1;total2+=scores2[a.id]||1;});
  var prom1=Math.round(total1/12*10)/10,prom2=Math.round(total2/12*10)/10;
  var delta=Math.round((prom2-prom1)*10)/10;

  var cstat=mk("div","card gold");cstat.style.padding="14px 16px";
  var statrow=mk("div");statrow.style.cssText="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px";
  [{l:"Diagn\u00f3stico inicial",v:prom1+"/10",c:"var(--dim)"},{l:hasCheckin?"Check-in 30 d\u00edas":"Actual",v:prom2+"/10",c:"var(--gold2)"},{l:"Tu crecimiento",v:(delta>=0?"+":"")+delta+" pts",c:delta>=0?"var(--grn)":"#BF4A4A"}].forEach(function(item){
    var s=mk("div");s.style.cssText="background:var(--bg4);border-radius:var(--r);padding:10px;text-align:center";
    var sn=mk("div");sn.style.cssText="font-family:var(--serif);font-size:var(--t-h2);font-weight:300;line-height:1;margin-bottom:3px";sn.style.color=item.c;sn.textContent=item.v;
    var sl2=mk("div");sl2.style.cssText="font-size:var(--t-h2);color:var(--dim);letter-spacing:.06em;text-transform:uppercase";sl2.textContent=item.l;
    s.appendChild(sn);s.appendChild(sl2);statrow.appendChild(s);
  });
  cstat.appendChild(statrow);

  // Ruedas comparativas
  var doble=mk("div");doble.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px";
  [{tit:"Diagn\u00f3stico inicial",sc:S.diagnostico},{tit:hasCheckin?"Check-in 30 d\u00edas":"Estado actual",sc:scores2}].forEach(function(item){
    var wrap=mk("div");
    var t=mk("div");t.style.cssText="font-size:var(--t-h2);letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:5px;text-align:center";t.textContent=item.tit;
    var rw=mk("div","rueda-wrap");rw.innerHTML=buildRuedaSVG(item.sc,200);
    wrap.appendChild(t);wrap.appendChild(rw);doble.appendChild(wrap);
  });
  cstat.appendChild(doble);p.appendChild(cstat);

  // Comparacion area por area
  var ccomp=mk("div","card");ccomp.appendChild(mk("div","cl","Comparaci\u00f3n \u00e1rea por \u00e1rea"));
  AREAS.forEach(function(a){
    var v1=S.diagnostico[a.id]||1,v2=scores2[a.id]||1,dv=v2-v1;
    var row=mk("div","comp-row");
    var dot=mk("div");dot.style.cssText="width:8px;height:8px;border-radius:50%;background:"+a.color+";flex-shrink:0";
    var nom=mk("div");nom.style.cssText="font-size:var(--t-h2);flex:1;min-width:0";nom.textContent=a.nombre.split(" ")[0];
    var bars=mk("div","comp-bars");
    [{v:v1,c:"rgba(255,255,255,0.2)"},{v:v2,c:a.color}].forEach(function(b){
      var brow=mk("div");brow.style.cssText="display:flex;align-items:center;gap:5px";
      var bar=mk("div","comp-bar");bar.style.cssText="height:5px;border-radius:3px;background:"+b.c+";width:"+Math.round(b.v/10*100)+"%";
      var val=mk("div","comp-val",b.v+"/10");brow.appendChild(bar);brow.appendChild(val);bars.appendChild(brow);
    });
    var delt=mk("div","comp-delta",(dv>=0?"+":"")+dv);delt.style.color=dv>0?"var(--grn)":dv<0?"#BF4A4A":"var(--dim)";
    row.appendChild(dot);row.appendChild(nom);row.appendChild(bars);row.appendChild(delt);ccomp.appendChild(row);
  });
  p.appendChild(ccomp);

  // Metas resumen
  var metasContenido=Object.keys(S.metas).filter(function(k){return S.metas[k]&&S.metas[k].meta;});
  if(metasContenido.length){
    var cmetas=mk("div","card acc");cmetas.appendChild(mk("div","cl b","Tus metas de 90 d\u00edas"));
    metasContenido.forEach(function(aId){
      var a=AREAS.find(function(ar){return ar.id===aId;});if(!a)return;
      var m=S.metas[aId];
      var blk=mk("div");blk.style.cssText="background:var(--bg4);border-radius:var(--rm);padding:11px 13px;margin-bottom:8px;border-left:3px solid "+a.color;
      var t=mk("div");t.style.cssText="font-size:var(--t-h2);font-weight:500;margin-bottom:4px";t.style.color=a.color;t.textContent=a.nombre;blk.appendChild(t);
      if(m.meta){var md=mk("div","ct");md.textContent=m.meta;blk.appendChild(md);}
      if(m.indicador){var mi=mk("div");mi.style.cssText="font-size:var(--t-h2);color:var(--dim);margin-top:4px";mi.textContent="\u00c9xito: "+m.indicador;blk.appendChild(mi);}
      if(m.accion){var ma=mk("div");ma.style.cssText="font-size:var(--t-h2);color:var(--acc);margin-top:3px";ma.textContent="Semanal: "+m.accion;blk.appendChild(ma);}
      if(m.fecha){var mf=mk("div");mf.style.cssText="font-size:var(--t-h2);color:var(--gold);margin-top:3px";mf.textContent="Fecha: "+m.fecha;blk.appendChild(mf);}
      cmetas.appendChild(blk);
    });
    p.appendChild(cmetas);
  }

  var cierre=mk("div");cierre.style.cssText="background:linear-gradient(135deg,rgba(155,127,212,.1),rgba(201,168,76,.07));border:1px solid var(--pub);border-radius:var(--rl);padding:22px 18px;margin-top:14px;text-align:center";
  var ctCierre=mk("div");ctCierre.style.cssText="font-family:var(--serif);font-size:var(--t-h2);color:var(--gold2);margin-bottom:9px;font-style:italic;line-height:1.4";
  ctCierre.textContent="Lo que mediste no es un resultado final \u2014 es el comienzo de la siguiente vuelta de la rueda.";
  cierre.appendChild(ctCierre);
  cierre.appendChild(mk("div","ct","Cada 90 d\u00edas, vuelve. Revisa. Ajusta. La vida plena no es un destino \u2014 es una forma de caminar con consciencia."));
  p.appendChild(cierre);

  var nav=mk("div","nav");var pb2=mk("button","bn","Anterior");pb2.onclick=function(){irA(5);};var ps=mk("button","bs","Revisar desde el inicio");ps.style.opacity=".5";ps.onclick=function(){irA(0);};nav.appendChild(pb2);nav.appendChild(ps);p.appendChild(nav);
}
