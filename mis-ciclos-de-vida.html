<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Ciclos de Vida · ∀normal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0F1E;--bg2:#0E1525;--bg3:#131D30;--bg4:#1A2640;
--gold:#C9A84C;--gold2:#E8C96A;--gold3:#F5E0A0;
--gd:rgba(201,168,76,.13);--gb:rgba(201,168,76,.28);
--text:#EAE6DC;--dim:#8A95A8;--faint:#3A4558;
--acc:#4A9EBF;--acd:rgba(74,158,191,.13);--acb:rgba(74,158,191,.28);
--grn:#4ABF7A;--grd:rgba(74,191,122,.12);--grb:rgba(74,191,122,.28);
--red:#BF6A4A;--rdd:rgba(191,106,74,.12);--rdb:rgba(191,106,74,.28);
--pur:#9B7FD4;--pud:rgba(155,127,212,.12);--pub:rgba(155,127,212,.28);
--r:4px;--rm:8px;--rl:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Barlow",sans-serif;font-weight:300;font-size:15px;line-height:1.65;min-height:100vh}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(201,168,76,.04),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(74,158,191,.04),transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:740px;margin:0 auto;padding:0 22px 80px}
.prog{display:flex;align-items:center;margin-bottom:32px;overflow-x:auto;padding-bottom:3px}
.ps{display:flex;align-items:center;gap:6px;white-space:nowrap;padding:3px 0;cursor:default}
.ps.done{cursor:pointer}
.pn{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;border:1px solid var(--faint);color:var(--faint);transition:all .3s;flex-shrink:0}
.ps.done .pn{border-color:var(--gold);color:var(--gold);background:var(--gd)}
.ps.act .pn{border-color:var(--gold2);color:var(--bg);background:var(--gold2)}
.ptxt{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);transition:color .3s}
.ps.done .ptxt,.ps.act .ptxt{color:var(--gold)}
.pln{flex:1;min-width:10px;height:1px;background:var(--faint);margin:0 6px;opacity:.2}
.pln.done{background:var(--gold);opacity:.4}
.panel{display:none}.panel.act{display:block;animation:fu .4s ease}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.pbadge{display:inline-flex;align-items:center;gap:8px;background:var(--gd);border:1px solid var(--gb);border-radius:var(--rl);padding:7px 15px;margin-bottom:18px}
.pbadge-q{font-family:"Cormorant Garamond",serif;font-size:20px;color:var(--gold2);font-weight:300;font-style:italic}
.pbadge-s{font-size:11px;color:var(--dim);margin-top:1px}
.ph{margin-bottom:24px}
.ph-s{font-family:"Barlow Condensed",sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.ph-t{font-family:"Cormorant Garamond",serif;font-size:clamp(20px,4vw,30px);font-weight:300;color:var(--gold2);line-height:1.15;margin-bottom:5px}
.ph-d{font-size:13px;color:var(--dim);line-height:1.8;max-width:520px}
.card{background:var(--bg2);border:1px solid rgba(255,255,255,.055);border-radius:var(--rl);padding:20px 24px;margin-bottom:13px}
.card.gold{border-color:var(--gb);background:linear-gradient(135deg,var(--bg2),var(--bg3))}
.card.acc{border-color:var(--acb)}
.card.pur{border-color:var(--pub);background:linear-gradient(135deg,var(--bg2),rgba(155,127,212,.04))}
.card.red{border-color:var(--rdb);background:linear-gradient(135deg,var(--bg2),rgba(191,106,74,.04))}
.card.grn{border-color:var(--grb)}
.cl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:10px}
.cl.b{color:var(--acc)}.cl.p{color:var(--pur)}.cl.r{color:#E09070}.cl.g{color:var(--grn)}
.ct{font-size:13px;color:var(--dim);line-height:1.8}
.dv{height:1px;background:var(--gb);margin:16px 0;opacity:.3}
.il{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;display:block}
.inp{background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:"Barlow",sans-serif;font-size:15px;font-weight:300;padding:10px 14px;width:100%;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--faint)}
.irow{display:flex;gap:10px;flex-wrap:wrap}
.bp{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border:none;border-radius:var(--r);font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;padding:12px 28px;cursor:pointer;transition:opacity .2s,transform .15s}
.bp:hover{opacity:.9;transform:translateY(-1px)}
.bs{background:transparent;color:var(--gold);border:1px solid var(--gb);border-radius:var(--r);font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:9px 20px;cursor:pointer;transition:all .2s}
.bs:hover{background:var(--gd)}
.bn{background:transparent;color:var(--dim);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);font-family:"Barlow",sans-serif;font-size:13px;padding:9px 18px;cursor:pointer;transition:all .2s}
.bn:hover{border-color:var(--gold);color:var(--gold)}
.tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;margin:2px 2px 2px 0}
.tg{background:var(--gd);color:var(--gold2);border:1px solid var(--gb)}
.tb{background:var(--acd);color:var(--acc);border:1px solid var(--acb)}
.tgr{background:var(--grd);color:var(--grn);border:1px solid var(--grb)}
.tr{background:var(--rdd);color:#E09070;border:1px solid var(--rdb)}
.tp{background:var(--pud);color:var(--pur);border:1px solid var(--pub)}
/* Grilla septenios */
.sept-grid{margin:16px 0}
.sept-fila{display:flex;gap:5px;margin-bottom:5px}
.sept-fila-label{font-size:9px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);width:62px;flex-shrink:0;text-align:right;padding-right:8px;padding-top:18px;line-height:1.3}
.sept-cell{flex:1;min-height:60px;border-radius:var(--rm);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .22s;border:1.5px solid;padding:6px 3px;text-align:center}
.sept-cell:hover{transform:translateY(-3px)}
.sept-cell.actual{border-width:2.5px}
.sept-cell.pasado{opacity:.8}
.sept-cell.futuro{opacity:.4}
.sc-n{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:300;line-height:1}
.sc-e{font-size:9px;opacity:.7;font-family:"Barlow Condensed",sans-serif;margin-top:2px}
.tipo-cuerpo{background:rgba(74,191,122,.1);border-color:rgba(74,191,122,.3);color:var(--grn)}
.tipo-sentir{background:rgba(155,127,212,.1);border-color:rgba(155,127,212,.3);color:var(--pur)}
.tipo-ser{background:rgba(74,158,191,.1);border-color:rgba(74,158,191,.3);color:var(--acc)}
/* Panel expandido */
.ciclo-det{background:var(--bg3);border-radius:var(--rl);padding:24px;margin:8px 0 13px;display:none;animation:fu .3s ease;border:1px solid var(--gb)}
.ciclo-det.open{display:block}
/* Género & pareja */
.opt-btns{display:flex;gap:8px;flex-wrap:wrap}
.opt-btn{flex:1;min-width:80px;padding:10px;border-radius:var(--r);font-family:"Barlow",sans-serif;font-size:13px;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:var(--bg3);color:var(--dim);transition:all .2s;text-align:center}
.opt-btn.on-grn{background:var(--grd);border-color:var(--grb);color:var(--grn)}
.opt-btn.on-pur{background:var(--pud);border-color:var(--pub);color:var(--pur)}
.opt-btn.on-acc{background:var(--acd);border-color:var(--acb);color:var(--acc)}
.opt-btn.on-gold{background:var(--gd);border-color:var(--gb);color:var(--gold2)}
/* Patrón */
.pat-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin:10px 0}
.pat-cell{border-radius:var(--r);padding:7px 12px;border:1px solid;display:flex;flex-direction:column;align-items:center;min-width:52px;font-family:"Cormorant Garamond",serif;font-size:18px;font-weight:300}
.pat-or{border-color:var(--rdb);color:#E09070;background:var(--rdd)}
.pat-ac{border-color:var(--gold2);color:var(--gold2);background:var(--gd);border-width:2px}
.pat-ar{color:var(--faint);font-size:16px}
.pat-l{font-size:9px;color:var(--faint);margin-top:2px;font-family:"Barlow",sans-serif}
/* Dolor checklist */
.dc{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer}
.dc:last-child{border-bottom:none}
.dcb{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--faint);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.dc.on .dcb{background:var(--red);border-color:var(--red)}
.dc.on .dcb::after{content:"\2713";font-size:11px;color:var(--bg);font-weight:600}
.dc-t{font-size:13px;color:var(--text);font-weight:400;margin-bottom:1px}
.dc-d{font-size:12px;color:var(--dim);line-height:1.5}
/* Alerta de cuidado */
.alerta-cuidado{background:rgba(155,127,212,.08);border:1px solid var(--pub);border-radius:var(--rm);padding:14px 16px;margin:10px 0;display:none}
.alerta-cuidado.show{display:block}
/* Pregunta */
.preg{background:var(--bg4);border-radius:var(--rm);padding:14px 16px;margin-bottom:10px}
.preg-n{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;font-weight:500}
.preg-t{font-size:13px;color:var(--text);font-weight:400;margin-bottom:6px;line-height:1.65}
.preg-h{font-size:12px;color:var(--dim);line-height:1.55;margin-bottom:8px}
.rta{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);color:var(--text);font-family:"Barlow",sans-serif;font-size:13px;font-weight:300;padding:10px 12px;width:100%;min-height:68px;outline:none;resize:vertical;line-height:1.65;transition:border-color .2s}
.rta:focus{border-color:var(--gold)}
.rta::placeholder{color:var(--faint)}
/* Reto */
.rr{background:var(--bg4);border:1px solid var(--gb);border-radius:var(--rm);padding:14px 16px;margin:9px 0}
.rr-l{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;font-weight:500}
.rr.b{border-color:var(--acb)}.rr.b .rr-l{color:var(--acc)}
.rr.p{border-color:var(--pub)}.rr.p .rr-l{color:var(--pur)}
.rr p{font-size:13px;color:var(--dim);line-height:1.75;margin-bottom:8px}
.rchk{display:flex;align-items:center;gap:8px;margin-top:7px;cursor:pointer}
.rchk input{width:15px;height:15px;accent-color:var(--gold);cursor:pointer}
.rchk label{font-size:12px;color:var(--dim);cursor:pointer}
.rdone{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--grn);padding:3px 9px;background:var(--grd);border:1px solid var(--grb);border-radius:12px;margin-top:5px}
.dmsg{background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(74,158,191,.05));border:1px solid var(--gb);border-radius:var(--rl);padding:15px 20px;margin-bottom:14px;text-align:center}
.dm-l{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.dm-t{font-family:"Cormorant Garamond",serif;font-size:15px;font-style:italic;color:var(--gold3);line-height:1.8}
.cierre{background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--gb);border-radius:var(--rl);padding:20px 24px;margin-top:18px;text-align:center}
.cierre-t{font-family:"Cormorant Garamond",serif;font-size:18px;color:var(--gold2);margin-bottom:8px;font-style:italic}
.cierre p{font-size:13px;color:var(--dim);line-height:1.75;max-width:460px;margin:0 auto}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:15px;border-top:1px solid rgba(255,255,255,.05)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gb);border-radius:2px}
@media(max-width:560px){.app{padding:0 14px 60px}.sept-fila-label{width:44px}}



/* VIDEO BANNER */
.vid-banner{background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(74,158,191,.04));border:1px solid rgba(201,168,76,.2);border-radius:14px;overflow:hidden;margin:0 22px 20px;display:none}
.vid-banner.show{display:block}
.vid-banner-hdr{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between}
.vid-banner-lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#C9A84C;font-weight:500;font-family:Barlow Condensed,sans-serif}
.vid-banner-mod{font-size:11px;color:#8A95A8}
.vid-banner-player{position:relative;width:100%;aspect-ratio:16/9;background:#060A14}
.vid-banner-player iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.vid-banner-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;padding:20px}
.vid-ph-icon{width:44px;height:44px;border-radius:50%;background:rgba(201,168,76,.13);border:1.5px solid rgba(201,168,76,.28);display:flex;align-items:center;justify-content:center;font-size:16px;color:#E8C96A}
.vid-ph-t{font-family:Cormorant Garamond,serif;font-size:15px;color:#E8C96A;font-weight:300}
.vid-ph-d{font-size:11px;color:#3A4558;line-height:1.55;max-width:240px}
@media(max-width:560px){.vid-banner{margin:0 14px 16px}}


/* BOTON BRUJULA */
.brujula-btn-fixed{position:fixed;bottom:22px;right:22px;z-index:500;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.brujula-btn{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.08));border:1px solid rgba(201,168,76,.35);border-radius:30px;padding:10px 16px;cursor:pointer;transition:all .25s;text-decoration:none;backdrop-filter:blur(8px)}
.brujula-btn:hover{background:linear-gradient(135deg,rgba(201,168,76,.25),rgba(201,168,76,.15));border-color:rgba(201,168,76,.6);transform:translateY(-2px)}
.brujula-btn-icon{font-family:"Cormorant Garamond",serif;font-size:18px;color:var(--gold2);font-weight:300;line-height:1}
.brujula-btn-txt{font-size:11px;font-family:"Barlow Condensed",sans-serif;letter-spacing:.14em;text-transform:uppercase;color:var(--gold2);font-weight:500}
.brujula-toast{background:var(--bg3);border:1px solid var(--gb);border-radius:var(--rm,10px);padding:9px 14px;font-size:12px;color:var(--gold3);font-family:"Barlow",sans-serif;max-width:220px;text-align:right;line-height:1.5;display:none;animation:btoast .3s ease}
.brujula-toast.show{display:block}
@keyframes btoast{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}


/* CHECKLIST CICLOS */
.ciclo-checklist{background:var(--bg3);border-radius:var(--rl);padding:16px 18px;margin:12px 0;border:1px solid rgba(255,255,255,.07)}
.ciclo-checklist-titulo{font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:500;margin-bottom:10px;font-family:"Barlow Condensed",sans-serif}
.ciclo-check-grupo{margin-bottom:12px}
.ciclo-check-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:6px;font-weight:500}
.ciclo-check-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer}
.ciclo-check-item:last-child{border-bottom:none}
.ciclo-chk{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--faint);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:2px}
.ciclo-chk.on{background:var(--grn);border-color:var(--grn)}
.ciclo-check-txt{font-size:12px;color:var(--dim);flex:1;line-height:1.5;transition:color .2s}
.ciclo-check-item:hover .ciclo-check-txt{color:var(--text)}
.ciclo-check-item.marcado .ciclo-check-txt{color:var(--text)}
.ecg-conexion-blk{background:linear-gradient(135deg,rgba(212,83,126,.08),rgba(155,127,212,.06));border:1px solid rgba(212,83,126,.25);border-radius:var(--rm);padding:12px 15px;margin-top:10px}
.ecg-conexion-lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#D4537E;font-weight:500;margin-bottom:5px;font-family:"Barlow Condensed",sans-serif}
.ecg-conexion-txt{font-size:12px;color:var(--text);line-height:1.65}
.ecg-btn{display:inline-flex;align-items:center;gap:6px;margin-top:9px;padding:7px 14px;border-radius:20px;background:rgba(212,83,126,.1);border:1px solid rgba(212,83,126,.3);cursor:pointer;text-decoration:none;transition:all .2s}
.ecg-btn:hover{background:rgba(212,83,126,.2)}
.ecg-btn-txt{font-size:11px;color:#D4537E;font-family:"Barlow Condensed",sans-serif;font-weight:500;letter-spacing:.1em;text-transform:uppercase}
.checklist-resumen{background:var(--bg4);border-radius:var(--rm);padding:10px 13px;margin-top:10px;font-size:12px;color:var(--dim)}
.checklist-resumen strong{color:var(--gold3)}

</style>
</head>
<body>

<!-- VIDEO BANNER: Ciclos de Vida -->
<div class="vid-banner" id="vid-banner-septenios">
  <div class="vid-banner-hdr">
    <div class="vid-banner-lbl">Introducción al módulo</div>
    <div class="vid-banner-mod">Ciclos de Vida</div>
  </div>
  <div class="vid-banner-player" id="vid-player-septenios">
    <div class="vid-banner-ph">
      <div class="vid-ph-icon">&#9654;</div>
      <div class="vid-ph-t">Video de introducción</div>
      <div class="vid-ph-d">Alonso te explica lo que encontrarás en este módulo y cómo aprovecharlo al máximo.</div>
    </div>
  </div>
</div>
<div class="app" id="app"></div>
<script>

// ============================================================
// WIDGET DE PRINCIPIOS Y COMPROMISOS - Anormal / Cafe con Proposito
// v2.0 - Con recordatorio no negociable y orden original de principios
// ============================================================

var MODULO_PRINCIPIOS = {"bienvenida":[1,4,14],"rueda":[11,12],"elementos":[11,12],"camino":[5,9],"subnums":[5],"mapa":[9],"flechas":[9],"nombre":[5,9],"personas":[9,13],"dolan":[12,13],"perfil":[9],"septenios":[3,16],"ecg":[2,10],"nino":[2,3,7],"ikigai":[6,8,17],"ciclo":[15,16],"plan":[13,15,16],"dashboard":[18,9]};

cio real. Identificarlo aqu\u00ed y aceptarlo es el acto de honestidad que hace que el plan de vida funcione."}, {"num": 9, "titulo": "\u2200sume responsabilidad total", "sesion": "sesion2", "color": "#9B7FD4", "no_negociable": "Lo que tu numerolog\u00eda y tus valores revelan no es un destino fijo. Es un mapa. T\u00fa decides c\u00f3mo usarlo. Eso es responsabilidad total."}, {"num": 10, "titulo": "\u2200poyo emocional como combustible", "sesion": "sesion3", "color": "#D4537E", "no_negociable": "El dolor emocional que emerge en esta sesi\u00f3n no es un obst\u00e1culo. Es combustible. La intensidad que sientes es proporcional a la transformaci\u00f3n que viene."}, {"num": 11, "titulo": "\u2200palancamiento: la verdad contigo mismo", "sesion": "sesion1", "color": "#C9A84C", "no_negociable": "El diagn\u00f3stico solo funciona si eres brutalmente honesto. El n\u00famero que le das a cada \u00e1rea de tu vida debe reflejar la realidad, no c\u00f3mo quisieras que fuera."}, {"num": 12, "titulo": "\u2200doptas lo que toleras", "sesion": "sesion1", "color": "#C9A84C", "no_negociable": "Las \u00e1reas con calificaci\u00f3n baja son exactamente lo que has estado tolerando. Verlo sin juzgarte es el primer paso. Seguir toler\u00e1ndolo despu\u00e9s de verlo es la excusa."}, {"num": 13, "titulo": "\u2200pr\u00f3piate la insatisfacci\u00f3n", "sesion": "sesion2", "color": "#9B7FD4", "no_negociable": "La brecha entre tus valores declarados y los que realmente vives no es una falla \u2014 es informaci\u00f3n. Usa esa insatisfacci\u00f3n como motor, no como excusa."}, {"num": 14, "titulo": "\u2200dopta m\u00e9todos probados", "sesion": "bienvenida", "color": "#C9A84C", "no_negociable": "Esta plataforma integra metodolog\u00edas con d\u00e9cadas de validaci\u00f3n. Tu trabajo es aplicarlas con honestidad, no cuestionarlas antes de vivirlas."}, {"num": 15, "titulo": "\u2200lcanza el resultado, luego mejora", "sesion": "sesion5", "color": "#4ABF7A", "no_negociable": "Tu plan de vida no necesita ser perfecto para empezar. Necesita ser tuyo y necesita empezar. La acci\u00f3n imperfecta ejecutada vale m\u00e1s que el plan perfecto que nunca sale."}, {"num": 16, "titulo": "\u2200celera el proceso", "sesion": "sesion5", "color": "#4ABF7A", "no_negociable": "Cada d\u00eda que pasa sin ejecutar el plan es un d\u00eda que no vuelve. La urgencia no es ansiedad \u2014 es el respeto que le tienes a tu propio tiempo."}, {"num": 17, "titulo": "\u2200tenci\u00f3n y enfoque constante", "sesion": "sesion4", "color": "#E8C96A", "no_negociable": "Haz este m\u00f3dulo sin interrupciones. Lo que emerja es proporcional a tu concentraci\u00f3n."}, {"num": 18, "titulo": "\u2200lcanzas la anormalidad", "sesion": "sesion5", "color": "#4ABF7A", "no_negociable": "Completar este proceso te convierte en alguien diferente. Esa diferencia ser\u00e1 visible \u2014 y no todos la aplaudir\u00e1n. Esa resistencia confirma que el proceso funcion\u00f3."}];

      sec.appendChild(aviso);

      var pregunta=document.createElement("div");pregunta.style.cssText="background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:12px 16px;text-align:center";
      pregunta.innerHTML="<span style='font-family:Cormorant Garamond,serif;font-size:16px;color:#E8C96A;font-style:italic'>Una excusa no te saca de la plataforma — te saca de tu máximo potencial.<br>¿Sigues dentro del camino ∀normal?</span>";

      var btnSi=document.createElement("button");btnSi.style.cssText="background:linear-gradient(135deg,#C9A84C,#E8C96A);color:#060A14;border:none;border-radius:4px;font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;padding:11px 26px;cursor:pointer";

    // FASE PRINCIPIOS
    if(paso >= 0 && paso < principiosIds.length){
      var pId=principiosIds[paso];

      sec2.appendChild(numDiv);
      var tit=document.createElement("div");tit.style.cssText="font-family:Cormorant Garamond,serif;font-size:26px;font-weight:300;color:"+pr.color+";margin-bottom:14px;line-height:1.2";tit.textContent=pr.titulo;sec2.appendChild(tit);

      if(pr.no_negociable){
        var nnBlk=document.createElement("div");nnBlk.style.cssText="background:rgba(212,83,126,.07);border:1px solid rgba(212,83,126,.2);border-radius:10px;padding:11px 14px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px";
        var nnIcon=document.createElement("div");nnIcon.style.cssText="font-size:14px;color:#D4537E;flex-shrink:0;margin-top:1px";nnIcon.textContent="!";
        var nnTxt=document.createElement("div");
        var nnLabel=document.createElement("div");nnLabel.style.cssText="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#D4537E;font-weight:500;margin-bottom:4px;font-family:Barlow Condensed,sans-serif";nnLabel.textContent="No negociable";
        var nnCont=document.createElement("div");nnCont.style.cssText="font-size:12px;color:#EAE6DC;line-height:1.65";nnCont.textContent=pr.no_negociable;
        nnTxt.appendChild(nnLabel);nnTxt.appendChild(nnCont);nnBlk.appendChild(nnIcon);nnBlk.appendChild(nnTxt);sec2.appendChild(nnBlk);
      }

      if(pr.aplicacion){
        var aplBlk=document.createElement("div");aplBlk.style.cssText="background:#1A2640;border-radius:10px;padding:12px 14px;border-left:3px solid "+pr.color+";margin-bottom:12px";
        var aplL=document.createElement("div");aplL.style.cssText="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:"+pr.color+";margin-bottom:4px;font-weight:500;font-family:Barlow Condensed,sans-serif";aplL.textContent="En este módulo";
        var aplT=document.createElement("div");aplT.style.cssText="font-size:13px;color:#EAE6DC;line-height:1.65;font-style:italic";aplT.textContent=pr.aplicacion;
        aplBlk.appendChild(aplL);aplBlk.appendChild(aplT);sec2.appendChild(aplBlk);

      body.appendChild(sec2);

      var btnP=paso>0?document.createElement("button"):document.createElement("span");

      ftr.appendChild(btnP);

      btnN2.textContent=paso<principiosIds.length-1?"Siguiente principio":"Mis compromisos";
      btnN2.onclick=function(){paso++;showPaso();};ftr.appendChild(btnN2);
      return;

    // FASE COMPROMISOS
    var sec3=document.createElement("div");sec3.style.cssText="padding:20px 0";
    var ct=document.createElement("div");ct.style.cssText="font-family:Cormorant Garamond,serif;font-size:22px;color:#E8C96A;margin-bottom:6px;font-weight:300";ct.textContent="Mis compromisos para este módulo";sec3.appendChild(ct);
    var cs=document.createElement("div");cs.style.cssText="font-size:13px;color:#8A95A8;margin-bottom:18px;line-height:1.65";cs.textContent="Los principios te dieron el marco. Ahora escribe qué harás diferente a partir de hoy en este módulo.";sec3.appendChild(cs);
    principiosIds.forEach(function(pId2){
      var pr2=PRINCIPIOS_DB.find(function(p2){return p2.num===pId2;});if(!pr2)return;
      var blk=document.createElement("div");blk.style.cssText="margin-bottom:14px;background:#131D30;border-radius:10px;padding:13px 15px;border-left:3px solid "+pr2.color;
      var bt=document.createElement("div");bt.style.cssText="font-size:11px;font-weight:500;color:"+pr2.color+";margin-bottom:6px;letter-spacing:.08em;text-transform:uppercase;font-family:Barlow Condensed,sans-serif";bt.textContent="∀"+pr2.num+" · "+pr2.titulo;blk.appendChild(bt);
      var ta=document.createElement("textarea");ta.style.cssText="background:#0A0F1E;border:1px solid rgba(255,255,255,.07);border-radius:6px;color:#EAE6DC;font-family:Barlow,sans-serif;font-size:13px;padding:9px 12px;width:100%;min-height:70px;outline:none;resize:vertical;line-height:1.6;transition:border-color .2s";
      ta.placeholder="Describe qué cambiarás o harás diferente a partir de hoy...";ta.value=compromisos_mod["p"+pId2]||"";
      ta.onfocus=function(){this.style.borderColor=pr2.color;};ta.onblur=function(){this.style.borderColor="rgba(255,255,255,.07)";};

    body.appendChild(sec3);

    var btnB2=document.createElement("button");btnB2.style.cssText="background:transparent;color:#3A4558;border:1px solid #1E2A3A;border-radius:4px;font-family:Barlow,sans-serif;font-size:13px;padding:9px 16px;cursor:pointer";btnB2.textContent="Revisar";btnB2.onclick=function(){paso--;showPaso();};ftr.appendChild(btnB2);
    var btnFin=document.createElement("button");btnFin.style.cssText="background:linear-gradient(135deg,#C9A84C,#E8C96A);color:#060A14;border:none;border-radius:4px;font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;padding:11px 26px;cursor:pointer";
    btnFin.textContent="Comenzar el módulo";

window.guardarCompromisosModulo = function(moduloId, compromisos){
  if(!window.COMPROMISOS_PROCESO)window.COMPROMISOS_PROCESO={};
  window.COMPROMISOS_PROCESO[moduloId]=compromisos;
};

<script>
// ============================================================
// ANORMAL - Módulo de datos compartidos entre módulos
// Usa sessionStorage para pasar datos entre páginas HTML
// ============================================================

var ANORMAL = {
  
  // Leer todos los datos del proceso
  getData: function() {
    try {
      var raw = sessionStorage.getItem('anormal_proceso');
      return raw ? JSON.parse(raw) : {};
    } catch(e) { return {}; }
  },
  
  // Guardar datos del proceso
  setData: function(data) {
    try {
      sessionStorage.setItem('anormal_proceso', JSON.stringify(data));
    } catch(e) {}
  },
  
  // Actualizar una sección específica
  update: function(section, value) {
    var data = this.getData();
    data[section] = value;
    this.setData(data);
  },
  
  // Agregar un compromiso/hábito a la agenda central
  addAgenda: function(item) {
    // item = {modulo, titulo, descripcion, fecha, periodicidad, tipo}
    var data = this.getData();
    if (!data.agenda) data.agenda = [];
    item.id = 'ag_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    item.cumplido = false;
    item.fechaCreacion = new Date().toLocaleDateString('es-CO');
    data.agenda.push(item);
    this.setData(data);
    return item.id;
  },
  
  // Guardar lo marcado en septenios para que fluya al ECG y al Niño Interior
  saveSeptenios: function(checklistEstado, cicloActual, nombre, genero) {
    var doloresPorCiclo = [];
    
    Object.keys(checklistEstado).forEach(function(chkKey) {
      var est = checklistEstado[chkKey];
      if (!est || !est.dolor || !est.dolor.length) return;
      
      // Extraer número de ciclo del key ('chk-3' -> 3, 'actual-5' -> 5)
      var cicloNum = 0;
      if (chkKey.startsWith('chk-')) cicloNum = parseInt(chkKey.replace('chk-',''));
      else if (chkKey.startsWith('actual-')) cicloNum = parseInt(chkKey.replace('actual-',''));
      if (!cicloNum) return;
      
      // Obtener los ítems de dolor marcados
      var cicloDatos = window.CICLOS_DATA ? window.CICLOS_DATA[String(cicloNum)] : null;
      if (!cicloDatos) return;
      
      var itemsMarcados = est.dolor.map(function(idx) {
        return cicloDatos.dolor[idx] || '';
      }).filter(Boolean);
      
      var itemsAlegria = (est.alegria || []).map(function(idx) {
        return cicloDatos.alegria[idx] || '';
      }).filter(Boolean);
      
      if (itemsMarcados.length || itemsAlegria.length) {
        doloresPorCiclo.push({
          ciclo: cicloNum,
          tipo: cicloDatos.tipo,
          titulo: cicloDatos.titulo,
          edades: cicloDatos.titulo.match(/\d+ a \d+/)?.[0] || '',
          dolores: itemsMarcados,
          alegrias: itemsAlegria,
          // Preguntas respondidas
          respuestas: [0,1,2].map(function(pi) {
            return checklistEstado[chkKey + '-preg-' + pi] || '';
          }).filter(Boolean)
        });
      }
    });
    
    // Ordenar por ciclo
    doloresPorCiclo.sort(function(a,b){return a.ciclo - b.ciclo;});
    
    this.update('septenios', {
      cicloActual: cicloActual,
      nombre: nombre,
      genero: genero,
      doloresPorCiclo: doloresPorCiclo,
      fecha: new Date().toLocaleDateString('es-CO')
    });
  },
  
  // Obtener datos de septenios para el ECG
  getSepteniosParaECG: function() {
    var data = this.getData();
    return data.septenios || null;
  },
  
  // Obtener ciclos 1-2-3 para el Niño Interior
  getCiclosInfancia: function() {
    var sep = this.getSepteniosParaECG();
    if (!sep) return [];
    return sep.doloresPorCiclo.filter(function(c) {
      return c.ciclo <= 3;
    });
  },
  
  // Guardar compromisos de un módulo en la agenda central
  saveCompromisos: function(moduloId, compromisos) {
    if (!compromisos || !Object.keys(compromisos).length) return;
    var data = this.getData();
    if (!data.agenda) data.agenda = [];
    
    Object.keys(compromisos).forEach(function(key) {
      var texto = (compromisos[key] || '').trim();
      if (!texto) return;
      // Evitar duplicados del mismo módulo+key
      var exists = data.agenda.some(function(item) {
        return item.moduloId === moduloId && item.key === key;
      });
      if (!exists) {
        data.agenda.push({
          id: 'ag_' + moduloId + '_' + key,
          moduloId: moduloId,
          key: key,
          tipo: 'compromiso-principio',
          descripcion: texto,
          fechaCreacion: new Date().toLocaleDateString('es-CO'),
          cumplido: false,
          periodicidad: 'diario'
        });
      }
    });
    this.setData(data);
  }
};

// Sobrescribir guardarCompromisosModulo para que también vaya a la agenda
window.guardarCompromisosModulo = function(moduloId, compromisos) {
  if (!window.COMPROMISOS_PROCESO) window.COMPROMISOS_PROCESO = {};
  window.COMPROMISOS_PROCESO[moduloId] = compromisos;
  ANORMAL.saveCompromisos(moduloId, compromisos);
};

function hexToRgb(hex) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  return r + ',' + g + ',' + b;
}


function procInicio() {
  var dia = parseInt(ge('inDia').value)||0;
  var mes = parseInt(ge('inMes').value)||0;
  var anio = parseInt(ge('inAnio').value)||0;
  var gen = S.genero;
  if (!dia||!mes||!anio) { alert('Por favor ingresa tu fecha de nacimiento completa.'); return; }
  if (!gen) { alert('Por favor selecciona tu g\u00e9nero.'); return; }
  S.dia=dia; S.mes=mes; S.anio=anio;
  var edad = calcCiclo(dia, mes, anio);
  S.cicloActual = edad;
  irA(1);
}

function avanzar() {
  if (S.paso < 3) { S.paso++; irA(S.paso); window.scrollTo({top:0,behavior:'smooth'}); }
}

function retro() {
  if (S.paso > 0) { S.paso--; irA(S.paso); window.scrollTo({top:0,behavior:'smooth'}); }
}

function abrirCiclo(n) {
  var el = document.getElementById('ciclo-det-' + n);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function togDC(key, sensible) {
  var el = document.getElementById('dce-' + key);
  if (!el) return;
  var open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  if (!open && sensible) {
    var alert_el = document.getElementById('alert-' + key);
    if (alert_el) alert_el.style.display = 'block';
  }
}

function selOpt(key, val, btnOn, btnOff, onCls, offCls) {
  S[key] = val;
  var bon = document.getElementById(btnOn);
  var boff = document.getElementById(btnOff);
  if (bon) { bon.className = bon.className.replace(offCls, '').replace(onCls,'') + ' ' + onCls; }
  if (boff) { boff.className = boff.className.replace(onCls, '').replace(offCls,'') + ' ' + offCls; }
}

function uD(key) {
  // Actualizar display despues de cambio de checkbox
  var el = document.getElementById('disp-' + key);
  if (el) el.textContent = S.comp[key] ? '\u2713' : '';
}

function ge(id) { return document.getElementById(id); }

function getTipoCol(t){return TIPO_COL[t]||'var(--gold)';}
function getEst(n,a){return n<a?'pasado':n===a?'actual':'futuro';}

function calcCiclo(dd,mm,aa){
  const hoy=new Date();const nac=new Date(aa,mm-1,dd);
  let ed=hoy.getFullYear()-nac.getFullYear();
  if(hoy.getMonth()<mm-1||(hoy.getMonth()===mm-1&&hoy.getDate()<dd))ed--;
  return{edad:ed,ciclo:Math.min(Math.floor(ed/7)+1,12)};
}

function rrH(key,lbl,txt,cl=''){
  const v=S.reg[key]||'';const done=S.comp[key]||false;
  return`<div class="rr ${cl}"><div class="rr-l">${lbl}</div><p>${txt}</p>
  <textarea class="rta" placeholder="Escribe tu reflexión aquí..." oninput="S.reg['${key}']=this.value">${v}</textarea>
  <div class="rchk"><input type="checkbox" id="c-${key}" ${done?'checked':''} onchange="S.comp['${key}']=this.checked;uD('${key}')">
  <label for="c-${key}">He reflexionado y tengo una acción concreta</label></div>
  ${done?'<div class="rdone">Completado</div>':''}</div>`;
}
window.uD=function(k){const c=document.getElementById('c-'+k);if(!c)return;const p=c.closest('.rr');if(!p)return;const e=p.querySelector('.rdone');if(c.checked&&!e){const d=document.createElement('div');d.className='rdone';d.textContent='Completado';p.appendChild(d);}else if(!c.checked&&e)e.remove();};

    if(i>0){const l=document.createElement('div');l.className='pln'+(i<=paso?' done':'');b.appendChild(l);}
    const s=document.createElement('div');s.className='ps'+(i===paso?' act':i<paso?' done':'');
    s.innerHTML=`<div class="pn">${i<paso?'✓':(i+1)}</div><span class="ptxt">${p.l}</span>`;
    if(i<paso)s.onclick=()=>irA(i);b.appendChild(s);
  });
}
function irA(i){paso=i;rProg();document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('act',j===i));window.scrollTo({top:0,behavior:'smooth'});}
window.avanzar=function(){if(paso<PASOS.length-1){const n=paso+1;if(n===1)bCuadro();if(n===2)bCicloActual();if(n===3)bHistoria();irA(n);}};

    pasados.forEach(function(cp, idx) {

    navWrap.appendChild(navLbl); navWrap.appendChild(navBar);

    // Conexion de repeticion si aplica
    var tiposPorCiclo = {'cuerpo':[1,4,7,10],'sentir':[2,5,8,11],'ser':[3,6,9,12]};
    var repeticionMsg = '';
    var ciclosDelMismoTipo = (tiposPorCiclo[tipoId] || []).filter(function(n){return n < ci.n && n >= 1;});
    if (ciclosDelMismoTipo.length > 0 && act > 3) {
      repeticionMsg = 'Si algo doloroso ocurri\u00f3 en el ciclo ' + ciclosDelMismoTipo.join(' o ') +
        ' y no fue sanado, es probable que se haya repetido o amplificado aqu\u00ed (Ciclo ' + ci.n + ').';

    var blk = document.createElement('div');
    blk.className = 'ciclo-pasado-blk';
    blk.style.cssText = 'background:var(--bg3);border-radius:var(--rm);padding:16px 18px;margin-bottom:12px;border:1px solid ' + tc + '33;border-left:3px solid ' + tc;

    // Header del ciclo

    hdr.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px';
    var hinfo = document.createElement('div');
    var hlbl = document.createElement('div');
    hlbl.style.cssText = 'font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:' + tc + ';margin-bottom:3px;font-weight:500';
    hlbl.textContent = 'Ciclo ' + ci.n + ' \u00b7 ' + (TIPO_LABEL[ci.tipo]||'') + ' \u00b7 ' + ci.edades[0] + '\u2013' + ci.edades[1] + ' a\u00f1os';
    var hnom = document.createElement('div');
    hnom.style.cssText = 'font-family:Cormorant Garamond,serif;font-size:20px;color:var(--gold2);font-style:italic;margin-bottom:4px';
    hnom.textContent = ci.nombre;
    hinfo.appendChild(hlbl); hinfo.appendChild(hnom);
    var hnum = document.createElement('div');
    hnum.style.cssText = 'font-family:Cormorant Garamond,serif;font-size:42px;color:' + tc + ';font-weight:300;line-height:1';
    hnum.textContent = String(ci.n);
    hdr.appendChild(hinfo); hdr.appendChild(hnum); blk.appendChild(hdr);

    // Alerta de repeticion
    if (repeticionMsg) {
      var repBlk = document.createElement('div');
      repBlk.style.cssText = 'background:rgba(201,168,76,.08);border-left:3px solid var(--gold);border-radius:var(--r);padding:9px 12px;margin-bottom:10px';
      var repLbl = document.createElement('div');
      repLbl.style.cssText = 'font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:3px;font-weight:500;font-family:Barlow Condensed,sans-serif';
      repLbl.textContent = '\u26a0 Patr\u00f3n de repetici\u00f3n';
      var repTxt = document.createElement('div');
      repTxt.style.cssText = 'font-size:12px;color:var(--dim);line-height:1.6;font-style:italic';
      repTxt.textContent = repeticionMsg;
      repBlk.appendChild(repLbl); repBlk.appendChild(repTxt); blk.appendChild(repBlk);
    }

    // Descripcion calibrada por genero
    var desc = document.createElement('div'); desc.className = 'ct';
    desc.style.cssText = 'margin-bottom:12px;font-size:12px';
    desc.textContent = genText; blk.appendChild(desc);

    // CHECKLIST
    buildChecklistPasado(tipoId, tc, blk, chkKey, ci.n);

    // Reflexion libre
    var rtaLbl = document.createElement('div');
    rtaLbl.style.cssText = 'font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin:10px 0 5px;font-weight:500';
    rtaLbl.textContent = '\u00bfAlgo m\u00e1s que quieras agregar sobre este ciclo?';
    blk.appendChild(rtaLbl);
    var rta = document.createElement('textarea'); rta.className = 'rta';
    rta.placeholder = 'Reflexiones adicionales, personas involucradas, emociones que recuerdas...';
    rta.value = S.reg[k] || '';
    rta.oninput = (function(kk){return function(){S.reg[kk]=this.value;};})(k);
    blk.appendChild(rta);

    // Checkbox completado
    var rchk = document.createElement('div'); rchk.className = 'rchk'; rchk.style.marginTop = '8px';
    var chkDone = document.createElement('input'); chkDone.type = 'checkbox';
    chkDone.checked = S.comp['hc-'+ci.n] || false;
    chkDone.onchange = (function(nn){return function(){S.comp['hc-'+nn]=this.checked; renderCicloNav();};})(ci.n);
    var lblDone = document.createElement('label');
    lblDone.style.cssText = 'font-size:12px;color:var(--dim);cursor:pointer';
    lblDone.textContent = 'He revisado y reflexionado sobre este ciclo';
    rchk.appendChild(chkDone); rchk.appendChild(lblDone); blk.appendChild(rchk);

    // Botones anterior / siguiente ciclo
    var cicloNav = document.createElement('div');
    cicloNav.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.05)';
    var btnPrevC = document.createElement('button'); btnPrevC.className = 'bn';
    btnPrevC.textContent = cicloActualIdx > 0 ? '\u2190 Ciclo ' + pasados[cicloActualIdx-1].n : '';
    btnPrevC.style.visibility = cicloActualIdx > 0 ? 'visible' : 'hidden';
    btnPrevC.onclick = function(){cicloActualIdx--;renderCicloNav();window.scrollTo({top:0,behavior:'smooth'});};
    var btnNextC = document.createElement('button'); btnNextC.className = 'bp';
    btnNextC.textContent = cicloActualIdx < pasados.length-1 
      ? 'Ciclo ' + pasados[cicloActualIdx+1].n + ' \u2192' 
      : '\u2713 Terminar revisi\u00f3n';
    btnNextC.onclick = function(){
      if(cicloActualIdx < pasados.length-1){cicloActualIdx++;renderCicloNav();window.scrollTo({top:0,behavior:'smooth'});}
      else{window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});}
    };
    cicloNav.appendChild(btnPrevC); cicloNav.appendChild(btnNextC);
    blk.appendChild(cicloNav);

    var ecgRef = p3.querySelector('.ecg-conexion-blk');
    if (ecgRef) {
      p3.insertBefore(navWrap, ecgRef);
      p3.insertBefore(blk, ecgRef);
    } else {
      p3.appendChild(navWrap);
      p3.appendChild(blk);
    }
  }

  renderCicloNav();

  // Conexion ECG
  var ecgBlk = document.createElement('div'); ecgBlk.className = 'ecg-conexion-blk';

  ecgBtn.onclick = function(e) {

        checklist_estado,
        S.cicloActual,
        S.nombre || '',

      );

  ps.onclick = function(){irA(0);};
  nav.appendChild(pb); nav.appendChild(ps); p3.appendChild(nav);
}

// Checklist para ciclos PASADOS — version DOM API
function buildChecklistPasado(tipoId, color, container, chkKey, cicloNum) {
  var cicloKey = String(cicloNum);
  var data = CICLOS_DATA[cicloKey];
  if (!data) {
    // Fallback al tipo si no hay datos especificos
    data = {titulo:'',dolor:[],alegria:[],tarea:'',patron:'',preguntas:[]};
  }

  var wrap = document.createElement('div');
  wrap.className = 'ciclo-checklist';
  wrap.style.borderColor = 'rgba(' + hexToRgb(color) + ',.3)';

  // Titulo
  var tit = document.createElement('div'); tit.className = 'ciclo-checklist-titulo';
  tit.style.color = color;
  tit.textContent = data.titulo || ('Situaciones del Ciclo ' + cicloNum);
  wrap.appendChild(tit);

  // Tarea del ciclo
  if (data.tarea) {
    var tareaBlk = document.createElement('div');
    tareaBlk.style.cssText = 'background:var(--bg4);border-radius:var(--r);padding:9px 12px;margin-bottom:10px;border-left:3px solid ' + color;
    var tareaLbl = document.createElement('div');
    tareaLbl.style.cssText = 'font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:' + color + ';margin-bottom:3px;font-weight:500;font-family:Barlow Condensed,sans-serif';
    tareaLbl.textContent = 'La tarea de este ciclo';
    var tareaTxt = document.createElement('div');
    tareaTxt.style.cssText = 'font-size:12px;color:var(--text);line-height:1.6;font-style:italic';
    tareaTxt.textContent = data.tarea;
    tareaBlk.appendChild(tareaLbl); tareaBlk.appendChild(tareaTxt);
    wrap.appendChild(tareaBlk);
  }

  // Patron de conducta
  if (data.patron) {
    var patronBlk = document.createElement('div');
    patronBlk.style.cssText = 'background:rgba(155,127,212,.08);border-radius:var(--r);padding:9px 12px;margin-bottom:10px;border-left:3px solid var(--pur)';
    var patronLbl = document.createElement('div');
    patronLbl.style.cssText = 'font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--pur);margin-bottom:3px;font-weight:500;font-family:Barlow Condensed,sans-serif';
    patronLbl.textContent = 'Patr\u00f3n frecuente en adultos con heridas en este ciclo';
    var patronTxt = document.createElement('div');
    patronTxt.style.cssText = 'font-size:12px;color:var(--dim);line-height:1.6';
    patronTxt.textContent = data.patron;
    patronBlk.appendChild(patronLbl); patronBlk.appendChild(patronTxt);
    wrap.appendChild(patronBlk);
  }

  var grupos = [
    {key:'dolor', lbl:'Situaciones de dolor \u2014 \u00bfcu\u00e1les viviste en este ciclo?', col:'#BF4A4A', items: data.dolor || []},
    {key:'alegria', lbl:'Situaciones de alegr\u00eda \u2014 \u00bfcu\u00e1les viviste en este ciclo?', col: color, items: data.alegria || []}
  ];

  var resumenEl = document.createElement('div');
  resumenEl.className = 'checklist-resumen';

  grupos.forEach(function(grupo) {
    if (!grupo.items.length) return;
    var gDiv = document.createElement('div'); gDiv.className = 'ciclo-check-grupo';
    var gLbl = document.createElement('div'); gLbl.className = 'ciclo-check-lbl';
    gLbl.style.color = grupo.col; gLbl.textContent = grupo.lbl;
    gDiv.appendChild(gLbl);

    grupo.items.forEach(function(item, idx) {
      var row = document.createElement('div');
      var isOn = (checklist_estado[chkKey] && checklist_estado[chkKey][grupo.key] || []).indexOf(idx) >= 0;
      row.className = 'ciclo-check-item' + (isOn ? ' marcado' : '');

      var chk = document.createElement('div');
      chk.className = 'ciclo-chk' + (isOn ? ' on' : '');
      if (isOn) { var tick = document.createElement('div'); tick.style.cssText = 'width:8px;height:8px;border-radius:50%;background:var(--bg)'; chk.appendChild(tick); }
      var txt = document.createElement('div'); txt.className = 'ciclo-check-txt'; txt.textContent = item;

      var handler = (function(gKey, iIdx, rowEl, chkEl) {
        return function(e) {
          e.stopPropagation();
          if (!checklist_estado[chkKey]) checklist_estado[chkKey] = {dolor:[], alegria:[]};
          if (!checklist_estado[chkKey][gKey]) checklist_estado[chkKey][gKey] = [];
          var arr = checklist_estado[chkKey][gKey];
          var pos = arr.indexOf(iIdx);
          if (pos >= 0) {
            arr.splice(pos, 1);
            rowEl.classList.remove('marcado'); chkEl.classList.remove('on'); chkEl.innerHTML = '';
          } else {
            arr.push(iIdx);
            rowEl.classList.add('marcado'); chkEl.classList.add('on');
            var t2 = document.createElement('div'); t2.style.cssText = 'width:8px;height:8px;border-radius:50%;background:var(--bg)'; chkEl.appendChild(t2);
          }
          updateResumenEl(chkKey, resumenEl);
        };
      })(grupo.key, idx, row, chk);

      chk.onclick = handler;
      row.onclick = function(e) { if (e.target !== chk) handler(e); };
      row.appendChild(chk); row.appendChild(txt); gDiv.appendChild(row);
    });
    wrap.appendChild(gDiv);
  });

  updateResumenEl(chkKey, resumenEl);
  wrap.appendChild(resumenEl);

  // Preguntas especificas del ciclo
  if (data.preguntas && data.preguntas.length) {
    var pregWrap = document.createElement('div');
    pregWrap.style.cssText = 'margin-top:12px;background:var(--bg4);border-radius:var(--rm);padding:12px 14px;border:1px solid rgba(255,255,255,.06)';
    var pregLbl = document.createElement('div');
    pregLbl.style.cssText = 'font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:' + color + ';margin-bottom:8px;font-weight:500;font-family:Barlow Condensed,sans-serif';
    pregLbl.textContent = 'Preguntas para este ciclo';
    pregWrap.appendChild(pregLbl);
    data.preguntas.forEach(function(preg, pi) {
      var pregBlk = document.createElement('div');
      pregBlk.style.cssText = 'margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.04)';
      var pregTxt = document.createElement('div');
      pregTxt.style.cssText = 'font-size:12px;color:var(--gold3);font-style:italic;margin-bottom:5px;line-height:1.6';
      pregTxt.textContent = preg;
      var pregKey = chkKey + '-preg-' + pi;
      var pregRta = document.createElement('textarea'); pregRta.className = 'rta'; pregRta.style.minHeight = '55px';
      pregRta.placeholder = 'Tu respuesta...';
      pregRta.value = checklist_estado[pregKey] || '';
      pregRta.oninput = (function(pk){return function(){checklist_estado[pk]=this.value;};})(pregKey);
      pregBlk.appendChild(pregTxt); pregBlk.appendChild(pregRta);
      pregWrap.appendChild(pregBlk);
    });
    wrap.appendChild(pregWrap);
  }

  // Nota ECG
  var ecgInline = document.createElement('div');
  ecgInline.style.cssText = 'background:rgba(212,83,126,.06);border-radius:var(--rm);padding:9px 12px;margin-top:8px;border-left:3px solid #D4537E';
  var ecgInlineTxt = document.createElement('div');
  ecgInlineTxt.style.cssText = 'font-size:11px;color:#D4537E;line-height:1.6;font-style:italic';
  ecgInlineTxt.textContent = 'Lo que marques aqu\u00ed pasar\u00e1 como insumo directo a tu M\u00f3dulo de Trabajo Emocional.';
  ecgInline.appendChild(ecgInlineTxt);
  wrap.appendChild(ecgInline);

  container.appendChild(wrap);
}

function updateResumenEl(chkKey, el) {
  if (!el) return;
  var est = checklist_estado[chkKey] || {dolor:[], alegria:[]};
  var d = (est.dolor||[]).length; var a = (est.alegria||[]).length;
  if (!d && !a) { el.textContent = 'Marca las situaciones que viviste en este ciclo.'; return; }
  el.innerHTML = '';
  var span = document.createElement('span');
  span.innerHTML = 'Identificaste <strong>' + d + ' situaciones de dolor</strong> y <strong>' + a + ' de alegr\u00eda</strong>.' +
    (d > 0 ? ' Estos ser\u00e1n insumo para tu Trabajo Emocional.' : '');
  el.appendChild(span);
}
