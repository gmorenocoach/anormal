<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∀normal — Mi Resumen de Conciencia</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060A14;--bg2:#0A0F1E;--bg3:#0E1525;--bg4:#131D30;
  --gold:#C9A84C;--gold2:#E8C96A;--gold3:#F5E0A0;
  --gd:rgba(201,168,76,.13);--gb:rgba(201,168,76,.28);
  --text:#EAE6DC;--dim:#8A95A8;--faint:#3A4558;--ffaint:#1E2A3A;
  --grn:#4ABF7A;--rose:#D4537E;
  --r:4px;--rm:8px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Barlow",sans-serif;font-weight:300;font-size:16.5px;line-height:1.7;min-height:100vh}
.wrap{max-width:720px;margin:0 auto;padding:24px 20px 60px}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 0 22px;border-bottom:1px solid var(--faint);margin-bottom:24px}
.hdr-logo{font-family:"Cormorant Garamond",serif;font-size:24px;color:var(--gold2)}
.hdr-info{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}

.label{font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:10px}
.titulo{font-family:"Cormorant Garamond",serif;font-size:clamp(26px,5vw,34px);font-weight:300;color:var(--gold2);line-height:1.2;margin-bottom:8px}
.subtitulo{font-size:14.5px;color:var(--dim);line-height:1.8;margin-bottom:24px}

.card{background:var(--bg2);border:1px solid rgba(255,255,255,.055);border-radius:var(--rl);padding:22px 24px;margin-bottom:16px}
.card.gold{border-color:var(--gb);background:linear-gradient(135deg,var(--bg2),var(--bg3))}
.cl{font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;font-weight:500}
.ct{font-size:14.5px;color:var(--dim);line-height:1.85}

/* NIVEL DE CONCIENCIA - HERO */
.nivel-hero{text-align:center;padding:8px 0}
.nivel-num{font-family:"Cormorant Garamond",serif;font-size:72px;font-weight:300;line-height:1;margin-bottom:4px}
.nivel-nombre{font-size:18px;font-weight:500;color:var(--text);margin-bottom:2px}
.nivel-zona{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:18px}
.nivel-barra{height:8px;background:var(--ffaint);border-radius:4px;overflow:hidden;margin-bottom:8px}
.nivel-relleno{height:100%;border-radius:4px;transition:width 1s ease}
.nivel-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--dim)}
.nivel-proceso{font-size:13px;color:var(--dim);line-height:1.8;margin-top:16px;padding:14px 16px;background:var(--bg3);border-radius:var(--rm);border-left:3px solid var(--gold)}

/* DATOS CLAVE */
.datos-grid{display:flex;gap:10px;flex-wrap:wrap}
.dato{flex:1;min-width:90px;text-align:center;background:var(--bg3);border-radius:var(--rm);padding:14px 10px}
.dato-val{font-family:"Cormorant Garamond",serif;font-size:22px;color:var(--gold2);line-height:1.1;margin-bottom:4px}
.dato-lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}

/* COMPROMISOS REGISTRABLES */
.comp-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:var(--bg3);border-radius:var(--rm);margin-bottom:8px;border:1px solid var(--faint);transition:all .2s;cursor:pointer}
.comp-item.cumplido{border-color:var(--grn);background:rgba(74,191,122,.06)}
.comp-check{min-width:22px;height:22px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-top:1px;transition:all .2s;flex-shrink:0}
.comp-check.on{background:var(--grn);border-color:var(--grn);color:var(--bg)}
.comp-body{flex:1}
.comp-area{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.comp-texto{font-size:14.5px;color:var(--text);line-height:1.5}

/* PRINCIPIOS INQUEBRANTABLES */
.princ-item{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--bg3);border-radius:var(--rm);margin-bottom:7px;border-left:3px solid}
.princ-num{font-family:"Cormorant Garamond",serif;font-size:20px;min-width:34px}
.princ-nombre{font-size:14.5px;color:var(--text);flex:1}
.princ-badge{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);background:var(--gd);padding:3px 8px;border-radius:10px}

/* ESCRITO */
.escrito-item{padding:12px 14px;background:var(--bg3);border-radius:var(--rm);margin-bottom:8px;border-left:3px solid var(--faint)}
.escrito-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.escrito-texto{font-size:14px;color:var(--text);line-height:1.7}

/* PRÓXIMA SESIÓN */
.sesion-card{background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--gb);border-radius:var(--rl);padding:20px 24px;text-align:center;margin-bottom:16px}
.sesion-dias{font-family:"Cormorant Garamond",serif;font-size:42px;color:var(--gold2);line-height:1}
.sesion-txt{font-size:14px;color:var(--dim);margin-top:6px}

.bp{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border:none;border-radius:var(--r);font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;padding:13px 30px;cursor:pointer;transition:opacity .2s}
.bs{background:transparent;color:var(--gold);border:1px solid var(--gb);border-radius:var(--r);font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;padding:11px 22px;cursor:pointer;text-decoration:none;display:inline-block}
.empty-state{text-align:center;padding:40px 20px;color:var(--dim)}
.empty-icon{font-size:48px;color:var(--faint);margin-bottom:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-logo">∀normal</div>
    <div class="hdr-info">Mi Resumen de Conciencia</div>
  </div>

  <div id="contenido"></div>
</div>

<div id="modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(6,10,20,.88);z-index:100;align-items:center;justify-content:center;padding:20px" onclick="if(event.target===this)cerrarModal()">
  <div style="background:var(--bg2);border:1px solid var(--gb);border-radius:var(--rl);padding:26px 24px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;position:relative">
    <button onclick="cerrarModal()" style="position:absolute;top:14px;right:16px;background:transparent;border:none;color:var(--dim);font-size:26px;cursor:pointer;line-height:1">×</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── LEER TODO EL ESTADO ──────────────────────────────────────────────
function leer(clave, def){
  try{ var v=localStorage.getItem(clave); return v===null?def:v; }catch(e){ return def; }
}
function leerJSON(clave, def){
  try{ var v=localStorage.getItem(clave); return v?JSON.parse(v):def; }catch(e){ return def; }
}

var nombre = leer('anormal_nombre','Participante');
var linea = leer('anormal_linea','');
var fechaNac = leer('anormal_fecha_nac','');
var numeroCamino = leer('anormal_numero_camino','');
var contrato = leerJSON('anormal_contrato',{});
var diagnostico = leerJSON('anormal_diagnostico',{});
var acciones = leerJSON('anormal_acciones',[]);
var prioridades = leerJSON('anormal_prioridades',[]);
var compromisosAreas = leerJSON('anormal_compromisos_areas',{});
var compromisoInicial = leer('anormal_compromiso_inicial','');
var principiosNuevos = leerJSON('anormal_principios_nuevos',{});
var puntosConciencia = parseInt(leer('anormal_puntos_conciencia','0'))||0;
var cumplidasComp = leerJSON('anormal_compromisos_cumplidos',{});

var lineaLabels = {salud:'Salud',dinero:'Dinero',amor:'Amor'};
var lineaColores = {salud:'#4ABF7A',dinero:'#C9A84C',amor:'#D4537E'};

// ── NIVEL DE CONCIENCIA ──────────────────────────────────────────────
var nivelMap=[
  {nivel:20,nombre:"Vergüenza",zona:"Zona crítica",color:"#4A0A0A"},
  {nivel:50,nombre:"Apatía / Culpa",zona:"Zona crítica",color:"#6A1010"},
  {nivel:75,nombre:"Tristeza",zona:"Zona de dolor",color:"#8A1515"},
  {nivel:100,nombre:"Miedo",zona:"Zona de dolor",color:"#A03520"},
  {nivel:150,nombre:"Ira / Rabia",zona:"Zona de alerta",color:"#A05A20"},
  {nivel:175,nombre:"Orgullo",zona:"Zona de alerta",color:"#7A6B29"},
  {nivel:200,nombre:"Coraje",zona:"Zona de inflexión",color:"#3A7A30"},
  {nivel:250,nombre:"Neutralidad",zona:"Zona de crecimiento",color:"#297A4A"},
  {nivel:310,nombre:"Disposición",zona:"Zona de crecimiento",color:"#2979A0"},
  {nivel:350,nombre:"Aceptación",zona:"Zona de éxito",color:"#5C2FA0"},
  {nivel:400,nombre:"Razón / Amor",zona:"Todo llega por añadidura",color:"#C9A84C"}
];

// Nivel base del diagnóstico + puntos acumulados
var nivelBase = diagnostico.nivel || 100;
var nivelTotal = nivelBase + puntosConciencia;
// Encontrar el nivel actual según el total
var nivelActual = nivelMap[0];
for(var i=0;i<nivelMap.length;i++){
  if(nivelTotal>=nivelMap[i].nivel) nivelActual=nivelMap[i];
}
var nivelIdx = nivelMap.indexOf(nivelActual);
var nivelCoraje = nivelMap.find(function(n){return n.nivel===200;});
var nivelObjetivo = nivelActual.nivel < 200 ? nivelCoraje : nivelMap[Math.min(nivelIdx+1,nivelMap.length-1)];

// ── PRINCIPIOS POR SESIÓN (los 18 reordenados) ──────────────────────
var PRINCIPIOS_18=[
  {n:1,nombre:"Agradecer",sesion:1,color:"#C9A84C"},
  {n:2,nombre:"Apúntale al compromiso",sesion:1,color:"#C9A84C"},
  {n:3,nombre:"Normaliza lo extraordinario",sesion:1,color:"#9B7FD4"},
  {n:4,nombre:"Avanza en el perdón",sesion:2,color:"#D4537E"},
  {n:5,nombre:"Aprovecha el dolor",sesion:2,color:"#D4537E"},
  {n:6,nombre:"Ataca el miedo",sesion:2,color:"#E8C96A"},
  {n:7,nombre:"Aprende cero excusas",sesion:3,color:"#4ABF7A"},
  {n:8,nombre:"Asume responsabilidad total",sesion:3,color:"#4ABF7A"},
  {n:9,nombre:"Apalancamiento: la verdad contigo mismo",sesion:3,color:"#4ABF7A"},
  {n:10,nombre:"Apoyo emocional como combustible",sesion:3,color:"#4ABF7A"},
  {n:11,nombre:"Aprende a pagar el precio",sesion:4,color:"#3E6B8C"},
  {n:12,nombre:"Adoptas lo que toleras",sesion:4,color:"#3E6B8C"},
  {n:13,nombre:"Aprópiate la insatisfacción",sesion:4,color:"#3E6B8C"},
  {n:14,nombre:"Adopta métodos probados",sesion:4,color:"#3E6B8C"},
  {n:15,nombre:"Alcanza el resultado luego mejora",sesion:5,color:"#5C2FA0"},
  {n:16,nombre:"Acelera el proceso",sesion:5,color:"#5C2FA0"},
  {n:17,nombre:"Atención y enfoque constante",sesion:5,color:"#5C2FA0"},
  {n:18,nombre:"Alcanzas la anormalidad",sesion:5,color:"#C9A84C"}
];
// La sesión actual del participante (por ahora Sesión 1)
var sesionActual = parseInt(leer('anormal_sesion_actual','1'))||1;
var principiosActivos = PRINCIPIOS_18.filter(function(p){ return p.sesion<=sesionActual; });

// ── RENDERIZAR ───────────────────────────────────────────────────────
function guardarCumplido(key){
  cumplidasComp[key]=!cumplidasComp[key];
  localStorage.setItem('anormal_compromisos_cumplidos',JSON.stringify(cumplidasComp));
  // Ajustar puntos
  var pts=parseInt(leer('anormal_puntos_conciencia','0'))||0;
  pts+=cumplidasComp[key]?10:-10; if(pts<0)pts=0;
  localStorage.setItem('anormal_puntos_conciencia',pts);
  render();
}

function render(){
  // Recargar datos que cambian
  cumplidasComp = leerJSON('anormal_compromisos_cumplidos',{});
  puntosConciencia = parseInt(leer('anormal_puntos_conciencia','0'))||0;
  nivelTotal = nivelBase + puntosConciencia;
  nivelActual = nivelMap[0];
  for(var i=0;i<nivelMap.length;i++){ if(nivelTotal>=nivelMap[i].nivel) nivelActual=nivelMap[i]; }
  nivelIdx = nivelMap.indexOf(nivelActual);
  var nivelCoraje = nivelMap.find(function(n){return n.nivel===200;});
  nivelObjetivo = nivelActual.nivel < 200 ? nivelCoraje : nivelMap[Math.min(nivelIdx+1,nivelMap.length-1)];

  var cont = document.getElementById('contenido');

  // Si no ha hecho la rueda todavía, estado vacío
  if(!diagnostico.nivel && !linea){
    cont.innerHTML = '<div class="empty-state"><div class="empty-icon">∀</div>' +
      '<p style="font-size:16px;margin-bottom:8px">Tu proceso aún no ha comenzado</p>' +
      '<p style="font-size:14px;margin-bottom:20px">Completa tu Sesión 1 para ver aquí tu resumen de conciencia.</p>' +
      '<a href="contrato-transformacion.html" class="bs">Comenzar mi proceso</a></div>';
    return;
  }

  var html = '';

  // SALUDO
  html += '<div class="label">Tu proceso, '+nombre+'</div>';
  html += '<h1 class="titulo">Resumen de tu conciencia</h1>';
  html += '<p class="subtitulo">Todo lo que has descubierto y a lo que te has comprometido vive aquí. Este es el centro de tu transformación.</p>';

  // VIDEO DE CIERRE DE SESIÓN
  var VIDEO_CIERRE_URL = ''; // Se activa cuando German grabe el video de cierre
  html += '<div class="card gold" style="padding:0;overflow:hidden;margin-bottom:16px">';
  if(VIDEO_CIERRE_URL){
    html += '<div style="position:relative;padding-bottom:56.25%;height:0"><iframe src="'+VIDEO_CIERRE_URL+'" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0" allowfullscreen></iframe></div>';
  } else {
    html += '<div style="padding:28px 24px;text-align:center">';
    html += '<div style="font-family:\'Cormorant Garamond\',serif;font-size:40px;color:var(--gold2);margin-bottom:8px">▶</div>';
    html += '<div style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:8px">Video de cierre — Sesión 1</div>';
    html += '<p style="font-size:13.5px;color:var(--dim);line-height:1.8;max-width:440px;margin:0 auto">Aquí irá el mensaje de cierre: dónde estás, a dónde debes llegar, y el recordatorio de que los compromisos que adquiriste son contigo mismo y con el proceso que iniciaste — no con nadie más. Lo que hiciste hoy es el insumo del siguiente nivel de conciencia.</p>';
    html += '</div>';
  }
  html += '</div>';

  // NIVEL DE CONCIENCIA HERO
  html += '<div class="card gold">';
  html += '<div class="cl">Tu nivel de conciencia hoy</div>';
  html += '<div class="nivel-hero">';
  html += '<div class="nivel-num" style="color:'+nivelActual.color+'">'+nivelActual.nivel+'</div>';
  html += '<div class="nivel-nombre">'+nivelActual.nombre+'</div>';
  html += '<div class="nivel-zona">'+nivelActual.zona+'</div>';
  // Explicación calificado vs real (si hay diferencia por las respuestas del diagnóstico)
  if(diagnostico.nivelCalificado && diagnostico.nivelCalificado !== nivelActual.nivel){
    html += '<div style="font-size:13px;color:var(--dim);line-height:1.7;margin-bottom:14px;padding:0 10px">En tu rueda calificaste un promedio que da <strong style="color:var(--gold2)">'+diagnostico.nivelCalificado+'</strong>, pero al cruzarlo con tus respuestas sobre tu origen, tu nivel de conciencia real hoy es <strong style="color:'+nivelActual.color+'">'+nivelActual.nivel+'</strong>. Eso es honestidad — y la honestidad es el punto de partida.</div>';
  }
  var pct = Math.round((nivelActual.nivel-20)/(400-20)*100);
  html += '<div class="nivel-barra"><div class="nivel-relleno" style="width:'+pct+'%;background:'+nivelActual.color+'"></div></div>';
  html += '<div class="nivel-meta"><span>Nivel '+nivelActual.nivel+'</span><span>Objetivo: '+nivelObjetivo.nivel+' — '+nivelObjetivo.nombre+'</span></div>';
  html += '<div class="nivel-proceso">Subir tu nivel de conciencia no es tachar tareas — es volverte ∀normal de forma permanente. Cada acción cumplida, cada principio que vives, te transforma un poco más. Esto es un proceso de por vida, no una meta que se alcanza y se olvida.</div>';
  html += '</div></div>';

  // DATOS CLAVE
  html += '<div class="card"><div class="cl">Tu punto de partida</div><div class="datos-grid">';
  if(linea) html += '<div class="dato"><div class="dato-val" style="color:'+(lineaColores[linea]||'var(--gold2)')+'">'+(lineaLabels[linea]||linea)+'</div><div class="dato-lbl">Tu línea</div></div>';
  // número de vida se muestra en sesión de numerología, no aquí
  html += '<div class="dato"><div class="dato-val">'+(diagnostico.nivel||nivelBase)+'</div><div class="dato-lbl">Nivel inicial</div></div>';
  html += '</div></div>';

  // COMPROMISOS REGISTRABLES — áreas críticas + 5 acciones prioritarias unificadas
  var listaCompromisos = [];
  // Compromisos de áreas (los escritos en la rueda)
  Object.keys(compromisosAreas).forEach(function(areaId){
    var comp = compromisosAreas[areaId];
    listaCompromisos.push({
      key:'comp_'+areaId,
      etiqueta: comp.nombre,
      texto: (comp.texto||comp),
      tipo:'area'
    });
  });
  // Las 5 acciones prioritarias
  if(prioridades.length>0 && acciones.length>0){
    prioridades.forEach(function(num,i){
      var acc = acciones.find(function(a){return String(a.num)===String(num);});
      if(!acc)return;
      listaCompromisos.push({
        key:'accion_'+num,
        etiqueta:'Acción prioritaria '+(i+1),
        texto: acc.texto,
        tipo:'accion'
      });
    });
  }

  if(listaCompromisos.length>0){
    html += '<div class="card"><div class="cl">Mis compromisos y acciones — registra lo que vas cumpliendo</div>';
    html += '<p class="ct" style="margin-bottom:8px">Marca cada compromiso y cada acción cuando los cumplas. Cada uno que completas sube tu nivel de conciencia.</p>';
    html += '<div style="font-size:13px;color:var(--gold2);line-height:1.7;margin-bottom:14px;padding:10px 14px;background:var(--gd);border-radius:8px;border-left:3px solid var(--gold)">Vuelve aquí cada día y registra lo que vas cumpliendo. La idea es que cuando lleguen los 15 días, ya tengas tus compromisos realizados — no que los dejes para el final. La constancia diaria es lo que te vuelve ∀normal.</div>';
    listaCompromisos.forEach(function(item){
      var cumplido = !!cumplidasComp[item.key];
      var colorTipo = item.tipo==='area' ? 'var(--gold)' : 'var(--rose)';
      html += '<div class="comp-item'+(cumplido?' cumplido':'')+'" onclick="guardarCumplido(\''+item.key+'\')">';
      html += '<div class="comp-check'+(cumplido?' on':'')+'">✓</div>';
      html += '<div class="comp-body"><div class="comp-area" style="color:'+colorTipo+'">'+item.etiqueta+'</div><div class="comp-texto">'+item.texto+'</div></div>';
      html += '</div>';
    });
    var totalCump = listaCompromisos.filter(function(it){return cumplidasComp[it.key];}).length;
    html += '<p style="font-size:13px;color:var(--dim);text-align:right;margin-top:8px">'+totalCump+' de '+listaCompromisos.length+' cumplidos</p>';
    html += '</div>';
  }

  // PRINCIPIOS INQUEBRANTABLES (acumulados)
  html += '<div class="card"><div class="cl">Mis principios inquebrantables</div>';
  html += '<p class="ct" style="margin-bottom:14px">Estos son los principios que ya activaste. Cada uno es no negociable — son la ruta para subir tu conciencia. Se irán sumando a medida que avances en las sesiones.</p>';
  principiosActivos.forEach(function(p){
    html += '<div class="princ-item princ-click" style="border-left-color:'+p.color+';cursor:pointer" onclick="abrirPrincipio('+p.n+')">';
    html += '<div class="princ-num" style="color:'+p.color+'">∀'+p.n+'</div>';
    html += '<div class="princ-nombre">'+p.nombre+'</div>';
    html += '<div class="princ-flecha" style="color:'+p.color+';font-size:18px">›</div>';
    html += '</div>';
  });
  var faltan = PRINCIPIOS_18.length - principiosActivos.length;
  if(faltan>0){
    html += '<p style="font-size:13px;color:var(--dim);text-align:center;margin-top:10px">Te faltan '+faltan+' principios por descubrir en las próximas sesiones</p>';
  }
  html += '<p style="font-size:12px;color:var(--dim);text-align:center;margin-top:6px;font-style:italic">Toca cualquier principio para releerlo</p>';
  html += '</div>';

  // LO QUE ESCRIBÍ (intención, visión, compromiso)
  var tieneEscrito = contrato.intencion || contrato.vision || compromisoInicial;
  if(tieneEscrito){
    html += '<div class="card"><div class="cl">Lo que declaré al comenzar</div>';
    if(contrato.intencion) html += '<div class="escrito-item"><div class="escrito-label">Mi intención trascendente</div><div class="escrito-texto">'+contrato.intencion+'</div></div>';
    if(contrato.vision) html += '<div class="escrito-item"><div class="escrito-label">Mi visión ∀normal</div><div class="escrito-texto">'+contrato.vision+'</div></div>';
    if(compromisoInicial) html += '<div class="escrito-item"><div class="escrito-label">Mi compromiso con los principios</div><div class="escrito-texto">'+compromisoInicial+'</div></div>';
    html += '</div>';
  }

  // PRÓXIMA SESIÓN
  var fechaProxima = leer('anormal_fecha_sesion_'+(sesionActual+1),'');
  var diasRestantes = 15; // default
  if(fechaProxima){
    var hoy = new Date();
    var prox = new Date(fechaProxima);
    diasRestantes = Math.max(0,Math.ceil((prox-hoy)/(1000*60*60*24)));
  }
  // Calcular si la cuenta regresiva ya inició
  var fechaInicio = leer('anormal_fecha_inicio_proceso','');
  if(!fechaInicio){
    // Iniciar la cuenta regresiva el día que termina la Sesión 1
    fechaInicio = new Date().toISOString();
    localStorage.setItem('anormal_fecha_inicio_proceso', fechaInicio);
  }
  var diasTranscurridos = Math.floor((new Date() - new Date(fechaInicio))/(1000*60*60*24));
  var diasParaSesion = Math.max(0, 15 - diasTranscurridos);

  html += '<div class="sesion-card">';
  html += '<div class="label" style="text-align:center;color:var(--rose)">La cuenta ya inició</div>';
  html += '<div class="sesion-dias" style="color:var(--rose)">'+diasParaSesion+'</div>';
  html += '<div class="sesion-txt">días para tu Sesión '+(sesionActual+1)+'</div>';
  html += '<p style="font-size:13.5px;color:var(--text);margin-top:14px;line-height:1.8;font-weight:400">Estos compromisos no son conmigo. Son contigo y con el proceso que iniciaste hoy. Cada día cuenta. Cada acción cumplida sube tu nivel de conciencia.</p>';
  html += '<p style="font-size:13px;color:var(--dim);margin-top:10px;line-height:1.7">Cuando vuelvas en '+diasParaSesion+' días, vas a calificar lo que cumpliste — y ese es el insumo del siguiente nivel de tu transformación.</p>';
  html += '</div>';

  // ACCESO SESIÓN 2 (cuando está desbloqueada)
  var sesion2Lista = (sesionActual >= 2) || (diasParaSesion === 0);
  if(sesion2Lista){
    html += '<a href="entrada-sesion2.html" class="bp" style="display:block;text-align:center;text-decoration:none;margin-top:14px">Entrar a la Sesión 2 · Ciclos de vida →</a>';
  }

  // BOTONES DE ACCIÓN
  html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">';
  if(contrato.firma || contrato.intencion){
    html += '<button class="bs" style="flex:1;text-align:center" onclick="abrirContrato()">Ver mi contrato firmado</button>';
  }
  html += '<a href="0a-rueda-vida.html" class="bs" style="flex:1;text-align:center">Volver a mi rueda</a>';
  html += '</div>';

  // ACCESO MODO DE PRUEBA (discreto - solo para evaluación)
  html += '<div style="text-align:center;margin-top:30px;opacity:.35">';
  html += '<span style="font-size:11px;color:var(--dim);cursor:pointer;letter-spacing:.1em" onclick="togglePrueba()">· modo evaluación ·</span>';
  html += '</div>';
  html += '<div id="panel-prueba" style="display:none;margin-top:12px;padding:16px;background:var(--bg3);border:1px dashed var(--faint);border-radius:var(--rm)">';
  html += '<div style="font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--rose);margin-bottom:10px">Modo evaluación — solo para pruebas</div>';
  html += '<p style="font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:12px">Este panel te deja simular el paso del tiempo y avanzar de sesión para evaluar la continuidad. En producción, las sesiones respetan los 15 días reales.</p>';
  html += '<div style="display:flex;flex-direction:column;gap:8px">';
  html += '<div style="font-size:13px;color:var(--text)">Sesión actual: <strong style="color:var(--gold2)">'+sesionActual+'</strong></div>';
  if(sesionActual>1){
    html += '<div style="font-size:12px;color:var(--rose);line-height:1.6;padding:8px 10px;background:rgba(212,83,126,.08);border-radius:6px">Estás en modo prueba en la Sesión '+sesionActual+'. Por eso ves principios de sesiones avanzadas (∀'+((sesionActual-1)*3+1)+' en adelante). Los módulos de estas sesiones aún están en construcción.</div>';
    html += '<button class="bs" onclick="pruebaVolverSesion1()" style="text-align:center;border-color:var(--gold);color:var(--gold)">↩ Volver a Sesión 1</button>';
  }
  html += '<button class="bs" onclick="pruebaAvanzarSesion()" style="text-align:center">Simular: desbloquear siguiente sesión →</button>';
  html += '<button class="bs" onclick="pruebaReiniciar()" style="text-align:center;border-color:var(--rose);color:var(--rose)">Reiniciar todo el proceso</button>';
  html += '</div></div>';

  cont.innerHTML = html;
}

// ── MODO DE PRUEBA ───────────────────────────────────────────────────
function togglePrueba(){
  var panel = document.getElementById('panel-prueba');
  panel.style.display = panel.style.display==='none'?'block':'none';
}
function pruebaAvanzarSesion(){
  var actual = parseInt(leer('anormal_sesion_actual','1'))||1;
  if(actual>=5){ alert('Ya estás en la última sesión (5).'); return; }
  localStorage.setItem('anormal_sesion_actual', actual+1);
  // Poner fecha de la siguiente sesión como hoy (desbloqueada)
  localStorage.setItem('anormal_fecha_sesion_'+(actual+1), new Date().toISOString());
  alert('Sesión '+(actual+1)+' desbloqueada. (Los módulos de esta sesión aún están en construcción.)');
  location.reload();
}
function pruebaVolverSesion1(){
  localStorage.setItem('anormal_sesion_actual','1');
  alert('Volviste a la Sesión 1. Ahora solo verás los principios 1, 2 y 3.');
  location.reload();
}
function pruebaReiniciar(){
  if(confirm('¿Reiniciar todo el proceso? Se borrarán todos los datos para empezar de cero.')){
    var claves = ['anormal_nombre','anormal_fecha_nac','anormal_numero_camino','anormal_linea',
      'anormal_contrato','anormal_contrato_firmado','anormal_entrada_completa','anormal_diagnostico',
      'anormal_acciones','anormal_prioridades','anormal_compromisos_areas','anormal_compromiso_inicial',
      'anormal_principios_nuevos','anormal_puntos_conciencia','anormal_compromisos_cumplidos','anormal_sesion_actual','anormal_rueda_areas','widget_visto_rueda','anormal_fecha_inicio_proceso'];
    claves.forEach(function(k){ localStorage.removeItem(k); });
    // Borrar también fechas de sesiones
    for(var s=2;s<=5;s++){ localStorage.removeItem('anormal_fecha_sesion_'+s); }
    window.location.href='contrato-transformacion.html';
  }
}

// ── MODAL DE PRINCIPIO ───────────────────────────────────────────────
var PRINC_DETALLE = {
  1:{voz:"\"Den gracias en toda circunstancia.\" La gratitud no es una emoción pasajera — es una decisión consciente de ver cada experiencia como parte de un proceso mayor. Quien no reconoce lo que ya tiene, no puede construir nada sólido sobre esa base.",
     exige:"La gratitud no es opcional. Es el lente desde el que lees cada resultado, cada ejercicio, cada descubrimiento sobre ti mismo. Un resultado que te incomoda, visto con gratitud, se convierte en información. Visto sin gratitud, se convierte en excusa."},
  2:{voz:"\"Nadie que pone la mano en el arado y mira hacia atrás es apto para lo que viene.\" El compromiso que tomaste hoy es más inteligente que cualquier excusa que vayas a construir mañana.",
     exige:"Ya te comprometiste al entrar. Ese compromiso no vence. Cada vez que sientas que quieres pausar, recuerda: te comprometiste antes de saber el cómo. Eso es lo que distingue a quien transforma de quien solo aprende."},
  3:{voz:"\"Quien cree en lo que está haciendo hará obras mayores de las que imagina.\" Ver algo extraordinario en ti mismo es fácil. Normalizarlo — vivirlo, aplicarlo, habitarlo — eso es lo extraordinario.",
     exige:"Lo que descubras sobre ti en este proceso debe convertirse en tu nueva normalidad, no en un dato interesante que olvidas en una semana. No son revelaciones temporales. Son tu nueva forma de verte."}
};

function abrirPrincipio(n){
  var p = PRINCIPIOS_18.find(function(x){return x.n===n;});
  var det = PRINC_DETALLE[n] || {};
  var modal = document.getElementById('modal');
  var body = document.getElementById('modal-body');
  var h = '';
  h += '<div style="font-family:\'Cormorant Garamond\',serif;font-size:48px;color:'+p.color+';line-height:1;margin-bottom:4px">∀'+p.n+'</div>';
  h += '<div style="font-family:\'Cormorant Garamond\',serif;font-size:26px;color:'+p.color+';margin-bottom:16px">'+p.nombre+'</div>';
  h += '<div style="height:1px;background:var(--faint);margin-bottom:14px"></div>';
  if(det.exige){
    h += '<div style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:'+p.color+';margin-bottom:6px">No negociable</div>';
    h += '<div style="font-size:14.5px;color:var(--text);line-height:1.8;margin-bottom:16px">'+det.exige+'</div>';
  }
  if(det.voz){
    h += '<div style="padding:14px 16px;background:var(--bg3);border-left:3px solid '+p.color+';border-radius:0 var(--rm) var(--rm) 0">';
    h += '<div style="font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:8px">Una voz que me acompaña</div>';
    h += '<div style="font-size:14px;color:var(--dim);line-height:1.8;font-style:italic">'+det.voz+'</div>';
    h += '</div>';
  }
  body.innerHTML = h;
  modal.style.display = 'flex';
}

function abrirContrato(){
  var modal = document.getElementById('modal');
  var body = document.getElementById('modal-body');
  var h = '';
  h += '<div style="font-family:\'Cormorant Garamond\',serif;font-size:28px;color:var(--gold2);margin-bottom:6px">Mi Contrato de Transformación</div>';
  h += '<div style="font-size:12px;color:var(--dim);margin-bottom:16px">Firmado por '+nombre+'</div>';
  h += '<div style="height:1px;background:var(--faint);margin-bottom:16px"></div>';
  if(contrato.intencion){
    h += '<div style="font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:6px">Mi intención trascendente</div>';
    h += '<div style="font-size:14.5px;color:var(--text);line-height:1.8;margin-bottom:16px">'+contrato.intencion+'</div>';
  }
  if(contrato.vision){
    h += '<div style="font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:6px">Mi visión ∀normal</div>';
    h += '<div style="font-size:14.5px;color:var(--text);line-height:1.8;margin-bottom:16px">'+contrato.vision+'</div>';
  }
  h += '<div style="padding:14px 16px;background:var(--bg3);border-left:3px solid var(--gold);border-radius:0 var(--rm) var(--rm) 0;margin-top:8px">';
  h += '<div style="font-size:14px;color:var(--gold2);line-height:1.8;font-style:italic">"Con esta firma, declaro la guerra a mi mediocridad. Elijo conscientemente el camino menos transitado."</div>';
  if(contrato.fecha){
    var f = new Date(contrato.fecha);
    h += '<div style="font-size:12px;color:var(--dim);margin-top:10px">Firmado el '+f.toLocaleDateString('es-CO',{year:'numeric',month:'long',day:'numeric'})+'</div>';
  }
  h += '</div>';
  body.innerHTML = h;
  modal.style.display = 'flex';
}

function cerrarModal(){
  document.getElementById('modal').style.display = 'none';
}

render();
</script>
